<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台 · 图片管理</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#171412;color:#d0c4b4;font-family:'Noto Serif SC','Source Han Serif SC',serif;padding:20px}
h1{font-weight:400;letter-spacing:8px;font-size:24px;margin-bottom:6px;color:#e4d8c8}
h2{font-weight:400;letter-spacing:4px;font-size:16px;margin-bottom:12px;color:#b0a090}
.sub{color:#7a6a5a;font-size:11px;letter-spacing:4px;margin-bottom:20px}
.login{max-width:400px;margin:100px auto;text-align:center}
.login input{padding:10px 16px;background:rgba(30,25,20,0.8);border:1px solid rgba(80,65,50,0.3);color:#d0c4b4;font-size:14px;width:100%;margin-bottom:12px;border-radius:4px;letter-spacing:4px}
.login button{padding:10px 32px;background:rgba(60,40,30,0.6);border:1px solid rgba(120,90,60,0.3);color:#c0a070;cursor:pointer;font-size:13px;letter-spacing:6px;border-radius:4px}
.login button:hover{background:rgba(80,55,40,0.6)}
.login .error{color:#c05030;font-size:12px;margin-top:10px;letter-spacing:2px}
.entry{background:rgba(25,20,17,0.6);border:1px solid rgba(60,45,35,0.2);margin-bottom:16px;padding:16px;border-radius:6px}
.entry-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.entry-header img{width:50px;height:50px;border-radius:50%;object-fit:cover;border:1px solid rgba(80,65,50,0.2)}
.entry-header .name{font-size:18px;letter-spacing:4px;color:#e4d8c8}
.entry-header .slug{color:#5a4a3a;font-size:11px;font-family:monospace}
.imgs{display:flex;gap:8px;flex-wrap:wrap}
.imgs .img-card{width:100px;cursor:pointer;border:2px solid transparent;border-radius:6px;overflow:hidden;transition:all .2s;position:relative;background:rgba(30,25,20,0.5)}
.imgs .img-card.active{border-color:#c0a070;box-shadow:0 0 12px rgba(192,160,112,0.15)}
.imgs .img-card:hover{border-color:rgba(160,130,100,0.3)}
.imgs .img-card img{width:100px;height:100px;object-fit:cover;display:block}
.imgs .img-card .label{font-size:9px;color:#5a4a3a;text-align:center;padding:3px 0;letter-spacing:2px;position:relative}
.imgs .img-card.active .label{color:#c0a070}
.imgs .img-card .check{position:absolute;top:4px;right:4px;width:18px;height:18px;background:#c0a070;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:10px;color:#171412}
.imgs .img-card.active .check{display:flex}
.imgs .img-card .del-btn{position:absolute;top:4px;left:4px;width:16px;height:16px;background:rgba(180,50,30,0.7);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff;cursor:pointer;z-index:2}
.imgs .img-card:hover .del-btn{display:flex}
.imgs .img-card .del-btn:hover{background:rgba(200,60,40,0.9)}
.status-bar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.status-bar .stat{color:#5a4a3a;font-size:11px;letter-spacing:2px}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.btn{padding:8px 20px;background:rgba(60,40,30,0.6);border:1px solid rgba(120,90,60,0.3);color:#c0a070;cursor:pointer;font-size:12px;letter-spacing:4px;border-radius:4px}
.btn:hover{background:rgba(80,55,40,0.6)}
.btn-primary{background:rgba(120,60,30,0.4);border-color:rgba(160,80,40,0.3);color:#d08050}
.btn-primary:hover{background:rgba(140,70,35,0.4)}
.btn-small{padding:4px 12px;font-size:10px;letter-spacing:2px}
.btn:disabled{opacity:0.3;cursor:not-allowed}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(30,25,20,0.95);border:1px solid rgba(80,65,50,0.3);padding:10px 24px;border-radius:6px;z-index:999;display:none;letter-spacing:3px;font-size:12px;backdrop-filter:blur(8px)}
.toast.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.loading{color:#5a4a3a;text-align:center;padding:40px;font-size:12px;letter-spacing:4px}
.upload-zone{display:none;margin-top:8px;padding:16px;border:1px dashed rgba(80,65,50,0.3);border-radius:6px;text-align:center;background:rgba(30,25,20,0.3)}
.upload-zone.show{display:block}
.upload-zone input[type=file]{color:#d0c4b4;font-size:11px;letter-spacing:2px;margin-bottom:8px}
.fetch-more{display:inline-block;margin-left:8px}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
const API = '/api';
let TOKEN = '';
const SLUGS = ['changshu_anuo','dailanzi','daoge','dingzhen','fanxiaoqin','fengge','gazi','huge','laoa','laochen','liangzi','lili','mabaoguo','maoyibei','sanheshen','shamatetuanzhang','shenyingheishou','sunxiaochuan','wangweiheng','wujing','xiucai','yangli','yaoshuige','yujie','zhangxuefeng'];
const SLUG_NAMES = {
  changshu_anuo:'常熟阿诺',dailanzi:'带篮子',daoge:'刀哥',dingzhen:'丁真',
  fanxiaoqin:'范小勤',fengge:'峰哥',gazi:'嘎子',huge:'虎哥',laoa:'牢A',
  laochen:'反诈警官老陈',liangzi:'良子',lili:'丽丽',mabaoguo:'马保国',
  maoyibei:'猫一杯',sanheshen:'三和大神',shamatetuanzhang:'杀马特团长',
  shenyingheishou:'神鹰黑手',sunxiaochuan:'孙笑川',wangweiheng:'王伟恒',
  wujing:'吴京',xiucai:'秀才',yangli:'杨笠',yaoshuige:'药水哥',
  yujie:'东北雨姐',zhangxuefeng:'张雪峰'
};

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500)}
function authHeaders(){return{'X-Admin-Token':TOKEN,'Content-Type':'application/json'}}

async function api(path,opts={}){
  const r=await fetch(API+path,{...opts,headers:{...authHeaders(),...opts.headers}});
  const d=await r.json();
  if(!r.ok&&d.error) throw new Error(d.error);
  return d;
}

function showLogin(){
  document.getElementById('app').innerHTML='<div class="login"><h1>后台管理</h1><div class="sub">INTRANET IMAGE ADMIN</div><input type="password" id="token-input" placeholder="管理员令牌" autofocus><button onclick="login()">登录</button><div id="login-error" class="error"></div></div>';
  document.getElementById('token-input').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
}

async function login(){
  TOKEN=document.getElementById('token-input').value;
  try{
    const r=await fetch(API+'/admin/verify',{method:'POST',headers:{'X-Admin-Token':TOKEN}});
    const d=await r.json();
    if(!d.ok) throw new Error('fail');
    localStorage.setItem('admin_token',TOKEN);
    loadDashboard();
  }catch(e){
    document.getElementById('login-error').textContent='令牌错误或连接失败';
    TOKEN='';
  }
}

async function loadDashboard(){
  document.getElementById('app').innerHTML='<div class="loading">LOADING...</div>';
  try{
    const data=await api('/admin/image-status');
    renderDashboard(data.status);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading" style="color:#c05030">加载失败: '+e.message+'</div>';
  }
}

async function rebuildAndReload(){
  const btn=document.querySelector('.btn-rebuild');
  if(btn)btn.disabled=true;
  toast('重建中...');
  try{
    const d=await api('/admin/rebuild',{method:'POST'});
    toast(d.ok?'重建成功':'重建失败: '+JSON.stringify(d));
    if(d.ok) setTimeout(loadDashboard,2000);
  }catch(e){toast('重建失败: '+e.message)}
  if(btn)btn.disabled=false;
}

function renderDashboard(status){
  const entries=SLUGS.map(slug=>{
    const st=status[slug]||{hasAvatar:false,avatarUrl:null,altCount:0};
    const name=SLUG_NAMES[slug];
    const currentUrl=(st.avatarUrl||'/images/placeholder-avatar.svg')+'?t='+Date.now();
    const alts=[];
    const maxAlt=Math.max(st.altCount||0,5)+2;
    const cb='?t='+Date.now(); for(let i=1;i<=maxAlt;i++) alts.push('/images/'+slug+'-avatar-alt-'+i+'.jpg'+cb);
    return {slug,name,currentUrl,alts,altCount:st.altCount||0};
  });

  let html='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><h1>图片管理</h1><div class="sub">点击头像或备选图切换 · 点上传按钮添加自定义图片</div></div><div style="display:flex;gap:8px"><button class="btn btn-primary btn-rebuild" onclick="rebuildAndReload()">重建站点</button><button class="btn" onclick="logout()">退出</button></div></div><div class="status-bar"><span class="stat">'+entries.length+' 条档案</span><span class="stat">|</span><span class="stat">有头像 '+entries.filter(e=>e.currentUrl.includes('avatar.jpg')).length+'/'+entries.length+'</span></div>';

  for(const e of entries){
    const hasCurrent=e.currentUrl.includes('avatar.jpg');
    html+='<div class="entry" id="entry-'+e.slug+'"><div class="entry-header"><img src="'+e.currentUrl+'" onerror="this.src=\'/images/placeholder-avatar.svg\'"><div><div class="name">'+e.name+'</div><div class="slug">'+e.slug+' ('+e.altCount+'张备选)</div></div><span style="margin-left:auto;font-size:10px;color:'+(hasCurrent?'#6a8a5a':'#5a4a3a')+';letter-spacing:2px">'+(hasCurrent?'✓ 有头像':'○ 无头像')+'</span></div><div class="imgs"><div class="img-card'+(!e.currentUrl.includes('placeholder')?' active':'')+'" onclick="setAvatar(\''+e.slug+'\',\''+e.currentUrl+'\',this)"><img src="'+e.currentUrl+'" onerror="this.src=\'/images/placeholder-avatar.svg\'"><div class="label">当前</div><div class="check">✓</div></div>';

    for(const alt of e.alts){
      html+='<div class="img-card" id="card-'+e.slug+'-alt-'+e.alts.indexOf(alt)+'" onclick="setAvatar(\''+e.slug+'\',\''+alt+'\',this)"><div class="del-btn" onclick="event.stopPropagation();delImage(\''+e.slug+'\','+e.alts.indexOf(alt)+')">×</div><img src="'+alt+'" onerror="this.parentElement.style.display=\'none\'" loading="lazy"><div class="label">备选</div></div>';
    }

    html+='</div><div class="action-row">';
    html+='<button class="btn btn-small" onclick="toggleUpload(\''+e.slug+'\')">📤 上传图片</button>';
    html+='<button class="btn btn-small fetch-more" onclick="fetchMore(\''+e.slug+'\')">🔍 搜更多</button>';
    html+='</div>';
    html+='<div class="upload-zone" id="upload-'+e.slug+'"><input type="file" id="file-'+e.slug+'" accept="image/*" multiple><br><button class="btn btn-small btn-primary" onclick="uploadFiles(\''+e.slug+'\')">上传</button></div>';
    html+='</div>';
  }
  document.getElementById('app').innerHTML=html;
}

function toggleUpload(slug){
  const z=document.getElementById('upload-'+slug);
  z.classList.toggle('show');
}

async function uploadFiles(slug){
  const input=document.getElementById('file-'+slug);
  if(!input.files.length){toast('请选择图片');return}
  let count=0;
  const total=input.files.length;
  for(const file of input.files){
    try{
      const dataUrl=await new Promise((resolve,reject)=>{
        const r=new FileReader();
        r.onload=()=>resolve(r.result);
        r.onerror=reject;
        r.readAsDataURL(file);
      });
      await api('/admin/upload-image',{method:'POST',body:JSON.stringify({slug,image:dataUrl,type:'avatar-alt'})});
      count++;
    }catch(e){toast('上传失败: '+file.name+' - '+e.message)}
  }
  toast('上传完成: '+count+'/'+total);
  input.value='';
  loadDashboard();
}

async function fetchMore(slug){
  toast('正在搜索更多 '+SLUG_NAMES[slug]+' 的图片...');
  try{
    const d=await api('/admin/fetch-images',{method:'POST',body:JSON.stringify({slug})});
    if(d.count>0) toast('新增 '+d.count+' 张备选图');
    else toast('未找到更多图片');
    loadDashboard();
  }catch(e){toast('搜索失败: '+e.message)}
}

async function setAvatar(slug,url,el){
  if(url.includes('placeholder')) return;
  if(!confirm('确定将 '+SLUG_NAMES[slug]+' 的头像切换为此图片？')) return;
  try{
    const r=await fetch(url);
    const blob=await r.blob();
    const reader=new FileReader();
    reader.onload=async function(){
      try{
        await api('/admin/upload-image',{method:'POST',body:JSON.stringify({slug,image:reader.result,type:'avatar'})});
        const entry=document.getElementById('entry-'+slug);
        entry.querySelectorAll('.img-card').forEach(c=>{c.classList.remove('active');const ch=c.querySelector('.check');if(ch)ch.style.display='none'});
        el.classList.add('active');
        const ch=el.querySelector('.check');if(ch)ch.style.display='flex';
        entry.querySelector('.entry-header img').src=url;
        toast(SLUG_NAMES[slug]+' 头像已切换');
      }catch(e){toast('切换失败: '+e.message)}
    };
    reader.readAsDataURL(blob);
  }catch(e){toast('下载图片失败: '+e.message)}
}

async function delImage(slug,idx){
  if(!confirm('确定删除 '+SLUG_NAMES[slug]+' 的备选图 '+idx+'？')) return;
  try{
    await api('/admin/delete-alt',{method:'POST',body:JSON.stringify({slug,index:idx})});
    document.getElementById('card-'+slug+'-alt-'+idx).style.display='none';
    toast('已删除');
  }catch(e){toast('删除失败: '+e.message)}
}

function logout(){localStorage.removeItem('admin_token');TOKEN='';showLogin()}

{
  const saved=localStorage.getItem('admin_token');
  if(saved){
    TOKEN=saved;
    fetch(API+'/admin/verify',{method:'POST',headers:{'X-Admin-Token':TOKEN}})
      .then(r=>r.json()).then(d=>{if(d.ok)loadDashboard();else showLogin()}).catch(()=>showLogin());
  }else showLogin();
}
</script>
</body>
</html>
