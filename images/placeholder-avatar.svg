<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <linearGradient id="bg" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#191512"/>
      <stop offset="50%" stop-color="#14110e"/>
      <stop offset="100%" stop-color="#100d09"/>
    </linearGradient>
    <linearGradient id="vignette" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(180,140,80,0.02)" />
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </linearGradient>
    <linearGradient id="plate" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(60,50,40,0.12)"/>
      <stop offset="50%" stop-color="rgba(40,35,30,0.06)"/>
      <stop offset="100%" stop-color="rgba(50,40,30,0.18)"/>
    </linearGradient>
  </defs>

  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="transparent" filter="url(#noise)" opacity="0.035"/>
  <rect width="400" height="500" fill="url(#vignette)"/>

  <!-- Border -->
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="rgba(100,80,60,0.1)" stroke-width="1"/>
  <rect x="24" y="24" width="352" height="452" fill="none" stroke="rgba(140,120,100,0.05)" stroke-width="1"/>

  <!-- Photo oval -->
  <ellipse cx="200" cy="170" rx="110" ry="100" fill="url(#plate)" stroke="rgba(140,120,100,0.12)" stroke-width="1"/>
  <ellipse cx="200" cy="170" rx="107" ry="97" fill="none" stroke="rgba(140,120,100,0.05)" stroke-width="1"/>

  <!-- Reticle marks -->
  <line x1="90" y1="170" x2="72" y2="170" stroke="rgba(140,120,100,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="310" y1="170" x2="328" y2="170" stroke="rgba(140,120,100,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="70" x2="200" y2="52" stroke="rgba(140,120,100,0.08)" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="200" y1="270" x2="200" y2="288" stroke="rgba(140,120,100,0.08)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Center crosshair -->
  <circle cx="200" cy="170" r="2.5" fill="none" stroke="rgba(140,120,100,0.06)" stroke-width=".5"/>

  <!-- Clasps -->
  <path d="M32 32 L60 32 L60 35 L35 35 L35 60 L32 60 Z" fill="rgba(140,120,100,0.05)"/>
  <path d="M368 32 L340 32 L340 35 L365 35 L365 60 L368 60 Z" fill="rgba(140,120,100,0.05)"/>
  <path d="M32 468 L60 468 L60 465 L35 465 L35 440 L32 440 Z" fill="rgba(140,120,100,0.05)"/>
  <path d="M368 468 L340 468 L340 465 L365 465 L365 440 L368 440 Z" fill="rgba(140,120,100,0.05)"/>

  <!-- Typography -->
  <text x="200" y="315" text-anchor="middle" font-family="'Times New Roman',Georgia,serif" font-size="9" fill="rgba(160,130,100,0.12)" letter-spacing="10">PORTRAIT</text>
  <text x="200" y="335" text-anchor="middle" font-family="'Times New Roman',Georgia,serif" font-size="7" fill="rgba(160,130,100,0.08)" letter-spacing="5">待 补</text>
  <line x1="150" y1="345" x2="250" y2="345" stroke="rgba(140,120,100,0.05)" stroke-width="1"/>
  <text x="200" y="375" text-anchor="middle" font-family="'Courier New',monospace" font-size="6" fill="rgba(100,80,60,0.1)" letter-spacing="3">影像待录</text>
  <text x="200" y="460" text-anchor="middle" font-family="'Times New Roman',Georgia,serif" font-size="5" fill="rgba(80,65,50,0.1)" letter-spacing="6">档 案 馆 藏</text>
</svg>
