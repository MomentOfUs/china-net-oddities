english_name: 'Fan Xiaoqin (Little Jack Ma) '
essay: '<p>范小勤的故事是中国互联网最残酷的童话。</p><p>2015年，江西永丰县严辉村，一个7岁男孩因为长相酷似马云，被资本从山沟里捞出来，穿上名牌，送上镁光灯。"小马云"这个称号给他带来了一时的风光，也剥夺了他的童年、教育和自由。</p><p>他被签下后，行程表排满：商演、直播、拍广告、上综艺。他学会了在镜头前机械地说"大家好，我是小马云"，学会了鞠躬、挥手、微笑——一个"智力残疾二级"的孩子，被训练成了一个流量木偶。五年间，他几乎没有长高，没有上学，没有朋友。</p><p>2021年，热度消退，他被送回永丰县。从飞机到汽车到摩托车到步行，一路退回。退回的不是他的家，是他被取走一切后剩下的壳。智力残疾二级——这是五年流量生涯给他的唯一诊断。</p><p>2026年，一段他写"穷"字的视频再次走红。网友从那个歪歪扭扭的笔画里解读出"唐宋八大家的风骨"。荒唐吗？荒唐。但这就是互联网——它造神，它毁人，它心血来潮地再次施舍关注，然后再次忘记。</p><p>范小勤今年18岁了，看起来像10岁。他可能永远不会理解"马云"是谁，不会理解"流量"是什么，不会理解为什么有人围着他拍照又离开。但他知道爸爸只有一条腿，妈妈不说话，哥哥和他一样——他们是穷人家，穷得响都不响。</p>'
