comment: 一个智力残疾二级的孩子，因为长了一张和首富相似的脸，被从农村带到城市，塞进西装里，送上舞台，教他说"我是马云的儿子"。——这是2015年的范小勤。那一年他7岁，被河北商人"接走"，每月给范家数千至一万元"劳务费"。五年后，热度消退，他被送回原地。全部收获是一项"智力残疾二级"的诊断书，和一块回不来的童年。<br><br>然而互联网的记忆是曲折的。2026年，他因为写了一个"穷"字，被网友解读出"唐宋八大家"的风骨，再次冲上热搜。这个被消费了半生的孩子，在他不认识的字里，又成了新的消费品。<br><br>他穿上西装时像马云，脱下西装时连自己的名字都不会写。没人教过他读书，教他的只有模仿、鞠躬、说"谢谢老板"。他被送回村里时身高104cm、体重仅36斤——五年间几乎没长。<br><br>他的父亲范家发，一条腿，撑起一个家——智障的妻子、三级残疾的大儿子、智力二级残疾的小儿子。范小勤被送回来的那天，父亲什么都没说，只是把他领回了家。<br><br>"小马云"这个标签贴在他身上十年了。他不知道自己叫范小勤，不知道马云是谁，不知道流量是什么。他只是觉得城里有很多人围着他，发给他糖，让他说话。然后有一天，那些人不见了。
