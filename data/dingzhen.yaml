english_name: Dingzhen (Tenzin Tsongkhapa)
essay: '<p>丁真的走红是一个纯粹的偶然。2020年11月11日，摄影师胡波去理塘采风，拍到一个藏族少年去买泡面。少年穿着藏族服饰，黝黑的皮肤，干净的眼神。胡波把视频随手发到抖音。一夜之间，播放量超过1200万。</p><p>这个偶然背后是一个必然——中国互联网的"纯欲"审美周期，需要一个新的代言人。在韩系花美男和日系小清新轮流霸屏之后，一个野生的、原生态的、会说藏语的少年，精准击中了所有人的审美盲区。</p><p>但他最让人意外的是签约选择。所有MCN都在等他开口——千万级合约、综艺、电影、品牌代言——随便签一个，他就财务自由了。但他签了国企。月薪3500元。理塘文旅的总经理杜冬说了一段值得写进中国网红史的话："我们不希望丁真成为一件商品，我们希望他成为一个人。"</p><p>然后是铺天盖地的争议。"十年寒窗不如丁真一笑"——这是中国互联网直男群体最大的愤怒——一个小学三年级学历的放牛娃，凭什么比我火？凭什么上联合国？凭什么被华春莹推荐？这股愤怒如此巨大，以至于"丁真"从一个名字变成了一个黑称。任何被认为是"德不配位"的人——谷爱凌、王冰冰——都会被冠以"XX丁真"的标签。丁真不是一个人在承受争议，他成了一个<strong>测量中国社会公平感的标尺</strong>。</p><p>争议之外，一个数据值得记住：甘孜州旅游收入从走红前到2022年达到了385亿元。理塘游客从15.2万人增长到420万人。修路、建学校、旅游配套——这个地图上都难找到的高原贫困县，因为一个少年的7秒视频，完成了不可逆的经济跃迁。</p><p>丁真后来在联合国演讲台上说："我的家乡很漂亮，我希望世界知道它。"他说藏语，穿藏服，站在世界的聚光灯前。那一刻，他不再是"九漏鱼"，不再是"丁真黑洞"。他是一个为家乡带来希望的孩子。</p><p>2026年，他仍在理塘，仍然骑着马，仍然领着国企的工资。他做数字专辑、开工作室、拍纪录片——但重点永远是理塘。谢霆锋问他为什么这么开心，他说：<b>"因为我也很自由。"</b></p>'
