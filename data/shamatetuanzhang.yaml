english_name: Shamate Captain
essay: >-
  <p>杀马特团长，真名不详，东北往事系列中虎哥的头号对头，杀马特亚文化在短视频时代最后的代表。</p><p>要理解杀马特团长，先要理解杀马特。这个在2000年代初期席卷中国的亚文化以夸张的彩色爆炸头、铆钉皮衣、浓重妆容为特征。它的成员——主要是工厂流水线上的青年、农村进城的打工者——用最夸张的方式表达着他们对主流世界的抗拒。他们的审美被主流嘲笑，但在他们自己的世界里，他们是朋克、是摇滚、是最潮的人。</p><p>2016年，当快手转型为短视频社交平台时，杀马特们找到了最终的归属地。在那个算法还没有精细化的年代，杀马特内容野蛮生长。杀马特团长就是在这样的背景下出现在沈阳大街宇宙中的。他以一身标志性的杀马特造型出场——彩色爆炸头假发、铆钉装饰——和虎哥形成了对峙。</p><p>虎哥大战杀马特是东北往事中最具知名度的篇章。虎哥对着镜头吼出指定没有你好果汁吃——这句话的对面站着的就是杀马特团长。团长在这场对决中以一种诡异的平静对抗着虎哥的狂躁——两个人代表了东北底层世界的两种极致：一个是暴力输出型的街头霸主，一个是符号化的亚文化代表。</p><p>团长的身份一直是个谜。有人说他叫张志轩，有人说他玩音乐，有人认为他上过大学。这些猜测本身说明了团长和虎哥刀哥等人的不同——他身上有一种不属于那个圈子的气质。但团长从未正式回应过这些猜测。</p><p>东北往事退潮后，团长淡出主流视野。当他再次出现时，标志性的假发已经不在了。寸头、圆润了一些——和当年那个杀马特判若两人。但老粉丝们认出了他，在快手的评论区里刷着杀马特团长，你回来了。</p><p>杀马特团长的故事是整个杀马特亚文化的缩影——<strong>被潮流抛弃的年轻人用最夸张的方式证明过自己的存在，然后在潮水退去时安静地回归平凡。</strong></p>
