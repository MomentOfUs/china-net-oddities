comment: >-
  杀马特团长，东北往事系列中虎哥的头号对头，杀马特亚文化在快手时代的代表人物。有关他身份的说法众说纷纭——有人叫他张云赫，有人叫他张志轩，有人说他读过大学——唯一确定的是：他是东北往事宇宙中不可或缺的一角。<br><br>杀马特（Shamate）是中国互联网史上浓墨重彩的一笔——起源于20世纪初中国的非主流（杀马特）亚文化，以夸张的染发、浓重的妆容、铆钉金属饰品为标志。这个群体主要由来自底层和工厂的年轻人构成，他们的审美被主流嘲笑，但他们在彼此的群体中找到了归属。2016年快手转型短视频平台后，杀马特们找到了新的舞台——杀马特团长就是其中的代表人物。<br><br>在东北往事中，团长饰演一个戴着彩色爆炸头假发的杀马特青年，和虎哥在沈阳大街上一决高下。虎哥大战杀马特是东北往事中最经典的篇章。团长的出场自带一种诡异的气质——他相对清秀的脸庞和虎哥刀哥等粗犷形象形成鲜明对比。有人说他玩音乐、有更高的审美品味，甚至猜测他读过大学。<br><br>团长在东北往事中的作用不仅仅是虎哥的对手——他代表了东北往事世界的另一极：与虎哥的粗野流氓不同，团长是一种更加符号化的存在。他的杀马特造型和虎哥的街头混混人设形成了奇妙的化学反应，让剧情既有冲突又有看点。<br><br>东北往事退热后，团长一度淡出视野。后来他回归快手，剪掉了标志性的彩色假发，以寸头造型重新出现。早期的快手玩家大呼想死你了团长，你胖了。他作为杀马特文化活化石的价值，比作为个人要大得多——他是那个野蛮生长时代的最后见证者之一。
