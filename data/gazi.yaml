comment: 嘎子，本名谢孟伟，1989年生于河北雄县。<br><br>2003年，14岁的他主演《小兵张嘎》一炮而红。那个在白洋淀芦苇荡里拿着木头枪、机智勇敢的嘎子，是一代人的童年记忆。<br><br>但童星光环没能延续。长大后的谢孟伟无戏可拍，辗转于各种抗战神剧和网大。2019年后转型直播带货，找到了新的来钱路子。<br><br>2021年，他因卖贴牌假酒被市场监管总局通报。老艺术家潘长江以长辈身份直播连线劝诫他："网上的东西都是虚拟的，你把握不住。"嘎子当场痛哭，表示要改。结果没过几天，潘长江自己也在直播间卖起了同款酒——"潘嘎之交"一词诞生，成为2021年度网络热梗。<br><br>此后嘎子彻底放飞：假酒、假手机、穿警服带货（被拘7天）、带20个记者去捐款、被P成"嘎子偷狗"——他几乎成了一个行走的互联网荒诞素材库。2025年被列为失信被执行人，欠款超1400万。2026年1月直播承诺"永不带货"，负债2200万，宣布转型拍短剧。
