english_name: Xie Mengwei (Gazi)
essay: <p>嘎子是互联网荒诞史的一个标本——他的坠落不是偶然，而是一步一步、有节奏地、在所有人的注视下完成的。</p><p>2003年的《小兵张嘎》给了他一个太高的起点。一个14岁的孩子演了国民级抗日剧的主角，成为了正义、勇敢、机智的符号。这个符号太沉重了——他用了二十年都没能摆脱，反而被它反噬。</p><p>成年后无戏可拍的他误打误撞进了直播带货的浑水。真酒假酒掺着卖、39块9的老窖、7888降到78的葡萄酒——这些套路不是他发明的，但他玩得最投入。直到被市场监管总局通报，直到潘长江以长辈身份前来"救场"。</p><p>潘嘎之交是整个事件最荒诞的一笔。潘长江的劝诫仿佛是剧本里写好的伏笔：一个老艺术家劝年轻后辈别碰假酒，然后自己转头卖起了酒。这个行为的高度荒诞性让"潘嘎之交"脱离了单纯的直播带货新闻，进入了网络迷因的殿堂。</p><p>此后的事态发展像滚雪球：穿警服带货→被拘7天→欠债1400万→成失信被执行人→负债2200万→承诺永不带货→转型拍短剧。每一步都精准地踩在了网友的猎奇心理上。</p><p>他最大的悲剧在于：他努力想证明"我不只是嘎子"，但最终他连"嘎子"都保不住了。那个白洋淀芦苇荡里拿着木头枪的少年，最终活成了自己扮演的角色的反面。</p>
