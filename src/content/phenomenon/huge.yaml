english_name: Chai Hao (Tiger Bro)
essay: |
  <p>2016年的快手直播间里，柴浩将一串点燃的鞭炮塞进自己的裤裆，在震耳欲聋的爆炸声和烟雾中痛苦地嚎叫。屏幕前的网民在笑，弹幕在飞，而他只能拍了拍身上的灰烬，继续准备下一个自残整活的道具。这幅毫无尊严、以出卖身体秩序为代价的底层挣扎画面，以最原始的方式撕开了中国早期短视频时代的审丑大幕。</p><p>柴浩的爆红依赖于中文互联网早期土味亚文化与B站二次元鬼畜文化的黑色核聚变。他主导的“沈阳大街”黑帮约架短剧，因其严肃的表演与事实的滑稽反差，被B站UP主大量搬运和二次创作，演变为鬼畜区的经典圣经。算法和看客们将他那粗粝的肉身塑造成了“二次元教父”，为他开辟了一条通过自我解构获取流量的生存通路。</p><p>在他后续的转型中，横亘着一个永无解的核心矛盾：为了在主流化过程中活下去，这个曾经以自残为乐的东北大哥，不得不套上动漫女装，在各大城市的漫展上跳起萌系宅舞。<span class="hl">一个在重工业衰退期为了温饱放弃体面的底层肉身，与高度符号化的现代二次元文化强行缝合，这种反差成了他身上最绕不过去的黑色幽默，使他虚幻地被困在小丑的坐标上。</span></p><p>随着平台去低俗化整治的推进，柴浩早期的自残整活模式被彻底清除。他曾经为了活命而践踏一切规则，又在媒介的规训下，顺从地将自己剪裁为符合B站网民解构审美的表情包。他用一生的尊严，为看客们换取了沈阳红旗广场上“一脚踢出整个夏天”的浪漫幻觉。</p><p>截至2026年，柴浩依然在漫展商演和二创互动中扮演着“教父”的角色，虽然关注度已大不如前，但他成功在互联网的淘汰赛里活了下来。当他在舞台上穿着洛丽塔服饰面对少年的镜头时，眼神里早已没有了当年的暴烈，只剩下温和的空洞。他就这样在被主流放逐后，在那个荒诞的舞台上，循环跳着没有终点的舞蹈。</p>

