comment: 虎哥，本名柴浩，1994年生于吉林省白城市镇赉县，沈阳大街的霸主。他是东北往事系列的核心人物——一个从吃不起饭的穷小子变成快手整活之王、再到B站二次元教父的互联网奇人。<br><br>2016年，镇赉县城镇居民月均收入仅1680元，虎哥自述当年甚至吃不起饭。在快手刚转型短视频社交平台的野蛮生长期，他开始拍摄整活视频：鞭炮炸裤裆、碰瓷路人索要Q币、往厕所隔间扔水袋——这些在今天看起来匪夷所思的内容，在当年的快手是顶流级别的存在。<br><br>沈阳大街系列是他的封神之作。他和刀哥、杀马特团长等人一起演绎了一段东北江湖恩怨——虎哥饰演自称社会你虎哥的地痞流氓，沈阳大街的霸主。核心情节包括虎哥大战赵三金、虎哥追求彪姐、虎哥大战杀马特团长。其中最知名的场景是他对着镜头高喊：我告诉你嗷杀马特，到沈阳了，指定没有你好果汁吃。<br><br>2018年，这些短视频被网友搬运到B站后引发核爆级连锁反应。配上动漫音乐和经典老番标签后，东北往事从快手土味变成了B站必读经典。虎哥也随之转型：在ID前加上二次元前缀，化身二次元教父虎哥，频繁参加线下漫展。<br><br>虎哥的荒诞之处在于：他的一切都是真的。那个在镜头前吃不起饭的穷小子是真的，那个往裤裆里塞鞭炮的狠人是真的，那个在漫展上和二次元合影的大叔也是真的。他的整个人生，从吉林最穷的县到网络顶流，本身就是一部互联网荒诞文学。
