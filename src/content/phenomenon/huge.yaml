comment: |-
  <b>沈阳大街宇宙霸主</b> · 柴浩 · 社会你虎哥 · 二次元教父<br><br>柴浩，网络ID为“社会你虎哥”（在二创文化中被尊称为“二次元教父”），1994年9月10日出生于吉林省白城市镇赉县的一个极端贫困家庭。在成为网络名人之前，柴浩的生活十分窘迫，由于当地重工业衰退、经济不振，他没有受过良好的系统教育，长期处于无业状态，甚至曾面临吃不起饭的生存危机。<br><br>2016年，短视频平台快手从工具属性转向社交社区，为底层草根青年提供了一个展示自我的窗口。柴浩以“社会你虎哥”为名，开始在快手上发布整活视频。他的早期内容极其粗粝且充满对传统身体秩序的践踏，包括“裤裆放鞭炮”、“街头碰瓷”、“公共厕所扔水袋”等荒诞行为。随后，他策划并主导了“沈阳大街”系列江湖恩怨短剧，以极其严肃和夸张的黑帮约架形式展开剧情。他在视频中对着镜头吼出的那句标志性挑衅——“我告诉你嗷杀马特，到沈阳了，指定没有你好果汁吃，你记住了嗷！”，配合他经典的下蹲和抱拳动作，迅速在快手平台上走红。<br><br>2018年，“沈阳大街”系列视频被大量搬运至B站，并随着网民的后现代鬼畜创作而迎来核弹级的二次爆火。虎哥在沈阳大街红旗广场的那句“全体目光向我看齐，我宣布个事”，以及为了约架而怒吼的“傻逼”，被网民奉为鬼畜区的至高圣经。网民用他的素材拼贴出“一脚踢出整个夏天”等极具浪漫解构色彩的网络热梗。柴浩敏锐地抓住了这股B站的二次元流量，将账号改名“二次元教父虎哥”，亲自穿着各种动漫女装的cosplay服出席各大城市的线下漫展，与年轻的二次元受众进行互动。这种快手土味大哥与萌系二次元文化的猛烈碰撞，让他成功实现了网络生命的重组与变现。<br><br>尽管虎哥通过自我解构成功走出了早期的自残整活泥潭，但他在快手时期的“裤裆鞭炮”等反秩序和低俗历史，以及沈阳大街系列所展现的街头混混斗殴价值观，依然在网络主流化过程中饱受公序良俗的质疑。随着快手平台去低俗化治理的推进和监管力度的加大，他早期依赖的自残式整活模式被彻底取缔，他也曾多次面临封禁警告。<br><br>在经历了几轮网络整顿和平台迭代后，柴浩彻底告别了早期的野路子整活，安心于在B站等社区扮演“常青树”和“鬼畜素材提供者”的角色。截至2026年，柴浩依然在互联网上不定期更新，其人气虽已无法与当年的爆红时期相比，但他成功在漫展商演和二创互动中找到了稳定的温饱出路。他的经历完整地映射了中国第一代土味网红通过出卖身体秩序获取关注，最终在媒介规训下被温和解构并活下来的互联网草根史诗。
