english_name: Chai Hao (Tiger Bro)
essay: |
  <p>2019年，一个东北大汉穿着动漫女装站在漫展的聚光灯下。周围的二次元少年举着手机，喊的不是角色名，是“虎哥”。三年前，同一个人把鞭炮塞进裤裆里点燃，在快手直播。从裤裆鞭炮到漫展cosplay，柴浩走了一千天。</p><p>2016年的快手不需要才艺，只需要你敢。柴浩的内容清单读起来像一份自残目录：鞭炮炸裤裆、街头碰瓷索要Q币、往公共厕所隔间扔水袋。镇赉县城镇居民月均收入1680元，他连饭都吃不上。在生存面前，体面是第一个被放弃的东西。</p><p>沈阳大街系列是他的封神之作。他和刀哥、杀马特团长在沈阳街头扮演江湖恩怨，用最严肃的表情演最荒诞的戏。那句“到沈阳了，指定没有你好果汁吃”被吼出来的时候，没有人想到它会成为B站弹幕里最高频的复读之一。2018年，这些视频被搬运到B站，配上日本动漫BGM，贴上“经典老番”的标签。快手土味和二次元文化发生了核聚变。</p><p>虎哥的转型没有策略。他发现沈阳大街在B站火了，就自己注册账号发视频。他发现二次元群体接纳了他，就把ID改成“二次元教父虎哥”，穿上cos服去了漫展。他从快手跳到B站、从裤裆鞭炮跳到漫展聚光灯，从来不是因为聪明——是一个吃不起饭的人从未学会对任何生存方式感到羞耻。</p><p>2026年的虎哥不再炸裤裆，也不再是顶流。他在B站不定期更新，在漫展商演和二创互动中找到了稳定的温饱。热度降了，但人没消失。在中国互联网的淘汰赛里，活下来本身就是一种罕见的成就。沈阳大街的鞭炮声已经散了。漫展的灯光下，一个中年男人穿着cos服，既不像是东北大哥，也不像是二次元信徒。他只是站在那里。</p>

