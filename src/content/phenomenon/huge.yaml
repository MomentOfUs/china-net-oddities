english_name: Chai Hao (Tiger Bro)
essay: <p>虎哥，本名柴浩，1994年生于吉林省白城市镇赉县。在成为沈阳大街霸主之前，他只是东北一个普通的穷小子。镇赉县城镇居民当年月均收入1680元，虎哥自述他连饭都吃不上。</p><p>2016年，快手从GIF工具转型为短视频社交平台。虎哥抓住了这个窗口期——他拍摄的内容在今天看来匪夷所思：把鞭炮塞进裤裆里点燃、在路上碰瓷路人索要Q币、往公共厕所隔间里扔水袋。这些内容让今天的我们倒吸一口凉气，但在当时的快手上，它们是顶流级别的存在。</p><p>沈阳大街系列短剧是虎哥的杰作。他和刀哥、杀马特团长等人扮演了一群东北街头的混混。虎哥饰演社会你虎哥——沈阳大街的头号霸主。剧中的情节荒诞而真实：约架、追彪姐、跟杀马特团长互骂。最经典的一幕：虎哥对着镜头吼出——<strong>我告诉你嗷杀马特，到沈阳了，指定、没有你、好果汁吃，你记住了嗷！</strong></p><p>这句话在2018年被搬运到B站后，爆发出核弹级的能量。配上日本动漫的BGM和经典老番的标签，沈阳大街的土味视频在B站上获得了诡异的文化新生。虎哥的台词成了弹幕中的高频复读，一脚踢出整个夏天的梗更是被铭刻在了B站的历史里。</p><p>虎哥第一时间感知到了风向的转变。他在B站注册账号，把ID改成二次元教父虎哥，开始参加漫展、和二次元群体互动。一个曾经在快手上往裤裆里塞鞭炮的东北大汉，穿着cos服站在漫展的聚光灯下——这种跨次元的荒诞感本身就是最高级的互联网迷因。</p><p>2024年后的虎哥仍然活跃在B站，虽然热度不如巅峰期。但他已经完成了一轮气运加身：从快手到B站，从土味到二次元，从沈阳大街到全国漫展——<strong>虎哥的人生轨迹就是中国互联网底层网红进化史的一个完整切片。</strong></p>
