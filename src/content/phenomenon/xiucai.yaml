comment: |-
  <b>乡村中老年女性的情感收割与退场</b> · 徐某某 · 秀才 · 中老年白马王子 · 税务争议 · 全网封禁<br><br>徐某某（网络ID为“秀才”），1980年代出生于安徽省亳州市蒙城县。在被短视频算法挖掘之前，他只是一名乡村青年。他没有受过高等教育，长期在安徽当地务农或外出从事零散体力劳动。婚后，他与家人过着平静且略显传神的典型华北乡村生活。<br><br>2020年前后，徐某某在抖音平台注册了“秀才”的账号，开始发布对口型歌唱视频。他的短视频创作模式高度程式化且极具年代反差：他往往梳着一丝不苟的油头，穿着整洁的衬衫或西装，站在华北的乡村田野、老旧房屋前，面对镜头做出半握拳捂嘴笑、撩头发、挑眉等具有强烈年代感的挑逗性小动作，并对口型演唱各种网络土味情歌。这一极其符合上世纪八九十年代电视小生审美的乡村绅士形象，瞬间在短视频算法的精准推送下，引爆了数以千万计的乡村中老年女性群体，粉丝量在极短时间内突破千万级别。<br><br>在2021年至2023年的流量顶峰期，徐某某成为了名副其实的“中老年女性情感收割机”，粉丝量最高时突破1054万。他的粉丝画像显示，女性占比超过70%，且40岁以上的中老年女性占比超过80%。对于长期在乡村家务、农活和琐碎现实中失语且精神贫瘠的阿姨们来说，秀才温和的招牌微笑和“阿姨喜欢就行”的互动姿态，成为了她们无可替代的情感绿洲。2023年，他与另一位面向中老年男性的网红“一笑倾城”连麦PK，直播间在线人数直逼百万，被网民戏称为“中老年互联网的世纪同框”。期间，甚至有60多岁的阿姨跨越数千公里独自坐车来安徽寻找秀才线下相亲，引发了社会各界对于“老年人精神缺位与情感关怀”的深刻讨论。<br><br>然而，秀才巨大的流量背后隐藏着灰色诱导和税务隐患。2023年8月，一名来自北京的62岁女性网友实名举报徐某某，指控其涉嫌在直播间利用虚假恋爱话术诱导、骗取其多达51万元人民币的打赏积蓄。该实名举报迅速引发了税务部门的介入。同年9月，亳州市税务局证实接到了关于徐某某涉嫌税收违法和偷逃税款的实名举报并展开全面调查。由于涉嫌违法合规问题以及诱导非理性打赏，抖音官方于2023年9月正式对“秀才”的个人账号实施了封禁处罚。<br><br>账号被永久封禁后，徐某某彻底退出了互联网的中心舞台。截至2026年，徐某某未曾有过任何形式的公开露面和复出尝试，彻底消失在公众视野中。而随着“一笑倾城”等博主也逐步淡出，中老年网络情感偶像的黄金时代宣告终结。他的起落深刻地折射了当代互联网在年龄与阶层上的巨大割裂——在年轻网民眼中，他是滑稽土味、甚至带有点性暗示调侃的群嘲对象；但在千万失语中老年女性眼中，他曾是她们青春回忆与情感尊严的最后寄托。
