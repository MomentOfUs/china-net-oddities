english_name: Xiucai (Scholar Xu)
essay: <p>2023年，一个叫"秀才"的抖音博主被封号。全中国的年轻人在刷段子、造梗、哈哈大笑。全中国的阿姨们——在哭。</p><p>这是秀才所有的意义：<strong>他让中国互联网最沉默的群体，被全世界看见了。</strong></p><p>50岁以上的中国女性，在互联网上是一群隐形人。她们不参与微博骂战、不玩B站弹幕、不在知乎写回答。她们唯一活跃的地方就是抖音。而秀才，是她们唯一追的星。</p><p>他的视频公式简单到荒唐：梳油头→穿西装→对乡村背景→对口型唱歌→捂嘴笑→撩头发→眼神飘忽。每一帧都不像是在2020年代的人，更像是80年代电视上的文艺青年。但对60年代、70年代出生的阿姨来说——那就是她们年轻时嫁不到的男人。秀才不是网红，他是一个时代欠下的债。那些在农田和厨房里度过一生的女性，从来没有被当作有"审美需求"的人。她们不会在网上表达自己，但当她们的审美对象被拿走了，她们的沉默第一次被打破——以一种让人心碎的方式。</p><p>2024年秀才被彻底封禁后，警方发现了更惊人的事实：他以"恋爱""投资"为名，骗取了一位62岁退休女性的私房钱。他被追缴了，但没有被判刑。那个被骗的大妈直到采访的最后还在说："他不是那样的人。"封禁后，有新闻传他在家乡做代驾。没人能证实。但人间最好的故事永远是那个真真假假的结局：一个让全中国的阿姨在抖音上找到青春的男人，最后穿着代驾的马甲消失在深夜的街头。</p>
