english_name: Xiucai (Scholar Xu)
essay: |
  <p>秀才被封号那天，全中国的年轻人在刷段子、造梗、哈哈大笑。全中国的阿姨们——在哭。这个分裂可能是2023年互联网最精准的年龄断层地图：年轻人不认识他，不理解来看他直播的阿姨们为什么会哭；阿姨们不知道为什么全世界都不理解自己为什么哭。两边互相对对方的存在感到震惊——而这个震惊本身，就是秀才存在的全部意义。</p><p>他是中国互联网唯一一个被50岁以上女性群体追出来的顶流。年轻人的流量是算法推的、MCN运营的、社交传播裂变的。秀才的流量是阿姨们一票一票手动投出来的——她们不懂什么推荐机制、什么数据运营，她们只是每天打开手机，找到那个梳油头、穿西装、对口型唱歌的男人，然后按那个桃心。秀才是所有互联网流量里最"干净"的那种——没有技巧，全是感情。</p><p>他的视频公式简单到荒唐：梳油头→穿西装→乡村背景→对口型唱歌→捂嘴笑→撩头发。每一帧都像80年代电视上的文艺青年。但对60年代、70年代出生的阿姨来说——那就是她们年轻时嫁不到的男人。他不是网红，他是一个时代欠下的债。那些在农田和厨房里度过一生的女性，从来没有被当作有"审美需求"的人。她们的审美停留在少女时代——那个王朔们在小说里写过的、被改革开放前的集体主义审美塑造过的、穿着中山装和碎花裙的时代。秀才和她们的距离，不是平台和用户的关系，是初恋和现实的差距。</p><p>但平台的动作清楚地说明了一件事：当一个沉默群体被发现是有利可图的流量池时，平台会先收割，再封禁，然后在财报里不提这件事。秀才的封禁理由含糊其辞，但核心逻辑很清晰——阿姨们的消费力不如年轻人，阿姨们的内容生态难以变现，阿姨们的主播被拿掉不会引起舆论反弹。那个骗走62岁退休女性私房钱的新闻只是给了平台一个体面的理由。真正的原因更直接：这个市场太小了，不值得维护。</p><p>封禁后，有新闻传他在家乡做代驾。没人能证实。如果这是真的，它是最荒诞的结局——一个让几百万阿姨在抖音上找回青春的男人，最后穿着代驾的马甲消失在深夜。如果这是假的，它是更荒诞的结局——阿姨们连一个关掉手机后的确切结局都得不到。这是全网唯一一个阿姨们叫得出名字的主播应得的结局：平台不需要他了，年轻人不认识他，只有那些还不会刷热搜找他的阿姨们，在某个再也刷不到他的深夜，疑惑地拍了拍手机屏幕。</p>
