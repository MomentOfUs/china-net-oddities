english_name: Xiucai (Scholar Xu)
essay: <p>2023年，一个叫"秀才"的抖音博主被封号。全中国的年轻人在刷段子、造梗、哈哈大笑。全中国的阿姨们——在哭。</p><p>这是秀才所有的意义：<strong>他让中国互联网最沉默的群体，被全世界看见了。</strong></p><p>50岁以上的中国女性，在互联网上是一群隐形人。她们不参与微博骂战、不玩B站弹幕、不在知乎写回答。她们唯一活跃的地方就是抖音。而秀才，是她们唯一追的星。</p><p>他的视频公式简单到荒唐：梳油头
  → 穿西装 → 对乡村背景 → 对口型唱歌 → 捂嘴笑 → 撩头发 → 眼神飘忽。每一帧都不像是在2020年代的人，更像是80年代电视上的文艺青年。但对60年代、70年代出生的阿姨来说——那就是她们少女时代对"帅"的定义。</p><p>所以，一个80年代审美的男人，在2020年代的抖音上，用最粗糙的创作手段，收割了中国最庞大但最沉默的互联网群体。这种错位感本身就是这个时代最完美的互联网奇观。</p><p>他与一笑倾城的连麦，是中老年互联网界的"世纪同框"。两人加起来近3000万粉丝，直播在线人数一度赶超顶级明星，抖音服务器险些崩了。年轻人在旁边围观："这就是中老年版的贾斯汀·比伯和赛琳娜·戈麦斯吗？"</p><p>但其阴暗面同样真实。北京一位62岁退休阿姨，千里迢迢从北京跑到安徽蒙城找秀才，声称被他以分红为诱饵骗走了51万元养老金。秀才被举报偷税漏税，税务部门介入调查。直播间被曝要求粉丝打赏、被拒后爆粗口辱骂——这些让他的"人设"崩塌了一次又一次。</p><p>但阿姨们不在乎。封号那天，秀才的粉丝群里一片哀嚎："我唯一的快乐没了"、"你们年轻人不懂"、"他是我每天活下去的动力"。</p><p>秀才的故事，既是一个关于收割和被骗的故事，也是一个关于"存在"的故事——<strong>那些你以为不存在的群体，一直都在，只是你从没看见过</strong>。</p>
