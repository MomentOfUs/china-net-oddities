comment: 秀才，本名徐某某，约1984年生，安徽亳州蒙城人，抖音现象级网红。<br><br>他的成功，是互联网最无法解释的现象之一。2020年他开始在抖音发布短视频，内容极其简单：穿上衬衫西装、梳一个油头、系好皮带、在乡村背景下对口型唱歌。招牌动作是——捂嘴笑、舔嘴唇、撩头发、眼神飘忽。就这些，没有了。<br><br>然后他火了。火得一塌糊涂。<br><br>他的粉丝画像比他的内容更能说明问题：70%是女性，80%在40岁以上。他在中老年女性群体中的影响力是核弹级的——有人为了见他一面跨越省份，有人把养老金都刷给了他，有北京62岁女性实名举报被他骗走51万元。<br><br>"秀才"与"一笑倾城"是中国互联网最奇特的CP——一个是中老年女性的理想型（正装、油头、乡土精英感），一个是中老年男性的女神（圆脸、甜嗓、乖巧笑容）。两人一场连麦直播，在线人数破千万，服务器都撑不住。<br><br>2023年9月，秀才的抖音账号被无限期封禁。封禁原因：涉嫌税收违法。此前他已被实名举报——直播间要求粉丝打赏被拒后破口大骂，以及以分红为诱饵骗走粉丝51万。<br><br>秀才被封后，全网的年轻人在嘲弄，全网的阿姨在落泪。这种撕裂本身就是对他最好的注脚——他就是一个活在不同的平行宇宙里的人，在你的宇宙是笑话，在阿姨的宇宙是唯一的光。
