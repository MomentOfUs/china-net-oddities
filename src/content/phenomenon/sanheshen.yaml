  desc: 深圳龙华三和人才市场每日发放的日结工资信封。150元一天——干一天玩三天，信封里的纸币就是全部的人生规划。
- name: 公园长椅过夜照片
  desc: 三和大神在龙华公园长椅上过夜的照片。一张长椅就是一张床——他们是中国工业化神话最具冲击力的注脚。
- name: 网吧充值卡
  desc: 三和大神最贵重的个人资产——网吧会员卡。网吧是他们的客厅、卧室和精神寄托。
glossary:
- key: 三和大神
  val: 深圳龙华三和人才市场周边以日结工作为生的底层劳动者群体。不买房不结婚不生子——"干一天玩三天"的终极自由派。
- key: 日结
  val: 三和大神的核心工作方式。当天工作当天拿钱——没有社保没有合同没有未来。
- key: 挂逼
  val: 三和大神的自嘲式自称。"挂了"意味着不用干活——两个字完成了对社会规训的终极拒绝。
