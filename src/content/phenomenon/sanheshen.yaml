english_name: Sanhe Gods
essay: <p>要理解三和大神，先忘掉你在北上广深看到的一切。</p><p>深圳龙华，三和人才市场。这里不招月薪过万的程序员，不招穿西装的销售。这里是日结的天下——今天干，今天拿钱。搬货100、分拣80、快递扫码60。但你猜怎么着？很多人干一天就走了。因为50块够活三天了。</p><p>这是中国互联网诞生的最奇特群体：<b>赤贫阶层的第一批职业躺平者</b>。他们不是没能力，是不想卷了。一个三和大神原话说："累死累活一个月5000，交房租吃饭剩2000。我干两天玩五天，一样活。"</p><p>NHK
  2018年纪录片里，一个蹲在网吧吃泡面的年轻人面对镜头说："你们拍我干嘛？我不是大神，我是废物。"这句自嘲被全网截屏。一个自称"废物"的人，被捧成了"大神"。这就是三和悖论——一个不需要任何技能就能封神的地方。</p><p>四块钱的红牛被称为"三和茅台"。15块的网吧包夜是"五星级酒店"。三元泡面加个卤蛋是"满汉全席"。他们发明了一套完整的反消费主义语言体系，比任何社会学论文都精准。</p><p>2020年后，三和的原住民开始消退。城中村改造、疫情、日结市场的萎缩，让三和大神们各奔东西。但"三和"这个词已经成了一个文化基因——<b>每代年轻人心中都有一个三和</b>，区别只是有人去了，有人只敢在网上喊一声"我也想当三和大神"。</p><p>三和大神没有消失。他们只是改名了。现在叫<span
  class="hlg">躺平</span>。</p>
