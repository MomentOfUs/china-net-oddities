english_name: Sanhe Gods
essay: |
  <p>日结工资150元。他把钞票塞进裤兜，在龙华公园的长椅上躺下来。头顶是深圳十一月的太阳，身边是同样躺着的人。没有人说话。</p><p>2016年，网易人间一篇《三和大神》为这个群体正式命名。随后NHK的镜头对准了网吧里吃泡面的年轻人，BBC的记者蹲在人才市场的台阶上。两万张面孔被压缩成一个标签。他们发明了一套词汇体系，比任何社会学调查报告都更快地进入了中文互联网的日常语料：四元红牛是"三和茅台"，两元大瓶水是"挂逼水"，十五元网吧包夜是"五星级酒店"。一套完整的反消费主义语言，由一群日收入不到八十元的人创造——在他们手里，语言不是装饰，是生存工具。</p><p>这群人自称"挂逼"——挂掉的挂。NHK纪录片里，一个蹲在网吧角落的年轻人对着镜头说："我不是大神，我是废物。"一个自称废物的人被互联网封了神。<span class="hl">这不是讽刺。这是精确的自我定位撞上了一套错位的命名系统。他知道自己在干什么，看客们不知道自己在看什么。</span></p><p>2020年，深圳对三和人才市场周边启动集中整治。廉价网吧关停，日结招工点清理，城中村改造。物理意义上的三和消失了，原先聚集在这里的约两万人散入珠三角各个角落——有的进了工厂，有的换了城市，有的不知所踪。"三和大神"这个词脱离地理坐标，成为中文互联网上一个独立的文化基因。</p><p>2021年，"躺平"一词进入全民词汇。没有人再提起三和人才市场的门牌号。龙华公园的长椅还在。日结工资涨到了两百。长椅上躺着的人，已经不记得NHK镜头曾经对准过这里。</p>

