comment: 这里汇集了中国最奇特的一群人：明明活着，却像死了；明明死了，又还喘气。<br><br>2016年，深圳龙华三和人才市场周边，聚拢了一批拒绝"搬砖"的青年。他们的生存公式简单到令人发指：<b
  class="hlg">干一天日结，躺三天网吧</b>。四元红牛是液体货币，三元挂逼面是口粮，深夜的网吧座椅是铺位。<br><br>他们没有社保、没有房租、没有对象、没有未来。但他们有世界上最大的<b
  class="hlg">自由</b>——不欠债、不打卡、不内卷、不买房。<br><br>NHK拍过他们，BBC写过他们，全网围观过他们。有人骂他们<span class="hlr">"废人"</span>，有人称他们<span
  class="hlg">"先知"</span>。他们不在乎——他们只在乎明天的日结能赚50块，够不够买四瓶红牛。<br><br>"三和大神"这个词本身就充满矛盾：<b
  class="hlg">"三和"</b>是中国最底层的劳务市场，<span class="hlr">"大神"</span>是游戏里至高无上的称谓。两组词拼在一起，拼出了这个时代最荒诞的身份认同。<br><br>后来者把他们的故事拍成短视频，剪成Vlog。围观者感叹"活明白了"，然后继续内卷。<br><br>他们从没想过成为大神，是社会把"弱者"供上了神坛。
