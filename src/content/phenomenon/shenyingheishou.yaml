glossary:
- key: 神鹰黑手
  val: 抽象文化圈最极端的代表人物。当其他抽象主播还在玩语言梗的时候，他选择了物理层面的抽象。
- key: 抽象圣经
  val: 神鹰黑手在直播间的经典言论总称。他是抽象文化研究中最不可绕过的标本之一。
- key: 永封
  val: 他是少数被所有平台同时永久拉黑的博主——不是因为说了什么，而是因为做了什么。
