comment: 神鹰黑手，人称黑手哥。他的故事是一部草根以互联网为跳板逆袭、又必然崩塌的当代传说。<br><br>黑手哥成名前是普通工人，一次工伤导致左手落下终生残疾。他的成名视频来自多年前开店面时遭遇收保护费的村霸，他以一己之力予以还击。这段经历在快手和B站上一传十十传百，神鹰挺身而出大战村霸的故事就此封神。<br><br>他的直播风格非常老派——爱摆长辈谱、爱说爱国言论、动不动教育直播间的小孩子要感恩正直。这种作风在某些人看来是朴实的正能量，在另一些人看来则是高高在上的爹味说教。<br><br>核心梗有两个：<b>西西里教父</b>——他自比教父科里昂，用那套老派家族观念处世；<b>比划比划</b>——PK时先老实巴交，等对面先嘴臭他，他突然暴起要和对方比划比划，戏剧性拉满。<br><br>2025年5月的西西里家族事务是他人设的转折点：管理群的是黑手朋友的女儿，和群成员爆发大规模冲突。反黑手方面声称当事人无端踢出元老成员，黑手方面则说成员对小姑娘恶语相向。罗生门之后，黑手亲自下场，带着朋友一起作法咒骂对方及其家庭成员。<br><br>此举引发剧烈反噬。黑手启动超级变换形态，在直播中阴阳怪气，言必称小黑粉儿小孩子没教育好帮你们父母教育你们。B站用户感到被针对，反黑手运动愈演愈烈。<br><br>黑手哥的悲剧在于：一个不懂互联网的老派人，被抬到了他控制不了的位置，最终必然摔下来。就像教父里的老科里昂——退出不了，也掌控不了。
