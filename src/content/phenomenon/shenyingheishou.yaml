essay: |
  <p>直播PK的经典桥段在B站鬼畜区至少有上百个剪辑版：他先尽可能老实，略微带着怯意——然后在某一帧突然拍案而起，左手残疾的那只手指向屏幕，脸涨得通红："我不给你好好说你不听，非得跟我比划比画是不是？"弹幕在那一帧同时炸开。他直播了上千场，人们反复消费的始终是这一秒。</p><p>观众不是在看他完成一个表演。观众是在看他以为自己能控制场面、但每一条青筋都在出卖他的那个瞬间。他的愤怒无法排练。他在镜头前端不住架子的狼狈无法模拟。B站鬼畜流水线需要的不是剧本里的冲突，而是一个人被逼到墙角时条件反射式的失控。雇一万个演员，拍不出一个黑手哥拍案。</p><p>他靠一段真实的还击村霸视频走进互联网。真，是他全部的资本。但流量生意的本质是把一个人的真提取、提纯、装裱成"人设"后按需供应。当西西里家族内部真的闹翻时，他按照一个真实的人的本能去处理——护短、骂人、站队。在现实江湖里天经地义的动作，在互联网上每一件都是呈堂证供。</p><p>他是靠真走到这里的。互联网惩罚他的方式，就是让他继续真下去。</p><p>西西里事件之后，他启动了所谓的超级变换形态。直播间里言必称"小黑粉儿"，动辄"帮你们父母教育你们"。但这一次弹幕不笑了。一个因工伤致残的底层工人在互联网上找到了尊严和收入，然后被互联网连带尊严一起收了回去。这个过程没有受害者，也没有加害者——只有一个看不懂规则的人站在自己点燃的火堆中间，继续对着屏幕比划。</p><p>2026年，他的直播间人数稳定在两位数。弹幕里偶尔有人刷那句老台词——"非得跟我比划比画是不是"。他不再拍案了。他笑了一下，说下一位。</p>

