english_name: Shenying Heishou (Eagle Dark Hand)
essay: <p>神鹰黑手，人称黑手哥，在快手和B站之间游走的一个互联网奇人。他的人设有着浓浓的矛盾感——一个因工伤左手残疾的前工人，摇身一变成了西西里的教父。</p><p>成名之前，他开过店面，经历过被收保护费、被威胁小心下黑手的事件。他的回应方式干脆利落：还击。这段经历被好事者传上网络后，神鹰挺身而出大战村霸的故事在B站和快手之间病毒式传播。</p><p>他的直播内容具有明显的<b>两极性</b>：一方面，他自视为长辈，直播间里充斥着老派的爱国主义教育、教你做人的大道理；另一方面，他要做节目效果，PK时的经典流程是先尽可能老实巴交，等对面开骂后突然暴起要和对方比划比划——这段反差是他最大的笑点来源。</p><p>黑手哥对黑手这个绰号的态度也很值得玩味：最初他不喜欢被无限刷比划比划，觉得玩梗可以，无脑复读很烦。但一段时间后他想通了——能放下身段在网上赚钱才是正道。没有过分恶心的事迹，比giao哥、老华丽还是要高一个格位的。</p><p>转折发生在2025年5月。西西里家族内部爆发大规模冲突。起因是管理群的黑手朋友女儿和元老成员闹翻。对方声称被无端踢出，黑手说是他们先对小姑娘恶语相向。随后黑手亲自下场，带着朋友一起作法咒骂对方及家人。</p><p>此举引发了海啸级的反噬。黑手随之启动超级变换形态：直播言必称小黑粉儿、小孩子没教育好、帮你们父母教育你们。这种高高在上的姿态让B站用户集体破防，反黑手运动愈演愈烈。</p><p>黑手哥的故事是一个标本——<strong>一个不懂互联网规则的老派普通人，被互联网抬到了他掌控不了的位置，然后必然地摔了下来</strong>。他像极了教父里的老科里昂，拒绝触碰新兴事物的那一刻，大厦就已经注定了要倾倒。</p>
