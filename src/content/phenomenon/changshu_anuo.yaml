comment: 常熟阿诺，本名盛亦陶，1994年生，江苏常熟人。<br><br>他不是一般意义上的网红，他是中文互联网健身圈的图腾——不是因为练得好，而是因为练得抽象。<br><br>事情要从一场健美比赛说起。阿诺拜了一位职业健美选手为师，师傅让他好好备赛，他偷偷报了上海的比赛。到赛场师傅才知道：阿诺体脂25%-30%，毫无备赛痕迹，一个大胖子就上台了。<br><br>更离谱的是，那场比赛的解说恰好和师傅有梁子，直接在台上给阿诺开了专题解说，封号"常熟阿诺"——从此江湖上多了一个传说。<br><br>后来名场面接踵而至：师傅备赛让他买米饭，他提了一袋<b>生米</b>回来，师傅饿到直接瘫倒在地——史称"生米冲碳"。师傅中暑躺地上了，阿诺拍视频发朋友圈配文"师傅死了"，然后替师傅收了个徒弟——史称"代尸收徒"。<br><br>最离谱的是他的言论。被弹幕说"你头顶怎么尖尖的？"他暴怒反击——"那我问你！你是男的还是女的？那我问你！"——这段毫无逻辑的咆哮成了互联网圣经。"头顶尖尖"成了2024年最火的健身梗，在各类评论区随处可见。<br><br>"除了不用蛋白粉，只用蛋白粉"、"我硬拉300公斤"（视频出来是个搞笑动作）、"上班都上不起的诺神真的很励志"——每一句话都是一个梗。<br><br>常熟阿诺的家境其实相当富裕，但他对互联网的"献祭"是真诚的——他是真的在认真练、认真直播、认真回答那些荒诞的问题。他把人生的每一面都毫无保留地交给互联网，这种天真比任何精心策划的网红都更有力量。<br><br>他不是最火的，但他是最被"记住"的——因为抽象，是一种不可复制的东西。
