english_name: Sheng Yitao (Changshu Anuo)
essay: "<p>常熟阿诺最大的成就不是健身，是他发明了一种全新的失败方式。大多数人失败的方式是重复的——考试没过就再考，面试被拒就再面。阿诺不是，阿诺每翻一次车都能翻出一种前无古人的角度，然后让全互联网记住这个翻车姿势。</p><p>第一战，健美比赛。他瞒着师傅报名参赛，到了后台被裁判告知体脂率不达标——他的腹肌是一坨，肌肉线条像海绵宝宝。他承诺\"今年一定要上台\"，然后增肌失败。他发誓\"再也不喝酒了\"，然后被拍到在街边撸串。他说\"这次我认真的\"，全网都在笑。这是第一次翻车，但它只是开场。</p><p>第二战，生米冲碳。师傅备赛让他去买米饭，他提着一袋生米回来了。师傅饿到瘫在地上。阿诺很无辜——你让我买米饭，我买了，米在这里，哪里不对？这个问题的荒诞之处在于：他的脑子真的认为自己做对了。他不是在装傻，他是真心觉得生米等于米饭，因为在某个粗糙的维度上，它们的原材料是同一种东西。这种\"差一点就对但错得离谱\"的思维方式，贯穿了他所有翻车的底层逻辑。</p><p>第三战，代尸收徒。师傅中暑晕倒在地上没动静了，阿诺掏出手机拍了个视频发朋友圈，配文\"师傅死了\"，然后在同一时间替地上那个昏迷的人收了个徒弟。这件事里每一个步骤都是独立的灾难——首先你该救人，其次你不该发朋友圈，再次你不该说人死了，最后你不该替一个昏迷的人收徒。阿诺把每一步都走错了，每一步都是一个独立的梗。互联网把这件事拆成了三个名场面反复播放，因为每一个都足够好笑，合在一起已经超越了\"傻\"的范畴，进入了某种行为艺术层面。</p><p>第四战，头顶尖尖。直播间弹幕说\"你头顶怎么尖尖的\"，阿诺暴怒反击：\"那我问你！你是男的还是女的？那我问你！\"这段毫无逻辑的咆哮被剪成音频，在各个视频平台上当BGM循环播放。头顶尖尖成了2024年最火的健身梗，超过了健身本身。这件事最妙的地方在于：他暴怒不是因为他觉得自己被侮辱了，而是因为他真的试图回答这个问题然后发现回答不了——他的脑子在那个瞬间短路了，只能用\"那我问你\"来争取思考时间。他没有争取到。</p><p>阿诺的四场战役每一场都不同，但它们的底层逻辑是一样的：他不是在装傻，也不是在演戏。他是真的用错了的那套系统在认知世界——米饭约等于生米，人躺了就是死了，你骂我我就问你你是什么性别。在这个系统里，每一步在他自己看来都是合理的。这就是为什么他永远在翻车，却永远不觉得自己翻车。</p>"
