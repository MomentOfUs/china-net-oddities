english_name: Sheng Yitao (Changshu Anuo)
essay: <p>要理解常熟阿诺，你得先理解一个道理：<strong>互联网不需要你有多专业，它只需要你足够特别</strong>。</p><p>2018-2020年间，常熟阿诺的师傅是国内知名的职业健美选手。阿诺拜师学艺，按理说应该走一条正统的路线：备赛、增肌、脱水、上台。但阿诺有他自己的节奏——或者说没有节奏。他的人生就是一部永远在翻车的喜剧，而他是唯一认真的演员。</p><p>第一战：阿诺瞒着师傅报名了上海健美比赛。师傅问他备赛了吗？他说备了。到赛前，师傅一看——25%体脂，没脱水，没cut，带了一大肚子碳水就上台了。解说席上那个人正是师傅的冤家，一看到阿诺的造型，直接来了一句："这位是常熟阿诺！"这个随口说的称号，就此奠定了阿诺的江湖地位。</p><p>第二战：师傅去外地参赛，让阿诺去买米饭补充碳水。阿诺消失了几个小时，回来提了一袋生米。师傅："这怎么吃？"阿诺："不是一样吃吗？"师傅怒极攻心，直接低血糖倒地——后来健身圈管这叫做"生米冲碳"，成为千古笑谈。</p><p>第三战：师傅在露天赛场中暑了，躺在地上休息。有人拍了视频发朋友圈。阿诺看到后直接转发，配文："师傅死了。"然后以师傅的名义收了一个徒弟——"代尸收徒"四个字，让师傅在赛场上死了一回又活了一回。</p><p>然后是最出圈的"那我问你"事件：2022年的一场直播，弹幕一直在刷"你头顶怎么尖尖的"。阿诺终于破防了，对着镜头咆哮："那我问你！你是男的还是女的？那我问你！那我问你！"——这段毫无逻辑、毫无意义的发言，成了2024年最火的网络梗。"头顶尖尖"四个字，让一个健身梗出圈到了全互联网。</p><p>常熟阿诺的珍贵之处在于：他是真的不觉得自己好笑。他认真回答每一个问题，认真对待每一场直播，认真做每一个动作（尽管动作标准约等于零）。他有一种纯粹的、天真的、不可摧毁的自信——"我是专业的，你们不懂。"这种反差，是任何编剧都写不出来的。</p><p>今天，阿诺还在练。他可能永远不会成为健美冠军，但他已经是互联网的冠军——不是因为练得好，而是因为练得让所有人都忘不掉。</p>
