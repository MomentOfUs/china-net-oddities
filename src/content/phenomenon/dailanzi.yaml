comment: |-
  <b>大专生文化博主</b> · 陈E（真名陈冷静） · 带篮子<br><br>陈冷静（网络ID为“带篮子”，亦被称为“陈E”），生于中国南方的一个普通小城镇。他的成长轨迹与千千万万未能走入精英大学的普通青年高度相似：高考失利后，他进入了一所普通专科院校，并在随后因为个人原因大专辍学。成名前的陈冷静经历了长时间的社会底层摸爬滚打，做过保安、在商场打过杂，处于极度迷茫和没有出路的窘迫状态。<br><br>2019年5月，陈冷静开始在Bilibili（B站）等平台发布视频。他以“带篮子”为名，最初凭借一系列记录保安日常生存状态、大专生混日子心态的“大专人”系列视频在抽象文化圈里崭露头角。他那标志性的慢速说话节奏、极其抽象的词汇组合，以及自嘲式的底层犬儒视角，精准戳中了众多在高考、就业中遭遇挫折的年轻人的痛点。<br><br>在2020年至2021年的巅峰期，“带篮子”成为了B站最具代表性的底层大专文化代言人，粉丝量迅速攀升至百万级别。他推出的“土狗进城”系列视频成为了他的成名杰作：在视频中， he 穿着拼凑出来的廉价“潮牌”衣服，故意装出中产阶级的高傲姿态，走入诸如北京SKP、国贸商城等城市顶奢消费场所。通过刻意展示自己与高档现代服务业之间的阶层碰撞与窘迫冲突，他用镜头记录了柜员冷漠的态度和自己尴尬的退缩。这种极具社会讽刺意味的黑色幽默，引发了千万年轻网民的强烈共鸣。他的名言“我直接一个抽象”、“这就是艺术”成为了各大弹幕网站的流行语，他成功为千万高考受挫、职业迷茫的底层青年发声。<br><br>随着知名度的提升，带篮子也迎来了巨大的商业化争议。他开始在视频中高频承接各类粗制滥造的商业广告，并频繁在带货直播中推广一些自己完全不使用的低质产品。期间，他为了迎合流量而制作的拙劣模仿外国网红郭杰瑞的视频导致口碑严重翻车，被大量粉丝指责“忘本”和“吃烂钱”。面对铺天盖地的批评与信任危机，陈冷静表现出了极其顽固的犬儒态度，直接在视频中向粉丝喊话“你们千万别当了我的带孝子”，宣称自己恰烂钱恰得坦坦荡荡，这种缺乏契约精神和职业敬畏的态度导致其粉丝粘性和个人信用出现断崖式下跌。<br><br>由于流量的大量流失以及自身创作瓶颈，2025年以后，陈冷静的内容更新频率显著下降。他没有发表正式的停更声明，也没有向粉丝做任何充满仪式感的告别，而是以一种极其符合其散漫性格的非正式方式逐渐退出了互联网的中心舞台。截至2026年，尽管他在抖音上仍保留着近200万粉丝的账号，但已基本停止了高频的商业化更新，回归到了普通人的生活轨迹中，成为了互联网时代底层青年快餐化走红又退场的一个典型符号。
