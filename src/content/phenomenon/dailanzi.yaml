relics:
- name: 土狗进城的帆布背包
  desc: 带篮子系列视频中的标志性道具。一只装满不屑与荒诞的帆布包，承载了一个大专辍学青年对中国互联网抽象艺术的终极献祭。
- name: 撕裂的录取通知书
  desc: 带篮子虚构的大专录取通知书。他从未拥有过它，却用它做了最成功的行为艺术——"大专学历"在这个语境下不再是劣势，而是一面旗帜。
- name: 被砸烂的键盘
  desc: 带篮子直播中激情输出时砸碎的键盘残骸。每一块碎片上都刻着互联网最纯粹的解构主义——当你连自己都嘲笑的时候，就没有人能嘲笑你。
glossary:
- key: 土狗进城
  val: 带篮子的成名系列。一个农村青年闯入城市的荒诞记录，以极致的自我解构完成了对城乡二元对立的最辛辣消解。
- key: 我直接
  val: 带篮子的标志性口头禅。"我直接一个XXX"句式被全网模仿，成为抽象文化圈的万能前缀。
- key: 抽象带专生
  val: 带篮子给自己的身份标签。将"大专生"的劣势转化为一种先锋文化符号，完成了对学历歧视的荒诞解构。
- key: 带孝子
  val: 带篮子粉丝群体的自称。以"孝"字反讽，将粉丝对主播的狂热崇拜解构成一种黑色幽默的亲子关系。
