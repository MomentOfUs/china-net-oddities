english_name: Chen E (Basket Boy / Dai Lanzi)
essay: <p>带篮子，B站ID陈E，一个以抽象语言和真实生活记录著称的UP主。他的走红几乎是命中注定的——因为他不是在创造内容，他本身就是内容。</p><p>带篮子是个标准的大专生：没考上好大学，在一个普通得不能再普通的职业院校晃荡，家庭普通甚至有些拮据，对未来没有明确规划，每天最大的活动是和朋友们出去闲逛。他录视频的原因很简单——就是想做点事。</p><p>他的视频内容极度日常：穿着他认为最帅的衣服（在大多数人看来其实很土）去商场，用他自认为很有范儿的态度跟店员交流，回家后对着镜头发表长篇大论。他的语速很慢，用词很抽象，逻辑经常跳脱。你看了可能觉得莫名其妙，但那个莫名其妙本身就是他想表达的东西——<strong>生活本来就很莫名其妙</strong>。</p><p>土狗进城系列是他最出圈的作品。他在视频中穿着一身廉价但自以为很潮的衣服走进城市的所谓高档商场，被店员随便敷衍。弹幕里全是哈哈哈，但笑完之后很多人都沉默了——因为那个被敷衍的土狗，就是千千万万个来自小地方、在大城市里小心翼翼生存的年轻人自己。</p><p>恰烂钱是他的主要争议来源。走红后接了各种莫名其妙的广告：拙劣地模仿郭杰瑞做视频翻车、推广自己根本不用的产品。有粉丝骂他是白眼狼、忘本。他对此的回应非常抽象：你们千万别当了我的带孝子——意思是别把我太当回事，我就是个恰饭的。</p><p>陈E的价值不是他的视频拍得有多好——说实话很多视频粗糙得可以。他的价值在于：他是中国数以千万计的大专生群体中，唯一一个用镜头真实记录自己生活、并且引发了巨大共鸣的人。在他之前，大专生的生活是被忽略的；在他之后，他们仍然被忽略——但至少有人在屏幕前替他们说过一句：这就是我的生活，我就是这样的。</p><p>用知乎上一条高赞来收尾：抽象这东西，你当它是个笑话，那就看个笑话了。但用令常人费解的语言行为，表现真实的现实生活——透过表演者个人，看到一个阶级乃至整个社会的模样——这就是陈E的价值。</p>
