comment: 带篮子，又称陈E，B站90万粉UP主。他是抽象文化在B站新世代的代表人物之一——一个在大专院校混日子的底边学生，用最荒诞的语言和最真实的状态，记录了一个社会边缘人的日常。<br><br>带篮子的核心内容是记录他的日常：在学校混吃等死、穿着自认为很潮的衣服逛街、跟朋友插科打诨、对着镜头发表各种奇奇怪怪的见解。他的语言风格极度抽象——语速极慢、语气散漫、内容跳跃，但总能在无厘头中透露出一种丧气的真诚。<br><br>他的代表作"土狗进城"系列中，他穿着自认为很帅的一套衣服走进城市的商场，被对面的店员用一种随意的态度敷衍——那个瞬间屏幕前的所有人都看到了一个带专生的自尊心被现实轻轻碾过的样子。他不是在演，他是真的在那里。<br><br>恰烂钱是他的主要争议。在他走红后，接了各种低质量广告，包括拙劣模仿郭杰瑞的视频翻车事件。有粉丝对他失望，骂他是白眼狼。他自己倒没什么表情：你们千万别当了我的带孝子。这句话本身就是抽象话的精髓——他知道自己是什么货色，他也没打算装。<br><br>陈E的意义在于：他是中国大专生这个庞大却被忽视的群体的缩影。高考失败、家庭普通、学校混日子、对未来一片迷茫——他用抽象的语言描绘了千万人的真实生活。他不是在扮演一个角色，他就是在过自己的生活。有人评价他的视频是现代行为抽象艺术——用令常人费解的语言行为，表现真实的现实生活。透过他的表演，看到一个阶级乃至整个社会的模样。
