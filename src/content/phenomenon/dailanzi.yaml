english_name: Chen E (Basket Boy / Dai Lanzi)
essay: <p>带篮子穿着59块钱的短袖、38块钱的休闲裤，走进了国贸商城。他走路的姿势很用力，像在给自己打气。柜员看了他一眼，继续低头玩手机。这是他的"土狗进城"系列——也是他所有内容的起点：一个从没被正眼看过的人，用镜头记录自己被忽视的全过程。</p><p>带篮子，大专辍学生，真名陈冷静，B站ID陈E。他没考上好大学，家庭普通甚至有点拮据，对未来没有规划。他录视频的原因不是什么梦想——就是想做点事。他的视频内容极度日常：穿自认为很帅的衣服去商场，用自认为很有范儿的态度跟店员交流，回家后对着镜头发表抽象的长篇大论。语速很慢，用词跳跃，逻辑时常断裂。你看了可能觉得莫名其妙——但那个莫名其妙本身就是他想表达的东西。</p><p>"土狗进城"让他出了圈。弹幕里全是哈哈哈——一个穿得像乡镇企业家的小伙子，走进SKP被柜姐用鼻孔接待。但笑完之后很多人沉默了：因为那个被敷衍的土狗，就是千千万万个来自小地方、在大城市里小心翼翼生存的年轻人自己。抽象的门槛在这里被拆掉了——它不是语言游戏，它是社会地位差距的黑色幽默。</p><p>走红之后他接了各种广告：拙劣地模仿郭杰瑞做视频翻车、推广自己根本不用的产品。粉丝骂他忘本。他的回应很简短："你们千万别当了我的带孝子。"他从不解释，不道歉，不讨好。他对自己走红这件事的态度和他对生活的态度一样：莫名其妙但无所谓。</p><p>带篮子的价值不在于他视频拍得多好——说实话很多视频粗糙得可以。他的价值在于：他是大专生群体里唯一一个用镜头记录自己生活、并且引发巨大共鸣的人。在他之前这个群体的生活被忽略；在他之后他们仍然被忽略——但他的视频像一份放在角落里的档案，上面写着一行字："这就是我的生活。我就是这样的。"</p>
