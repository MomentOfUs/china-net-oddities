english_name: Chen E (Basket Boy / Dai Lanzi)
essay: |
  <p>2020年，深圳的出租屋里。一个戴着黑色面罩的年轻人坐在电脑前，摄像头只拍到他的上半身——黑色T恤，背后是白墙，没有任何装饰。他用一种刻意压低、介于嚣张和心虚之间的语调开始说话："我叫带篮子，98年，湖南人。"弹幕立刻刷了一排问号和侮辱。他看了一眼，没有停顿，继续说话。这是他直播生涯的第一分钟。此后三年，这个出租屋的白墙比他本人更出名。</p><p>带篮子走红的路是一条极其罕见的逆向路径：他不是因为表现优秀赢得观众，而是因为表现拙劣到足够奇怪。他在直播中表现出的所有品质——情商低、吹牛、嘴硬、逻辑混乱——在任何一个正常的社交场合都是减分项。但互联网有一种机制，能把一个人全部的性格缺陷打包成一个"人设"统一出售。观众分不清自己在嘲笑他还是喜欢他——这不重要。重要的是下一次开播，他们还会回来。</p><p>他的内容产品是一套稳定的元素组合：戴面罩（增加神秘感，同时降低丢脸成本）、吹牛（"我在株洲有十二套房子"——可以被轻易证伪，但不需要被证明，因为观众的兴趣不在真伪，在他说完这句话之后被揭穿的反应）、嘴硬（被揭穿后从不认错，会换一个角度重新论证同一个谎言）。这套组合不复杂，但它的效率在于一个发现：当一个主播的被揭穿本身比他会吹的任何牛都好看的时候，吹牛就变成了铺垫，揭穿变成了正片。观众不是来看他吹牛的。观众是来看他吹牛然后被拆穿的。他知道这一点——这让他和观众之间达成了一种秘密的共谋：你假装信，我假装不知道你在假装信。</p><p>2021年末，带篮子账号被封。原因没有公开说明。面罩下的脸终于露了出来——不是因为自愿，而是因为有账号使用了他的无面罩影像进行诈骗，他不得不发布不戴面罩的视频辟谣。那张脸和他在面罩下的想象几乎完全不同：更年轻，更普通，更像一个真的98年湖南人。他在辟谣视频的最后一句说："我真的是98年的。"这一次，说谎王子说了唯一的真话——反而是弹幕最不想信的一句。</p><p>2025年，有人在一个地下拳击场的观众席后排拍到了他。黑衣，面罩不见了，脸上有几道不属于屏幕特效的伤。他不知道有人在拍他。他的目光落在拳台上，三个人正在打他认识的那个老对手。但那段视频被传到B站后，弹幕最多的评论是："他总算不用再假装看不穿我们了。"</p>

