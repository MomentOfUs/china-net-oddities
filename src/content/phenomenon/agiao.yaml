comment: |-
  <b>1991</b> · 河南许昌鄢陵 · 展亚鹏 · 黑猫警长Giao哥<br><br>展亚鹏，1991年8月22日出生于河南省许昌市鄢陵县陶城镇的一个普通农村家庭。他在家中排行老六，上面有五个姐姐。由于家庭经济条件有限，展亚鹏在高中毕业后便早早步入社会。在成名之前，他经历过多份底层工作：他在家乡种过地，去蛋糕店当过学徒，还曾远赴广东工厂的流水线打工。后来，他回到家乡尝试自主创业，摆摊卖过小孩棉裤，也曾推着小车在街头叫卖水果，生活一直处于艰辛奔波的状态。<br><br>2017年，伴随着短视频平台快手的崛起，展亚鹏以“黑猫警长Giao哥”为网名，开始在快手上发布土味短视频。他的视频多在老家的田野、小树林里拍摄，内容通常是发表一段毫无逻辑的励志说唱，并在视频结尾面对镜头做出标志性的下蹲动作，大喊出一声极其魔性的无意义尾音——“一给我里giaogiao”。这一声“giao”因其极致的洗脑效果和独特的声音模因，迅速点燃了中文互联网，成为全网争相模仿的现象级网络热词。<br><br>在2017年至2020年的巅峰期，展亚鹏的粉丝量一路上涨，最高时突破了740万。他成功从土味网红跨界到主流娱乐圈，在2018年和2020年，他两度受邀参加爱奇艺的大型音乐选秀节目《中国新说唱》。尽管在海选阶段他就因专业水平被明星制作人吴亦凡淘汰，但他的参与为节目带来了空前的网络讨论度。2019年，展亚鹏发布了《开心真Giao》等单曲，并受邀出席了Q China 2018年度音乐盛典。2020年，他甚至登上了主流舞台，与知名歌手周笔畅同台合唱。同年，他在直播中随口哼唱的“画画的baby，画画的baby——奔驰的小野马和带刺的玫瑰”被网民截取并迅速二次创作，演变为年度现象级流行神曲。在此期间，他的商业身价暴涨，线下夜店商演10分钟的报价曾高达20万元。<br><br>随着影响力的扩大，展亚鹏在直播中多次出现低俗、谩骂、向粉丝索要礼物的言论，引起了社会舆论的强烈反弹。他曾在直播中直白地喊出“不刷礼物，我的奔驰谁来加油”，这种直白的金钱交易言论和低俗的言行最终触发了平台的监管机制，其快手和抖音主账号因内容低俗、宣扬不良价值观被官方予以封禁。2021年6月，展亚鹏在一家酒吧进行商演时，在毫无防备的情况下被一名台下观众从脑后狠狠掌击了一巴掌，现场视频迅速引爆热搜，引发了舆论对于土味网红职业安全以及“审丑”文化的反思。<br><br>主账号被封后，展亚鹏并未彻底退出互联网，而是使用小号重新复出。他停止了过去标志性的“喊Giao”和搞怪行为，将自己的定位转型为分享生活感悟和拼搏故事的“正能量人生导师”。他宣称创办了“展亚鹏奖学金”以资助高学历人才，但在直播中面对网民的调侃时，他也常以“我补你个蛋”等话语进行黑色幽默式的互动。截至2026年，展亚鹏以本名“展亚鹏先生”在抖音小号上继续活跃，粉丝量约为97万。虽然名气和流量早已无法与巅峰期相比，但他完成了从早期的荒诞土味网红向温和、励志的现实中年主播的身份转型。
