  bio:
  - 1991年生，河南许昌人，<b>母亲早逝，高中辍学</b>
  - 推着小车<b>卖苹果</b>，七年的底层打工生涯
  - 2017年因"一给我里giao giao"走红，<b class="hlg">魔性尾音成为互联网符号</b>
