english_name: A-Giao (Zhan Yapeng)
essay: <p>展亚鹏26岁那年推着小车在河南街头卖水果。他不会想到，互联网会用他发明的三个无意义音节来指代他整个人生——以及那之后的另一个名字："展亚鹏先生"。</p><p>2017年快手正处于土味审美的狂潮中。一个河南农村青年对着镜头喊出"一给我里giaogiao"，这段尾音没有任何修辞学上的价值——它不有趣、不讽刺、不漂亮。它只是一个声带上的意外。但2017年的中国互联网不需要内涵，它需要可以无限复制的声音模因。他给了它一个。</p><p>此后的事是一场文化史级的身份回旋镖。2018年他站在吴亦凡面前唱完一段giao式flow，被淘汰了，但他笑起来比晋级的人还开心。他在直播间随口哼了一句"画画的baby"，被截取后成了全网病毒。2020年他登台与周笔畅合唱。一个卖水果出身的农村青年，靠一个没有含义的拟声词，走了这么远。</p><p>2021年夜店那一掌从脑后拍来。他倒下的角度和他视频里标志性的下蹲角度惊人一致。互联网把这一幕做成鬼畜循环播放——他从"用giao娱乐别人"变成了"被别人用giao娱乐"。这个互文的圆环合上了。他在那之后停止了喊giao。</p><p>他转而穿着黑色T恤站在豪车前讲奋斗。他发明了"展亚鹏奖学金"——研究生毕业月薪不到两万来找他补，补多少？"我补你个蛋"。他在封禁后用小号复出，粉丝从740万变成了97万，但留下的都是愿意听他讲道理的。不是"阿giao在讲道理"，是"展亚鹏先生在讲道理"。</p><p>阿giao和所有土味网红最大的区别只有一条：他知道自己在干什么。嘲笑他的人以为他不知道。一个26岁才被迫出道的河南农村青年，比任何人都清楚"giao"这个音节值几毛钱。正因为他清楚，他选择继续喊。他的筹码从头到尾只有这一个，他把它用到了一分不剩。2026年"展亚鹏先生"还在更新，还在讲正能量，还在笑。镜头关掉的那一刻你猜他脸上还剩多少笑容？十年giao之后剩下的不是快乐，是惯性。阿giao已经死在了那片树林里。走出来的是展亚鹏先生。
