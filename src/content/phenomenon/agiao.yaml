relics:
- name: 晒干的苹果干
  desc: 展亚鹏成名前推小车卖水果的实物切片。承载着未被算法卷入前的底层劳作宿命——从一个河南农村卖水果的年轻人，到站在周笔畅身边唱歌的人，这条路的起点就是这个推车。
- name: '"不刷礼物"录音笔'
  desc: 录有"不刷礼物，我的奔驰谁来加油"原始音频的数字物证。当一个卖水果出身的农村青年对着镜头说出这句话时，他不是在开玩笑——他只是在描述一个他以为理所当然的交易关系。
- name: 展亚鹏奖学金聘书（伪造品）
  desc: '"展亚鹏奖学金"在直播间口头设立的聘书复刻。研究生毕业月薪不到两万可以找他补，补多少？"我补你个蛋"。一张不存在的聘书比真实的奖学金更能说明"人生导师"这个身份的本质。'
glossary:
- key: Giao
  val: 一个无法被定义含义的声音符号。它不需要意义——因为拒绝被定义本身就是这个符号的全部意义。
- key: 一给我里giaogiao
  val: Giao哥的标志性口号。一个毫无意义的音节组合，以极致的洗脑效果成为中文互联网上传播最广的无意义拟声词之一。
- key: 画画的baby
  val: 2020年由Giao哥在直播间随口哼唱后被截取传播的洗脑段子，演变成年度互联网梗文化。Giao哥不是这首歌的创作者，他是这首歌的素材。
- key: 展亚鹏奖学金
  val: Giao哥转型"人生导师"后自称创办的项目。口头承诺"研究生毕业月薪不到两万来找我补"——实际上"我补你个蛋"。它比真实的奖学金更精准地定义了"网红正能量"的信用边界。
- key: 阿giao已经死在了那片树林
  val: 粉丝对Giao哥转型的终极评价。"走出来的是展亚鹏先生"——同一个身体，两个截然不同的名字和身份。一个人杀死自己一次，还要在互联网上再死一次。
