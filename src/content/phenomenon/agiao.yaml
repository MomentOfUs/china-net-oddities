english_name: A-Giao (Zhan Yapeng)
essay: <p>2017年，河南许昌鄢陵的一片杨树林里，一个26岁的农村青年对着手机屏幕蹲下，爆发出一声无法被文字记录的音节。上传账号：黑猫警长Giao哥。拍摄设备：一部售价不超过两千元的智能手机。从这一天起，三个无意义的音节开始像一个真正的名字一样跟随他——直到他亲手把它埋掉。</p><p>快手的推荐算法在那个年份奖励的不是才艺，是辨识度。在所有辨识度里最便宜的一种叫"魔性"——一段让你说不上来为什么还想再听一遍的声音。"一给我里giaogiao"没有含义，没有旋律，没有节奏。它只有一个功能：在算法划过屏幕的那0.3秒里让你停下来。2017年的中国互联网不需要内涵，它需要可以被无限复制的声音模因。这个26岁的河南农村青年给了一个。</p><p>此后四年发生的事超出了所有人的计算范围。他两度登上《中国新说唱》的舞台，被吴亦凡淘汰时笑得比晋级的人还灿烂——他从来不是去比赛的。他随口哼出"画画的baby"，那段旋律被截取、改编、在全网循环播放——他从来不是去唱歌的。夜店商演十分钟报价二十万，与周笔畅同台，一首《开心真Giao》推上音乐平台首页。他做了十年傻子，从没傻过一天。</p><p>2021年那一掌是句号。一间河南夜店里，一只手从他脑后拍过来。他往前踉跄了一步——那个倒下的角度和他在视频里标志性下蹲的角度几乎完全一致。现场有人笑，有人掏出手机拍下来，有人立刻点下了上传。互联网把这一幕做成鬼畜循环播放。他从"用giao娱乐别人"完成了向"被别人用giao娱乐"的终极互文。主账号随后因内容低俗被官方封禁。他停止了喊giao。</p><p>此后的故事属于另一个人。他把黑色T恤换成深色，站在豪车前讲奋斗。他口头设立了"展亚鹏奖学金"——研究生毕业月薪不到两万来找他补。补多少？他在直播里自己喊出了"我补你个蛋"。抖音小号粉丝97万，不到巅峰期的七分之一。留下的人不再叫他阿giao，叫他展亚鹏先生。</p><p>2026年，展亚鹏先生还在更新。弹幕偶尔飘过一句"giao一个"，他没有回应。评论区在刷同一句话：阿giao已经死在了那片树林里——走出来的是展亚鹏先生。这份卷宗不需要任何补充评语了。归档。</p>
