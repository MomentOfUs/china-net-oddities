comment: 阿giao，本名展亚鹏，1991年生于河南许昌。家中排行老六，有五个姐姐。母亲早逝，高中辍学后去广东打工谋生。回到老家后推着小车卖苹果，生计十分拮据。<br><br>2017年，短视频的风吹到了河南农村。giao哥开始在快手上发布短视频，内容极其简单——对着镜头做出夸张表情，每段视频结尾必说一句"一给我里giao giao！"配合标志性的抬手下蹲动作。这个毫无意义的尾音成了他最大的财富——在2017年的互联网上，魔性、重复、易模仿就是一切。<br><br>他的走红是短视频时代"土味文化"的标志性事件。当时快手正处在"土味"审美周期的高峰期，giao哥与郭老师、韩美娟等人共同构成了"土味网红"的第一梯队。<br><br>2018年，他做了一件让所有人都没想到的事——参加了爱奇艺的《中国新说唱》。当giao哥出现在吴亦凡面前，唱出"我嘻哈玩的不是flow，是giao式风格"时，全网沸腾。他被淘汰了，但他赢了——因为互联网对"跨界失败"的关注，远远大于对"跨界成功"的关注。<br><br>2019年，他出席Q China2018年度音乐盛典；2020年再次参加《中国新说唱2020》。还出了单曲《开心真Giao》《一直都这样》《土味之王》。2020年11月女儿出生。<br><br>2021年6月，giao哥在夜店被人从脑后拍了一掌，视频全网疯传。"giao哥被打"一度登上热搜——人们不关心他为什么被打，只关心他被打得有多惨。<br><br>此后giao哥进入转型期。他开始发布正能量语录，讲述自己从卖苹果到网红的励志故事。他的抖音从"一给我里giao giao"变成了"我觉得人一定要有梦想、要有规划、要对自己的人生负责"。从"土味网红"到"人生导师"——这个转型的跨度之大，本身就是一种互联网奇观。<br><br>他依然活跃在抖音，粉丝数百万。他出了歌、上了综艺、结了婚、生了孩子、被打过、被嘲笑过、被遗忘过、又回来了。giao哥的故事是一个底层打工人在互联网时代抓住风口、飞起来、又努力学着落地的标本。
