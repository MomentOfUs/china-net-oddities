comment: <b>1991</b> · 河南许昌鄢陵 · 展亚鹏 · 黑猫警长Giao哥<br><br>他叫展亚鹏，1991年8月22日生于河南省许昌市鄢陵县陶城镇，家中排行老六，有五个姐姐。高中毕业后——他不是辍学，是毕了业——种过地、去蛋糕店当过学徒、在广东工厂打过流水线、摆摊卖过小孩棉裤、推着小车卖过水果。2017年他26岁，一事无成。<br><br>2017年快手正处在土味审美的巅峰。他对着手机做出夸张的表情——头爆西瓜、扎猪料槽、一秒炫啤酒、抽自己嘴巴。后来他发现说唱节目火了，于是每个视频结尾必定抬手、下蹲、从嗓子里挤出一声"一给我里giaogiao"。这个声音没有任何意义。但2017年的中国互联网不需要意义——它需要一个可以无限复制的声音。他给了它一个。<br><br>2018年他参加《中国新说唱》，站在吴亦凡面前用giao式flow唱完了整段。正片没有他，但他被淘汰的画面比任何晋级选手的表演都更火。他还在直播间创造了"画画的baby"——一段无意义的即兴哼唱被截取后在全网病毒式传播。2020年他甚至登上了电视台，和周笔畅合作演出。<br><br>他火了之后买了奔驰和霸道两辆车，结了婚生了娃。线下酒吧请他演出，10分钟赚20万。但流量反噬得很快：直播间里他欺负小主播、调戏女主播，粉丝不刷礼物时说"不刷礼物，我的奔驰谁来加油"。这些言行让他被官方封禁。他换用小号复出，但那个在树林里喊"giao"的年轻人已经不在了。<br><br>2021年6月，夜店里有人从脑后拍了他一掌。视频被传到网上，他倒下的动作跟他视频里标志性的下蹲角度形成了荒诞的互文。此后他完成了第二次转型：不再喊giao，不再扮丑，而是穿着黑色T恤站在豪车前讲人生道理。他发明了"展亚鹏奖学金"——在直播间说研究生毕业月薪不到两万找他补，"我补你个蛋"。<br><br>2026年他还在更新。抖音粉丝97万，但每一个新粉都知道"阿giao已经死在了那片树林——走出来的是展亚鹏先生"。
