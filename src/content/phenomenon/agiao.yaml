english_name: A-Giao (Zhan Yapeng)
essay: <p>2017年的某个下午，一个推着小车卖苹果的河南青年，对着手机喊了一句没有任何意义的尾音——"一给我里giao giao"。他不知道那条视频会改变他的人生，因为他已经花了十年，什么都没改变。</p><p>母亲早逝，高中辍学，广东流水线上打工，回老家卖苹果每斤赚两毛钱——这是展亚鹏的前半生。然后一句"giao"改变了一切。上了《中国新说唱》，在吴亦凡面前唱"我嘻哈玩的不是flow，是giao式风格"；出了单曲《开心真Giao》；结了婚；生了孩子。互联网只用三年时间，把一个一无所有的人变成了一个符号。</p><p>2021年在夜店被人从后脑拍了一巴掌，视频传遍全网。嘲笑声铺天盖地，他没躲，说了一句话："我愿意为我做错的事情买单。"这句话很奇妙——它太正经了，正经到不像是从一个靠喊giao走红的人嘴里说出来的。但也许他从来就不想当那个喊giao的人。</p><p>从此他的抖音从搞怪变成了语录。他开始讲奋斗、讲家庭、讲人一定要有梦想。评论区里有人在笑，但也有人在认真听。这个转型是真诚的吗？没人知道。但一个卖苹果的农村青年推着小车等了十年等不到的机会，互联网用一个声音就给了他。现在他只是在拼命证明自己配得上这份运气。</p><p>2025到2026年，他还在更新。如果说有什么比"一给我里giao giao"更值得记住的，那就是这个事实本身：互联网早就不记得他为什么出名了，只记得他还在。</p>
