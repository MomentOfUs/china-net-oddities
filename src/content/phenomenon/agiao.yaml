english_name: A-Giao (Zhan Yapeng)
essay: <p>展亚鹏推着小车卖苹果的时候，他应该没有想过，未来互联网会用他发明的三个无意义音节，来指代他整个人生。</p><p>2017年的快手是土味文化的狂欢节。一个河南农村青年对着镜头喊出"一给我里giao giao"，这个尾音没有任何修辞学上的价值——它不有趣、不讽刺、不漂亮。它只是一个声带上的意外。但2017年的中国互联网不需要内涵，它需要的是可以无限复制和模仿的模因。giao哥给了它一个。</p><p>他上了《中国新说唱》。当他站在吴亦凡面前，一个卖苹果出身的农村青年用自创的giao式flow唱完了一整段，被淘汰了。但他笑得比晋级的人还开心。因为被吴亦凡淘汰这件事本身，比他唱的任何一首歌都更有传播力——他深谙这条法则，只是从来没说破。</p><p>2021年夜店那一掌从脑后拍来。视频里他倒下的动作跟他视频里标志性的下蹲动作惊人相似。互联网把这一幕做成了鬼畜视频循环播放。在那一刻，giao哥完成了从"用giao娱乐别人"到"被别人用giao娱乐"的终极互文。这个循环完成了。他不再是一个制造快乐的人——他本身就是快乐的材料。</p><p>此后他开始讲正能量。讲奋斗，讲家庭，讲人要有梦想。评论区里有人在笑——一个靠喊无意义音节走红的人，凭什么教我怎么活？但也有人在认真听。那种底下评论区里写"giao哥说得对"的人，跟2017年那些模仿他giao手势的人，是同一批人——只是他们都老了十岁。</p><p>giao哥和所有土味网红的最大区别是：他知道自己在干什么。那些嘲笑他的人以为他不知道——他怎么可能不知道？一个从河南农村卖苹果起家的人，比任何人都清楚"giao"这个音节有多少斤两。但正因为他清楚，他选择继续喊。因为对于他来说，喊giao不是一个选择，是他唯一的选择。他的人生走到2026年，能拿得出手的还是一句"giao giao"。2026年他还在更新，还在讲正能量，还在笑。但镜头关掉的那一刻，你猜他脸上还剩多少笑容？十年giao之后还剩下的东西，不是快乐，是习惯。</p>
