comment: |-
  <b>大胃王吃播与拷打主播</b> · 刘建龙 · 徒步浪人华丽 · 戴维董事长 · 丽丽<br><br>刘建龙（网络ID为“徒步浪人华丽”、“戴维董事长”，网民俗称“丽丽”），1988年出生于河北省保定市清苑区的一个普通乡村。由于从小性格散漫，他仅有小学文化水平。在步入社会后，他曾通过关系获得了一份在铁路上担任列车员的工作，但很快因违反纪律和性格冲突被开除。此后，刘建龙长期混迹于社会底层，涉及打架斗殴、酗酒寻衅，并在一次斗殴中后背挨刀、手指骨折致畸，后因酒后驾驶被依法吊销驾照。他在村里游手好闲，成为了村民口中的边缘人物。<br><br>2019年前后，伴随着“徒步西藏”在快手等平台成为流量红海，刘建龙以“徒步浪人华丽”为网名，推着一辆手推车开启了他的“西藏徒步之旅”。在直播中，他展现出了极度艰苦的徒步状态，但很快便被多名路人拍到其在下播后，骑着加装了隐蔽电动机的徒步车在公路上飞驰造假。面对造假质疑，刘建龙在直播中采取了既不否认也不道歉的态度，反而借着这股争议黑红的势头迅速沉淀了人生的首批关注度。<br><br>在2020年至2022年的巅峰期，刘建龙彻底放弃了艰苦的徒步路线，将直播重心转向与其他主播连麦PK。他创造了一种被其粉丝称为“拷打”的直播内容：在连麦中，刘建龙面对陌生女主播或弱势主播，以极其污秽、粗俗的语言进行无底线的人身攻击与道德审判。他那标志性的反秩序粗俗态度，以及口头禅“aqa巴累”（表达开心）和“eqe亏内”（表达快乐），迅速在网络亚文化圈层内流传，其鬼畜切片在B站和YouTube上获得了极高的播放量。面对大众对其靠脏话吸粉的批评，他在直播中公然宣称“我搞拷打还不是为了家人们”、“打工能让我一年赚50万吗”，以极致的犬儒主义撕下了所有体面的伪装。<br><br>刘建龙极度缺乏社会责任感和公序良俗敬畏的言行，频繁触碰监管红线。他在直播中多次发表歧视女性、侮辱残障人士的恶劣言论，多次被快手平台禁言处罚。随着国家相关部门对于网络低俗整活、人身攻击连麦行为的专项整治，刘建龙赖以生存的“拷打”模式被彻底定性为低俗违规。<br><br>2022年，快手官方对刘建龙的账号实施了永久封禁，并将其列入行业黑名单。此后，他多次尝试通过在抖音、B站注册小号或通过他人出镜的形式谋求复出，但均被平台机制识别并迅速予以秒封。截至2026年，刘建龙已基本退出了主流短视频平台的视野，仅在海外平台YouTube和部分小众群聊中残留少量信息。他的退场深刻印证了网络直播时代审丑流量的宿命——一个完全不设道德下限、靠侮辱他人博取眼球的草根网红，终究会被网络净化红线和算法彻底淘汰。
