comment: 丽丽，本名刘建龙，1988年生于河北保定清苑，小学文化。他是快手底层主播生态中最具代表性的一个人——集徒步造假、嘴臭拷打、黄赌毒往事、酒驾吊销、电动代步于一身，堪称快手底层乱象的大全。<br><br>他的网名变迁就是一部小型互联网史：最早在一款叫聊聊的平台上叫华丽转身，后来徒步时叫徒步浪人华丽，粉丝简称丽丽。徒步西藏后又改叫徒步阿龙，再后来变成戴维董事长。aqa巴累eqe亏内是他与师傅才子之间的暗号，代表开心和快乐，后被官方莫名其妙禁止使用。<br><br>他的直播内容分为两阶段：第一阶段是徒步，第二阶段是拷打。徒步是他在2019-2020年间的核心内容，表面上是徒步西藏，实际上在徒步车上私自加装了电动机，下播后直接电动车骑走。被人拍到无数次，在直播间被提及完全不理。但他有一个完整的叙事：说第一次徒步的故事堪称传奇，说自己徒步成功后会全国自驾游，说明后年找个老婆结婚。这些故事真假参半，但对底层观众的吸引力是实在的。<br><br>拷打（嘴臭）是他的第二阶段核心内容。他会在PK中随机连麦到女主播，然后以最不堪的语言攻击对方——即所谓拷打。他会把自己锁在屋里一个人做这件事，偶尔有围观者。他自己说：我搞拷打还不是为了家人们的开心快乐。他也说过对于被骚扰的人：我从来没感受过啥抱歉，你们知不知道多少人求着和我再连一次。<br><br>丽丽在2020年初收到官方警告，拷打内容大幅减少。但这个人物的弧光已经完整了：一个小学文化的混混，依靠互联网从列车员变成网红，徒步造假、拷打女主播、酒驾、电动代步，然后过气、粉丝掉到两位数，最终被快手官方永久封禁。<br><br>他对打工有深深的鄙视：亏钱咋了，一二十万现在根本就不是个钱，打工能让我一年50w吗？——这是切格瓦拉之后最经典的底层网红打工鄙视宣言。
