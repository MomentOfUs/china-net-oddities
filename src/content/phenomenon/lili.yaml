english_name: Liu Jianlong (LiLi / Chairman David)
essay: <p>丽丽，1988年生于河北保定清苑，小学文化，曾在铁路上当过列车员。打过架，身上和后背都挨过刀，手指有一部分是塌的。黄赌毒全沾过，酒驾被吊销过驾照。这不是什么少年犯的忏悔，这是快手上一个徒步主播的人生简历。</p><p>2019年，刘建龙在快手上开始徒步。ID从徒步浪人华丽到徒步阿龙到戴维董事长，粉丝习惯叫他丽丽。在短视频平台上，徒步西藏是一大盘巨大的流量蛋糕——无数人靠徒步西藏赚到了人生的第一桶金。丽丽也是其中一员。</p><p>但丽丽的徒步和其他人不一样。他的徒步车上装着电动机，下播后直接骑电动车走完剩下的路程。他在直播间里慷慨激昂谈着对徒步的热爱，私下被人无数次拍到在电动车座上一路狂飙。这种造假并不稀奇——几乎是徒步西藏直播的全行业潜规则——但他的诡异之处在于造假的同时还能保持一种老子天下第一的自信。</p><p>让他真正出圈的，是拷打。所谓拷打，是他PK连麦到女主播后，以极度肮脏的语言攻击对方。他把自己锁在屋里，对着屏幕上的陌生女性口不择言。他说：我搞拷打还不是为了家人们的开心快乐——这句台词本身就可以入选互联网经典语录。他也回应过批评：我从没感受过啥抱歉，你们知不知道多少人求着和我再连一次。</p><p>丽丽的拷打内容在被多次封禁后收敛。但他身上聚集了快手底层生态的所有矛盾特质：对打工的鄙视（打工能让我一年50万吗）、对造假的心安理得、对粉丝的势利眼、对女性物化的理直气壮。他最后被快手官方永久封禁，抖音和B站上还有残余账号。</p><p>他不是好人，他自己也知道。但他是快手底层网红生态中最完整、最诚实的标本——<strong>一个把所有的阴暗面都暴露在镜头前、最终被自己控制不了的力量碾碎的普通人</strong>。</p>
