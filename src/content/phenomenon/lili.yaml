english_name: Liu Jianlong (LiLi / Chairman David)
essay: |
  <p>2019年漫天尘土的国道旁，刘建龙推着一辆外表简陋的徒步车，以匀速向前移动。然而下播后的路人镜头却记录下了荒谬的真相：他的徒步车上暗中加装了口哨般尖锐鸣叫的电动机，拉着他在公路上疾驰。面对造假戳穿，他既没有在直播间道歉，也没有删掉视频，而是用标志性的面无表情，承受了全网铺天盖地的嘲讽与玩梗。</p><p>刘建龙的黑红路径是在快手低俗连麦与B站鬼畜解构共谋下诞生的媒介奇观。在放弃徒步后，他迅速开发出了通过在连麦中对弱势主播进行无底线语言侮辱的“拷打”内容。他自创的无意义符号“aqa巴累”、“eqe亏内”，在鬼畜区被脱离语境大量复制，算法奖励了他这种极致野蛮的反秩序姿态，将他塑造成了审丑文化中的畸形图腾。</p><p>在他狂妄的表演中，存在着一个永恒的犬儒矛盾：他毫不掩饰自己对金钱的饥渴与对道德秩序的群殴踩踏，公然在直播中叫嚣“拷打是为了家人们”、“打工能让我年赚50万吗”。<span class="hl">他与粉丝之间达成了一种极其畸形的共谋——他表演毫无底线的恶俗，网民消费这出反文明的斗兽场表演。</span>这种将无耻作为变现武器的策略，使他越陷于低俗的深渊，越能榨取网民的猎奇打赏。</p><p>然而，这种野蛮消耗终究在监管的净化红线前迎来了审判。2022年，其快手主账号因低俗骂人被官方予以永久封禁，并列入行业黑名单。此后他多次注册小号试图借尸还魂，均在数小时内被平台机制精准秒封。平台像一个定向清除程序，删除了他留下的每一处数据痕迹。</p><p>截至2026年，刘建龙已彻底消失在国内主流视野中，只在海外平台和部分小众匿名群聊中残留少量信息。曾经席卷全网的“拷打”狂欢已化为泡沫，他用自己被物理清除的下场，写下了互联网垃圾流量的终局。那句“我从来没感受过啥抱歉”，最终成了他荒诞一生的最后墓志铭。</p>

