english_name: Liu Jianlong (LiLi / Chairman David)
essay: <p>一段摇晃的手机视频，从路过车窗里拍的。刘建龙坐在他的徒步车上，电机嗡鸣，在国道上以四十码的速度飞驰。直播已关。几小时前，镜头前的他还在推着同一辆车徒步，额头冒汗，对观众讲去拉萨的路有多苦。那是2019年，快手的徒步西藏流量潮正处在最高位。</p><p>彼时，"徒步西藏"已是快手的一套完整内容流水线。几十个主播推着手推车朝高原进发，日复一日将苦难转化为打赏。大多数人暗装电机——这是行业内公开的秘密。丽丽不同之处不在造假本身，在于他对被抓包的彻底免疫。面对路人拍下的视频证据，他不否认，不解释，甚至不改变操作方法。造假不是他要保守的秘密，是他认为根本不值得讨论的细节。</p><p>徒步带来了第一批观众。拷打让他出了名。形式极其简单：PK连麦到一位女主播，然后用极度污秽的语言进行人身攻击，数千人在线围观。他独自锁在房间里，面对素未谋面的女性，将残忍变成一种观赏性运动。两个毫无意义的音节——"aqa巴累""eqe亏内"——成为病毒式传播的代号，指代一种没有内容的毁灭快感。B站和YouTube的鬼畜频道将他的咆哮剪成百万播放的合集，评论区里满是模仿他口音的留言。</p><p>他自己的话同时是供词和辩护："我搞拷打还不是为了家人们。""打工能让我一年50万吗。""我从来没感受过啥抱歉。"本案卷的核心矛盾只有一句：在一个所有人都在表演善良的平台上，丽丽表演邪恶——并且是这个经济体系里最不伪善的表演者。算法奖励他的，正是规则最终惩罚他的。他拒绝假装羞愧，而这拒绝本身既是他的产品，也是他的罪名。</p><p>2022年前后，快手永久封禁了他的账号。抖音和B站的小号在数小时内被识别并封停。粉丝从数十万跌至两位数。曾将他推上流量顶端的平台，像一个擦除程序一样抹去了他的全部痕迹。他多次试图借他人账号出镜复出，均被当场识破。</p><p>残片留在YouTube上，被匿名剪辑者剪进鬼畜的节奏里。未来某个翻阅中国早期直播遗迹的研究者会在这里找到他——一个把全部诚实都用在承认自己不诚实上的人，最终因精准地成为了系统付钱让他成为的那种人，而被同一套系统清除。卷宗合上。</p>
