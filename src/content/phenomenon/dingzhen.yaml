english_name: Dingzhen (Tenzin Tsongkhapa)
essay: |
  <p>2020年11月11日，四川省甘孜州理塘县。一个20岁的藏族青年走在去村口买方便面的路上。一个摄影师叫住了他，拍了一段不到10秒的视频。画面里，丁真朝着镜头走过来，皮肤是高原太阳烤出的深赭色，眼睛因为长期不接触电子屏幕而有一种城市人失去已久的清澈。他穿着藏袍，对着镜头笑了一下——一种完全没有任何拍摄意识的、下意识的微笑。当天晚上，这段视频被配上了文案上传抖音："原来这就是甜野男孩。"</p><p>在这个节点上，一个正常的内容流程应该是：流量来了，签MCN，开直播，带货。丁真走了另一条路——二舅在他身后按下了暂停键。热搜挂了一周之后，理塘县国资文旅公司签下了丁真，月薪3500元，工作内容：学习汉语和写字。他进了教室，是的，他把教室搬进了直播间。当天，全国媒体蜂拥而至。理塘县——一个无数中国人从没听过的地名——在48小时内上了35次热搜。</p><p>争议在同一时间到达。男性网友质疑他的颜值被过度吹捧。女性网友反击。知乎一个高赞回答写道："一个因为没读过书所以显得'纯真'的人被捧上天，是对千万个认真读书的普通人的侮辱。"这条回答的点赞数超过30万。丁真的走红引发了当年最激烈的性别对立论战——而事件的中心人物连汉字都写不利索。他既不是论战发起者，也无法参与论战。互联网为他吵架，他对此一无所知。这种完全的被代言状态，是丁真最独特的地方——他是一场双方都不需要他实际在场的争论中，唯一的论据。</p><p>两年后，丁真学会了写自己的名字。他出了几首单曲，参加了几个综艺——成绩平平，没有翻车也没有爆红。理塘县的旅游收入在他走红第一年增长了67%，第二年回归正常曲线。人们不再讨论他。2024年，有人在理塘街头拍到他，他正在帮一个游客指路。他穿着普通的羽绒服，不再是藏袍。镜头扫到他的眼睛——和2020年相比，他左下方的泪沟已经出来了。</p>

