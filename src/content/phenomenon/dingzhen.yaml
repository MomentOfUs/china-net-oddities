- name: 7秒视频原始文件
  desc: 2020年11月11日摄影师胡波拍摄丁真去买泡面的7秒短视频原件。一段7秒的视频在一个月内创造了中国互联网史上最不可思议的走红神话。
- name: 理塘文旅国企工牌
  desc: 丁真签约理塘文旅后的国企工牌。月薪3500元、五险一金——一个放牛娃到"编制网红"的魔幻跃迁，比任何选秀剧本都离谱。
