glossary:
- key: 甜野男孩
  val: 网友给丁真的标签。"甜"和"野"的矛盾组合精确捕捉了一个藏族少年的天然魅力——这种矛盾本身就构成了不可复制的稀缺性。
- key: 九漏鱼
  val: '"九年义务教育漏网之鱼"的缩写。丁真走红后被曝出未完成义务教育，这个词成了互联网上围绕他的核心争议之一。'
- key: 国有网红
  val: 丁真的特殊身份——国企签约的流量明星。他不是MCN产品，他是地方文旅产业的一次豪赌。
- key: 丁真效应
  val: 丁真走红给理塘带来的旅游经济爆发。一个人的7秒短视频让一个县的GDP增速超过四川平均水平。
