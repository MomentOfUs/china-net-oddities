english_name: MaNiuBi
essay: |
  <p>2006年，北京某路公交车上，一个男人突然站起来，举着DV对准自己，对一整车陌生人喊出了一句后来刻进中文互联网基因的话："我叫马牛逼！我每天吃三斤屎，越吃越牛逼！"没有剧本，没有运镜，没有团队——只有一个人、一台DV、一声喊叫。中文互联网荒诞叙事的第一页不是被创作出来的，是被喊出来的。</p><p>此后近十年，他在马桶里炒菜并当场吃掉，在地铁车厢里脱衣洗澡，在步行街追着路人喊"妈妈我要吃世界上最大的烤肠"。他不是在设计内容——"内容"这个词对他太精巧了。他只是在释放一种出厂设置：一个没装羞耻模块的人，端着DV闯进任何公共空间。</p><p>2022年，"社交牛逼症"意外成为全网热词。年轻一代在溯源这个概念时，最终停在了2006年那辆公交车上。焦双喜被加冕为"社牛鼻祖"。<span class="hl">这个词从诞生的第一秒就与创始人割裂了：它被发明来描述一种天生的缺失，却被用来命名一种后天的技能。</span>今天所有在镜头前表演社牛的人，恰恰因为精确知道体面的边界在哪里才需要表演越界。</p><p>鲁豫在他对面失语过。这个能让任何人继续开口的女人，面对焦双喜时发现所有采访框架全部崩塌——他反客为主，对着镜头宣布"只要我焦双喜在，哪怕是你们四位导师都换了，我依然在"。她沉默的那几秒，不是被驳倒，是坐标系失效。</p><p>翻红之后，新一代博主排队来认祖归宗。镜头一开，剧本一停，这些后天的社牛在先天的社牛面前迅速萎缩回正常人。焦双喜没有开关——他从始至终不在表演状态。他没进过门，所以不需要出来。</p><p>2024年，他还在拍。同一个表情，同一种尴尬，同一个姿势闯进同一种公共空间。互联网每三个月换一批新梗，一个十八年不变的人嵌在里面，像一个系统至今未识别出的漏洞。DV始终对着2006年那辆公交车。车厢早就空了。乘客换了一轮又一轮。他还在喊。</p>

