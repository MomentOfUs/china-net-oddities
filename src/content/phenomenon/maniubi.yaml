comment: |-
  <b>社牛鼻祖</b> · 焦双喜 · B哥 · 马牛逼 · 社交牛逼症<br><br>焦双喜（网络ID为“B哥”，后更被广大网友称为“马牛逼”），1980年代出生于北京市。在网络视频和流媒体尚未普及的宽带上网时代，焦双喜曾自称毕业于北京市海淀区卫校精神病护理专业，并因此拥有一种超脱于常人社交羞耻感和体面规则的奇特个性。他在成名之前主要从事底层的社会边缘工作，是一位极其早期的DV拍摄发烧友。<br><br>2006年前后，焦双喜拿着手持DV，开始在北京的公交车、地铁和繁华商业街区拍摄恶搞视频。在最著名的一段公交车视频中，他突然对着满车的陌生乘客扯着嗓子大喊：“我叫马牛逼！我每天吃三斤屎，越吃越牛逼！”这段极度令人难堪且违背正常社交体面的视频被上传至当时的播客网站后，瞬间引发了中国第一代网民的强烈围观。焦双喜凭借其毫无心理包袱的野生尴尬表演，成为了中国互联网历史上最早的“恶搞网红”鼻祖之一。<br><br>在2006年至2015年的长达近十年的时间里，焦双喜推出了多部极具争议的整活系列视频，包括在马桶里炒菜并当场食用、在地铁车厢里公然洗澡、在步行街高喊“妈妈，我要吃世界上最大的烤肠”以及油炸公共电话亭等荒诞越界行为。他的恶搞在当时虽然被指责为低俗与精神失常，但也因其纯粹的、无剧本包装的尴尬感而在网民中建立了神圣的恶搞地位。他曾受邀参加东方卫视《鲁豫有约》等主流节目的录制，在节目中他反客为主对鲁豫说：“只要我焦双喜在，哪怕是你们四位导师都换了，我依然在！”，甚至让以提问犀利著称的鲁豫在节目中无语沉默，留下了中国电视史上的荒诞一幕。<br><br>焦双喜的很多早期行为，诸如在公共交通工具里大喊大叫、在马路上挑衅路人，在今天的法治与网络合规环境下早已属于违法违规或严重扰乱公共秩序的行为，因此在后续的网络环境整治中面临过多次下架警告。<br><br>令人意想不到的是，2022年前后，随着中文互联网上“社交牛逼症”（简称“社牛”）这一概念的意外走红，年轻一代的网民在考证社牛源头时，重新发掘了2006年就在公交车上大喊大叫的焦双喜，并将他奉为“社牛鼻祖”和“社牛天花板”。网民将他当年纯天然的尴尬视频，与如今充满脚本、剧本和资本包装的刻意社牛博主（如安峰等）进行对比，戏称“自信的味道最终还是败给了妈妈的味道（源自马牛逼经典吃馄饨名场面）”。截至2026年，焦双喜依然以“双喜哥”或“马牛逼”的名号在抖音上低调更新整活视频，成为少数历经二十年互联网淘洗依然用同一个表情存活至今的草根元元老。
