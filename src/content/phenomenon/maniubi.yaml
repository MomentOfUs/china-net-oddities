glossary:
- key: 马牛逼
  val: 一个靠自称"牛逼"走红的主播。越声称自己牛逼，越显得不牛逼——但观众恰恰是冲着这份不牛逼来的。
- key: 我马牛逼什么人
  val: 马牛逼的口头禅。潜台词是"你不知道我有多牛逼"。
- key: 直播PK
  val: 马牛逼的核心内容形式。永远在吹嘘，永远输得一塌糊涂——重复的失败本身就是一种行为艺术。
