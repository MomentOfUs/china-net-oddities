comment: >
  <b>马牛逼</b> · 本名焦双喜 · B哥 · 社牛症鼻祖 · 中国第一代网红<br><br>
  马牛逼（焦双喜），中国最早期的网络恶搞红人之一。2006年，在那个智能手机还没普及、大哥大和桑塔纳还是身份象征的年代，他已经开始拍摄网络原创搞笑视频。<br><br>
  他的成名简洁到离谱：在一辆公交车上大声说自己姓马叫马牛逼，每天吃三斤屎越吃越牛逼。这个视频迅速在网上走红，他也以B哥/阿B哥的名号成为初代网红。随后他开创了一系列经典整活作品：用马桶当炒锅做饭、在地铁车厢假装洗澡、在案板上炒大葱、把公共电话放进油锅炸——每一段都让人尴尬得用脚趾抠出三室一厅。<br><br>
  但马牛逼的独特性在于：他不是在演。如今互联网上的社牛博主全是剧本、全是设计好的段子——马牛逼是认真的。他的尴尬不是演出来的尴尬，是发自肺腑、由内而外自然释放的尴尬。他只管自己开心，把尴尬留给了全世界。网友评价：别人的社牛是装的，只有双喜哥是真实的。他上鲁豫节目，把鲁豫和乐嘉整到集体失语——史上唯一让鲁豫无话可说的人。<br><br>
  2022年，「社交牛逼症」（社牛症）这个概念在全网爆火——人们发现那个最早在公交车上大喊马牛逼的初代整活狂人，就是社牛症的创始人。这个迟到了十六年的认可，让马牛逼又翻红了一次。安峰等新一代社牛博主在他面前都显得拘谨——网友说：看来自信的味道还是败给了妈妈的味道。<br><br>
  马牛逼的荒诞不需要任何分析。他不是一个需要被解读的符号——他就是互联网荒诞本身最纯粹的呈现。在那个还没有剧本、还没有团队、还没有剧本的时代，一个北京老爷们走上公交车大叫自己叫马牛逼——这件事里没有隐喻、没有讽刺、没有立场。它就是一个人类对着空气释放全部自我的纯粹的荒诞。
