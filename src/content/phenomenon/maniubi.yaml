  bio:
  - 本名焦双喜，1980年代生，北京人——中国互联网第一代恶搞网红
  - 2006年，在公交车上大喊自己姓马叫马牛逼，每天吃三斤屎——初代整活视频爆火
  - 人称B哥/阿B哥/双喜哥，以无差别尴尬攻击闻名
  - 开创一系列经典整活：马桶炒菜、地铁洗澡、案板炒大葱、油炸公共电话
  - 上〈鲁豫有约〉反客为主，让鲁豫和乐嘉集体无语——史上唯一
  - 2010年代沉寂但从未停止创作，保持低频率整活更新
  - 2022年社交牛逼症概念全网爆火——人们惊觉社牛鼻祖就是2006年那个阿B哥
  - 被追认为社牛症创始人，迎来职业生涯第二春
  - 后辈安峰等社牛博主在他面前显得拘谨——自信的味道败给妈妈的味道
  - 从2006到2024，用同一个表情演了十八年——不靠团队、不靠剧本、不靠人设
  - 经典履历自曝：毕业于北京市海淀区卫校精神病护理专业
