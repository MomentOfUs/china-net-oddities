comment: 窃·格瓦拉，本名周立齐，1984年生于广西南宁。他靠一段被捕后的采访视频成为中国互联网最无法复制的文化符号。<br><br>2012年，周立齐因盗窃电瓶车被南宁警方抓获。面对记者采访，他说了一段话——"打工是不可能打工的，这辈子都不可能打工的。做生意又不会做，就是偷这种东西，才能维持得了生活。进看守所就跟回家一样，里面个个都是人才，说话又好听，超喜欢在里面的。"<br><br>这段话以惊人的速度席卷全网。网友发现他的长相和发型神似古巴革命家切·格瓦拉，遂赐名"窃·格瓦拉"。他成了底层打工人的"精神领袖"——不是因为他偷东西，而是因为他说出了很多人不敢说的话：不想打工。<br><br>2016年他第四次被捕，判4年6个月。2020年4月出狱时，他发现自己已经变成了一个名人——几十家网红公司在他家门口等着，开出最高1500万的签约费。他全部拒绝："不可能打工。"然后开了自己的烧烤店"周某烤吧"，800平米，招牌上印着自己的头像和"来这里的个个都是人才"。<br><br>2021年他成了某电动车品牌的联合创始人兼形象代言人，风光一时。但他不会做生意。烧烤店很快倒闭，公司被列被执行人，债务30多万。他试图做网红直播，账号被封。最终，一个29岁还在偷电瓶车的人，在40岁时规规矩矩做起了电动车维修。<br><br>窃·格瓦拉最荒谬的地方在于：一个窃贼的脱口而出，成了一代人的精神寄托。"不想打工"四个字刺痛了什么，远比"进看守所像回家"好笑得多。他的故事是2020年代中国社会阶层情绪的浓缩——当"不打工"成为一种被追捧的宣言，它反映的不是犯罪，是绝望。
