- name: “周某烤吧”的破损招牌
  desc: 见证了从“精神领袖”到“资本代言人”再到破产倒闭的荒诞商业闭环。
- name: 南宁派出所前"窃·格瓦拉"签名
  desc: 周立齐在南宁某派出所门前留下的"窃·格瓦拉"签名涂鸦照片。一个连名字都被互联网重新定义的人——从周立齐到"窃·格瓦拉"，加勒比海革命者的面容和广西偷车贼的故事在一个词里完成了史上最荒诞的结合。
glossary:
- key: 窃·格瓦拉
  val: 网友给周立齐取的绰号，将拉丁美洲革命家切·格瓦拉的名字与"窃"字结合。一个偷电瓶车的人和一个革命者的面容重叠在同一张脸上——这种反差本身就是互联网解构精神的终极体现。
- key: 打工是不可能打工的
  val: 周立齐在接受记者采访时说出的原话。这句话在2015-2020年间成为中国最具传播力的反鸡汤金句——它击中了每一个上班族心中最隐秘的共鸣。
- key: 这辈子不可能打工
  val: 周立齐名言的续篇。当一个人把"不打工"变成人生信条并反复进监狱也不改口时，他就不再是一个小偷，而是一个行为艺术家。
- key: 电瓶车杀手
  val: 周立齐的另一绰号。他的主要"作案工具"和对象——"电瓶车"三个字因为他的存在而获得了一种荒诞的仪式感。
