comment: |-
  <b>反内卷亚文化领袖的救赎</b> · 周立齐 · 窃·格瓦拉 · 不可能打工<br><br>周立齐（因容貌和部分特质神似古巴革命领袖切·格瓦拉，被网民戏称为“窃·格瓦拉”），1984年12月27日出生于广西壮族自治区南宁市的一个多子女贫困家庭。由于家庭管教缺失，周立齐自小学辍学后便步入社会，由于缺乏劳动技能与生存出路，他开始混迹于街头，先后因多次盗窃电瓶车以及抢劫被公安机关依法惩处，多次进出看守所，其大半青年时期都在监狱高墙内度过。<br><br>2012年，周立齐因第四次盗窃电瓶车被广西南宁警方抓获。在看守所接受南宁电视台都市频道采访时，面对记者的镜头，手戴手铐的周立齐神态自若地发表了一段极其反常规的言论：“打工是不可能打工的，这辈子都不可能打工的。做生意又不会做，就是偷这种东西，才能维持得了生活这个样子。”在谈到看守所的生活时，他更是语出惊人：“进看守所就跟回家一样，在家里一个人多无聊，在里面个个都是人才，说话又好听，超喜欢在里面的感觉。”这段视频在数年后被搬运至B站和贴吧，由于其极度违背传统主流劳动观念的黑色幽默，瞬间走红全网。<br><br>在2016年至2020年他服刑期间，周立齐成为了网络亚文化世界里的“精神领袖”。在年轻人深受生活内卷、职场压力折磨的社会背景下，周立齐那句“打工是不可能打工的”被广泛用于宣泄反内卷、反过度劳动的消极抵抗情绪。他的肖像被制作成各种“窃·格瓦拉”主题的表情包和T恤衫，火遍全网。2020年4月18日周立齐刑满释放当天，甚至有几十家网红经济公司开着豪车堵在监狱门口，开出高达1500万人民币的天价签约合同，试图将这个“偷车贼”彻底包装为收割眼球的顶级商业IP。<br><br>面对资本围猎的天价诱惑，周立齐展现出了极其罕见的清醒。他在采访中坚拒了所有网红公司的签约邀请，公开重申“不打工，之前就说过不打工”，并为自己过去的偷盗行为向社会公开致歉。随后，他在当地政府的引导和支持下，决定回归实体劳作，加盟了一家电动车品牌并出任其联合创始人，协助开展防盗系统的研发与推广，并尝试涉足餐饮行业，自己开设了一家烧烤店，试图以积极的姿态融入正常社会生活。<br><br>由于个人商业运营经验不足以及市场竞争，周立齐开设的烧烤店在运营两年后宣布倒闭，其加盟的相关公司也在2022年被法院列为被执行人。同时，他在抖音平台上的自媒体账号也在随后的低俗内容排查和网络审查中遭到封禁，使其失去了线上的流量发声窗口。截至2026年，周立齐在广西南宁当地重新回归到了一名普通电动车维修工人的身份，靠着踏踏实实的手艺养活自己。他的经历完整展现了一个底层边缘失足者在经历过全网网民的审丑狂欢与资本天价诱惑的围猎后，最终摆脱流量幻象，重新靠劳动回归社会的清醒救赎过程。
