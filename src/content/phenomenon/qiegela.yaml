english_name: Qiegela
essay: "<p>南宁看守所，2012年。一个叫周立齐的男人第四次因为偷电瓶车被带进来。记者把话筒伸过去，他戴着手铐，头发乱糟糟的，像刚睡醒。然后他对着镜头说了一段话，这段话后来被印在T恤上、刻进鬼畜视频里、做成表情包，传遍了整个中国互联网。他说这句话的时候面无表情，像在陈述一条不需要辩论的公理："打工是不可能打工的，这辈子都不可能打工的。做生意又不会做。进看守所就跟回家一样，里面个个都是人才，说话又好听。"</p><p>这段话的引爆需要等待一个时机。2016年，当它在B站和贴吧被重新挖出来的时候，"内卷"这个词还没有进入主流词典，但那种感受已经长在每一个上班族的骨头里。周立齐在监狱里服刑的那四年半，恰好是中国年轻一代最想说出"不想打工"这四个字的四年半。网友把他的脸PS到切·格瓦拉的贝雷帽下面，"窃·格瓦拉"这个外号就此诞生——一个拉丁美洲革命者和一个广西偷车贼，在一张贴图里完成了史上最荒诞的身份重叠。他不是英雄。他是处境。当一代人需要一个嘴替的时候，偷车贼也可以成为先知。</p><p>2020年4月18日，周立齐刑满释放。几十家网红公司堵在监狱门口，最高开价1500万。他回家吃了一顿白切鸡和清蒸罗非鱼，亲戚围着劝他签。他想了很久，告诉记者两个字："不打工。"然后他做了一件所有人都没想到的事——开了一家800平米的烧烤店。招牌上印着自己的头像，写着"来这里的个个都是人才"。他每天凌晨四点起床采购，凌晨两点还在算账。一个人为了逃避打工，选择了一份比任何打工都累十倍的工作。这就是周立齐身上那个永远说不通的地方——也是他最诚实的地方。</p><p>烧烤店两年后倒闭。电动车品牌"联合创始人"的头衔消失。公司被法院列为被执行人。抖音账号因低俗内容审查被封。他又消失了。</p><p>2025年，有人在南宁街头看到他。他在修电动车。不是偷，是修。那个发誓这辈子都不可能打工的人，最终还是回到了他偷了半辈子的电瓶车旁边——只不过这一次，他手里拿的是扳手，不是撬锁工具。</p><p>存档备注：周立齐从始至终没有做成任何一件他计划中的事。他不想打工——打了。他想当老板——倒了。他不想被消费——被消费了六年。他唯一做对的，是在所有人等着他继续演"窃·格瓦拉"的时候，选择了做回周立齐。南宁街头的电动车不会说话，但它们可能比互联网更早原谅了他。</p>"
