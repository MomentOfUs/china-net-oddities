english_name: Qiegela
essay: "<p>2016年，南宁警方抓到一个偷电瓶车的男人。这已经是他第四次了。记者把话筒递过去，问他想说什么。他穿着一件灰扑扑的外套，头发乱糟糟的，像刚睡醒——然后他说了一段话。这段话后来被刻进了中国互联网的骨头里。他面无表情地说，\"打工是不可能打工的\"，好像这是一句不需要解释的真理。\"里面个个都是人才，说话又好听\"——他是认真的。他说这句话的时候，脸上没有半点嘲讽，全是真心实意的怀念。</p><p>周立齐，1984年广西南宁人，小学辍学，没有一技之长。29岁还在偷电瓶车维持生活。他的人生本来没有任何值得记录的地方，但那段采访被做成鬼畜、表情包、语录集，在全网病毒式传播。网友把他PS成古巴革命领袖的造型，\"窃·格瓦拉\"这个外号诞生了。他不是英雄——他是处境。当\"不想打工\"成为一代人的内心独白时，一个偷车贼成了文化镜像。</p><p>2020年4月18日，他刑满释放。几十家网红公司堵在家门口，开出天价合同。最高的一家说1500万。他坐在家里吃白切鸡和清蒸罗非鱼，亲戚劝他签。他想了很久，说：\"不打工。\"他回到南宁乡下，开了一家800平米的烧烤店，招牌上印着自己的头像和\"来这里的个个都是人才\"。开业那天门口摆满花篮，舞狮队在店前表演。</p><p>然后他成了电动车品牌的\"联合创始人\"。然后烧烤店倒闭了。然后公司被法院列为被执行人。然后他的抖音账号被封了。然后他又消失了。2025年有消息说他在南宁做电动车维修——不是偷，是修。</p><p>一个窃贼的脱口而出成了社会情绪的发泄口。\"不想打工\"这个宣言从偷车贼嘴里说出来，又被一个拒绝1500万的烧烤店老板实践了。他什么都没做对，却让无数人在他的身上看到了自己的委屈。他的人生比任何喜剧都荒诞，因为写这个剧本的那个人——他自己——也完全不知道自己在演什么。</p>"
