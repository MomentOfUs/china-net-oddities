comment: |-
  <b>战狼版李子柒与售假风波</b> · 常小雨 · 东北雨姐 · 力量型带货 · 假红薯粉条<br><br>常小雨，网络ID为“东北雨姐”，1978年出生于辽宁省本溪市。她是中文互联网著名的乡村生活与力量型带货博主。<br><br>常小雨的起点是整个馆藏人物里最低的之一——三岁丧父、九岁被弃、没读完小学、餐厅打杂、田间务农。你从她的视频里看不到卖惨，只有一种近乎暴烈的生存意志。她扛半扇猪、徒手清白菜、穿高跟鞋下地——这些工作实实在在。2022年起，常小雨通过在短视频中展现其身材高大、干活利落、极具力量感的东北农村妇女劳作日常走红，被网民称为“战狼版李子柒”，粉丝量迅速突破两千万。她与丈夫“老蒯”在视频中的反差相处模式也成为看点。走红后，她迅速投身直播带货，销售各类东北农副产品。<br><br>2024年9月，常小雨在直播间销售的红薯粉条被打假博主质疑不含红薯淀粉、只含有木薯淀粉。在其团队以暴力手段扣押打假人并报警的恶性事件舆论失控后，舆论迅速反弹。随后，朝阳县市场监督管理局对常小雨所属公司处以行政罚款和没收违法所得165万元。2025年8月，在国务院新闻办公室的新闻发布会上，国家市场监督管理总局副局长将“东北雨姐”虚假宣传案与“三只羊”月饼案并列通报，作为直播电商专项治理的重大典型违法案例，其个人信用被彻底重创。虽然网信部门随后证实其账号封禁已于2025年10月届满。但截至2026年，常小雨依然保持着彻底退网的状态，未曾发布任何视频，其昔日的粉丝帝国已然人去楼空。她的起落深刻证明了，不懂供应链合规、以暴力对抗舆论的粗放式乡村网红，终将被法治时代彻底淘汰。
