comment: 东北雨姐，本名常小雨，1978年生于辽宁本溪农村。<br><br>她的开局是地狱难度：3岁丧父，9岁母亲改嫁，被遗弃给爷爷奶奶。没读完小学就出去打工，餐厅打杂、田间务农什么都干过。20岁在饭店遇到老蒯（白国辉）——一个二级厨师、导演系毕业的男人，改变了她的命运。<br><br>结婚后两人攒钱开农家乐，一场洪水冲垮一切。之后种地、养家、摸索短视频。2021年在快手发第一条视频无人问津，2022年转战抖音，凭《剪头发》一夜暴涨。2023年《东北过年囤年货有多狠》播放量破亿，300万到2400万粉丝只用了一年。<br><br>她的视频核心公式：干最糙的活，穿最靓的衣裳。高跟鞋下地、连衣裙铲粪、扛半扇猪、徒手清理白菜——一种"战狼版李子柒"的力量美学。<br><br>2024年9月，打假博主"大娃"送检红薯粉条，检出木薯而非红薯。雨姐团队回应方式匪夷所思——殴打维权者、抢手机。官方介入后确认虚假宣传，罚没165万，厂家罚671万。央视连报，国务院发布会点名。账号被禁言后，粉丝从2400万跌至1600万，几乎消失。<br><br>一个从泥里爬出来的女人，又在泥里陷了下去。
