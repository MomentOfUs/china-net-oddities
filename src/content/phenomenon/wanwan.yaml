comment: |-
  <b>豆瓣女神的人设坍塌</b> · 雷宛萤 · 晚晚 · 晚学 · 木木美术馆 · 工人坠亡事件<br><br>雷宛萤（网络ID为“晚晚”），1987年出生于香港，在北京长大，持有香港特别行政区居民身份。她自称具有优渥的外祖母家族背景，自幼接受了艺术教育。在2000年代末期中国首代社交平台豆瓣网崛起时，雷宛萤凭借分享独特的穿搭和文艺美学风格走红，与阿花、张辛苑等并称为“豆瓣三大女神”。随后，她从中央美术学院毕业，并自称前往美国哥伦比亚大学攻读艺术管理硕士学位，开始在艺术圈内积累人脉。<br><br>2014年，雷宛萤与收藏家林瀚结婚。林瀚自称“85后收藏家”、“红三代”，家世显赫。两人的婚礼在瑞士的一座古堡举行，其奢华大气的画面瞬间在全网引爆。婚后，雷宛萤与林瀚在北京共同创办了木木美术馆，正式完成了从“豆瓣网红”向“艺术豪门名媛”的重大身份跨越。两人在网络上开创了独特的秀恩爱与艺术推广话语，被网民戏称为“Let's恋爱，Let's艺术”，雷宛萤也迎来了其声誉和影响力的顶峰。<br><br>然而，雷宛萤精心营建的“豪门文艺”人设，很快便在互联网上引爆了一场网络核查与解构狂欢——被称为“晚学”。大批被称为“晚学家”的网民通过逐帧对比两人的社交媒体照片，揭露了大量令人错愕的伪豪门细节：两人居住的奢华农村别墅其实是向他人租用的；雷宛萤在镜头前多次展示的爱马仕包袋需要与婆婆共享；所谓的瑞士豪华古堡婚礼场地租赁费用其实仅需数万元；而她手指上展示的钻戒也因多次调换反差，被戏称为“一颗钻戒的36种晒法”。这些拆穿虚荣的行为令两人成为全网嘲讽的常客。<br><br>“晚学”的性质在2021年发生重大转折，从单纯的嘲讽虚荣升级为严肃的道德和法律边界质询。2021年3月，木木美术馆北京分馆在施工期间发生安全生产事故，导致一名底层工人不幸坠楼身亡。事故发生后，木木美术馆和雷宛萤夫妇在第一时间采取了删帖的冷漠态度，并因拖欠工人工资、拒绝承担合理民事赔偿责任而遭到舆论的强烈声讨。这一事件彻底打破了其文艺爱心人设。此后，两人与高端豪车品牌劳斯莱斯的广告代言合作也因网民的集体抵制而被迫下线，王思聪更公开留言称其低俗，使其商业社会评价遭受毁灭性打击。<br><br>2024年起，雷宛萤尝试通过直播带货寻求商业转型。然而在首场直播中，万人围观的直播间有9000人是前来公屏刷梗的“晚学家”，甚至被公屏痛斥到当场落泪，单场销售额不足10万元。截至2026年，“晚学”在各大论坛和社交媒体上依然拥有极高的更新活跃度。雷宛萤本人彻底从曾经被大众模仿的“豆瓣美学女神”退化为解构虚伪中产与名媛泡沫的“行为艺术标本”。
