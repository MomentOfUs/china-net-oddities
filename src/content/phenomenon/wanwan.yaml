english_name: WanWan
essay: |
  <p>晚晚不是一个人，是一个社会集体无意识的显示屏。她身上最值得解读的不是那些被拆穿的谎言——谎言人人都会说。最值得解读的是：为什么拆穿她这件事，可以被当成一场十年的狂欢？为什么几万个不相干的人愿意花数年时间，逐帧分析另一个人的每一张照片、每一段文案、每一颗钻戒的透光率？晚晚的罪不是她装——是她的装给了所有人一个安全的出口，去宣泄自己对这个社会阶层固化愤怒。晚学家们追的不是晚晚，是在追自己心里那个「也有过但没敢说出口的欲望」。</p><p>把晚晚一个人架在火上烤，和用几百万字去拆解一颗奶钻到底有多薄——这件事的规模已经远超对一个网红的兴趣，进入了社会集体仪式的范畴。她在2010年代初走红的叙事模板是「麻雀变凤凰」——被大画家选中、留学、嫁豪门、开美术馆。这套模板放在今天回头看，是1990年代社会叙事的回光返照：一个女孩的终极出路，就是被一个更强大的男人选中。晚学家以拆穿这套叙事为乐，本质上并不是和晚晚本人过不去——是和那个曾经让这套叙事成立的社会结构过不去。</p><p>晚晚最大的困境不是「她穿帮了」——是她穿帮之后继续按照老剧本演。2024年那场直播的荒谬之处在于：台下9000个晚学家，台上1个晚晚，所有人都在等她说错下一句话。这不是直播带货，这是公开处刑。而晚晚依然在台上微笑。「还没有下台」这件事，比「被拆穿」更值得追问：为什么一个人在被唾弃了十年之后，还要选择站在所有人面前？因为那个「被看见」的需求，已经远远超出了她对羞辱的恐惧。晚晚依赖的不是富豪人设——是关注本身。只要还有人在看，她就不会消失。这和虚荣无关，和存在感有关。一个从17岁起就被「看」着长大的女人，已经不知道不被看的时候该怎么活。</p><p>晚学这门学科最深的洞见或许不是关于晚晚的——而是关于围观者自己的。你花了这么多时间去研究一个假名媛，这件事比晚晚的真实身份更有趣。因为在看似正义的「打假」狂欢之下，涌动的是对这个社会阶层流动通道日益狭窄的极致愤怒——既然我没有办法通过合法体面的方式变成人上人，那么凭什么你可以假装你是？晚学是一面镜子，你以为你在剖析她，其实你在照见自己的不甘。</p><p>「晚学永存」不是诅咒，是判决。只要中国社会的阶层焦虑还在——只要"嫁得好"仍然是许多人的出路想象——晚学就永远有着源源不断的新鲜样本。晚晚只是第一个，不是最后一个。换一个名字、换一张脸、换一个新版剧本，同样的故事第二天就会重新上演。晚学从未完结，它只是在等待下一次起跑。</p>

