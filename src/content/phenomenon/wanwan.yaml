  bio:
  - 1987年生于香港，北京长大，香港户籍；中央美术学院+哥伦比亚大学（哥大毕业生名单查无此人）
  - 17岁认识大画家刘野（年长23岁有家室），成为其模特及亲密伴侣；在豆瓣称其为老东西老兔兔
  - 靠刘野推荐信入哥伦比亚大学攻读艺术管理硕士；留学期间交男友王博
  - 2010年代初在豆瓣以文艺女神走红，与南笙/张辛苑并称豆瓣三大女神
  - 2014年嫁自称红三代最年轻85后收藏家的林瀚；瑞士古堡婚礼；共同创办木木美术馆
  - 婚后豪门人设逐步崩塌：钻戒是奶钻/爱马仕是借的/别墅是租的（还欠百万房租）/古堡场地仅数万
  - 触及公众底线：工人坠亡后删帖捂嘴；林瀚称天灾是了解河南的机会；贴国旗看NBA
  - 劳斯莱斯合作翻车（王思聪说RR很low），被全网抵制下线
  - 互联网形成晚学——一门专门研究她言行的学科（持续10+年）
  - 2024年尝试直播带货：万人直播间9000人是晚学家；单场销售额不到10万
  - 她是中国互联网史上生命力最持久的现象：靠完美走红，靠裂缝成为传奇
  - 晚学经典句：雷宛萤你是我的奶奶（林瀚写的诗）/let's句式/奶嘴夫妇
