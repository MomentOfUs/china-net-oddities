comment: >
  <b>晚晚</b>本名雷宛萤·1987·香港出生北京长大·<b>晚学核心研究对象</b><br><br>
  晚晚是中国互联网史上生命周期最长、衍生文化最庞大的网红现象之一。她于2010年代初在豆瓣以文艺女神的形象走红——一双大长腿、莫兰迪色系穿搭、艺术史专业背景、港籍身份，在那个大家对艺术留学港籍还没有祛魅的年代，她的每一条动态都引发追捧。<br><br>
  她的早年经历奠定了日后晚学的基石：17岁成为大画家刘野（大她23岁、有家室）的模特和亲密伴侣，靠刘野的推荐信进入哥伦比亚大学。她在豆瓣上把刘野称为老东西老兔兔，这段关系后来成为晚学核心课题之一。2014年，她嫁给自称红三代富二代最年轻85后收藏家的林瀚，两人共同创办木木美术馆。婚礼在瑞士古堡举办，晚晚感叹上帝是个好编剧——这些后来都成了被逐帧解构的晚学经典教材。<br><br>
  晚晚的故事真正戏剧性的转折在于：嫁给豪门的叙事崩盘。晚学家们通过逐帧分析她的每一条微博、每一张照片，逐一揭穿了她的豪门假象——那颗硕大的钻戒是奶钻（看着大但极薄、纯度低）；她的爱马仕是和婆婆共享的甚至是假的；那个瑞士古堡婚礼场地租金才几万块；他们晒出的别墅是租的（宅基地不能买卖），还拖欠了百万房租；房产证晒的是背面……每一个谎言被戳穿之后，他们不仅不承认，还继续吹更大的牛。这构成了晚学第一定律——花小钱装大逼。<br><br>
  随着口碑崩盘，晚晚和林瀚触碰了更多红线：河南暴雨期间林瀚说天灾是了解河南的机会；NBA辱华期间两人贴着国旗去看球；木木美术馆工人坠亡后两人忙着删帖捂嘴，晚晚发了张全黑图片配一个黑点。这些事件让晚学从嘲讽虚荣升级为公众人物底线清单。<br><br>
  2024年晚晚尝试直播带货——万人直播间里九千人是晚学家，在公屏上戳她肺管子、呼吁大家不要下单。单场销售额不到10万。曾经那条只有我能美的晚晚，最终沦为了被自己的影子吞没的人。腾讯新闻标题就是最好的总结：初代顶流网红晚晚怎么过成这样。<br><br>
  晚晚的终极荒诞在于：她靠营造完美生活走红，但让她成为互联网传奇的不是完美本身，而是完美的裂缝——那些裂缝构成了中国互联网最庞大的学科，养活了一代又一代晚学家。
