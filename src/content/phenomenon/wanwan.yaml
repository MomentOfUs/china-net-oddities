english_name: WanWan
essay: |
  <p>二〇二四年，晚晚开了一场直播。在线一万人，其中九千是晚学家。弹幕不催下单——弹幕在比对她的耳环与上一场的差异。她对着镜头微笑。十年前在豆瓣晒照片时，她也是这个角度。取景框没变过，观众从粉丝换成了研究员。屏幕左下角跳出一条评论，问她手上婚戒的克拉数。她没有回答，但换了一个不露左手的手势。</p><p>晚学始于一次偶然的交叉比对。豆瓣用户认出她别墅里的巴塞罗那椅——同款出现在城中租赁网站上。随后归档的内容包括：爱马仕包袋与婆婆共享、古堡场地的真实租金、一颗钻戒拆分为三十六次展示。这不是猎奇，是一场自发的、分布式的民间审计。该学科运行十年，教材月更，学员无毕业记录。</p><p>卷宗的核心问题不在造假内容本身——在被拆穿之后的行为选择。二〇二一年工人坠亡，美术馆删除相关讨论。劳斯莱斯合作遭公众抵制终止。按标准剧本，当事人应在此处退场。她没有。二〇二四年她再度开播，面对九千名研究者保持微笑。<span class="hl">一个从十七岁起就被观看的女人，已经不知道不被观看时该怎么活。</span></p><p>晚晚执行的是一套过期脚本：一个女孩的终极跃迁，是被更强势的男人选中。刘野、王博、林瀚——每一段关系都是一次身份升级。晚学家拆穿的不是她一个人，是那套曾让这个脚本成立的社会语法。每一次公开穿帮，都是这套语法的一次失效宣告。</p><p>本卷不设结案日期。在阶层焦虑持续寻找出口的条件下，相同结构将以新姓名、新面孔、新版本脚本于次日重新运行。晚晚是第一个归档标本。晚学至今未结课。等待下一位标本。</p>

