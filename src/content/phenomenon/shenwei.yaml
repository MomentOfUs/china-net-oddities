english_name: Shen Wei
essay: |
  <p>2018年12月，上海。一个裹着破棉袄的男人坐在路灯下看书。身边堆着捡来的塑料瓶和废纸箱，手指冻得发麻，但他翻得很慢，遇到晦涩的古文就停下来反复读。路人问他看什么。他说：《尚书》。又问讲了什么。他随口说了几句周公。那天晚上他并不知道，这段视频会让他成为2019年中国最红的网红。</p><p>流量机制在沈巍身上展现出罕见的清晰度。一个蓬头垢面的流浪汉坐在垃圾堆旁边讲国学——两类绝无可能重叠的社会身份在这一帧画面里强行并置。算法捕捉到的不是“流浪汉在读书”，而是“流浪汉怎么可能在读书”。当几百万人同时产生同一种好奇，流量不需要任何推手就自动聚合。沈巍后来说“我不想被消费”——这句话说得太晚了。在他被拍下来的那一刻，消费就已经完成了。</p><p>最大的悖论在这里：一个因为捡废纸整理分类、被同事认为“精神异常”而逐出体制的人，最珍视的东西就是“不被别人左右”。他流浪二十六年，正是为了逃离任何一种需要看人脸色的活法。但当几千万部手机对准他，他发现这种凝视比体制更密不透风。他用二十六年逃离的东西，在走红的那一刻加倍地回到了他身上。</p><p>2025年，沈巍以另一种面貌重新出现。黄头发，干净衣服，小十五岁的妻子。他重新坐回直播间，单场礼物打赏五十万。但他不再讲《尚书》了。他对着镜头念打赏名单，语气平稳，像在读另一本书。那种曾经让几百万人困惑的反差感消失了——一个整洁的中年男人坐在直播间里感谢礼物，这件事没有任何传播价值。算法不再推他。</p><p>2026年，沈巍仍在直播，话题度有限。他的直播间标题一度写着“善始者众，善终者寡”。这是他最常说的一句话，也是他对自己这场人生实验的最终注脚。</p>

