comment: |-
  <b>流浪大师的书香人生</b> · 沈巍 · 国学与垃圾分类 · 公务员病退<br><br>沈巍（网络ID为“流浪大师”），1967年出生于上海市的一个普通家庭。他自幼对古典文史有着浓厚的兴趣，渴望学习文科，但由于父亲的严厉限制和家庭压力，他不得不妥协考入大学审计专业。毕业后，他进入上海市徐汇区审计局成为一名本分的体制内公务员。然而，沈巍在工作中养成了一个极其执拗的习惯——他舍不得丢弃废纸和易拉罐等可回收垃圾，分类保存，常把写过字的纸张从局里的垃圾桶捡回来整理分类。这一与现代机关格格不入的执念被同事视为“精神异常”，在历经长期的冲突后，沈巍于1993年被局领导要求“病退”离职，随后更被家人强制送入精神病院治疗了三个月。出院后，他因与家庭彻底决裂，在上海街头开启了长达二十六年的流浪生活。<br><br>在流浪的二十多年里，沈巍坚持以捡垃圾、归类废品维生，同时用捡来的旧书在路灯下通读《尚书》、《论语》等古典文献，保持着极为丰富的知识储备。2018年底，一名自媒体博主在上海街头偶然拍下了衣衫褴褛、蓬头垢面的沈巍在路灯下逻辑清晰、引经据典地阐述国学经典的画面，并将视频上传至短视频平台。这段“流浪汉与国学大师”的巨大视觉与身份反差瞬间引爆网络，“流浪大师”的名号在一夜之间红遍大江南北。<br><br>在2019年的流量狂欢中，沈巍的露宿地成为了全国网红的“打卡圣地”。成百上千名想蹭流量的博主、女主播和MCN机构将其重重包围，甚至有人为了抢夺在他身边的拍摄位置而大打出手。沈巍在面对媒体采访时曾痛苦表态“我不想被消费，我只想安静地看书”，但这番清高的言论反而沦为被算法进一步消费的“流量素材”。在资本的强力介入下，沈巍开通了个人直播账号，短短数天内吸粉数百万。他尝试在直播中讲授国学经典并参与电商带货，单场直播的打赏收益曾高达数十万元。<br><br>然而，沈巍骨子里的书生气使其无法适应充满铜臭和钩心斗角的网红江湖。他很快被卷入了与所谓的“干儿子”、助理及各路流量掮客之间的利益纠纷与网络网暴中。网络上开始出现大量指责他“欺世盗名”、“抛弃清高疯狂捞钱”的质疑声。面对不堪其扰的网络舆论压力和人身威胁，2020年5月，沈巍在精神近乎崩溃的状态下发表声明，宣布无限期退网，并注销了原先拥有巨额流量的直播账号。<br><br>退网数年后，沈巍的生活发生巨大转变。2025年，已理去长发、染回黄发、脱下破棉袄的沈巍与一名多年默默关照他的年轻女粉丝宣布结婚，并在各方的推动下以整洁温和的中年知识分子形象重新回归直播间，成为一名常态化的知识播主。截至2026年，他的直播生活逐步归于平静。沈巍的个人遭际深刻地展现了互联网注意力经济的荒诞——它可以通过算法将一个被体制淘汰并流浪了二十多年的社会边缘人，在一夜之间塑造为大众阶层猎奇消费的国学景观，又在无情消费完毕后将其重塑为一个温顺的体制内复归者。
