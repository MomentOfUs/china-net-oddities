english_name: Shen Wei
essay: "<p>2018年12月，上海。一个裹着破棉袄的男人坐在路灯下看书。他身边堆着捡来的塑料瓶和废纸箱，手指冻得发麻，但他翻书翻得很慢，遇看不懂的古文就停下来反复读。一个路过的中年人问他在看什么。他说：《尚书》。对方又问讲了什么，他讲了几句周公——那天晚上他并不知道，这个画面会被拍下来传到网上，然后整个互联网都在问同一个问题：为什么一个流浪汉在读《尚书》？</p><p>他叫沈巍，1967年生，上海人。在这之前他在上海审计局工作。他有一个习惯：把办公室里被扔掉但还能用的纸捡回来收纳整理。同事觉得他精神不正常。领导让他病退，父亲送他进精神病院，然后把他赶出门。他在街头流浪了二十多年，但每月仍然从审计局领病退工资。他租了一间屋子放书，选择睡在大街上——不是因为没地方去，是因为\"自由\"。</p><p>2019年春天，这个在路边读《尚书》的流浪汉成了最红的中国人之一。大量的人专程去上海看他，围着他，叫他\"大师\"。他开直播了，一年赚了200万。但他在直播间里聊的不是带货也不是喊麦，是《左传》《战国策》和\"不与民争利\"。全网震惊的不是他有多博学，而是一个捡垃圾的人比大多数坐办公室的人更认真地对待一本书。</p><p>2020年5月，他说不干了。\"这并不是我想要的生活。\"他退出网络，有人又看到他在上海街头捡垃圾。2025年的消息说，他还活着，还在捡废纸，还在读书。</p><p>沈巍的荒诞不在于他流浪，而在于他流浪的原因是热爱纸张。一个因为舍不得扔纸而被诊断为精神病的人，最终被一个不读书的时代推上神坛又抛下。他唯一做对的事，就是在所有人都习惯浪费的时候，把别人扔掉的东西小心地收好，包括纸张，也包括时间。</p>"
