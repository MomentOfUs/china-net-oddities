comment: 流浪大师沈巍，1967年生于上海。在上海街头流浪了二十多年，在垃圾桶旁读《尚书》《战国策》——然后一夜之间成了2019年中国最不可思议的网红。<br><br>沈巍的人生轨迹像一出荒诞剧。他毕业于上海一所大学，进入上海审计局工作，本应是一个安稳的公务员。但他有一个致命的爱好——捡垃圾。不是缺钱，而是舍不得被扔掉的纸张，他把办公室里废弃的单面A4纸和旧报纸捡回来按日期整理。同事们觉得他有病，领导以"精神不正常"为由让他病退。父亲把他送进精神病院，然后把他赶出家门。他从此开始了26年的流浪生活。<br><br>但他每月仍然领病退工资。他不是没有地方住——他租了一间屋子放书，自己选择睡大街。因为他习惯了自由。<br><br>2018年12月的一个寒夜，他裹着破棉袄坐在上海街头读《尚书》。一个路过的中年男人拿起手机问他读什么书。他随口讲了周公。视频上传后爆炸了。一个流浪汉在街头读《尚书》——这个画面击中了所有人。<br><br>大量的人涌到上海找他。有人叫他"国学大师"，有人叫他"流浪大师"，有人真的想听他讲书。他开直播，一年赚了200万。但他说他不在乎钱，"最渴望的生活就是有一间安稳的住所和永远陪伴自己的书籍。"<br><br>2020年5月，他宣布退网。2025年有消息说他依然在上海，依然在捡垃圾，依然在读书。<br><br>沈巍是中国互联网最反常识的奇观：一个流浪汉不是因为惨而走红，而是因为在一个不读书的时代，一个捡垃圾的人坐在马路边读《尚书》。
