english_name: Shen Wei
essay: "<p>2018年12月，上海。一个裹着破棉袄的男人坐在路灯下看书。他身边堆着捡来的塑料瓶和废纸箱，手指冻得发麻，但他翻书翻得很慢，遇到晦涩的古文就停下来反复读。一个路人问他看什么。他说：《尚书》。又问讲了什么。他随口说了几句周公。那天晚上他并不知道，这段视频会让他成为2019年中国最红的网红——而且是靠读《尚书》红的。</p><p>他叫沈巍，1967年生，上海人。大学学审计，毕业进入上海徐汇区审计局，本分的公务员。但他有一个致命的习惯：他舍不得被扔掉的纸张。办公楼的垃圾桶里，单面用过的A4纸、旧报纸，他捡回来按日期整理。1993年，同事投诉太久，领导以\"精神不正常\"让他病退。父亲送他进精神病院住了三个月。出院后他开始了一种更极端的生活：彻底流浪。他在上海的街头捡垃圾为生，一捡就是二十六年。</p><p>2019年走红后，狂欢的戏码按部就班地上演：成千上万人涌向他的露宿点，女网红举着手机对着他的脸直播，他被逼到角落里无处可逃。他拒绝了一切商业邀约，说\"我不想被消费\"。没有用。他被消费了。他说\"我只想安静地看书\"——这句话本身就成了消费素材。</p><p>2025年沈巍再次出现在公众视野——他结婚了。新娘是多年关照他的粉丝。街头照片中，他染了黄头发，脱了那件穿了二十多年的破棉袄。然后是直播间，单场礼物打赏50万。这是流浪大师最荒诞的一幕——一个为了不看别人脸色而流浪了二十六年的人，现在穿着新衣服对着镜头念打赏名单。他不是变了，他是累了。他流浪了二十六年，不是因为不想过正常人的生活，而是想过正常人的生活但过不上。当他发现\"正常生活\"就是\"穿着新衣服在直播间感谢大哥送的火箭\"的时候，他选择了接受。不是因为他不清高了，是因为26年的流浪已经透支了他所有说\"不\"的力气。</p>"
