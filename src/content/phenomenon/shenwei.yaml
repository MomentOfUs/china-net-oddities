comment: 流浪大师沈巍，1967年生于上海。他的人生是一部从体制内到流浪再到顶流、又从顶流回归流浪再到结婚的完整弧光。<br><br>他大学学审计专业，毕业后进入上海徐汇区审计局成为公务员。上班后他发现办公楼垃圾桶里有大量被遗弃的纸张——单面用过的A4纸、旧报纸——他舍不得，捡回来按日期整理。这个习惯持续了好几年。1993年，同事多次投诉后，领导以"精神不正常"为由让他病退。他每月领取2000多元生活费回家。<br><br>父亲认为他有精神病，送他进精神病院。他出院后和家人决裂。1995年离家出走。2001年在外租房，2002年被邻居投诉后真正开始流浪街头——但他每月仍从审计局领病退工资。他租了一间屋子放书，自己选择睡大街。因为"自由"。<br><br>2018年12月，一个寒夜。他裹着破棉袄坐在上海街头读《尚书》。一个路人拿起手机拍他，问他看什么书。他说《尚书》，然后讲了几句周公。视频爆炸了。一个流浪汉在街头读《尚书》的画面，击穿了2019年中国的信息茧房。<br><br>2019年他登上CCTV-13《新闻周刊》。"善始者众，善终者寡"成了他的名言。大量人涌到上海找他。有人问他老子和孔子谁更厉害，他说老子。有人问晏婴，他说"晏婴是中国历史上第一个脱口秀大师"。问韩非子，他说"第一个寓言大师"。他开直播，打赏收入超200万。但他很清醒："我不是大师，百分百不是。"<br><br>2020年5月，他宣布"殉网"，清空所有视频。"这并不是我想要的生活。"退网后，粉丝借走他60万不还。2022年他曾为1700元房租发愁。2025年他们又在街头看到他翻垃圾桶——但这次不一样了。<br><br>2025年，他和小15岁的妻子晓晓结婚。晓晓是他的粉丝。两人开直播，单场礼物收入超50万。他染了黄头发，穿着干净的衣服。他说晓晓是他的"白月光"。但他在镜头前说的仍然是书里的话。<br><br>沈巍是互联网最反常识的奇观：一个因为热爱纸张而被诊断精神病的人，在一个不读书的时代被推上神坛。他的26年流浪不是因为没钱，而是因为太爱自由。他甚至不是在流浪——他是在用自己的方式活着。
