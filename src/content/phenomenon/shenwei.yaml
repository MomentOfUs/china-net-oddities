english_name: Shen Wei
essay: "<p>2018年12月，上海。一个裹着破棉袄的男人坐在路灯下看书。他身边堆着捡来的塑料瓶和废纸箱，手指冻得发麻，但他翻书翻得很慢，遇到晦涩的古文就停下来反复读。一个路人问他看什么。他说：《尚书》。又问讲了什么。他随口说了几句周公。那天晚上他并不知道，这段视频会让他成为2019年中国最红的网红——而且是靠读《尚书》红的。</p><p>他叫沈巍，1967年生，上海人。大学学审计，毕业进入上海徐汇区审计局，本分的公务员。但他有一个致命的习惯：他舍不得被扔掉的纸张。办公楼的垃圾桶里，单面用过的A4纸、旧报纸，他捡回来按日期整理。1993年，同事投诉太久，领导以\"精神不正常\"让他病退。父亲送他进精神病院。出院后家人决裂，他离家出走。但他每月仍然从审计局领病退工资——2000多块钱，够他活。他租了一间屋子放书，选择睡大街上。不是因为没地方去，是因为\"自由\"。</p><p>2019年春天，这个在路边读《尚书》的流浪汉上了CCTV-13的《新闻周刊》。\"善始者众，善终者寡\"这句话跟着他的脸一起在全网传播。大量的人专程去上海看他、围着他、叫他\"大师\"。有人问老子和孔子谁厉害，他说老子。问晏婴，他说\"晏婴是中国历史上第一个脱口秀大师\"。问韩非子，他说\"第一个寓言大师\"。他开了直播，打赏收入超过200万。但他不断澄清：\"我不是大师。百分百不是。\"</p><p>2020年5月，他宣布\"殉网\"，清空所有视频。\"这并不是我想要的生活。\"退网后，粉丝找他借了60万——没还。2022年的时候，他曾为1700块房租发愁。</p><p>2025年又有人在上海街头看到他翻垃圾桶。但这次不一样了。他娶了一个小他15岁的妻子，叫晓晓，是他的粉丝。两人一起直播，单场礼物收入50多万。他染了黄头发，穿着干净的衣服坐在镜头前，说的仍然是从书里来的话。</p><p>沈巍的荒诞不在于他是流浪汉。而在于他流浪了26年的真正原因，是一个人因为热爱纸张而被体制抛弃。他以\"捡垃圾的精神病\"被赶出体制，又以\"读《尚书》的流浪大师\"回到所有人的手机屏幕里。互联网唯一做对的一件事，是让他为数不多的真心话——\"善始者众，善终者寡\"——被人记住。可惜大多数人只记住了前半句。</p>"
