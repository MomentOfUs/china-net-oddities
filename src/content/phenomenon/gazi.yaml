comment: <b>1989</b> · 河北雄县 · 谢孟伟 · 童星→老赖<br><br>2003年，14岁的谢孟伟在《小兵张嘎》里演活了那个在白洋淀芦苇荡里拿着木头枪的少年。这个角色太成功了——它给了谢孟伟一辈子的饭吃，也让他一辈子被困在这个角色里。<br><br>长大后的童星之路走不通。他转型直播带货，从此开启了中国互联网最漫长、最密集、最荒诞的坠落弧线。<br><br>2021年，他因卖贴牌假酒被通报。潘长江以长辈身份连线劝诫："网上的东西都是虚拟的，你把握不住。"嘎子当场痛哭，说改。结果没几天潘长江自己卖起了同款酒——"潘嘎之交"成为年度热词。这是他第一个拿得出手的名场面。<br><br>此后他像开挂了一样持续输出：穿警服直播带货被拘留7天、欠债1400万变失信被执行人、负债2200万宣布永不带货。每一次翻车都让人以为这是终点了，但下一次永远更离谱。<br><br>2026年春天，他迎来了第二春——不是因为翻盘，而是因为黑红。酸奶战役中他卖过期半年的牛奶，喝出酸味后怒摔奶瓶，对着助理咆哮"你们给我拿好的呀"。可乐事件中他把超市价3元的百事可乐卖4元，观众说贵了，他怒怼"你喝过百事可乐吗？你喝过吗？滚！"——这些视频在B站播放量百万级，二创和鬼畜满天飞。<br><br>从童年英雄到互联网乐子，嘎子的二十年可以这样概括：小兵张嘎赢了，谢孟伟输了。而他对此最清醒的一句话就是他自己说的——"我不只是嘎子，我连嘎子都保不住了。"
