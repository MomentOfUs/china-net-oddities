english_name: Xie Mengwei (Gazi)
essay: |
  <p>2003年，白洋淀的芦苇荡。14岁的谢孟伟穿着土布军装，在镜头前演完《小兵张嘎》的最后一场戏。全国的电视观众都记住了那个眼神倔强的少年。他不知道的是，这一刻是他职业生涯的最高点。此后二十多年，只有一个方向。</p><p>中国戏曲学院专业第一名。毕业。无戏可拍。娱乐圈只认得"嘎子"，不认得"谢孟伟"。他去跑组，导演笑着说"嘎子来了啊"——然后就没有然后了。童星的诅咒是一条精确的分界线：角色太成功，角色就把演员吃掉了。2020年他打开直播间，这是算法时代留给过气者的最后一条出路。</p><p>2021年，潘长江在连麦中劝他："网上的东西都是虚拟的，你把握不住。"几个月后，潘长江自己下场卖假酒。"潘嘎之交"由此成为一个精准的分类学标签——它记录的是一场劝诫与悔改，而是劝你的人和你走的是同一条路。他只是还没走到你那一步。</p><p>假酒。警服。过期牛奶。四块钱可乐。四次翻车，荒诞逐级爬升。但真正应该停下来看的不是事件本身——是翻车视频的播放量永远比道歉视频高两个数量级。他用了二十年学会了一件事：卖东西没人买，摔东西全是人。B站把他的酸奶视频翻制成文言文版、鬼畜版、新三国版。"嘎子名场面"成了一个独立的内容品类。弹幕不再骂他——在玩梗。</p><p>2026年，负债2200万，失信被执行人。他反复承诺"永不带货"，反复食言——不是他不想守信，是他没有第二条路。直播间里数万人每天守着。没人等他翻盘。所有人都在等他翻车。</p>

