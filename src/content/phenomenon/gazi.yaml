relics:
- name: 贴牌假酒瓶
  desc: 2021年嘎子直播间售出的贴牌假酒实物。该物证开启了中国互联网最漫长、最密集、最荒诞的坠落弧线——从童星到老赖，一瓶假酒就够了。
- name: 《小兵张嘎》VCD光盘
  desc: 2003年嘎子主演的抗战剧光盘。14岁的白洋淀芦苇荡少年给了他一辈子的饭吃，也让他一辈子被困在这个角色里——起点太高，只能坠落。
- name: 手铐（道具复刻）
  desc: 2025年嘎子穿警服带货被行政拘留7天的象征物证。这已经不是翻车了——法律在替互联网按住刹车，但刹车片已经磨没了。
glossary:
- key: 潘嘎之交
  val: 2021年度网络热词。潘长江在直播间劝嘎子"网上的东西都是虚拟的，你把握不住"，随后自己开始带货卖酒——"把握不住"成了当年最大的黑色幽默。
- key: 把握不住
  val: 潘长江劝诫嘎子的名句。该词的荒诞升级版发生在潘长江自己也踏入带货泥潭之后——原来他也把握不住。
- key: 四大名场面
  val: 嘎子职业生涯的四个标志性翻车事件：假酒、酸奶改名、可乐卖贵、穿警服带货被拘。四件事件在荒诞程度上逐级爬升，共同构成了一部互联网坠落弧线教科书。
- key: 嘎子偷狗
  val: 嘎子的早期网络黑称，源于网友对其童星形象崩塌的戏谑。这个称呼在后来的直播带货翻车潮中被逐渐遗忘，但它的存在证明了他的坠落从很早就开始了。
