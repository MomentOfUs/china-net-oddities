comment: |-
  <b>童星的网红坠落</b> · 谢孟伟 · 嘎子 · 潘嘎之交<br><br>谢孟伟，艺名“嘎子”，1989年出生于河北省保定市雄县的一个普通家庭。他自幼学习戏曲，有着扎实的武术和翻子拳功底。2003年，年仅14岁的谢孟伟在电视剧《小兵张嘎》中担纲男主角，凭借朴实、坚毅且充满灵气的表演，成功塑造了抗日小英雄“张嘎”这一国民级艺术形象，一举成为家喻户晓的童星。2006年，他以专业第一名的成绩考入中国戏曲学院。然而，由于外形受限以及童星滤镜过深，谢孟伟在成年后的主流演艺市场转型极其不顺，面临无戏可拍的尴尬境地，最终决定转向方兴未艾的短视频直播带货赛道。<br><br>2020年起，谢孟伟在快手、抖音等平台转型成为带货主播。他利用自己童年时期积累的国民度，在直播间高频卖货。然而，为了追求利润和流量，他很快陷入了销售低质、贴牌乃至涉嫌虚假宣传酒水商品的争议中。其带货时的夸张表演和价格套路，引发了大量消费者的质疑与相关监管部门的通报，其从“童年英雄”向“带货老赖”的蜕变引起了网民的强烈关注。<br><br>2021年，谢孟伟在直播间因带货争议遭到网民痛骂而当众痛哭。此时，著名老牌演员潘长江在连麦中以长辈身份对他进行了语重心长的劝诫，说出了名言“网上的东西都是虚拟的，你把握不住”。然而仅仅几个月后，潘长江自己也投身到了同样套路的假酒带货中。这一戏剧性的反转被网民嘲讽地总结为“潘嘎之交”，成为2021年度中文互联网传播最广的网络流行语，谢孟伟也因此沦为B站等二创社区鬼畜素材的核心来源，其符号被彻底娱乐化和解构。<br><br>此后，谢孟伟不仅没有收敛，反而变本加厉地在直播带货中采用低俗、反常识的套路制造争议。他曾因涉嫌虚假捐款、卖假手机等事件屡遭曝光。2024年9月，谢孟伟在直播带货时公然穿着警服以谋取不正当商业利益，这一严重违法行为导致其被公安机关依法行政拘留7天，国内账号遭到封禁。2025年12月，他被法院列为失信被执行人，累计欠款超过1400万元。<br><br>2026年4月，谢孟伟在直播间卖过期半年牛奶，并在喝出酸味后怒摔奶瓶、咆哮助理，其失控的“酸奶名场面”和随后在“可乐事件”中怼观众“你喝过百事可乐吗？滚！”等反智暴走言论，在B站等平台再次斩获数百万的鬼畜播放量。截至2026年，谢孟伟个人负债已达2200万元，尽管他多次在直播中承诺“永不带货”，但为了偿还债务，他依然频繁活跃在直播间带货并转型拍摄粗制滥造的商业短剧。他的符号价值已在无休止的审丑和信任破产中被消费殆尽。
