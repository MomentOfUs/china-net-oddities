glossary:
  - key: 人类高质量男性
    val: 2021年夏天由徐勤根创造的自称标签。原意是自我标榜"高净值、高收入、高素质"，但在互联网的解构运动中，它演变成了一个自嘲式万用句式——在"人类高质量XX"的模板里填入任何词，都能产生嘲讽效果。
  - key: 油头粉面
    val: 徐勤根标志性视觉形象——油腻的背头加厚得透光的粉底。这不是造型失误，而是互联网审丑美学的一次精准合成：它足够真实（确实存在这样的人）又足够滑稽（但他又是认真的），恰好激发了全网的模仿和恶搞狂热。
  - key: 求偶视频
    val: 徐勤根在微博发布的1分30秒视频。该视频原意是一则严肃的婚恋自我介绍，但其尴尬程度——从语气、台词到表情管理——完美突破了人类的尴尬耐受阈值，成为驱动流量狂欢的"尴尬素"。
  - key: 割韭菜
    val: 徐勤根爆红后的快速变现行为——7.5万元/年的付费粉丝群、直播打赏、广告合作。在网友看来，从一个"可笑的求爱者"到一个"急切的收割者"之间的转换过于突兀，触发了一次对互联网"爆红收割"模式的集体反思。

