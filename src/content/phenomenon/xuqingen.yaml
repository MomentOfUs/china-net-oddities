comment: |-
  <b>人类高质量男性的速红与消亡</b> · 徐勤根 · 求偶视频 · 付费粉丝群 · 平台封杀<br><br>徐勤根，约1991年出生于江苏省的一个普通家庭。在爆红网络之前，他曾自称是一名资深的海外金融从业者，拥有高额的个人净资产和丰富的海外投资背景，在领英等职场社交平台上以“金融高净值人才”的人设寻找客户。<br><br>2021年7月，徐勤根在微博上发布了一段长达1分30秒的“人类高质量男性求偶”视频。在视频中，他梳着油腻得发光的偏分发型，画着惨白得如同蜡像的底妆，涂着深色的口红，面对镜头身体极度局促地晃动，并以极其僵硬、机械的语气发声：“我，徐勤根，人类高质量男性，想要寻找一位高质量女性。”这段极其尴尬、反差且充满魔性视觉特征的视频被上传后，瞬间以排山倒海之势席卷了整个中文互联网。<br><br>在2021年7月至8月的流量巅峰期，徐勤根成为了全网最火爆的流量图腾。他那拍照时侧身、双脚微蹲的“高质量站姿”和油头粉面的视觉形象，成为了全网模仿的现象级模因。一众一线明星和各大网红博主纷纷在社交平台上晒出同款高质量站姿，各大商业品牌也纷纷向他抛来合作橄榄枝，其微博粉丝在短短一周内从几百人暴涨至120多万。然而，徐勤根在获得流量后，几乎是在第一时间内开启了粗放的流量收割。他设立了高额的个人付费粉丝群，入群门槛费自曝高达7.5万元人民币/年。这一吃相难看的割韭菜行为，引发了全网关于其假借求偶实为“投机诈骗”的猛烈质疑。<br><br>徐勤根如此激进且收割性质明显的商业套利行为，迅速撞上了监管红线。2021年9月2日，央视网发布了质疑文章，公开痛批其通过荒诞恶搞爆红后，急于套现、吃相难看的投机本质，警告切勿给此类“审丑收割”提供平台生存空间。<br><br>在央视网等官媒定性通报后，微博平台立即对徐勤根的账号实施了合规永久禁言处罚，抖音、B站等国内平台也同步对其账号和视频进行了彻底清理。从2021年7月爆红到9月彻底封号，徐勤根的互联网生命周期仅维持了短短两个月。截至2026年，徐勤根已从中文互联网上完全消失，没有任何的后续生活信息或复出迹象。他的经历成为了审丑注意力经济史上最经典、最高效的时代侧影——完美地呈现了算法时代一个微小个体的突发爆红、激进套利以及最终被合规净化瞬间抹去的完整自毁全貌。
essay: |
  <p>2021年7月微博上一面惨白的墙壁前。一个歪着脖子、将锃亮的油头偏向一侧的文雅男人，脸上打着厚得像石膏面具的粉底，用极度僵硬、机械的语调对着镜头说：“我，徐勤根，人类高质量男性，想要找一位高质量女性。”这段1分30秒的求偶视频，在一夜之间触发了整个中文互联网的“转寄强制力”，播放量迅速突破数千万次。</p><p>徐勤根的爆发是网民对畸形精英主义的黑色幽默式反讽与推荐算法猎奇偏好缝合的产物。他视频中那种刻板、滑稽的“绅士”站姿和怪诞的求偶逻辑，恰好击中了大众对当代婚配市场功利主义与阶层虚无的焦虑心理。算法在短时间内将他的怪异姿势捧为全网竞相模仿的万能模因，完成了流量红利的极速爆发。</p><p>然而，这股突如其来的流量并没能支撑起他虚幻的高端人设。徐勤根走红后迅速露出了投机变现的底牌，开设天价付费粉丝群、收取每月数万元会员费，试图直接从粉丝身上收割暴利。<span class="hl">这一挑战金融监管和网络合规底线的吃相，迅速触发了官方的铁腕整治，各大平台在几天内对其实施了全面封杀，完成了常态的瞬间坠落。</span></p><p>封禁将他试图包装的“高质量”外衣扒了个干净，露出了他只是个投机倒把的金融中介的荒诞真相。他曾经用歪脖自拍来宣示精英地位，最终却被这一歪脖的经典动作所彻底定型，成为中文互联网审丑词典里一个不可回收的滑稽标本。</p><p>截至2026年，徐勤根已被网络彻底清除，其天价粉丝群早已化为泡影，只剩下一张歪脖歪嘴、抹着厚粉的搞笑截图依然在表情包库里积灰。他用自身的瞬间消失，为中国短视频时代那些试图用粗劣人设收割网民钱包的投机者，留下了一行尴尬而冰冷的评语。</p>

