english_name: 'Liangzi (Li Zhanliang) '
essay: '<p>全中国可能都找不到第二个人，像良子一样背负着大众的期望——大家口径一致："对喽，就这么吃""祝早日大结局"。他就像华北平原马戏团的怪奇秀主角：人们打赏他的暴食，嘲笑他的肥胖，盯着他生命的倒计时。</p><p>风神翼龙，晚白垩纪，翼展12米——人类已知最大飞行动物。有人拿它打趣，说它比良子还轻40斤。BMI
  80，这组明显不属于人类体征的数据，是他傲立于互联网潮头的武器。空腹血糖16mmol/L（问题是良子从不空腹），血压270mmHg（至今未血管爆裂）。糖尿病并发症导致全身多处黑棘皮，脊柱因胃袋重量重度倾斜。<br><br>良子体内的屎山代码就这么运行起来了——各路势力在互相牵制中达成了诡异的平衡。</p><p>他的吃播充满野性的动物气息。首选食物以华北平原民间的碳水化合物为主：焖子、火烧、馅饼、油条、凉皮、包子。由于长期服用碳酸饮料，牙齿脱落七八颗，张嘴明显看到四颗下切牙缺失。进食面条类食物还会多次反刍咀嚼。饭毕，顾不上擦嘴边的油汤和残渣，大喊三声<b>"味真足"</b>——这是良子作品的特殊水印。</p><p>最凶险的「经典十大战役」：16包泡面将铁锅装得严丝合缝，37根油条让良子吃到双眼迷离。"纯享大肥肉"战役蔚为壮观——几块厚如板砖的白色肥肉丝滑下肚，系统提示"高危行为请勿模仿"自己就弹出来了。</p><p>他去拍X光片，放射线在脂肪面前乏力，一团白雾。去核磁共振，胃袋太大进不去仪器——胃袋上壁与仪器严丝合缝，堪称零公差工艺品。车祸后毫发无损——只有胃袋多了些许淤青。他的座驾铃木北斗星（绰号小星星）常年弹道偏左。网友说：<b>没有V8发动机钢铁心脏，根本带不动这种高配置的身体</b>。</p><p>关于良子的大结局，网友们文思泉涌：把良子炼成油，赛尔号就找到了无尽能源；火化都得先切块再进炉，炉子也得少食多餐。建议海葬——一良落，万物生。要是土葬，估计沧州任丘未来会多出一块油田。</p><p>从语言学角度，良子让"胃袋"一词直接入选年度梗词典。在某种程度上，良子是华北平原的索绪尔——在语言学与符号学层面赋予"胃袋"更宏观的意义。无论结局如何，他都将以另一种形式实现<b>赛博永生</b>。</p>

  '
