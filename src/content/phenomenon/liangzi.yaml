comment: 一个<b>120斤</b>、侧脸像周杰伦的青年，把自己吃到了<b class="hlr">410斤</b>。胃袋<b>150斤</b>，CT穿不透，X光打不透，床被压塌，牙齿掉了<b
  class="hlr">7-8颗</b>。弯腰系不了鞋带，坐飞机加长安全带。医生说他活不过半年。<br><br>他独创<b class="hlg">"胃袋舞"</b>：吃完站起，用手掂着肚子，喊"一二三"。15秒就喘不上气。医生说他的身体<b
  class="hlr">相当于三个成年人</b>。<br><br>他吃跑了妻子，打跑了养母。女儿说"爸爸肚子真大"，他说那是<b class="hlg">"大胃袋"</b>。这个胃袋吞噬了健康、家庭、过去，也正在吞噬未来。<br><br>观众刷着<b
  class="hlr">"大结局"</b>。他知道："他们就想让我吃死。"但他还在吃。一锅泡面、一盘焖子，喊一声<b class="hlg">"味真足"</b>。<br><br>也曾减过。从410到360，瘦了20斤。代价是直播间礼物少了。<br><br>他是互联网奇观。他死不死，是他们下饭的佐料。
