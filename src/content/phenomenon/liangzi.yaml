english_name: Liangzi (Li Zhanliang)
essay: |
  <p>良子把最后一口饭咽下去，筷子往桌上一拍，双手扯起T恤下摆，对着手机连拍三下肚皮——“味真足！味真足！！味真足！！！”弹幕从他浮肿的脸上滚过去：大结局。奠。催更。明天他还会打开摄像头。后天也是。所有人都知道。</p><p>2021年，一个在快手混了好几年都没火的沧州农村青年，对着镜头吃完了16包方便面。那支视频的播放量超过他此前全部作品的总和。良子终于找到了自己的赛道。他把它变成了一条流水线：一天两场，每场主食三到五斤，配菜十斤起步。直播间里唯一的悬念不是他吃不吃得完——他永远能吃完——而是他能不能活着吃完。这种悬念让每一场都像最后一期。算法精确地捕捉了这一点。</p><p>流水线的效率是惊人的。从120斤到410斤，三年。空腹血糖测不出来了——仪器上限30。血压270。牙齿掉了七八颗。有一次做CT，医生看着扫描结果沉默了很久。那沉默是整件事里最接近真相的声音。但弹幕听不见。</p><p>2025年，良子短暂减了40斤。打赏少了八成。他算了一笔账——不是没算过，是算过了——然后发了条视频：“减肥减蛋的肥，活着吃死了算。”<span class="insight">他把答案写在所有人面前：健康的穷人值0元，要死的网红值300万一年。不是不想活。是不想穷着活。</span></p><p>在这笔账之外，其他的都成了损耗。养母被殴打。妻子被3000元卖掉买手机。女儿在学校被叫“小胃袋”，他拍着肚子说“这是大胃袋”。黑历史被扒出来后，评论区更热闹了——一个不完美的受害者让围观变得心安理得。你不用替他难过。你只需要继续看，继续等。</p><p>直播间还开着。弹道偏左的北斗星还在沧州的土路上跑。大结局还没来。</p>

