relics:
- name: 拆坏的电子秤
  desc: 良子直播暴食时被体重压坏的电子秤残骸。从210斤到410斤再到160斤——一台秤记录了一个人身体变迁的全部刻度。
- name: 沾满油渍的手机支架
  desc: 良子吃播时放置手机的铁丝支架。支架上凝固的油渍记录了他三年暴食生涯的每一个深夜。
- name: 医院CT光盘
  desc: 良子体重巅峰期拍摄的CT影像光盘。当医生看着扫描结果沉默时，弹幕还在刷"味真足"——娱乐至死的终极画面。
glossary:
- key: 味真足
  val: 良子吃播的口头禅。他会对着镜头反复喊出这三个字——"味真足"既是对食物的评价，也是对自己整个人生的评价。
- key: 大胃袋
  val: 良子的人设标签。他不是大胃王吃播，他是"大胃袋"——一个没有底限的容器。
- key: 大结局
  val: 良子直播中频繁出现的主题词。他不是在直播吃，他在直播"大结局"。
- key: 活着吃死了算
  val: 良子直播间常驻观众的弹幕梗。这句话既是玩笑也是诅咒。
