english_name: Liangzi (Li Zhanliang)
essay: <p>他是一个互联网无法归类的人——你说他是吃播，但他的观众不是来看他吃的，是来盼他死的。你说他是被霸凌的受害者，但他打娘卖妻霸凌女儿的每一个故事都让人确认他不是好人。你可怜他410斤身体随时可能崩溃，但他说"不吃不喝，死了谁说"。良子站在了所有道德判断的交叉点上，每一个对他做出评价的人，最后都会发现自己也被绕进去了。</p><p>他的走红是一场结构性的意外。一个120斤的农村青年，因为侧脸像周杰伦，走入互联网。拍剧情不火，徒步失败，最后发现"吃"——这个最低门槛的表演——才是他的出口。他吃16包方便面的视频在2021年炸了。不是因为吃得多——吃播多得是——而是因为他吃得真不要命。其他吃播镜头前吃完镜头后催吐，他镜头前吃完镜头后偷偷加餐。他的每一口都让人相信：这个人真的会吃死。</p><p>然后扭曲开始了。观众发现他真的会吃死后，不是报警，不是劝他——是给他打钱让他接着吃。一个网名叫"良子"的男人，在直播间里按照老板的吩咐往死里吃，弹幕同时刷着"大结局"。他表演胃痛倒地，礼物一到立刻起身感谢。这个闭环——花钱买他的命、观看他的濒死、在他真的倒下之前及时行乐——是整个直播生态最黑暗的剧本，而他演得最投入。</p><p>他的人生污点不在表演里，在现实中。打养母——因为母亲拒绝为他做暴食的饭。卖妻——3000块买断一段婚姻，拿钱买了一台手机。女儿被全校叫"小胃袋"——他在镜头前拍着肚子说这是"大胃袋"，笑得最大声。这些事让他的观众觉得自己催命催得理直气壮——"这是替天行道，不是猎奇。"——但如果你真的替天行道，为什么一边骂他一边给他打钱？</p><p>2026年他还在播。360斤，比巅峰瘦了50斤——不是为健康，是因为礼物少了。黑棘皮全身都是，牙齿掉了大半，胃袋150斤。他倒下的频率比以前高了，每次倒下弹幕就问"大结局了吗"，礼物刷得更疯了。他不演了也不装了——"活着吃，死了算"就是他的墓志铭，他自己写的。从120斤到410斤再到360斤，从卖手机到卖命——良子的故事没有反转。只有一个不愿停下来的男人，和一群不愿他停下来的观众。</p>
