comment: <b>1993</b> · 河北沧州任丘 · 李占良 · 大胃袋<br><br>他曾经120斤，侧脸像周杰伦。现在410斤，CT穿不透，X光打不透，核磁共振进不去仪器。BMI 80——这组数据不属于人类范畴。<br><br>良子的吃播之路始于一个偶然。早年他在快手试拍土味剧情视频不温不火，试过徒步直播——结果一个月没走出村口。2021年他发现"吃"才是真正的赛道。此后一路狂飙：16包泡面将铁锅塞得严丝合缝、37根油条吃到双眼迷离、"纯享大肥肉"厚如板砖。吃完站起来用手指着肚子喊"一二三"——"胃袋舞"横空出世。饭毕，擦都不擦嘴边的油汤和残渣，喊三声"味真足"。<br><br>但良子之所以是互联网奇观，核心不在吃，在"催命"。<br><br>他的观众翻着花样盼他死：弹幕刷"大结局"、发一连串"奠"字、讨论他火化需要多久。"开席""灵堂""葬礼"是日常话题。担心他脂肪太厚火化炉不够用——建议先切块，炉子也得"少食多餐"。建议海葬——"一良落，万物生"。<br><br>然而这些人不是白看的——他们花真金白银催他吃。这就是良子生态最扭曲的一环："逼良为猪"。直播间老板刷钱，点菜让他吃。他吃，钱到账。不吃，没收入。越吃越多人刷钱，越刷钱越要往死里吃。他说过一句名言："不吃不喝，死了谁说。"<br><br>他的人品同样堪称奇观。黑历史在互联网上口口相传：打养母——母亲不给他做饭（嫌他太胖），他暴起打人，后来回应"我早就不打了"——等于是认了。卖妻——老婆提离婚，他要3000块（也有说彩礼钱）就同意，钱到手买了台手机——就是现在直播用的这台。女儿被同学叫"小胃袋"，他在视频里拍着肚子说"爸爸没有肚子，这是胃袋，大胃袋"。还有自己吃肉让女儿吃剩菜、睡着把养的狗压死、为了500万参加减肥营但天天偷吃还要对方提前支付200万定金——每一个段拿出来都让人下巴掉地。<br><br>律师说他身体状况太糟糕，劝网友不要再催他吃，出了事观众要负责。良子很替老板们着想——不在直播间吃，私下吃完拍视频单独发给老板看。"他是互联网上唯一一个观众花钱催他吃、边吃边盼他死、他死了观众还要负责的人。"<br><br>2026年他还在吃，还在播。减过一点肥——从410到360，礼物立马少了。他很快懂了：减肥=降收入，保持体重=保饭碗。至于大结局——"活着吃，死了算。"
