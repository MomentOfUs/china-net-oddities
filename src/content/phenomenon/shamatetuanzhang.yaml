english_name: Shamate Captain
essay: |
  <p>2016年冬天，沈阳大街。一个戴彩色爆炸头假发的年轻人站在镜头前，对面是虎哥。虎哥指着他的脸吼出那句后来被播放了上千万次的台词：“指定没有你好果汁吃。”年轻人没有回嘴。他站在寒风中，用一种和周围一切都不协调的平静，承受了全部的怒吼。他是杀马特团长——东北往事宇宙里台词最少的核心角色。</p><p>这段视频被搬运到B站后成为鬼畜区最持久的素材之一。弹幕在笑，但没有人问过站在虎哥对面那个人当时在想什么。东北往事是一个关于“说”的宇宙：每个人都在输出。杀马特团长不说。但他站在那里就够了。<span class="insight">一个被主流审美判了死刑的彩色假发，立在沈阳大街的正中央。这就是他全部的表达。</span></p><p>这种沉默不只属于他一个人。杀马特诞生于2000年代中期的工厂流水线和城乡结合部网吧。它的成员是进城务工的农村青年、辍学的留守儿童。在工厂里他们被编号，在城里被叫“农民工”，在网上被嘲笑。那些爆炸头、铆钉、烟熏妆——你可以说它丑，但它不是无意识的丑。它是故意的。故意让自己无法被主流世界消化。和团长在沈阳大街上的沉默一样：不需要你理解，只需要你看见。</p><p>但互联网看见了之后做的事，不是理解，是消费。杀马特团长不是被骂出名的，他是被“解构”出名的。一个阶层的愤怒被提炼成娱乐产品，团长本人的任何表达都被消音了。</p><p>2019年之后，杀马特团长剪掉了假发。他重新出现在快手上时，是一个留着寸头的普通男人。假发被摘下来的动作被截成短视频反复传播——人们把它看作一个时代的终结。但很少有人注意到：他从来没有说过为什么摘掉它。</p><p>今天搜索“杀马特团长”，第一个结果仍然是那句“指定没有你好果汁吃”。他说过的话很少，被记住的只有挨骂的那句。彩色假发被收进了互联网的档案库，和劲舞团、QQ空间、网吧包夜一起，变成了考古名词。杀马特团长偶尔还在快手上发段子，寸头，圆润了一些。弹幕里刷着“爷青回”。没有人再问他当年的事。</p>

