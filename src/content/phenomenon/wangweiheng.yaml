english_name: Wang Weiheng
essay: <p>王伟恒的故事，是中国互联网"润学"最完整的反面教材。</p><p>他本有一个典型的中产人生：河北邯郸人，当过消防员，后来做互联网项目负责人，年入20多万，知乎3万粉丝，有房有车。2021年炒虚拟货币爆仓，欠债近200万。他的反应很互联网：不是重新来过，而是把所有失败归咎于环境，归纳出一套"国内不行，国外就是天堂"的逻辑。</p><p>2022年，他卖掉剩余家产，走线美国。入境后第一个举动——在洛杉矶机场当众撕毁护照。在那一刻，他完成了从"中国中产"到"美国黑户"的身份转换。代价是：没有合法身份的"黑户"，时薪被压到4美元，打黑工，睡车里。</p><p>然后一颗螺丝松动，整栋大厦塌了。腰疼看病15分钟，账单5670美元——没有医保，付不起。追尾赔1.1万美元——没保险，车被拖走。信用破产、失去住所、流落街头。58张罚单像雪球越滚越大。2025年被捕，保释金2万美元。"神秘人士"将他保释，他以为是天使，其实是更深的陷阱——"保释贷"意味着如果他死了，遗体器官会被用来抵债。</p><p>他在精神崩溃的路上越走越远。拍视频指控所有人是"内鬼"——奥巴马、佩洛西、CIA、FBI、美国警察。在麦当劳蹭网时辱骂中国留学生，被拍下，对方送他一袋汉堡附上纸条"吃完记得喊爹"。这是他仅存的社交互动。</p><p>如今他在洛杉矶街头举牌乞讨，左眼失明，精神恍惚。反衬他的是同在美国流浪的丁胖子金牌讲师——同样没身份，但选择学法、拍视频、积累关注，后来住进了政府公寓。而王伟恒把每个试图帮他的人都骂走了。</p><p>有人问他为什么不回国。他说不出口——撕毁的护照和非法入境的记录，让他连"被遣返"的资格都没有。他是回不去的中国人，留不下的美国人。他是互联网上最悲壮的"润人"样本——<b>一个被自由叙事绑架，又被美国现实碾碎的人</b>。</p>
