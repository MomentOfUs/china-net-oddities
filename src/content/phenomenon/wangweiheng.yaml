english_name: Wang Weiheng
essay: <p>王伟恒的故事，是中国互联网"润学"最完整的反面教材。</p><p>他本有一个典型的中产人生：河北邯郸人，当过消防员，后来做互联网项目负责人，年入20多万，知乎3万粉丝，有房有车。2021年炒虚拟货币爆仓，欠债近200万。他的反应很互联网：不是重新来过，而是把所有失败归咎于环境，归纳出一套"国内不行，国外就是天堂"的逻辑。</p><p>2022年，他卖掉剩余家产，走线美国。入境后第一个举动——在洛杉矶机场当众撕毁中国护照。这个动作的价值不在于政治表态，它是一场向自己过去的宣战仪式。他以为撕掉护照就是撕掉过去的一切，但他不知道的是，他撕掉的不是"过去的枷锁"，而是"最后的退路"。他甚至连换护照的流程都没查过——在美国的中国领事馆，五年前的老护照是可以换新护照的。但他不知道，他也不想查。</p><p>接下来的剧本比他最悲观的预期还要残酷。打黑工时薪4美元，留学生时薪15美元。车贷5000美元买辆破车，送外卖追尾赔1.1万。看一次病5670美元账单。每一步都在击垮他，但每一步他都提前算到了——只是他以为自己是那个例外。每个走线的人都觉得自己是例外，正如每个赌徒都觉得自己下一把能翻盘。</p><p>2025年被逮捕，2万美元保释金。他被保释出来了——但保释他的人大概率要的不是他的自由，而是他的器官。这个中国互联网上最著名的"润人"，最后的价值是一份可能连他自己都不知道的器官分配协议。当余华小说的情节在现实中发生时，没有人笑得出来，连曾经围观他的网友都沉默了。</p><p>王伟恒和王伟恒们的悲剧有一个共同的根源：他们相信问题全在外部。国内不好，所以国外好。社会不好，所以我是对的。CIA搞我，FBI搞我，所有人都负了我。一个永远在外部找原因的人，永远不会从自己身上找到答案。这不是一个关于润的故事——这是一个关于人如何把自己骗到绝路的故事。他的荒诞不在于他的结局有多惨，而在于他到今天都不明白自己到底错在哪。如果你问他，他会告诉你：是美国的问题。</p>
