comment: 曾经是中产知乎大V，年入20多万，有房有车。2021年炒虚拟货币爆仓，欠债近200万。他把一切归咎于环境，坚信"美国刷碗都能一年买别墅"。2022年变卖所有家产凑钱走线美国。<br><br>入境第一个标志性动作：在洛杉矶机场当众撕毁中国护照。这个举动当时被一些人称为"酷"，但也意味着他主动斩断了与祖国的法律纽带，成了没有合法身份的"黑户"。贷款5000美元买了一辆破车，白天打黑工，晚上睡车里。时薪被压到4美元，远低于法定最低工资。<br><br>真正的噩梦从一次腰疼开始。2023年去诊所，医生只做了15分钟检查。两个月后他收到一张<b class="hlr">5670美元</b>的账单，没有医保，付不起。医疗欠款被卖给讨债公司，信用彻底破产。紧接着送外卖追尾，没保险，对方索赔1.1万美元。破车被拖走抵债，他开始流落街头。<br><br>2025年被逮捕，保释金2万美元。一位"神秘人士"将他保释——很可能是一种"保释贷"：如果死亡，遗体器官会被作为"遗产"用于抵债。走出监狱后，他的债务窟窿更大了。精神状态逐渐崩溃，怀疑所有人是"内鬼"——骂美国警察、CIA、FBI，甚至指控奥巴马、佩洛西。在华人区麦当劳被留学生拍下，几个留学生把一整袋汉堡挂在他的棚子外，附纸条："吃完记得喊爹。"<br><br>他的故事与另一位知名"润人"丁胖子金牌讲师形成对比——讲师同样没有合法身份，但学习当地法律，拍流浪生活积累关注，后来被安排进政府临时公寓。而王伟恒把每个试图帮助他的人都骂作"内鬼"，包括给他投喂过甜甜圈和10美元的讲师本人。目前精神恍惚，有时去沙漠边缘小教堂领过期罐头。曾嘟囔想回国，但撕毁的护照和偷渡者身份，让他连"被遣返"的资格都难以获得。<br><br>王伟恒最荒诞的地方不是他沦落至此，而是他曾经拥有的一切都是靠自己挣来的——知乎大V、中产收入、房车齐全——这一切在他选择"润"的那一刻全部清零。他撕掉的不是一本护照，是他作为一个普通中国中产能够体面生活的一切可能性。而他到现在都不明白这一点——他觉得是CIA在搞他、是FBI在搞他、是所有人都负了他。一个永远在怪别人的人，在美国找到了最终的归宿：连"归"这个字对他都不适用了。
