comment: |-
  <b>中产破产与海外流浪</b> · 王伟恒 · 走线偷渡美国 · 撕毁护照 · 洛杉矶街头乞讨<br><br>王伟恒，1988年出生于河北省邯郸市的一个普通家庭。在“走线”偷渡美国之前，王伟恒曾是一名消防员。随后，他进入了互联网行业工作，凭借个人努力做到项目负责人，拥有房车，自媒体知乎账号拥有约3万粉丝，年收入达20万元以上。然而，在2021年前后，王伟恒因炒虚拟货币爆仓，瞬间欠下了近200万元人民币的债务。面对债务重压与个人生活的失意，他将原因完全归结于国内宏观环境，坚信“美国刷碗都能一年买别墅”，决定放弃国内的一切。<br><br>2022年，王伟恒变卖了所有家产筹集资金，毅然通过南美“走线”的方式偷渡美国。在历经九死一生的长途跋涉入境美国后，王伟恒在洛杉矶机场拍摄了当众撕毁自己中国护照的视频，并将其上传至社交媒体平台。他以极端的姿态高调宣称要“拥抱自由”。这一极具视觉冲击和高度争议性的“投名状”行为迅速在中文网络舆论中引爆，使他成为网民高度关注的“走线润人”典型代表。<br><br>走红初期的王伟恒在网络上继续展示他的“美式新生活”。然而，由于没有合法身份、不会英语且缺乏现代社会生存技能，他很快在洛杉矶华人区堕入社会最底层。由于不懂规则，他在洛杉矶遭遇了多起遭遇：因为腰疼去诊所检查了15分钟，收到了高达5670美元的账单，导致个人信用破产；好不容易买了一辆破旧的二手车送外卖，却因追尾遭遇了1.1万美元的天价索赔，最终车子被依法拖走，只得沦落街头流浪。他在洛杉矶街头手举“HUNGRY”木牌乞讨的照片和视频在全网疯传，与他成名前的中产生活形成了极其惨烈的对比。<br><br>身处底层的王伟恒精神状态逐渐出现严重异样，展现出被害幻想与极端偏执的倾向。他在视频中公开将自己流浪的惨状归咎于“所有人都是内鬼和特务”，甚至在街头翻找垃圾桶寻找食物时遭到其他流浪汉的殴打，导致左眼不幸失明。2025年，他因多次涉嫌寻衅滋事和扰乱公共秩序被洛杉矶警方逮捕，累计收到了58张罚单。在面临被遣返的巨大危机时，他曾公开哭诉渴望回国，但由于他在入境初期亲手撕毁了自己的中国护照，导致其身份核实异常困难，彻底斩断了寻求领事保护和正常遣返的退路。<br><br>截至2026年，王伟恒依然流浪在洛杉矶街头，身体残缺且常年忍受疾病折磨，绿卡申请的希望几近为零。他在中文互联网上已沦为被猎奇、群嘲和反思“盲目偷渡”的典型代表。他的经历深刻地证明了，一个无法面对自身失败、盲目斩断退路的投机者，在脱离社会基础阶层保护网后迅速坠入异国社会最底层且无法脱身的悲惨命运。
