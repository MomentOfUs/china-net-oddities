english_name: Wang Weiheng
essay: |
  <p>2022年洛杉矶机场明亮的到达大厅里。王伟恒在同行人手机镜头的对准下，从上衣口袋掏出深红色的护照，双手用力一撕，将纸页断为两半扔在地上，扬了扬手没有回头。这出精心设计的“撕护照入关”戏码被上传网络，瞬间引爆了国内的舆论场，拉开了他自以为走向“美国天堂”的流浪序幕。</p><p>王伟恒的爆红展现了网络舆论对“中产走线失败”和“逆向爱国主义”的黑色围观机制。在国内当过消防员、做过IT项目负责人并拥有房车资产的他，因虚拟货币爆仓负债200万后，将失败归因于母国，坚信“美国是天堂”。算法以极大的嘲讽和批判性流量包围了他的流浪直播，将他推上了中文互联网反向爱国和走线败局的头号反面标志。</p><p>然而，他在异国他乡的生活迅速滑入了一场极其荒谬的透支与挣扎。他撕毁了护照，却发现美国并不是“刷碗也能买别墅”的乐土，没有身份、不会英语的他只能露宿洛杉矶街头，靠排队申领教堂的免费救济粮维生。<span class="hl">他通过不断指责母国、在镜头前哭诉美国的物价与治安，来维持在中文互联网上的黑红关注度，陷入了靠贩卖自身惨状苟活的恶性怪圈。</span></p><p>崩溃瞬间发生在他被疾病折磨、在街头流眼泪痛哭的时刻。当他发现生病后面临天价医疗账单，且在街头遭遇流浪汉暴力威胁时，他在直播中崩溃失控。随后，他在国内社交平台上的所有账号因内容合规违规而遭遇全网彻底封禁，国内的变现通道被完全掐断，将他彻底遗弃在异国他乡的死角。</p><p>截至2026年，王伟恒依然流浪在洛杉矶街头，身体状况极度恶化，昔日的中产工作背景已荡然无存，彻底沦为流浪乞讨者。曾经围观他、嘲笑他的网民早已寻找到了新的政治乐子，只有他一个人被永远留在了那张撕碎的护照和洛杉矶冰冷长椅的现实中。他以自身的惨烈坠落，为那条通往虚幻天堂的走线之路，留下了一张最荒凉的警示名片。</p>

