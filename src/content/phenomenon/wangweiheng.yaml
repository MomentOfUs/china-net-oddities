  desc: 王伟恒考入清华大学的学生证。中国最高学府的身份凭证——一度是他的骄傲，后来成了他人生反差的起点。
- name: 流落异国的街头照片
  desc: 王伟恒在美国街头的照片。一个清华毕业生在异国他乡流落街头——比任何关于"教育改变命运"的演讲都更有说服力。
- name: 抖音历史直播截图
  desc: 王伟恒在抖音直播中的历史截图合集。从清华学霸到街头流浪再到直播博主——十年走完了别人一辈子也走不完的跨度。
glossary:
- key: 王伟恒
  val: 清华毕业生，后流落美国街头，被称为"最惨清华生"。他的故事击碎了"名校=成功"的社会共识。
- key: 清华毕业
  val: 王伟恒身上最醒目的标签。"清华"不是光环而是重负——当一个人用最高学历证明了自己的下限时，"上限在哪里"就成了一个残忍的问题。
- key: 流落街头
  val: 从清华毕业生到美国街头露宿者。不是每个人都能从这个落差中走出来。
