comment: |-
  <b>抽象行为艺术代表</b> · 刘波 · 药水哥 · 你配吗 · 表情包狂欢<br><br>刘波，网络ID为“药水哥”，1990年出生于湖北省。他是中国游戏直播和整活视频领域知名的“行为艺术”式审丑主播。<br><br>刘波早期为《英雄联盟》游戏主播，因在直播中装疯卖傻和独特的“国服第一卡牌”自封而获得关注。其最知名的爆红事件是与一名网民在直播中连续几个小时互骂“你配吗”直到对方认输。此后，他在直播中表演假哭、吞食怪异物品、与宠物结婚等违背常理的行为，被网民解构为后现代虚无主义的行为艺术，其表情包在社交平台广泛流传。<br><br>随着直播合规 standards 的提高，刘波曾多次被平台阶段性禁播。2019年，他在直播中当众饮用成分不明的液体（“药水”），引发了社会舆论对于主播自残博眼球的强烈谴责，导致其账号被平台实施了阶段性封禁。随着网络监管部门对于低俗炒作、审丑整活风气的严厉整治，他赖以生存的“装疯卖傻”式整活空间被彻底压缩，商业化变现路径逐渐受阻。<br><br>由于长期透支身体和缺乏持续的内容输出，刘波在2022年之后热度呈现大幅下滑，在各大平台上处于间歇性直播的边缘化状态。2026年，为了寻求出路，刘波以“行为艺术限时返场”的标签在抖音平台重新恢复更新。截至2026年，虽然他仍能偶尔吸引老粉丝的怀旧围观，但由于互联网审美品味的理性回归与严格的合规监管红线，属于他的“抽象狂欢”已然退潮。他的起落折射了网民通过审视他人自我毁灭式的荒谬表演来消解现实虚无的审丑注意力经济样态。
