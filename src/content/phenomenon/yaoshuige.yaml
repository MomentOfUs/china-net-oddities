comment: 药水哥，本名刘波，约1995年生，湖北人。他可能是中文互联网史上最难以定义的主播——你说他是精神病患者、行为艺术家、还是纯粹的商业天才？没有人能给出确切答案。<br><br>他最出名的标签是"你配吗"。在早期的直播中，他会对着刷礼物的观众一遍又一遍地吼"你配吗"，声音大到破音、面部扭曲到变形。这种极致的对抗性直播吸引了大量看热闹的观众。他的直播间成了"猎奇"的代名词。<br><br>但真正让他封神的是"喝药水"。为了节目效果，他在直播中表演喝各种奇怪液体——盐水、洗洁精、甚至是自己的尿。"药水哥"这个外号就此诞生。他自己后来解释说那些大多是道具，但观众不在乎。<br><br>后续事迹包括在斗鱼年度盛典上和某明星对骂、在B站武林大会上打擂台被KO（又一位被KO后火上天的）、直播中假装和猫结婚、在街头裸奔、突然在直播间大哭崩溃然后又若无其事——每一件事都匪夷所思，每一件事都发生在直播镜头前。<br><br>药水哥的荒诞之处在于：你永远分不清他是真的疯了还是在演。这个模糊的界限本身就是他的最大作品。有人叫他"小丑"，有人叫他"喜剧大师"，还有人说他是在用后现代的方式解构直播生态——不管哪种解读，他的直播生涯都是一部荒诞派文学。<br><br>2021年后他的声势有所下降，B站账号也经历了封禁和解封。但他的核心梗"你配吗"和"药水"已经成为了中文互联网的永久遗产。他不是最大的主播，但他绝对是最特别的那个。
