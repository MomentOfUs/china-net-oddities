relics:
- name: 破音的直播麦克风
  desc: 药水哥在斗鱼时期的音频输出设备。"你配吗"三个字被对着它重复了数万次，直到声音嘶哑、面部扭曲——它是中文互联网最暴力的对抗式直播的物理见证。
- name: 《中国新说唱》海选号码牌
  desc: 2019年药水哥报名参加《中国新说唱》的参赛凭证。一个靠喊"你配吗"走红的人站在吴亦凡面前唱了一段——被淘汰了，但全网记住了。
- name: 拳击手套
  desc: 2021年药水哥与向佐拳赛中使用过的拳击手套。一场所有人都知道是假的比赛，全国人民都在看——艺术的本质不在于真假，而在于观众是否愿意相信。
glossary:
- key: 你配吗
  val: 药水哥的标志性反击三字经。他会对着刷礼物的观众一遍遍地吼出这三个字，声音大到破音、面部扭曲到变形——极致的对抗性直播创造了极致的观看体验。
- key: 艺术
  val: 药水哥粉丝对其抽象行为的解构式美化。一个在直播间装疯卖傻的人被尊称为"行为艺术家"——这个词的滥用本身就成了当代互联网最精确的艺术定义。
- key: 装疯卖傻
  val: 针对药水哥的核心争议。支持者认为他是艺术家，反对者认为他在消费观众的猎奇心理。两种观点都有道理，而药水哥对此的回应是：继续装疯卖傻。
- key: 宁王
  val: 药水哥直播间的另一个著名身份——"宁王"在直播圈是一个与药水哥并称的抽象符号，两人曾有过经典的直播互怼名场面。
