english_name: Liu Bo (Medicine Water Brother)
essay: <p>药水哥的故事，从"你配吗"开始。</p><p>2018年前后，斗鱼一个直播间里，一个长相普通、声音嘶哑的年轻人对着镜头大吼——那是他最简单也最暴力的节目：找出送礼清单里最贵的礼物然后怼回去。所有送礼的观众都会得到一句"你配吗"。</p><p>这三个字让无数人破防。有人愤怒地回骂，有人乐呵呵地继续送礼物，有人截图发朋友圈。药水哥的直播间人数从几千涨到几万，再到几十万——所有人都在看"他这次又会整什么活"。</p><p>然后就是药水。他拿出各种液体往嘴里灌——盐水、冰红茶混合酱油、甚至更离谱的东西。直播间弹幕爆炸，管理员封号，解封后继续。药水哥成了一个形容词，形容那种"为了博眼球什么都能干"的状态。</p><p>他的行为一次次刷新认知下限：直播中突然嚎啕大哭；对着镜头求婚一只猫；在街头裸奔被路人拍摄；在B站武林大会的擂台上被打到爬不起来。每一次你都觉得"这次肯定完了"，但他下次又坐在镜头前，换了一种更离谱的方式。</p><p>药水哥被反复封禁、反复解封。斗鱼封了去B站，B站封了去虎牙——他从不是一个平台的宠儿，他是一个四处流浪的异类。但他的观众追着他跑，因为他的直播间是这个互联网上唯一让人"不确定会看到什么"的地方。</p><p>有人分析他是天才的喜剧演员，有人觉得他真的精神有问题，有人觉得他就是个没有下限的小丑。三种解读可能同时成立——这恰恰是他最迷人的地方。</p><p>2022年后他的活跃度明显下降。网络上关于他的讨论从"他又做什么了"变成了"药水哥现在在干嘛"。属于他的那波流量高峰期已经过去，但他的遗产——<strong>你配吗、药水、以及那种对"正常直播"的彻底抛弃</strong>——已经刻进了中文互联网的DNA。</p>
