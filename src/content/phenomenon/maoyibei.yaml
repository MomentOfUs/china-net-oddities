comment: |-
  <b>千万级网红的虚假叙事</b> · 徐某某 · Thurman猫一杯 · 巴黎捡作业事件<br><br>徐某某（网络ID为“Thurman猫一杯”，以下简称“徐某某”），1990年代出生于浙江省杭州市。她拥有优渥的家庭背景，自幼接受了良好的美术与时尚设计教育，曾前往法国等欧洲国家留学深造，并在海外从事时尚设计相关工作。学成归国后，她以精致、时尚、跨国生活的海归女性形象，开始投身短视频自媒体创作，其早期内容主要以时尚穿搭、欧洲生活见闻以及幽默吐槽为主。<br><br>2024年2月，正值春节假期期间，徐某某发布了一则声称“在法国巴黎街头咖啡馆捡到中国小学生‘秦朗’寒假作业”的短视频。在视频中，她以生动搞怪的夸张表情和幽默的语言，声称要寻找这位“一年级八班”的秦朗，并称要把写满名字的作业本带回中国。该视频凭借巧妙设计的剧情和极强的猎奇趣味，在长假期间迅速引爆了中文互联网，各平台点赞量和转发量累计破千万，成为了全民寻找“秦朗”的舆论大事件。<br><br>在“巴黎捡作业”事件的推动下，徐某某的个人粉丝量瞬间暴涨，全网粉丝总量迅速冲破1500万级别，成为时尚与生活赛道毫无争议的超级大V。然而，事件的巨大热度引发了自主繁殖式的舆论失控。一名自称“秦朗舅舅”的网友半路杀出，声称确实有这一名外甥，并带着各大媒体跟进求证。随着全国多地学校站出来辟谣称并没有名为“秦朗”的在读学生，以及“秦朗舅舅”最终被证实为蹭流量，公共资源遭到大范围浪费，公众对事件真实性的质疑声达到了顶峰，也引起了警方的介入。<br><br>2024年4月，杭州市公安局发布了正式的官方通报，彻底撕开了猫一杯的谎言：经警方调查，徐某某及其团队为了博取眼球、吸引流量，在杭州网购了道具作业本，并与公司编导薛某共同策划、自导自演了这段所谓的“巴黎捡作业”视频。警方依法对徐某某、薛某及相关涉事公司实施了行政处罚，并在视频中发布了徐某某的公开道歉画面。这一通报迅速成为舆论焦点，人民日报、公安部等官方媒体先后下场严批网络摆拍造假。<br><br>通报发布后，徐某某在抖音、B站、微博、微信等国内所有主流社交平台上的账号在一夜之间被官方实施合规永久注销，其名下关联的服饰品牌和商业广告合作全部倒闭解约，一天内粉丝量便被清空。截至2026年，徐某某已彻底从互联网上消失，成为中国自媒体发展史上严厉打击摆拍造假行为的标志性典型反面教材。
