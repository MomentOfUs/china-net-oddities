english_name: Thurman / Mao Yibei
essay: <p>猫一杯的故事，是2024年中国互联网最震撼人心的"反转剧"之一。</p><p>2023年底，猫一杯发布了一条视频：她在巴黎的街头，捡到了一本中国小学生的寒假作业。作业本上写着"秦朗"。她对着镜头，展示作业内容，用流利的法语和中文向大家播报——"谁的寒假作业丢在巴黎了？"然后一本正经地号召全网找人。</p><p>这条视频在各大平台疯狂传播。中国人在巴黎捡到中国小学生的作业——这故事太完美了：有异国元素、有文化共鸣、有幽默感、有温度。网友开始了一场全网的寻秦朗运动。猫一杯涨粉数百万，成为年度最受关注的创作者之一。</p><p>然后，故事开始崩塌。有网友根据视频中的细节扒出了矛盾之处：巴黎的地理位置不对、作业本的字体印刷不对、时间线不合理。越来越多的人开始质疑。最终，真相浮出水面：整个事件是猫一杯团队自导自演的剧本。</p><p>舆论从感动变成愤怒的速度比光速还快。之前赞美她的人，现在指责她"消耗公众信任"；之前夸她有创意的人，现在骂她"无耻造假"。她的账号在多平台被封禁或限流，道歉视频措辞诚恳但于事无补。</p><p>猫一杯的故事是互联网注意力经济的一个寓言：<strong>最好的故事往往都是假的，而每个编故事的人，都以为自己是那个不会被发现的例外</strong>。</p>
