english_name: Thurman / Mao Yibei
essay: |
  <p>2023年底，时尚UP主"猫一杯"在巴黎街头拍了一条视频——她在长凳上发现了一本中国小学生的寒假作业。"秦朗，一年级八班，作业给你带回来了。"视频全长1分37秒，制作精良，剧情完整，情绪到位。它在抖音获得550万点赞、36万条评论、207万次转发。它太完美了——所以它是假的。</p><p>猫一杯，本名徐某某，杭州人，全平台粉丝超1500万。在"捡作业"之前，她是一个以精致都市女性人设走红的时尚博主——精品穿搭、跨国旅行、高级生活方式。这个赛道竞争激烈，内卷严重。一条"接地气"的剧情内容比一百条精致穿搭更有爆款潜力。她知道这一点，她的编导也知道。所以这条视频诞生了。不是因为她要骗人——是因为不骗人就拿不到数据。</p><p>事情迅速失控。一个自称"秦朗舅舅"的账号跳出来认领，带着媒体去查证——然后发现这是一个更大的谎言。多家小学被家长电话打到崩溃，发声明称没有叫秦朗的学生。猫骑虎难下，硬着头皮圆谎。杭州警方通报：自导自演，网购道具，徐某某与编导共同策划。公安部点名，人民日报发文批评。从后台注销账号到互联网上彻底消失——不过一瞬。</p><p>猫一杯的落网是整个内容创作行业的一面镜子——当"编故事"能轻松获得550万点赞，"讲真话"可能只有几百个赞的时候，不是猫一杯选错了，是整个生态出了错。但更值得问的问题是：从她发视频到警方通报之间，有至少48小时的窗口期。这48小时里，抖音的内容审核机制在哪里？551万点赞、36万评论、207万转发——没有一个人举报它是假的。不是没有人发现——是发现了的人发现"说真话"的回报太低。在互联网的激励机制里，戳穿谎言永远没有编造谎言划算。猫一杯不是第一个，也不会是最后一个。"秦朗们"永不绝迹，因为只要"编"的回报率永远高于"真"，讲故事的人就会前赴后继。</p><p>但她最后的结局值得注意：她没有回来。猫一杯之后，抖音上再也没有出现过同等体量的"剧情造假"翻车事件。不是因为创作者变诚实了——是因为猫一杯让所有人知道，假的做得再真，只要官方想查，48小时就能查个底朝天。平台的沉默不是不知道，是选择什么时候知道。</p>
