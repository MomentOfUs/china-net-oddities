comment: 猫一杯，B站&抖音千万级UP主，时尚生活类内容创作者。在2024年之前，她是一个挺成功的博主——有品味、有审美、内容质量不错。<br><br>但让她真正"载入史册"的，是2023年底的一个视频。<br><br>视频里，猫一杯在巴黎街头捡到一本中国小学生的寒假作业。她对着镜头翻开，秦朗这个名字赫然纸上。她声情并茂地喊话全网帮忙找这位小朋友，要把作业还回去。视频制作精良，剧情完整，情绪到位——全网感动。<br><br>可惜，故事是假的。<br><br>2024年初，网友扒出整个事件从头到尾都是编造的：作业本是道具、秦朗这个人不存在、巴黎捡作业是一场自导自演的剧本。舆论瞬间反转。愤怒的观众感觉自己被耍了——你编一个这么美好的故事，就是为了骗流量？<br><br>猫一杯的账号被全网封禁/限流，她从一个时尚博主变成了"造假博主"的代名词。她后来发布道歉视频，但已经无法挽回。<br><br>猫一杯的故事，是"互联网时代注意力经济"的最典型案例——当一个博主发现好的内容不如好的故事吸粉时，她选择了后者，然后被故事的反噬吞没。
