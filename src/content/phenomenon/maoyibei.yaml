english_name: Thurman / Mao Yibei
essay: <p>2023年底，一位叫"猫一杯"的时尚UP主在巴黎街头拍了一条视频——她在长凳上发现了一本中国小学生的寒假作业。"秦朗，一年级八班，作业给你带回来了。"视频全长1分37秒，制作精良，剧情完整，情绪到位。这条视频在抖音获得550万点赞、36万条评论、207万次转发。微博、B站、小红书同步爆火。它太完美了——所以它是假的。</p><p>猫一杯，本名徐某某，杭州人，全平台粉丝超过1500万。在"捡作业"之前，她是一个成功但不算顶流的时尚博主。2023年底她做了一件事：把编造的剧本拍成"真实记录"。不是因为她缺钱，是因为她太想要那个"所有人都在讨论我"的时刻了。</p><p>但秦朗的作业不是一个人在编。视频发布第二天，一个自称"秦朗舅舅"的账号冒出来，发布确认视频，声称在江苏某西场小学读书。这个半路杀出的"戏精"让事件彻底脱离猫一杯的掌控——不是她的剧本里安排了这个角色，是有人在她编的框架上接着编了。多家媒体开始疯狂致电全国各地的"西场小学"求证——江苏的、河南的、广西北海的，全都被问了一遍。查无此人。猫一杯发现自己骑虎难下了：承认造假等于自毁前程，继续圆谎则需要更多的谎。她选择了圆谎，发布了一个模糊的"大结局"视频。</p><p>2024年4月，杭州警方发布通报：视频系人为策划，按编造视频脚本摆拍，网购作业本作为道具，徐某某、薛某及涉事公司被处以行政处罚。通报一出，全平台同步封禁。公安部、人民日报先后发声。一天之内，她的账号被封、品牌闭店、粉丝暴跌。秦朗——那个不存在的一年级学生——成了中国互联网最著名的虚拟人物。</p><p>猫一杯的故事不止是一个"网红造假翻车"的案例。她的更深处藏着一个更普遍的中国互联网困境：当所有人都在编故事的时候，谁能忍住不编？在她翻车前，热搜上充斥着各种精心策划的"真实故事"——而观众看腻了真实，他们想要的是"看起来像真实的精彩"。猫一杯不是第一个，也不会是最后一个。她只是运气最差的那个——因为半路杀出了一个不在剧本里的"秦朗舅舅"，让这个谎言长出了自己的腿。</p>
