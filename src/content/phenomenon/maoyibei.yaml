comment: 猫一杯，本名徐某某，B站&抖音千万级UP主，时尚生活类内容创作者。在2024年之前，她是一个挺成功的博主——有品味、有审美、内容质量不错。<br><br>但让她真正"载入史册"的，是2023年底的一个视频。<br><br>视频里，猫一杯在巴黎街头捡到一本中国小学生的寒假作业。她对着镜头翻开，"秦朗"这个名字赫然纸上。她声情并茂地喊话全网帮忙找这位小朋友，要把作业还回去。视频制作精良，剧情完整，情绪到位——全网感动。<br><br>然后剧情开始失控。一个自称"秦朗舅舅"的网友突然出现——戏精附体，声称在江苏西场小学读书，发视频确认"确有其人"。多家媒体开始疯狂求证，全国各地的"西场小学"纷纷被媒体致电查询——都是查无此人。猫一杯骑虎难下：她不能说实话，因为这等于承认视频是假的；她也不能沉默，因为全网在等答案。最终她发布了一个模糊的"大结局"视频，声称已通过学校找到秦朗家长——她以为这样就能翻篇了。<br><br>但互联网不会放过一个漏洞。网友根据视频中的地理和时间细节扒出了矛盾之处。最终，2024年4月，杭州警方通报了整个事件的真相：<b>视频是猫一杯团队与编导薛某共同策划的自导自演剧本，他们网购了作业本道具，在巴黎摆拍完成</b>。杭州市公安局西湖区分局对徐某某、薛某以及涉事公司处以<b>行政处罚</b>。<br><br>通报发布后，抖音、微博、微信、B站等多平台迅速封禁猫一杯的所有账号。她一天掉粉40万。她经营的服饰品牌宣布闭店。公安部、人民日报先后发声严批。秦朗——那个她捏造出来的小学生——成了一个符号："全网最著名的虚假小学生"。<br><br>猫一杯的故事，是"互联网时代注意力经济"最经典的案例——当一个顶流博主发现好的内容不如好的故事吸粉时，她选择了后者，然后被故事的反噬吞没。而"秦朗舅舅"的横插一脚更说明了一件事：你在互联网上撒了一个谎，它就不再属于你了。
