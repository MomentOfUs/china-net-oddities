english_name: Thurman / Mao Yibei
essay: |
  <p>她蹲在巴黎街头的长凳旁，把镜头对准一本摊开的寒假作业。封面上的名字清晰可见：秦朗，一年级八班。她对着镜头说了一句——作业给你带回来了。这条1分37秒的视频在2024年春节长假期间拿下了550万点赞、36万条评论、207万次转发。全网都在寻找秦朗。没有人在那个时刻停下来问过一句：巴黎街头咖啡馆门口的长凳上，为什么会躺着一本中国小学生的寒假作业。</p><p>在此之前，徐某某是一个以海归时尚博主身份走红的UP主，全平台粉丝超过千万。穿搭、跨国旅行、高级生活方式——每一条内容都在精密地计算着都市年轻女性的欲望坐标。她比别人更早看清了这个赛道的底层逻辑：精致是有天花板的，而算法的胃口永不满足。一条精心布置的“真实偶遇”，比一百条穿搭视频更能击穿推荐流。编导薛某也看清了。于是那本作业本先在杭州一间公寓的桌面上被拆开包装，再被放进飞往巴黎的行李箱。</p><p>四个月后，杭州市公安局用一纸通报拆开了这个故事。淘宝订单记录被公开：空白寒假作业本，14.8元，包邮。编导薛某共同策划，行政处罚。但在警方通报落地之前，更致命的事情已经自己发生了——一个自称“秦朗舅舅”的陌生账号凭空杀出，带着各地媒体去查证。全国多所小学紧急发声明辟谣，家长电话被打爆。猫一杯骑虎难下。这个谎开始在互联网上自主繁殖，长出她无法修剪的枝杈，最终反过来吞噬了它的创作者。</p><p>550万个点赞。没有一个是给真相的。每一个都是给一个好故事的——包括那些转发的、评论的、出主意找秦朗的。<span class="insight">全网一起编造的故事，最后只有一个人出现在封禁名单上。</span></p><p>通报落地后48小时内，抖音、B站、微博、微信全线封禁。账号注销，品牌闭店，全平台粉丝清零。公安部点名，人民日报发文。从整个互联网寻找秦朗到整个互联网封杀猫一杯——不到三个月。</p><p>她的主页上只剩一行灰字：该账号已注销。向下滑动——什么都没有。</p>

