comment: 铁头惩恶扬善，本名董光明，1987年生，浙江舟山岱山县人，大专文化。<br><br>他的前半生是犯罪史：2014年因开设赌场和非法拘禁被判刑，2017年出狱。2023年4月，他转型短视频博主，先做街頭善意测试，一个月后切换风格——"打假"。"咆哮式打假"让他迅速走红：三亚海鲜市场宰客、金镶玉抽奖骗局、老年保健品骗局，他的视频逻辑简单——走进店铺，架好镜头，大声质问，然后等待对方慌乱。2023年8月粉丝已达309万。<br><br>同月，他举报杭州新东方违规补课，导致新东方全面关停。又预告要打假东方甄选——东方甄选发律师函回应。他的打假行为引发了巨大争议：支持者认为他确实让不良商家吃了苦头，反对者认为他不过是在借打假之名行流量之实。<br><br>2023年8月，他的犯罪前科被曝光——中国裁判文书网上有他的刑事裁定书。他的回应模糊又坦诚："有真有假……我做的事情，合法也好，不合法也好，我都付出了代价。"<br><br>2024年1月12日凌晨1点30分，他在直播间自曝嫖娼涉黄经历。舆论彻底炸了——一个以"惩恶扬善"为旗号的人，自己竟是最需要被"惩"的对象。随后被禁言、全平台封禁。<br><br>但真正的疯狂还没结束。2024年6月1日，他在日本靖国神社石柱上撒尿，用红色喷漆写上"toilet"并发布视频。此事登顶中日两国热搜。中国外交部回应：希望在外公民遵守当地法律。<br><br>而在靖国神社事件之前一个月——2024年5月——他已经做了一件更致命的事：与同伙合谋，以曝光黑料相威胁，向一名带货主播索要数百克黄金。2024年8月27日，杭州市公安局以涉嫌敲诈勒索罪将其刑拘。二进宫。
