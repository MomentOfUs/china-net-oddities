english_name: Tietou (Dong Guangming)
essay: |
  <p>铁头的故事是一个所有条件都相互矛盾的社会实验——一个坐过牢的人，出来以后选择做的事情是"打假"。"惩恶扬善者"的履历表上第一条是开设赌场和非法拘禁。这个矛盾让所有想评价他的人都陷入了困境：如果他打假成功了，好事算不算抵消了坏事？如果他翻车了，坏事算不算撤销了好事？互联网没有给他答案——它直接把他封了。</p><p>他的打假方式简单到暴力：架好手机，大声质问，等待对方慌乱。三亚海鲜市场缺斤短两、杭州美容院天价宰客——每一条视频都把镜头怼到管理方面前，让他们在恐慌中暴露问题。2000万粉丝在背后撑腰的时候，没有什么商户是不怕他的。但这种"靠恐惧维持的权力"有一个致命的漏洞：你没法永远保持恐惧的纯度。当你从一个海鲜市场的打假走向全平台的"正义使者"，当你从惩罚缺斤短两走向预告举报新东方——你的正义授权就稀释了。铁头没有意识到的是："惩恶"这件事合法与否，不取决于你惩的是不是恶，取决于你有没有资格来惩。</p><p>他翻车的直接原因不是警察抓他，是他在自己的叙事逻辑里扮演了太久"正义使者"，已经分不清"惩恶"和"敛财"的界限了。2024年1月，他的团队预告要举报新东方，然后自己承认消息不准确——一个以"事实"为武器的账号，被自己编织的"预告"反噬了。然后他被剃光头道歉的视频流出，然后账号被封。铁头从头到尾都没变过——他入狱前的行事逻辑和打假时一模一样：找到弱点，强势出击，拿到结果。区别只在于：监狱里的对手被他锁喉的时候不能报警，抖音上的对手在他翻车的时候可以。</p><p>但他留下的那个问题至今没有答案：一个做过坏事的人去做好事，好事还是好事吗？互联网目前的答案是：看他自己够不够干净。铁头太"脏"了——他的前科让所有被他惩罚的人都可以说"你凭什么"。这是一个互联网无法解决的结构矛盾：纯粹的正义需要纯粹的化身，而现实中伸张正义的人往往不是完美的。当正义的工具只能由没有污点的人使用，绝大多数不公都不会被追究。铁头的问题不是他有前科——是他的前科意味着互联网不需要给他答案，直接处理掉提问者就行了。</p>
