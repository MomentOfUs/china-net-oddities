english_name: Tietou (Dong Guangming)
essay: |
  <p>2023年5月三亚某海鲜加工广场的喧嚣中。董光明架好手机镜头，对着秤盘缺斤短两的商户开始近乎暴力的怒吼。镜头里，商户在指责下慌乱退缩，这条打假视频在24小时内获赞破百万，将这个曾因开设赌场和非法拘禁入狱、出狱刚满六年的中年男人，瞬间送上了正义使者的流量王座。</p><p>董光明的迅速崛起是算法对社会大众“维权焦虑”进行情绪缝合的结果。在消费者长期维权无门的困境下，他用超越常规司法程序、充满暴力和压迫感的方法论，去砸烂商户的招牌，为网民提供了一种“以暴制恶”的代理性快感。算法以数百万粉丝奖励他这种粗暴，将他确立为打假赛道的顶流英雄。</p><p>然而，在庞大的流量绑架与利益诱惑前，董光明的内容很快滑向了流量的疯狂透支。他开始将目标对准民生、教育培训机构等领域，甚至远赴海外在靖国神社石柱上涂鸦，试图通过疯狂收割狂热的爱国情绪来维持其日益缩水的话题度。<span class="hl">这种超越法律边界的越界炒作，彻底暴露了他投机变现的虚无底牌。</span></p><p>自毁的枪口最终扣动在法律的网内。2024年，董光明因涉嫌敲诈勒索打假对象，被公安机关刑事拘留，其在微博、抖音等平台上的全部账号被彻底依法永久封杀。这场从“惩恶先锋”到“涉罪嫌疑人”的标志性崩溃，是他无视社会公序良俗与法律边界、将“打假”异化为犯罪敛财工具的必然结局。</p><p>截至2026年，董光明已被彻底清除出网络视野，其自媒体帝国在一夜之间化为一片狼藉的法治废墟。曾经站在他身后为他大声叫好的粉丝早已散去，只有起诉书上的开设赌场与敲诈勒索罪名，无声地记录着他的真实轨迹。他最终在自己发起的暴力狂欢中，被法治的铁腕彻底碾碎。</p>

