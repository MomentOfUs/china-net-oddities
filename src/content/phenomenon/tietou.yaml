english_name: Tietou (Dong Guangming)
essay: <p>2023年5月，三亚第一海鲜市场。一个戴着墨镜的男人走进一家海鲜加工店，架好手机，对着镜头说了一句话："我是铁头惩恶扬善，今天来打假。"老板笑着迎上来，三分钟后脸色变了。这条视频的播放量冲向千万，评论区里分成两派：一派说这人是真英雄，一派说等他有事了就知道了。</p><p>铁头，本名董光明，1987年生，浙江舟山岱山人，大专文化。在成为"惩恶扬善"之前，他的人生履历是一份刑事判决书：2014年因开设赌场和非法拘禁被判刑，2017年出狱。一个坐过牢的人，出来后选择做的事情是"打假"——这件事本身就充满了无法解决的矛盾。</p><p>他的打假方式很直接：架好镜头，大声质问，等待对方慌乱。三亚海鲜市场缺斤短两、杭州美容院天价宰客、河北中学暗示补课收费——每一条视频都把镜头怼到管理方面前，让他们在恐慌中暴露问题。他的粉丝暴涨到2000万。</p><p>但2024年1月，他翻车了。他的团队发布了一则"重磅预告"，声称要实名举报新东方旗下公司违规补课。然后他自己承认消息不准确。然后他被人剃了光头道歉的视频流传出来。然后他的账号被封了。铁头的坠落不是因为警察抓他，而是因为他在自己的叙事逻辑里扮演了"正义使者"太久，已经分不清"惩恶"和"敛财"的界限了。但他留下的问题是：一个做过坏事的人去做好事，好事还是好事吗？互联网给他的答案是：好事永远是好事，但只要做这件事的人"不干净"，好事也会被打成坏事。</p>
