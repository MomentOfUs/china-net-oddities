glossary:
- key: 铁头惩恶扬善
  val: 打假网红，以暗访拍摄商家违规行为为主要内容。有人称他为"民间315"，有人则认为他是在以打假为名的敲诈勒索。
- key: 打假
  val: 铁头的核心业务模式。通过暗访拍摄商家的违规行为施压——方法有效，但法律的灰色地带让他的"正义"变得可疑。
- key: 翻车
  val: 铁头从打假者变为被调查者。当他从镜头后面走到镜头前面接受审视时，所有人都在问：他打假的资格是什么？
