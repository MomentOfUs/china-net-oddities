comment: <b>1992</b> · 湖南岳阳 · 南昌大学肄业 · 六年欧莱雅柜员<br><br>2016年，美ONE公司开启"BA网红化"项目时，李佳琦只是一个在南昌欧莱雅柜台卖口红的男生。他接受了这个项目，去了上海。第一场直播，只有79个人看。三年后，他一场直播的观看人数是东北一个省的人口。<br><br>他是中国直播电商黄金时代的唯一代言人。2019年，他用"OMG！买它！"和"所有女生"两个短语，创造了一个全新的营销语系。他的直播间不是卖货——是演唱会、综艺节目、闺蜜聚会的混合体。涂口红能上热搜，跟马云比赛卖口红赢了马云。"李佳琦直播间"本身就是一个品牌，比绝大多数它卖的牌子都值钱。<br><br>2021年，他年入18亿。他在上海买了1.3亿的豪宅。他跟刘畊宏、朱广权等人连麦，跟央视合作，出现在春晚。他不再是一个卖货主播——他是中国消费主义的符号，是"消费升级"这个宏大叙事的具象面孔。<br><br>然后2023年9月10日，他在直播间卖一支79元的眉笔。有弹幕说"太贵了"。他看了一眼，说了一句话——这句话杀死了"李佳琦"这个品牌的第一条命："有时候找找自己原因好不好？这么多年了工资涨没涨，有没有认真工作？"<br><br>这句话在24小时内传遍全中国。不是因为它有道理——恰恰相反，因为它完美地展示了一个年入18亿的人，已经完全无法理解一个觉得79元贵的人的生存状态。一夜之间，他失去了100万粉丝。"李佳琦"这个从消费者中走出来的品牌，在七年间走到了消费者的对面。<br><br>他当天直播哭着道歉。但这次不一样——他的眼泪不再让人感动。因为一个亿万富翁为说错话而哭，和普通人觉得79元眉笔太贵，之间的距离已经不是一场直播能弥合的了。<br><br>2026年，他仍在直播。双十一的销售额仍有几十亿。但他的时代——那个他站在原地不动就能让全中国女生掏钱包的时代——已经过去了。不是因为他不努力了，而是因为中国消费市场翻过了消费升级的那一页，翻到了消费降级的那一页。而他是上一页的封面人物。
