english_name: Li Jiaqi (Austin Li)
essay: <p>2023年9月10日晚，李佳琦在直播间拿起那支花西子眉笔，79元。弹幕飘过一句"越来越贵了"。他没有像往常一样笑着把质疑化成段子。他停下来，看着镜头，说了一句在南昌欧莱雅柜台站了六年都没对顾客说过的话。</p><p>从柜台BA到淘宝一哥，李佳琦走了七年。一年389场直播，嘴唇试色试到溃烂。他喊"所有女生"，那些女生用下单回应——2016年首播79人看，2021年双十一单场百亿。他的嗓子是渠道，他的表情是详情页，他的信誉是退货率。他本人就是直播电商。</p><p>然后一个每天工作十六小时、年入十八亿的男人，对一个可能月薪五千、在九个链接间比了十分钟价的观众说出了——"工资涨没涨，有没有认真工作"。他的成功恰恰让他再也无法理解那个在南昌柜台前、花六年时间帮客人试口红的自己。</p><p>眉笔事件杀死的不是GMV，是信任。在那句话之前，他是她们的代理人——砍价、试错、选品。在那句话之后，他和她们之间隔了十八亿。</p><p>一夜掉粉百万。次日哭着道歉。一个靠理解普通人消费困境起家的人，最终因不理解普通人而坠落。这道裂缝不是道歉能填上的。</p><p>2026年，李佳琦仍在直播。在线人数从六千万降至百万级。"OMG买它"还在说，但由他开启的那个时代已经翻页了。</p>
