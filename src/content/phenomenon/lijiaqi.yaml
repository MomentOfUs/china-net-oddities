essay: |
  <p>2023年9月10日的直播间里，李佳琦在聚光灯下拿起那支79元的花西子眉笔。面对弹幕区飘过的一句“越来越贵了”，他没有像往常一样用话术化解，而是沉下脸，看着镜头吐出了一句冷冰冰的说教：“工资涨没涨，有没有认真工作”。这句话瞬间凝固了直播间的空气，在全网掀起了一场海裂山崩般的阶层舆论风暴。</p><p>李佳琦的爆红是直播电商时代女性消费红利与淘宝头部垄断算法极速缝合的奇迹。从南昌柜台的底层BA到年入18亿的“淘宝一哥”，他用高强度的肉体透支和“所有女生”的温情召唤，建立了无可匹敌的信任背书。算法和资本将他推上了直播帝国的话语权之巅，将他塑造成了中国消费主义最显赫的传统代言人。</p><p>然而，眉笔事件的致命爆发撕裂了他全部的信任根基。其核心悖论在于：一个依靠理解和微薄资本起家、帮女生选品的奋斗者，在实现巨大的阶层跨越后，最终以一种冷酷的傲慢说教，背叛了那些用79元购买力将他推上神坛的普通人。<span class="hl">他和“所有女生”之间，从此隔了一座由18亿年薪筑起的冰冷高墙，完成了从柜台代理人到高空资本的阶层异变。</span></p><p>一夜掉粉百万，次日哭泣道歉，但那道阶层分化的裂缝已无法闭合。此后，电商红利的退潮与大众实用主义消费观的回归，加速了他帝国的瓦解。他不再是不可替代的带货神话，而是成了一个脱离大众生活、需要被时刻审视的资本木偶，其职业生命在一场全网的信任崩塌中滑入深渊。</p><p>截至2026年，李佳琦依然在直播间里高呼“OMG”，但成交额与场观已较巅峰期大幅折半，失去了绝对的主导权。那个曾经在南昌专柜为顾客试色涂口红到嘴唇溃烂的年轻柜员，已彻底死在了79元眉笔的舆论唾沫中。他最终成为了中国直播电商黄金时代落幕前，最显眼的一道伤痕。</p>

