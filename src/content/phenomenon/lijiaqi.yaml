english_name: Li Jiaqi (Austin Li)
essay: <p>2016年南昌欧莱雅柜台的店长大概想不到，她手下一个给客人涂口红的男生，七年后会年入18亿，然后用一句话杀死自己的品牌。</p><p>李佳琦的成功不是一个故事，是一个中国的时代切片——2016-2021年，中国消费市场经历了最疯狂的升级潮。人均可支配收入在涨，电商渗透率在涨，年轻人的消费欲望在涨。李佳琦站在这个涨潮的顶峰，他不需要判断潮水的方向，他只需要在潮头上喊"所有女生"。潮水会把货卖光。</p><p>他一年直播389场，最高纪录连续30天不休。他的嘴可以一边介绍产品一边跟粉丝聊天一边记住所有优惠机制。他不是天才销售——他是用命换来的"口红一哥"。他说"不敢停"——停下来就可能被取代。这种恐惧推着他跑完了所有同行都跑不完的路。</p><p>2023年9月的"79元眉笔"事件中，面对粉丝的质疑，他说出了那句让一切都停下来的话："有时候找找自己原因，这么多年了工资涨没涨，有没有认真工作。"一夜掉粉百万。眉笔事件杀死的不是他的带货数据，是他和所有普通观众之间的那层信任。在那句话之前，他是"所有女生的朋友"——因为他替她们砍价、替她们试错、替她们选品。在那句话之后，他是"年入18亿的资本家"——装都不装了。</p><p>李佳琦真正的问题不在于说错了话。他2023年说的那句"有没有认真工作"就是他内心一直在想、只是第一次说出口的话。他在直播间里关了六年摄像头后的某个瞬间，一个每天工作16个小时、年入18亿的男人，终于忍不住对一个只为了省几块钱翻了十分钟链接的女孩说出了心里话。那句话的可悲不在于伤人，而在于它是他真实的想法。一个曾经站在柜台后帮客人涂口红的人，变成了那个想不通"为什么别人不努力"的人。他不是变了——他是走得太远了，远到忘了自己从哪来的。</p>
