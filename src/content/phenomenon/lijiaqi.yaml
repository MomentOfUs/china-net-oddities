comment: |-
  <b>直播带货一哥</b> · 李佳琦 · 79元眉笔事件<br><br>李佳琦，1992年10月20日出生于湖南省岳阳市。他在岳阳度过了童年与少年时代，后考入南昌大学艺术设计专业，但中途肄业。2011年起，李佳琦进入彩妆品牌欧莱雅位于江西南昌的专柜，担任一名底层的美容顾问（BA）。在这份平凡的工作中，李佳琦展现出了极强的销售天赋与惊人的敬业精神，曾创下为顾客连续涂抹数十支口红的专柜纪录。六年的柜员生涯，使他积累了扎实的美妆专业知识和对女性消费心理的敏锐洞察。<br><br>2016年底，李佳琦签约的美妆运营公司美ONE启动了“BA网红化”项目，旨在培养线上美妆主播，李佳琦成为首批入选者。在早期的直播中，他的直播间极为冷清，第一场直播仅有79人观看。然而在2018年“双十一”期间，李佳琦与阿里巴巴创始人马云在天猫直播间举行了一场“口红PK战”，最终在两小时内卖出1000支口红，以绝对优势“战胜”了马云。这次标志性的跨界PK让他一夜成名，其标志性的带货口癖“OMG，买它！”迅速成为全网流行的消费模因。<br><br>在2019年至2022年的巅峰期，李佳琦成为了名副其实的中国直播电商“一哥”。他开创了“所有女生”这一极具群体召唤力的词汇，淘宝直播间的在线观看人数动辄破千万，单场成交额在2021年双十一期间曾创下超过100亿元人民币的行业神话。他实现了巨大的阶层跃升，自曝2021年年收入高达18亿元人民币，在上海购买了价值1.3亿元的顶奢豪宅。他受邀登上央视春晚、参与国家级公益带货，其商业价值和大众好感度达到了中国电商主播的无上顶峰。<br><br>李佳琦职业生涯的致命拐点发生在2023年9月10日的直播中。当时，他在推销一款售价79元的国货品牌花西子眉笔时，有弹幕质疑“国货品牌越来越贵了”。李佳琦在听到质疑后神态异样，当即发表了带有说教和指责意味的言论：“国货品牌很难的……哪里贵了？这么多年都是这个价格……有时候找找自己原因，这么多年了工资涨没涨，有没有认真工作？”这一说教式暴论瞬间引爆舆论，被指责为暴富后对广大普通打工者生存现状的冷血漠视与阶层傲慢。事件发生后，李佳琦一夜之间掉粉数百万，社会声誉一落千丈。尽管他次日哭着发表了正式致歉，但其大众共鸣基础已宣告破裂。<br><br>在经历“79元眉笔事件”的重创后，李佳琦淡出公众视线两个月，并于同年年底低调复播。截至2026年，虽然他依然保持着高强度的直播节奏，但其直播间在线观看人数和整体成交额已较巅峰期大幅下滑，失去了行业绝对的垄断地位。在电商红利退潮与大众消费观念回归理性的时代背景下，他已无法重现往日的号召力。他的起落成为中国直播电商史上最具警示性的案例，展现了一个从底层走出来的奋斗者在实现阶层跨越后，因与大众现实困境脱节而最终失去大众信任的商业悲剧。
