comment: 孙笑川，四川人，1990年生。他不是最火的主播，但他是中国互联网最绕不开的一个人。<br><br>他的走红是个荒诞的笑话。在斗鱼6324直播间，他是李老八团队里一个不起眼的Dota主播，口齿不清、技术拉胯、脾气暴躁。但就是这种"不想好好播"的摆烂态度，催生了中文互联网最强大的亚文化——<b>抽象</b>。<br><br>抽象文化本质上是一种解构一切的态度：把主播的每一句话做成圣经，把每一次口误变成梗，把愤怒和尴尬变成狂欢。孙笑川的本事不是他做了什么，而是他什么都不做——他越不想火，粉丝越把他架成神。<br><br>他贡献了中文互联网最多的梗之一："你在赣神魔"、"网恋被骗8000块"、"我是你粉丝"、"好烦啊"、"孙🐶"——这些至今活跃在每一届网民的键盘上。他的粉丝"狗粉丝"是中文互联网最臭名昭著的群体之一：蔡徐坤被全网黑的背后有他们的影子，各种网络暴力的源头都能找到6324的痕迹。<br><br>全平台封禁后，孙笑川活成了传说。网上有无数个假孙笑川在直播，真的那个偶尔在角落说一句"好烦啊"。他被封不是因为做了什么，而是因为他成为了一种无法控制的文化力量——他就是抽象本身。<br><br>"孙笑川"这三个字，已经不是一个名字，而是一个形容词。
