comment: |-
  <b>抽象文化教父</b> · 孙笑川 · 带带大师兄 · 6324工作室 · 狗粉丝文化 · 全网禁播<br><br>孙笑川（网络ID为“带带大师兄”），1990年5月12日出生于四川省成都市。在进入直播行业之前，他是一个极为普通的工地监工。由于学历普通、性格孤僻，他常年顶着安全帽在各个建筑工地上转运，过着日晒雨淋、前途渺茫的生活。2015年左右，在发小兼同学李干（李老八）的拉拢下，孙笑川决定辞去工地工作，加入了李干在斗鱼TV创办的“6324抽象工作室”，担任Dota和主机游戏板块的副主播。<br><br>在“6324”工作室初期，由于孙笑川游戏水平平庸、缺乏表演才华且在镜头前极易打瞌睡摆烂，引起了观众大规模刷弹幕辱骂。在一次被激怒后，孙笑川对着镜头直接爆发，用一口纯正的四川方言和高频的脏话，发表了长达数分钟的愤怒回怼：“你在赣神魔（干什么）？”、“网恋被骗8000块，我好烦，真的烦！”这段被后世封为“抽象圣经”的暴怒连珠炮，展现出了极度荒谬的反差效果，在B站等平台上迅速病毒式扩散，孙笑川也因此完成了从无名主播向“抽象文化代言人”的戏剧性转变。<br><br>在2016年至2018年的抽象文化巅峰期，孙笑川与他的粉丝群体“狗粉丝”共同构建了中文互联网史上最庞大、最具破坏性的解构主义亚文化圈。狗粉丝们发展出了一套以“拼音缩写”为特征的网络黑话体系，并在微博、B站等各大社交平台上实施无差别的网络出征与恶意嫁祸。无论世界上发生任何坏事，狗粉丝都会在第一时间内跟帖称“凶手找到了，就是微博@带带大师兄”。蔡徐坤演唱会被激光笔照射、陈冠希网络对骂等事件中，孙笑川都被推上了“幕后黑手”的背锅侠王座，其个人微博瞬间沦为中文互联网第一垃圾倾倒场，完成了“肉身不起眼，符号无处不在”的互联网奇观。<br><br>孙笑川的野蛮走红伴随着极高的合规隐患。由于狗粉丝群体中充斥着大量的反叛与政治敏感色彩，且孙笑川本人的直播间常年存在粗口谩骂，这最终引爆了致命的红线。2018年，狗粉丝在孙笑川的直播间里利用藏头歌词的形式输入了带有政治敏感特征的内容，导致“6324”工作室及孙笑川的个人账号遭到斗鱼官方以及国家网信部门的全网永久禁播，孙笑川本人的肉身被国内主流直播平台彻底清除。<br><br>在经历了全平台禁播后，孙笑川彻底失去了在国内平台公开露脸直播的资格。尽管他曾尝试发表单曲、进行潮牌联名以及在海外平台进行低调活动，但其作为自然人的网络商业生命已基本走向消亡。截至2026年，虽然孙笑川本人已不再直播，但脱离了他肉身限制的“孙笑川”符号，却已成为整个中文互联网不可分割的解构基因。“摆烂”、“破防”、“急了”等词汇均带有其亚文化的血脉。他以自己被彻底封禁并消解的一生，为中文互联网献祭出了一个无法被磨灭的解构主义幽灵。
