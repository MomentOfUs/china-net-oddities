english_name: Sun Xiaochuan (DD Master)
essay: <p>要理解孙笑川，必须先理解6324。</p><p>2016-2018年，斗鱼6324直播间是中国互联网最混沌的地方。李老八带着一群小主播，每天在镜头前做最无聊的事——吃饭、打游戏、吵架、睡觉。观众不是来看内容的，是来"抽象"的——把一切变成梗，把一切解构到什么都不剩下的地步。</p><p>孙笑川是6324里最不起眼的一个。他口音重（"赣神魔"即"干什么"的四川话），脾气差，打游戏菜，直播能睡觉。但就是这种"我根本不Care"的态度，反而成了抽象文化最完美的载体——<strong>你越认真，越抽象不了；你越摆烂，越接近真谛</strong>。</p><p>他的名场面不计其数："网恋被骗8000块"成为永久笑料；直播被黑粉气得摔键盘；"我是你粉丝"梗出圈到被官方媒体使用；"你在赣神魔"成为中文互联网使用频率最高的反问句之一。</p><p>但孙笑川的黑暗面同样真实。他的"狗粉丝"文化催生了中国互联网最恶臭的暴力群体——人肉、网暴、举报、反串——蔡徐坤事件的幕后推手就有6324的影子。狗粉丝把"抽象"变成了武器，而孙笑川作为这个文化的图腾，某种程度上成为了这一切的象征。</p><p>巅峰时期的孙笑川有多火？B站、微博、贴吧、抖音——全网到处是自称孙笑川的账号，真的那个在角落直播，假的比真的火。以至于出现了一个互联网奇景：<strong>孙笑川是第一个"被全网模仿到真假难辨"的主播</strong>。</p><p>全平台封禁后，孙笑川彻底退出了公众视野。但抽象文化没有消失——它渗透进了中文互联网的每一个角落。今天你看到的"开摆"、"摆烂"、"破防"、"急了急了"——这些词或多或少都有6324和孙笑川的血脉。他是中文互联网的幽灵，你感受不到他的存在，但他无处不在。</p><p>孙笑川已死。孙笑川永生。</p>
