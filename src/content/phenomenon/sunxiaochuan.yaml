english_name: Sun Xiaochuan (DD Master)
essay: <p>孙笑川在6324的每一天都差不多。下午打开摄像头，不说话，打Dota。弹幕骂"孙狗"，他回一句"你在赣神魔"，然后趴在桌上睡着。观众不走。他们不是来看他打游戏的，是来围观一个人摆烂的。这种集体仪式后来被命名为"抽象"。</p><p>6324在2016至2018年间是中文互联网最特殊的内容工厂。李老八领着一群小主播，每天在镜头前吃饭、吵架、发呆——做一切不构成"节目"的事。观众涌入不是为了看内容，是为了参与解构本身：把每一次口误做成圣经，把每一次破防剪成鬼畜，把所有严肃的东西拆到什么都不剩。孙笑川是这群人里最不起眼的——口音重、脾气暴、Dota菜、能随时在直播中睡过去——但恰恰是这种"根本没想播"的姿态，让他成了抽象机制最完美的燃料。你越认真，越抽象不了。你越不想红，越无限接近红的本质。</p><p>他的名场面——"你在赣神魔"、"网恋被骗8000块"、"我是你粉丝"——没有一个是主动制造的。一个不想当网红的人被一个也不想当骗子的人骗了，一个不想出梗的人口中的每一个字都成了梗。孙笑川一生从未主动生产过任何内容，但他是中文互联网上被消费最多的内容来源之一。他是内容黑洞：什么都不产出，却吸进了全部流量。</p><p>6324的解构没有刹车。孙笑川的狗粉丝发展出了完整的网络出征机制——人肉、反串、嫁祸三位一体。互联网上无论发生什么坏事，评论区都会准时出现"凶手找到了，微博@带带大师兄"。蔡徐坤激光笔事件、陈冠希对骂事件，幕后都能追溯到同一批人。孙笑川本人从未参与过任何一次出征，但他的ID印在了每一次出征的旗上。他不是施暴者，但他成了暴力的商标。这件事不是他选的，是抽象替他选的。</p><p>全平台封禁后，孙笑川本人消失了。但"孙笑川"没有。B站、微博、抖音、贴吧——到处是自称孙笑川的账号在活动，假号比真号更活跃。一个人被永久驱逐出互联网，却同时在互联网的每一个角落活着。"摆烂"、"破防"、"急了"——你今天不加思索使用的这些词里，都流着6324的血。</p><p>他曾在摄像头前睡着，弹幕刷了一整夜的"晚安孙狗"。关了摄像头之后，弹幕还在刷。</p>
