relics:
- name: 6324直播间的破旧麦克风
  desc: 孙笑川在斗鱼6324时期使用的音频设备。该物证见证了中文互联网抽象文化的诞生——一个不想火的主播，通过一台廉价麦克风向全网输出了上百个传世梗。
- name: '"你在赣神魔"弹幕截屏'
  desc: 2017年采集自斗鱼6324直播间的数字物证。一句四川口音的方言反问，意外成为中文互联网被使用频率最高的反问句之一，完成了从个人口癖到全民模因的跃迁。
- name: 网恋被骗8000元的转账记录
  desc: 2019年流出的一份虚拟转账凭证。该物证的荒诞之处在于：一个不想当网红的主播，被一个也不想当骗子的人骗了——两个都不想努力的人撞在一起，产出了最纯粹的互联网喜剧。
glossary:
- key: 抽象
  val: 中文互联网亚文化的核心概念，起源于斗鱼6324直播间。本质是一种解构一切的态度——把主播的每一句话做成圣经，把每一次口误变成梗，把愤怒和尴尬变成狂欢。
- key: 孙狗
  val: 孙笑川的粉丝对其的戏称。该称呼体现了抽象文化对主播的"去神圣化"倾向——越骂越火，越贬越低，最终在解构中完成封神。
- key: '6324'
  val: 斗鱼直播间房号，抽象文化的摇篮。李老八带领一群小主播在镜头前吃饭、打游戏、吵架、睡觉，观众不来看内容，来看"抽象"。
- key: 你在赣神魔
  val: 孙笑川的四川口音反问句，后成为中文互联网最通用的幽默反问句式之一。其魔性在于方言发音造成的"赣"字误听，赋予了原句意想不到的传播力。
- key: 狗粉丝
  val: 孙笑川粉丝群体的自称，后泛指抽象文化圈的极端粉丝。以人肉、网暴、反串、举报为手段，蔡徐坤全网黑幕后的推手之一。
