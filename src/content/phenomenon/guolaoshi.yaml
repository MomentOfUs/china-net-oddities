comment: |-
  <b>网络审丑顶流</b> · 郭蓓蓓 · 迷人的郭老师 · 耶斯莫拉<br><br>郭蓓蓓，网络ID为“迷人的郭老师”，1994年出生于河北省沧州市农村。在成为网络红人之前，她只是一个极为普通的农村妇女。她没有接受过高等教育，缺乏专业的职业技能，长期在农村从事简单的农活，婚后与丈夫过着平淡且略显拮据的乡村生活。<br><br>2018年起，为了打发时间并赚取零花钱，郭蓓蓓开始在快手平台发布自己吃水果和日常生活闲聊的短视频。在早期的吃播中，她以极其粗糙、不修边幅的形象出镜，并无意间使用了一种奇特的声调和发音方式来称呼食物，例如将猕猴桃称作“迷hotel”、将草莓称作“粗莓”。这种怪异且极具魔性的发音，配合她极高分贝的尖叫“耶斯莫拉”以及对粉丝群体的称呼“集美们”，迅速在中文互联网上引爆，被网民总结为“郭语”，吸引了数以百万计的年轻受众进行模仿和恶搞二创。<br><br>在2020年的流量顶峰期，郭蓓蓓完成了从快手向抖音等平台的迁移，抖音粉丝量迅速突破千万级别，成为中文互联网上现象级的“顶流网红”。她不仅收到了各大主流综艺节目的邀请，接拍了知名品牌的商业广告，甚至在出行时遭到了粉丝的围追堵截。在她的直播间里，高频上演着谩骂、哭闹、暴饮暴食、故意吐痰以及当众展示各种生理异状的离奇行为。数以千万计的网民出于窥私、解压和审丑的心理，将她的直播切片视为日常的娱乐消费品，其自创的“郭语”甚至成为当时Z世代群体的标志性流行黑话。<br><br>然而，郭蓓蓓在直播中所展现的无底线低俗行为和违背社会公序良俗的言论，触碰了网络内容合规的底线。她在直播中多次对其他主播进行带有侮辱性的人身攻击，甚至故意挑动粉丝群体之间的对立谩骂。2021年9月，国家多部委联合下发关于整治“审丑”不良风气的通知，郭蓓蓓首当其冲，其在微博、抖音、快手等国内所有主流社交平台上的账号均被官方予以永久封禁，其网络商业合作被全部斩断。<br><br>主账号被永久封禁后，郭蓓蓓不甘心失去巨额流量红利，在此后的数年间，她多次尝试通过佩戴面具、使用变声器、以及注册亲友账号等技术手段在各大平台开设小号复出。但平台的监管识别机制均在极短时间内将其精准识别并实施秒封。截至2026年，郭蓓蓓已完全从公众视野中消失，没有任何关于她的采访、偶遇或公开生活信息。她的互联网生命在强力的合规红线面前彻底归零，其起落轨迹深刻地定义了中文互联网审丑流量的宿命与终点。
