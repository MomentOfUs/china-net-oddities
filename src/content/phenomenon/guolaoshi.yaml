comment: 郭老师，本名郭蓓蓓，1992年生于河北沧州。她可能是中国互联网史上最令人不适、又最让人无法移开眼睛的网红——没有之一。<br><br>郭老师的早期内容很简单：吃播。她在快手上一口气吃掉一大盆不知道什么东西，边吃边发出意义不明的拟声词。但她真正出圈靠的不是吃，是"说话"。她用一种介于方言和自创语言之间的东西直播，说出的每一句话都是梗："耶斯莫拉""迷hotel""你在无中生有暗度仓凭空想象凭空捏造""集美们"，她的粉丝叫"集美"——她的语言系统几乎独立于普通话存在。<br><br>2020年，她从快手渗透到抖音、B站，成为现象级网红。她的直播间永远有几十万人围观，不是看她表演，是看她"做自己"——一个不加任何滤镜、不按任何套路的农村妇女。她骂人、她哭、她吃东西、她自创语言，她每一分钟都在暴露出自己最丑陋的一面，而观众为此疯狂。这不是偶像崇拜——这是人类观察。<br><br>2021年9月，郭老师被全网封禁。官方理由：低俗、价值观问题。她尝试复出——用变声器、用小号、用各种方法——全部被封。2024年尝试以新账号复出，再次被封。<br><br>郭老师是互联网奇观中最赤裸的一面镜子：一个没有任何才艺、颜值、身材、资源的普通人，靠"做自己"成了顶流。但这个"做自己"恰好也是她被封的理由。她不是被制造的，她是被发现的——互联网在她身上看到了最真实的自己，然后恐惧了这个真实。
