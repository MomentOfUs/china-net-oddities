english_name: Sister Guo
essay: "<p>她咬了一口没削皮的猕猴桃，汁水顺着下巴流。\"迷hotel。\"浓重的河北口音把三个字拧成了字典里不存在的东西。弹幕炸了。2019年，沧州一间普通屋子里，郭蓓蓓——没上过大学、早早嫁人的农村女人——刚刚发明了一个词。十八个月后，一代人将用这个词说话。</p><p>到2020年，\"郭语\"已无处不在。\"耶斯莫拉\"——毫无意义的尖叫——成了国家级口号。\"集美们\"取代了\"姐妹们\"。B站鬼畜区把她的声音剪成remix，抖音十秒切片传遍每一个班级群。千万粉丝。综艺邀约。品牌代言。Z世代不是在看她——是在说她的话。这不是梗，这是一套活的语言系统。发明它的人没有任何文凭，没有任何训练，没有任何先例。</p><p>同一直播间里也上演着：冲丈夫尖叫、往地板吐痰、暴食到干呕、辱骂其他主播、当众展示生理异状。算法来者不拒——词汇创新和自我羞辱获得同一种流量信号，因为系统只认停留时长，不分你是被美吸引还是被丑抓住。她同时是平台上最有创造力和最被鄙视的人。这两件事来自同一张嘴。</p><p>抖音靠她的流量赚了两年广告费，然后把她写进了\"低俗内容\"专项整治文件。两个判断来自同一套算法，没有哪一个比另一个更真实。</p><p>2021年9月，全网同步封禁。此后三年她反复试图复出：面具、变声器、亲戚的账号。每一次都在数小时内被精准捕获。平台对她的识别模型比任何用户的都精确——她是标杆，也是靶子。</p><p>到2026年，郭蓓蓓从互联网上完全消失。没有采访，没有偶遇，没有流出照片。那个教会一亿人新说话方式的女人被删得如此干净，仿佛她从未存在过。\"耶斯莫拉\"还在角落回响，但说这句话的人不会再发出新的声音了。</p>"
