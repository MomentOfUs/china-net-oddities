english_name: Sister Guo
essay: |
  <p>2020年，河北沧州的一间出租屋里。一个三十岁出头的女性对着手机镜头，用一套自己发明的发音体系直播："姐妹们，今天我吃了一个<span class="glossary-term" data-tip="郭老师口音版的&quot;猕猴桃&quot;。她用自己的方言体系重新定义了普通话词汇，创造了一种让全网模仿的&quot;郭语&quot;。">迷hotel</span>（猕猴桃）。"弹幕问她在吃什么，她说："吃个漏（肉）。"每一句话里都有一个正常汉字被她用不规则变调改成了另一副面孔。她把这种语言体系命名——没有正式命名，网友管它叫"郭语"。一个真正意义上的自然涌现方言——全球唯一的母语者，就是这个发明者自己。</p><p>母语者叫郭美美，快手粉丝数千万。她的内容工具箱里装满了不讲道理的元素：不化妆、不修边幅、情绪毫无预兆地大起大落、镜头前吃东西的声音大到可以当白噪音使用。直播中她会突然尖叫，然后立刻恢复正常语调继续说话，中间不接任何逻辑桥梁。她可能做对了互联网上唯一一件不需要技巧的事——她让自己成为一个完全不可预测的人。</p><p>2021年，一纸整治"审丑"不良风气的通知从中央部委发出。郭老师的名字没有任何意外地出现在第一批名单上。微博、抖音、快手、B站——她在所有平台的账号被同时永久封禁。没有告别直播，没有最后一条动态，没有任何形式的正式道别。她的直播间像被人从后台拔掉了电源，屏幕一黑，千万粉丝的帝国就地蒸发。此后数年，她戴过面具，用过变声器，借过亲友的身份证注册小号——每一次都被系统在几小时内精准识别，秒封。平台的算法认识这张脸，哪怕她本人已经不再露脸。</p><p>这是整个故事最意味深长的一段：一个通过让自己"不可预测"而走红的人，最终被系统最可预测地终结了。她之所以能被捧上神坛，恰恰是因为平台需要这种审丑内容来刺激用户时长和互动数据；而她之所以能被扫进历史垃圾桶，也是因为同一批平台接到了新的指令。她不是第一个，也不会是最后一个——只是在那个短暂的窗口期里，她恰好站在了平台算法的风口上，和中国互联网内容监管的铁幕之间。</p><p>2024年春天，郭老师最后一次尝试复出。她用一张远焦镜头拍摄的戴口罩照片开了新账号，配文只有两个字："是我。"六个小时后账号被封。没有人知道那六个小时里有多少老粉看到了那条动态，也没有人知道她发出那两个字时是什么表情。此后至今，再没有任何关于郭蓓蓓的公开信息。没有采访、没有偶遇、没有亲友发声——她从互联网上完成了一次近乎完美的消失，像她从未存在过一样。</p><p>今天如果你去搜"郭老师"，搜索引擎会给你一堆模仿者的账号，没有一个是真的。她创造的"耶斯莫拉"和"集美"早已被收编为全民通用的网络语言，在千万人的聊天记录里每天被使用——那个发明这些词的人，已经彻底找不到了。语言比她活得更久。她留下的三样东西：一个无意义的口号、一个口误版的水果名称、一个对女性群体的方言化称呼——每一件都成了中文互联网的日常组成部分。而创造者本人，已经退出了语言流通的现场。这是互联网时代的文学：作者死在作品之前。</p>
