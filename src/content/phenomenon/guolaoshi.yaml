english_name: Sister Guo
essay: "<p>你的活。你的——那个——你在一个房间里，你坐在一张床上，前面放着一部手机，你开始用你自己的语言讲话。什么是这种语言只有你自己能发明，但所有人都听得懂？郭老师教你。\"耶斯莫拉！\"她对着屏幕喊。她吃了一口不知道什么东西。她说\"迷hotel\"。\"你在无中生有暗度仓凭空想象凭空捏造。\"她的粉丝说：集美们。那个晚上直播间里有三十万人，没有人知道自己在看什么，但没有人能关掉。</p><p>郭老师，本名郭蓓蓓，1992年河北沧州人。她长得不像网红，讲话不像人类，吃的东西——也不像给人类吃的。她在快手起家，吃播。但这不是吃播的问题，你在她脸上看到的是毫无修饰的、完全未经包装的一个普通人对着镜头和自己独处。然后她说话，话说完就是，话。她给每一个普通的汉语词汇重新注音、重新造句，\"集美\"取代\"姐妹\"进入日常语汇，\"耶斯莫拉\"成为某个夏天的通行密码。</p><p>2020年她火到不可收拾。抖音千万粉丝，B站鬼畜区全是她。每一个人都模仿她——用\"耶斯莫拉\"打招呼、用\"集美\"称呼朋友、用\"你在无中生有\"吵架。但没有人能复制她，因为她的语言不是设计出来的，是从身体里长出来的。她不需要MCN、不需要剧本、不需要人设，她往镜头前一坐就是完完整整的郭老师。</p><p>2021年9月2日，全网封禁。她在抖音用变声器复出，被封。去B站找新的号，被封。用小号试探，被封。2024年再次尝试，还是被封。平台没有给出具体理由，但每个人都明白：郭老师被封的原因，和她火的原因，是同一件事。</p><p>2025年之后，没有任何关于郭老师的消息。没有采访，没有偶遇，没有复出信号。她就像被从互联网的底层代码中彻底删除了——不是被屏蔽，是被抹去。你可以找到孙笑川的抽象圣经、可以找到马保国2026年还在直播的录屏、可以找到各路被封的网红们以各种方式回春——但你找不到郭老师。2024年那最后一次被封，就是她的句号。</p><p>郭老师是互联网最深的恐惧：一个没有任何才艺、没有颜值、没有套路甚至没有逻辑的人，仅仅因为\"真实\"就获得了千万粉丝。这个真实太锋利了，锋利的被平台定义成\"低俗\"。她没有被任何人制造出来——她被中国互联网发现，然后被完全遗忘，像一包拆封后放在桌上然后被清理掉的零食。她缺席的人比很多在场的网红更有价值。</p>"
