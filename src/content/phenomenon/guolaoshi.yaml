english_name: Sister Guo
essay: "<p>你的活。你的——那个——你在一个房间里，你坐在一张床上，前面放着一部手机，你开始用你自己的语言讲话。什么是这种语言只有你自己能发明，但所有人都听得懂？郭老师教你。\"耶斯莫拉！\"她对着屏幕喊。她吃了一口不知道什么东西。她说\"迷hotel\"，她的粉丝说她脑子里有泡。但那个晚上直播间里有三十万人。</p><p>郭老师，本名郭蓓蓓，1992年河北沧州。她长得不像网红，讲话不像人类，吃的东西不像......像她。她在快手起家，吃播。但她不是在这个意义上吃东西的——她是在你跟食物之间放了一面镜子，你不是看她她吃的，你是看你自己有多挑剔。然后她开始说话，话说完就是，话。每个词都被她重新发明过。</p><p>2020年她火了，从抖音到B站，每个人都学她说话。\"耶斯莫拉\"成了打招呼的方式。\"集美\"取代了\"姐妹\"。\"你在无中生有暗度仓凭空想象凭空捏造\"成了一段贯口。模仿她的人成千上万，但没有一个人能复制她——因为她的语言不是设计出来的，是从身体里长出来的。</p><p>2021年9月她被全网封禁。官方定义：低俗。她在抖音上用变声器复出，被封。去B站，被封。用小号，被封。2024年再次尝试，还是被封。每一次她出现在镜头前，弹幕都在刷\"爷青回\"然后平台把她的账号一秒钟关停。</p><p>郭老师是互联网最深的恐惧：一个没有才艺、没有颜值、没有套路、甚至没有逻辑的人，仅仅因为\"真实\"就获得了千万粉丝。这个真实太锋利了，锋利的被平台定义成\"低俗\"。她没有被MCN制造出来——她就被中国互联网发现，然后被抛弃，像一包被拆封的零食的包装袋。</p>"
