english_name: Sister Guo
essay: "<p>郭老师不是一个网红，她是一个语言学事件。\"耶斯莫拉\"、\"迷hotel\"、\"集美们\"、\"你在无中生有暗度仓凭空想象凭空捏造\"——这些词在2020年入侵了全中国的互联网，成了Z世代的通用语。而发明这套语言系统的人，是一个从河北沧州农村走出来的、没上过大学的女人，对着手机镜头吃带皮香蕉。</p><p>这是郭老师所有荒诞的起点：她不是文化精英，不是语言学者，不是一个有任何\"资格\"发明语言的人。她只是一个农村妇女，在快手上开了一间直播间，坐下来，开始用一种她自己都不知道从哪学来的方式讲话。然后整个互联网开始模仿她。语言的下沉从来没有这么彻底过——不是精英发明、大众接受，而是一个最底层的普通人发明、全平台模仿。她无意中完成了一次语言的逆殖民。</p><p>但真正的问题不是她怎么火的，是她为什么没有办法复制。其他被封的网红都有退路：带货的找供应链，演戏的找片方，唱歌的找平台。郭老师没有，因为她的货就是她本人。她的全部内容浓缩成一句话就是\"我坐在床上说话给你们听\"——你告诉我这个东西怎么复制？她可以上综艺、接代言、见明星，但那都是她作为\"郭老师\"这个人的延伸，不是她的核心。她的核心就是她自己坐在镜头前，用没人听得懂的语言说没人听得懂的话。</p><p>所以她被封后，互联网出现了一个奇怪的真空：没有她的替代品，不是因为没人能模仿她——是因为没人找到她那套语言是从哪来的。如果能找到来源，MCN就能批量生产郭老师。但来源就是她本人。一个农村妇女的大脑，不是供应链。这也是她消失得如此彻底的原因——她连一个告别视频都没发。郭老师那种人不会发告别视频的，因为告别视频需要一个剧本。而她唯一会演的那出戏，已经被平台下架了。</p>"
