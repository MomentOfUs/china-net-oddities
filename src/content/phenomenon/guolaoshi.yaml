english_name: Sister Guo
essay: "<p>你的活。你的——那个——你在一个房间里，你坐在一张床上，前面放着一部手机，你开始用你自己的语言讲话。什么是这种语言只有你自己能发明，但所有人都听得懂？郭老师教你。\"耶斯莫拉！\"她对着屏幕喊。她吃了一口不知道什么东西。她说\"迷hotel\"。\"你在无中生有暗度仓凭空想象凭空捏造。\"她的粉丝说：集美们。那个晚上直播间里有三十万人，没有人知道自己在看什么，但没有人能关掉。</p><p>郭老师，本名郭蓓蓓，1992年河北沧州人。她长得不像网红，讲话不像人类，吃的东西——也不像给人类吃的。她在快手起家，吃播。她吃奇奇怪怪的东西——带皮香蕉、生土豆、各种说不清名字的食物——然后用一种不像人类会发出的声音来评价它。观众来看什么？没人说得清。猎奇？解压？还是看一个和自己一样的普通人，把生活过成了一场自己也不想过的喜剧？</p><p>2020年是她最辉煌的一年。她的语言体系入侵了全中国的互联网——耶斯莫拉、迷hotel、集美们、你在无中生有——这些词不再是郭老师的专属词汇，它们变成了Z世代的通用语。她上了各种综艺，接了品牌代言，见了明星。然后被封了。全平台封禁，理由是\"不符合平台价值观\"。</p><p>封禁之后郭老师彻底消失了。没有复出声明，没有小号，没有任何公开消息。所有被封的网红都有回春路径——带货的找供应链、演戏的找片方、唱歌的找平台——但郭老师不能。因为她的流量来源就是\"做自己\"，而当你被封到不能再做自己的时候，你就什么都没有了。互联网给她的结局不是封禁，是遗忘。那个创造了\"耶斯莫拉\"的人，最终被互联网拖进了\"莫拉\"——消音了。</p>"
