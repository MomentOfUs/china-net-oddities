relics:
- name: 啃烂的猕猴桃
  desc: 郭老师吃播中经常出现的食物道具。"迷hotel"——她的口音将普通话彻底解构，创造了中文互联网上最魔性的语言体系之一。
- name: 卡通头套
  desc: 郭老师早期直播中佩戴的卡通头套。一个30岁的河北女人戴着卡通头套在镜头前装疯卖傻——弹幕在笑，但没人知道她摘下头套之后的样子。
- name: 全平台封禁通知
  desc: 2021年9月郭老师全网同步封禁的官方通知。她被封的理由至今没有一个统一的说法——在这个意义上，她成了一个没有墓碑的互联网幽灵。
glossary:
- key: 耶斯莫拉
  val: 郭老师的标志性口号，无意义的拟声词。它以极致的无厘头气质成为2019-2020年中国互联网最魔性的洗脑口号之一。
- key: 迷hotel
  val: 郭老师口音版的"猕猴桃"。她用自己的方言体系重新定义了普通话词汇，创造了一种让全网模仿的"郭语"。
- key: 集美们
  val: 郭老师对"姐妹们"的方言化称呼。"集美"从她的直播间出发，后来成为全网通用的女性间互称。
- key: 最后一台人类观察仪器
  val: 网友对郭老师的评价。当所有人都在精心打造人设时，她把自己活成了一台完全不设防的人类行为观察仪器。
