- name: 破旧自行车
  desc: 刀哥在沈阳大街游荡时的代步工具。当二次元刀酱骑着它cos各类动漫角色时，完成了从土味社会人到二次元缝合怪的身份跃迁。
- name: 变声器耳机
  desc: 刀哥转型"二次元刀酱"后使用的音频设备。从"我不道啊"到甜美的女声——同一张嘴，两个时代，一个互联网的奇迹。
glossary:
- key: 我不道啊
  val: 刀哥的口头禅，东北话"我不知道"的简写。这句话以极致的摆烂态度成为互联网逃避型人格的万能挡箭牌。
- key: fw刀
  val: 刀哥的早期黑称，"废物刀"的缩写。后来被接纳并转化为个人品牌，完成了从被嘲到自嘲的抽象文化标准流程。
- key: 沈阳大街
  val: 《东北往事》系列的核心取景地。沈阳大街在互联网上成了东北土味文化的麦加圣地。
- key: 二次元刀酱
  val: 刀哥2023年后的转型身份。从土味社会青年变身为coser，以极致的反差感在B站获得了"二次重生"。
