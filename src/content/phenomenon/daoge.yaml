english_name: Brother Knife (Er Ci Yuan Dao Jiang)
essay: |
  <p>2019年，石家庄，一座没有电梯的老旧居民楼。一个发际线退到头顶的中年男人举着手机，对着镜头展示了今天晚饭的核心食材：一包方便面。他身后是掉了漆的橱柜门和一台用了至少十五年还在运转的冰箱。画面里唯一的动态是他的嘴唇，它在说："兄弟们，今天吃个红烧牛肉面，加个蛋。"这条视频全长48秒，播放量超过两千万。</p><p>刀哥，真名不详——也可能不重要。他是河北石家庄人，2020年前后开始在快手发布视频。内容高度一致：在极其简陋的家庭环境中，一边展示市井生活一角，一边用自创的"石家庄口音"和"东北口音混合体"进行唠嗑式叙述。他吃的东西永远是最低成本的食物组合：方便面、榨菜、馒头、凉水。他生活的每一个细节都在指向同一个事实——他是一个真正意义上的穷人。贫穷是中国互联网上最古老的内容品类，比他年轻的所有平台都老。但刀哥给这个古老品类加了一个变量：他不再美化贫穷。</p><p>此前所有的"穷人内容"都有一个潜在的后设叙事：主人公正在努力摆脱贫穷。这种叙事让观众在消费贫穷时获得一种道德安慰——我在看一个正在奋斗的人。刀哥的镜头里没有这个叙事。他不炫耀贫穷，不利用贫穷，不诉苦。他只是活着，然后把活着的过程拍下来。他的真实姿态让互联网的穷人内容工厂第一次遇到了对手：一个把贫穷当作日常生活而非内容选题的人，不知道该怎么演——因为他从来没有停止过生活。</p><p>2023年，刀哥开了自己的淘宝店，卖石家庄特产。粉丝冲进去把库存买空，然后在评论区留言："买到了，但希望刀哥别靠这个赚钱。"这句话的意思是：希望你过得好，但你过好了我就没东西看了。在互联网上，爱你和消费你之间的距离就是一条点击下单的缝隙。</p><p>到今天，刀哥还在更新。画面质量稍微好了一点，他换了一部新手机——可能是广告商送的。住址还是那栋没有电梯的老楼。方便面加蛋仍然是晚饭的核心配置。弹幕说他装穷，但没有人能提供他曾经富过的证据。他的解释只有一句："这就是我的生活，你爱看不看。"</p>

