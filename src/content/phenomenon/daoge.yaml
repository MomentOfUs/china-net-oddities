comment: |-
  <b>东北往事</b> · 三凶 · 二次元刀酱 · fw刀<br><br>刀哥，本名三凶（在互联网上更以“fw刀”、“二次元刀酱”的名号为人熟知），出生于中国东北地区。在互联网土味浪潮兴起前，三凶只是东北这片重工业衰退土地上一个普通的草根青年，没有受过高等教育，也没有稳定的职业，长期在社会边缘游荡。<br><br>2016年前后，快手平台成为了东北草根青年宣泄精力和寻找出路的大本营。三凶加入了由网红“社会你虎哥”主导的“东北往事”草根短视频创作群像，并在其中担任核心配角。在沈阳大街系列短剧中，刀哥的人设是虎哥麾下战斗力极低、临阵脱逃的“废物小弟”。每次面临街头约架冲突，他总是躲在虎哥身后，但在战斗开始时又永远最先倒地。他在视频中面对质疑时嘟囔着的一句标志性台词“我不道啊”（东北方言“我不知道啊”），配合其极其懵圈、无辜的表情，迅速在快手平台上走红，成为了网民解构沈阳大街江湖恩怨时的经典段子。<br><br>2018年，随着“东北往事”系列视频被B站UP主大量搬运和二创，刀哥在主流弹幕视频平台上迎来了巨大的热度新生。他的口头禅“我不道啊”以及虎哥的“指定没有你好果汁吃”成为了鬼畜区的圣经。面对突如其来的二次爆火，刀哥展现出了极强的适应能力。2019年，他正式入驻B站，将ID改为“二次元刀酱一刀哥”。一个满脸胡茬的粗犷东北大汉，竟然穿上了精致的动漫女装，跳起了极具反差萌的宅舞。他频繁cosplay成初音未来等二次元歌姬，出现在各大城市的线下漫展上。这种强烈的视觉和身份冲突，成为了他流量长盛不衰的密码，让他成功收获了数十万核心二次元粉丝。<br><br>转型为“二次元刀酱”后，刀哥的野路子作风依然不时引发争议。2022年，他在一次网络直播中，为了迎合观众的猎奇心理，当众表演了极具危险性的“咬打火机”行为。这一行为严重违反了网络安全管理规范，导致其B站账号遭到平台封禁一个月的处罚。这一事件被视为土味网红在主流化过程中因缺乏安全意识而导致的典型越界。<br><br>在结束一个月的封禁处罚后，刀哥重新回归直播，并对其直播行为进行了规范。相比于东北往事中已经彻底淡出或销声匿迹的其他成员，刀哥通过彻底的自我解构和迎合年轻亚文化受众，成功延长了自己的网络生命周期。截至2026年，刀哥依然以“二次元刀酱”的身份在B站及各大漫展上活跃，靠着漫展邀约和直播打赏维持着体面的生活，成为了中文互联网上草根网红转型最为奇特且成功的案例之一。
