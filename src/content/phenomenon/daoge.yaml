english_name: Brother Knife (Er Ci Yuan Dao Jiang)
essay: <p>刀哥，东北往事系列中最重要的配角。之所以说最重要，是因为没有他的拉胯，就没有虎哥的英明神武。他是整个沈阳大街宇宙的笑点担当。</p><p>在东北往事的设定中，刀哥是虎哥的小弟——战斗力约等于零的那个。每次约架，刀哥都跟在虎哥后面，但架真的打起来时他永远是最先倒下的那个。弹幕中充斥着对他的嘲笑：fw刀、废物刀、有你没你都一样。但正是这种废柴人设，让他的每一个镜头都充满了喜剧感。</p><p>他的台词不多，但每句都精准：我不道啊成为了面对一切质问时的标准回答，在B站各种评论区泛滥。他和虎哥之间的默契配合构成了沈阳大街系列的一大看点——一个极致的霸气外露，一个极致的懵圈无辜。</p><p>但刀哥真正的传奇发生在东北往事结束之后。当其他东北往事成员还在苦苦维持热度时，刀哥做出了一个匪夷所思的决定：他改名二次元刀酱一刀哥，穿上了cos服。</p><p>一个东北大汉，穿着歌姬的cos服出现在漫展上。这种反差太大了——大到让人分不清这是在整活还是被迫营业。但刀哥很认真：他真的去学跳舞，真的去参加漫展活动，真的去和二次元群体互动。他的B站账号从土味视频变成了cosplay日常。</p><p>2022年，刀哥因在直播中咬打火机被B站封禁一个月。解封后他继续活跃，热度未减。如今的刀哥在B站拥有稳定的粉丝群体，定期更新内容，参加线下活动。他是东北往事所有成员中转型最成功的一个——<strong>证明了在互联网上，有时候不是最狠的人活得最好，而是最会转身的人走得最远。</strong></p>
