comment: 刀哥，人称fw刀，东北往事系列中虎哥的得力大将（并不得力），剧中打架能力太差，被粉丝称为fw刀。但就是这个在东北往事里表现最拉胯的配角，反而成为了整个系列最大的受益者——他转战B站后敏锐地抓住了反差感这一流量密码，改名二次元刀酱一刀哥，穿上cos服扮演歌姬，成功从土味网红转型为二次元达人。<br><br>在快手的东北往事系列中，刀哥的角色主要是虎哥的小弟，战斗力为零，全程处于一种懵圈状态。标志性台词我不道啊完美诠释了这个角色——他什么都不知道，但他是虎哥最忠诚的跟班。他在剧中的废柴表演反而产生了极佳的喜剧效果，被B站用户喜爱。<br><br>2019年，刀哥第一时间入驻B站，改名二次元刀酱一刀哥。他大胆转型cos圈，穿上cos服扮演二次元歌姬，和漫展上的其他coser互动。这种从土味东北大汉到二次元coser的反差，让他收获了大量粉丝。<br><br>他的B站生涯也有波折——由于在直播中表演咬打火机等危险行为，被B站封禁了一个月，但解封后人气不减。指定没有你好果汁吃这句话虽然出自虎哥之口，但在B站的弹幕中也和刀哥形象深度绑定。刀哥的故事告诉我们：不是最狠的人活得最好，而是最懂转身的人活得最久。
