comment: 约瑟翰·庞麦郎，本名庞明涛，1984年生于陕西汉中宁强县。他的故事是中国互联网草根一夜爆红最经典的样本——也是最残酷的那个。<br><br>2013年，一个在山东打工的陕西青年第一次走进录音棚，录了一首叫《打吊针》的歌。调音师把成品发到音频论坛求助，不是因为好——而是因为跑调跑得太不可思议了。网友二创的《摩的大飙客》在AcFun和B站迅速爆火，庞麦郎因此被华数唱片签约。<br><br>2014年，《我的滑板鞋》正式发布——这首制作简陋、跑调严重、歌词不知所云（"时间会给我答案"、"摩擦摩擦似魔鬼的步伐"）的歌，成了2014年最火的神曲。全网都在模仿"摩擦摩擦"，贾樟柯在微博上说这首歌"有一种准确的孤独"。<br><br>走红后的庞麦郎做了一件让所有人无法理解的事：他声称自己是台湾基隆人，出生在"加洲"，本名"约瑟翰·庞麦郎"，拒绝承认陕西农民的儿子这个身份。他在全国巡演杭州站只卖出7张票，被保安拦住不让他上台。2015年，媒体揭穿了他的所有谎言——年龄造假、家庭背景造假、"台湾人"身份造假。<br><br>此后他消失了很多年。2020年，他的父母将他送入精神病院——诊断为偏执型精神分裂症。2021年有消息说他已去世，被辟谣。<br><br>2025年，他出人意料地复出了——"拯救计划"巡演。上海站四百张票售罄，但贵阳场只有9个观众。他仍然卖力演唱，散场后给每个观众拍合影，签名照背面写"谢谢你来拯救我"。B站上他2005年在地下通道卖唱的老视频被翻出，弹幕飘过："原来他真的一直在唱。"<br><br>庞麦郎不是网红——他是中国互联网第一个因为"唱得不好"而出名的人。他的人生是一个从底层到顶流再到疯人院的完整弧光。
