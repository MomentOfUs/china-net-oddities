english_name: Joseph Pangmailang
essay: <p>2014年夏天，一个陕西青年录了一首歌，叫《我的滑板鞋》。这首歌的录音室质量约等于零——编曲廉价、混音粗糙、人声彻底跑调。歌词更荒诞："我的滑板鞋，时尚时尚最时尚""摩擦摩擦，似魔鬼的步伐""时间会给我答案"——三句话之间没有任何逻辑联系。但它成了2014年最火的歌。贾樟柯在微博上写："这首歌有一种准确的孤独。"</p><p>庞麦郎，本名庞明涛，1984年生于陕西汉中宁强县。在成为庞麦郎之前，他在山东进过工厂、在发廊打过工。2013年他第一次走进录音棚，录了首《打吊针》。调音师把成品发到音频论坛求助——不是因为好，是因为跑调跑得太不可思议了。这个"不可思议"定义了庞麦郎的一切。他不是在唱歌，他是在用自己的方式完成一件他以为自己在做的事——而那个完成方式恰好击中了互联网最深处的一根弦。</p><p>走红之后他做了所有偶像都会做的事：巡演。杭州站，七个观众，被保安拦在后台不让上台。他不理解："我是歌手，为什么不能唱？"然后是更致命的操作——他宣布自己是台湾基隆人，英文名约瑟翰·庞麦郎。媒体很快扒出真相：他的身份证是陕西宁强的，户口本上写的是庞明涛。从那时起，互联网不再把他当一个唱歌跑调的追梦者，而是一个撒谎的疯子。</p><p>他消失了。2020年新闻再次出现时，标题是"庞麦郎被送入精神病院"。诊断：偏执型精神分裂症。再后来传出他去世的消息，被辟谣。又消失了。</p><p>2025年，他回来了。"拯救计划"巡演，上海站四百张票卖光，贵阳站九个观众。他仍然卖力演出，唱完给每个人拍合影，签名照背后写"谢谢你来拯救我"。B站上他2005年在地下通道卖唱的老视频被翻出，弹幕说："原来他真的一直在唱。"庞麦郎从没有假装过自己会唱歌。他只是假装不了自己不会唱。</p>
