english_name: Joseph Pangmailang
essay: <p>2014年夏天，一个陕西青年录了一首歌，叫《我的滑板鞋》。这首歌的录音室质量约等于零——编曲廉价、混音粗糙、人声彻底跑调。但它成了2014年最火的歌。贾樟柯在微博上写："这首歌有一种准确的孤独。"</p><p>庞麦郎，本名庞明涛，1984年生于陕西汉中宁强县。在成为庞麦郎之前，他在山东进过工厂、在发廊打过工。2013年他第一次走进录音棚，录了首《打吊针》。调音师把成品发到音频论坛求助——不是显摆，是真的不知道该怎么办。没人帮上来。</p><p>但华数唱片签了他。2014年，《我的滑板鞋》发行，一夜间全网刷屏。庞麦郎被推上各种音乐节、颁奖礼、采访节目。他在台上唱"摩擦摩擦"的时候，台下的观众在笑。他的表演是"灾难"级的——跟不上伴奏、记不住歌词、节奏全靠感觉。但坐在电脑前的人觉得很"真实"。</p><p>然后他消失了。不是退圈，是逃了。他拒绝承认自己是庞明涛，说自己"来自台湾""是90后"。华数的合同他拒不履行，演出公司找不到他人。2015年他开了全国巡演——订了最小的场子，卖了不到十张票。网络上关于他的讨论从"有趣"变成了"可悲"。</p><p>2020年庞麦郎被强制送进精神病院的消息上了热搜。后来的情况更糟糕：2023年他在生日直播中确诊躁郁症，被经纪人送进精神病院出院后在网上直播《我的滑板鞋2024》——唱的依然是这首唯一的歌。</p><p>2025年3月，他预定贵阳9人小场，结果上海那个400座售罄了。预售100元，全价120元——有人专程从东北飞来看他。他在台上摔了一跤，又站起来接着唱。他还在摩擦。他只有这一双滑板鞋。2026年热度再次消退，他再次沉入了乡村的生活中。</p>
