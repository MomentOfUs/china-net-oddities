english_name: Joseph Pangmailang
essay: |
  <p>庞麦郎的荒诞不在他的歌——在全世界都把他当笑话的时候，他当自己是认真的。而更荒诞的是：他可能是对的。</p><p>《我的滑板鞋》是一首"错误"到无法复制的歌。编曲廉价、人声跑调、节奏完全不在拍子上——但它在2014年成了最火的歌，贾樟柯说它有"一种准确的孤独"。这里的悖论是：如果庞麦郎是故意唱成这样的，他是天才；如果他不是故意的，他的"错误"恰好击中了某种被专业音乐忽视的真实情感。这个悖论永远没有答案，因为他自己也说不清楚。他唯一能确定的是：这首歌以后，他再也没有写出第二首。</p><p>华数唱片签他的时候，双方对这件事的理解完全不同。华数眼里他是一个商品——一个供都市人消费的"土味奇观"；庞麦郎眼里他是一个未被承认的天才——来自台湾的、90后的、有国际背景的创作歌手。这两种叙事在2014年秋天还能共存，因为流量足够大，大到没人发现它们本质上是不兼容的。但他出道后所有人都在笑他，不是笑他的歌——是笑他这个人。笑他的口音、笑他的衣着、笑他在台上跟不上伴奏。当嘲笑盖过了一切，"有趣"就变成了"可悲"。</p><p>他拒绝承认自己是陕西农民庞明涛，说自己来自台湾、是90后——所有人都觉得他疯了。但他的逻辑其实是非常清楚的自救策略：如果庞明涛的《我的滑板鞋》只是一个笑话，那这首歌就没有意义。但如果"来自台湾的90后创作歌手庞麦郎"写出了这首歌，它就配得上所有的赞美。他需要维护的不是他的身份——他需要维护的是那首歌的尊严。</p><p>2020年他因躁郁症被送进精神病院的消息上了热搜，2023年他在生日直播中确诊。但他的结局不是住院——是2025年上海一个400座的小场子售罄了。有人从东北飞来看他，他摔了一跤，站起来继续唱。庞麦郎的最终答案不是被封杀、不是被遗忘——是他还在摩擦。十四年了，他只有这一双滑板鞋，他还在穿。当所有人笑他的时候他在唱，当所有人忘记他的时候他还在唱。他不是在反抗命运——他是真的不知道还有别的事情可以做。</p>
