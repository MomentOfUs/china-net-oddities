english_name: Joseph Pangmailang
essay: |
  <p>2013年，北京一间录音棚。调音师把一段完全跑调的音频发到论坛上，标题大意是：这活我没法接。他想不到，这段"没法接"的音频会在一年后成为2014年中国互联网播放量最高的歌曲之一。唱歌的人叫庞明涛，陕西汉中宁强县人，初中辍学，在KTV和工厂打过工。他攒钱走进录音棚，录了一首自己写的歌。</p><p>华数唱片在论坛上发现了这段音频——不是发现了音乐，是发现了奇观。公司给跑调的人声铺上专业编曲，把"错误"包装成商品。《我的滑板鞋》2014年爆炸式传播。它走红的原因和音乐评判体系完全无关。贾樟柯说它有"一种准确的孤独"；但推动几亿次播放的是笑声，不是孤独。</p><p>走红后，庞明涛拒绝承认自己是陕西农民。他对媒体坚称来自台湾基隆，是90后。媒体很快揭穿了谎言。公众把这当作他"疯了"的又一证据。但他的逻辑其实比看客们以为的更自洽：如果这首歌是陕西农民庞明涛唱的，它就只能是被围观的滑稽歌曲；如果它是台湾创作歌手约瑟翰·庞麦郎的作品，它就有资格被当作音乐来讨论。他维护的不是一个虚假的身份——他维护的是那首歌被认真对待的权利。这是他所有荒诞行为里最不荒诞的一件。</p><p>2015年，他与公司决裂，独自巡演。杭州站卖出7张票——他在台上跟不上伴奏，台下7个人在看。2020年，父母将他送入精神病院，诊断：偏执型精神分裂症。</p><p>2025年3月，他尝试"拯救计划"复出。贵阳首站9个观众。这条消息上了热搜；热搜之后，上海站400张票售罄。2026年，他再次归于沉寂。</p><p>那首关于"想要一双滑板鞋"的歌。十四年了。他只有这一双。</p>
