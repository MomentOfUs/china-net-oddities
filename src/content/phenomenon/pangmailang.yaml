comment: |-
  <b>神曲制造者的悲剧闭环</b> · 庞明涛 · 约瑟翰·庞麦郎 · 我的滑板鞋<br><br>庞明涛（艺名为“约瑟翰·庞麦郎”，以下简称“庞明涛”），1984年1月19日出生于陕西省汉中市宁强县南沙河村。他出生于一个极其闭塞的陕南农村家庭，父母皆是地道的农民。庞明涛在初中毕业后未能继续上学，便背起行囊远赴山东、西安等地打工，在工厂、KTV等场所从事底层的劳作。在漫长而枯燥的打工生涯中，庞明涛酷爱在本子上涂写歌词，并在2013年左右省下微薄的积蓄前往录音棚录制了自己的第一首原创跑调歌曲《打吊针》，渴望能像迈克尔·杰克逊那样在舞台上起舞。<br><br>2013年，北京的华数唱片公司发现了庞明涛在网络音频论坛上传的粗糙音频，决定将其作为一个“土味奇观”进行商业包装。2014年，在公司的专业编曲与强力推广下，庞明涛的原创歌曲《我的滑板鞋》正式发布。这首完全不合节拍、人声极其跑调、普通话极不标准，但充斥着陕南方言与魔性叙事逻辑的歌（特别是歌词“摩擦摩擦，似魔鬼的步伐”），在短时间内引爆了全网，被知名导演贾樟柯评价为具有“一种准确的孤独”，庞明涛瞬间爆火全国，成为当年的神曲之王。<br><br>在2014年至2015年的流量巅峰期，庞明涛陷入了强烈的认知失调与名利幻想。他不满经纪公司对他的分红与商业压榨，选择单方面逃跑毁约，并在接受媒体采访时，极力否认自己的陕西农村出身，坚称自己是“台湾基隆人”、出生于“90后”，起用洋气的艺名“约瑟翰·庞麦郎”。这种刻意脱离底层的虚无幻象很快被媒体的深度调查揭穿。在与唱片公司彻底决裂后，庞明涛在全国各大二三线城市的酒吧展开独立巡演，然而票房极其惨淡，甚至创下杭州站仅有7名观众的凄凉纪录，其在台上面对伴奏跑调穿帮的窘境也遭到全网的无情嘲讽。<br><br>长期的商业违约纠纷、名利幻灭后的巨大落差，以及外界持续的嘲笑与网暴，使原本性格孤僻偏执的庞明涛精神状况急剧恶化。他甚至在村里出现了暴力自残行为。2020年，在疾病发作的危险期，庞明涛被父母和当地有关部门强制送往精神病院进行封闭式治疗，医生诊断其患有偏执型精神分裂症。这一悲惨结局引发了舆论关于互联网资本掠夺性压榨底层草根后将其抛弃的反思。<br><br>2025年3月，庞明涛在经纪人的协助下尝试开展“拯救计划”复出巡演。在首站贵阳站时仅有9名观众买票到场，这一惨烈画面再次登上热搜。然而，这一热搜意外激起了大批网民的情怀消费，使得其随后的上海站400张门票在极短时间内被抢购一空。但这种带有猎奇与同情性质的情怀消费并未能帮助其重回主流。截至2026年，庞明涛在短暂的热搜狂欢后再次归于沉寂，依然生活在陕南老家，承受着药物的副作用与疾病的折磨，在互联网尘品落定后完成了其从神曲制造者向精神病患者的悲剧闭环。
