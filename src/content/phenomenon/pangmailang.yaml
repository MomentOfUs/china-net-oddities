english_name: Joseph Pangmailang
essay: |
  <p>2013年北京一间破旧的录音棚里。调音师看着屏幕上完全跑调、节奏错乱的音频波形，叹了口气，在论坛上发帖称“这活我真没法接”。他身后的录音间里，穿着廉价夹克的庞明涛正闭着双眼，用陕南口音的普通话固执地唱着自己写的歌词。他不知道，这段被称为灾难的音频，将在一年后被包装成年度神曲《我的滑板鞋》。</p><p>庞明涛的爆红是早期娱乐资本对底层边缘群体进行强制客体化包装的经典奇观。唱片公司发现了他在音乐上的极致粗鄙中所蕴含的“审丑价值”，为其配上专业编曲推向市场。大众在几亿次播放中消费的是对一个底层农民音乐梦想的戏谑与嘲笑，而资本则在这场全民解构的快感中赚得盆满钵满，强行将他推上了不属于他的神坛。</p><p>在被推上神坛的过程中，庞明涛陷入了无力的本能顺应与精神错乱。他为了迎合媒体的期待和维护自己那脆弱的艺术尊严，固执地坚称自己并非陕西农民，而是来自台湾基隆的“约瑟翰·庞麦郎”。<span class="hl">这种对自我出身的极力撇清和在镜头前摆出的病态绅士姿态，使他在看客的哄笑声中越发显得滑稽，完成了对其主体尊严的二次剥夺。</span></p><p>随着新奇感的消失和合同官司带来的信用危机，他的商业价值迅速归零，被资本彻底弃置。庞明涛在流量耗尽的窘迫与严重的精神分裂症折磨下，最终在2021年被送入了精神病院。他在流量的盛宴里被剥皮抽骨，最终被重重摔回了那片他极力想要逃离的陕南农田，成为了一件被使用完毕后丢弃的时代垃圾。</p><p>截至2026年，庞明涛依然在陕南老家的村庄里生活，其眼神已彻底失去了焦距。中文互联网早已找到了新的笑料，那首《我的滑板鞋》成了陈旧的历史胶片。他在摩擦中没有找到属于他的时尚步伐，只留下了一个在名利泡沫中被彻底撕碎的灵魂。</p>

