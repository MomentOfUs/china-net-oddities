relics:
- name: 破旧的球鞋
  desc: 约瑟翰·庞麦郎在成名前穿着的破旧球鞋。一个来自陕西农村的青年带着这双鞋去了北京——鞋没换，命运先换了。
- name: 《我的滑板鞋》MP3文件
  desc: 庞麦郎代表作的原始录音文件。一首在专业音乐人看来"完全不着调"的歌，在互联网上获得了超越技术评价的传播力量。
- name: 精神疾病诊断书
  desc: 庞麦郎2021年被送入精神病院后的诊断文件。一个用跑调唱出时代之音的人，最终被时代诊断为"不正常"。
glossary:
- key: 我的滑板鞋
  val: 2014年最火的网络神曲之一。以完全偏离专业标准的演唱方式触碰到了某种真实——"摩擦摩擦"成了时代的注脚。
- key: 约瑟翰·庞麦郎
  val: 庞麦郎给自己取的国际化艺名。一个陕西农村青年自称"约瑟翰"——身份错位本身就是对他全部艺术的最精准描述。
- key: 摩擦摩擦
  val: 《我的滑板鞋》中最洗脑的歌词。两个叠词获得了超越歌曲本身的独立生命。
