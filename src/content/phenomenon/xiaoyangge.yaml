comment: <b>1995</b> · 安徽六安 · 张庆杨 · 疯狂小杨哥<br><br>他曾经是抖音粉丝最多的人——1亿+，比很多国家的总人口还多。他的带货直播间单场销售过亿，他的MCN公司三只羊网络签约了2000个主播，他的个人IP价值曾经被认为超过百亿。2026年，他在隐身一年多后，已经不被大多数新用户想起了。<br><br>小杨哥的起点是短视频搞笑博主。2015年前后，他和双胞胎哥哥大杨哥在快手/抖音拍整蛊视频：在老爸头上放炮仗、趁哥哥睡觉贴满纸条、用假老鼠吓唬妈妈。他的表演有一种粗粝的街头喜剧感——不是精致的内容创作，是真正农村出身的小孩想到什么拍什么。这种野生感恰好是那个时代最缺的。<br><br>2020年前后，他转型直播带货。搞笑基因让他的直播间跟别人不一样——不只是卖货，是表演。他和哥哥在直播间吵架、打架（表演）、摔东西——观众当综艺看，顺便买东西。这个模式让他从众多主播中杀了出来。<br><br>然后他创办了三只羊网络。三年内扩张到2000+主播、年销售额数百亿。他建了直播基地、做供应链、搞培训——他从一个博主变成了一台商业机器。他买了1亿的楼，上了福布斯，被地方政府接见。<br><br>2024年9月，假月饼事件炸了——直播间卖的"高端月饼"被查出是贴牌假货。然后是系列连锁反应：监管部门介入、罚没6800万、央视点名、全面停播。<br><br>2025年8月，国务院新闻发布会上，国家市场监管总局副局长把他和东北雨姐并列，作为直播电商治理的重大案例通报——一个95后安徽农村青年的公司，跟中国最高监管机构的名字出现在了同一个段落里。<br><br>2026年1月，三只羊主账号复播。4小时销售额25万——不足巅峰的0.25%。小杨哥本人不在直播间，大杨哥也不在。他在所有平台上都像消失了一样。<br><br>2月，粉丝584万的头部主播七老板宣布解约。三只羊的签约主播从2000多人降到321人。公司在尝试转型——做自有品牌"小杨臻选"App、进军东南亚和巴西市场——但失去了核心IP的三只羊，就像一个没有主角的剧团。灯光还在，观众没了。
