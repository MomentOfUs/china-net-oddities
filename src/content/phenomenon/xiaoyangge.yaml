english_name: Zhang Qingyang (Crazy Little Yang Brother)
essay: <p>小杨哥是中国直播电商史上最极端的抛物线——从安徽农村的留守儿童，到抖音粉丝第一人，到罚没6800万的监管典型，再到消失在自己公司的办公室里。这条弧线只用了不到十年。</p><p>他的起步毫无工业痕迹。2015年的快手是野生内容的狂欢，小杨哥和哥哥大杨哥拍的是最粗糙的整蛊视频——没有剧本、没有编导、没有团队，两个安徽农村男孩对着镜头傻笑和打架。但他有一种那个年代内容创作者最稀缺的本能：知道观众想看什么。而且是第一时间知道。</p><p>转型直播带货后，他把这种本能转化成了商业。他的直播间不是卖货，是综艺——和哥哥吵架、摔东西、演剧本。观众当节目看，顺便买个垃圾袋。这个模式的关键不在于"低价"——在于"你在买的同时收获了快乐"。2022年，小杨哥月销售额突破10亿。2023年，三只羊网络营收超过300亿。2024年，他的徒弟"红绿灯的黄"因低俗带货出圈。2025年，三只羊公司被罚没6800万元。</p><p>小杨哥被封不是一次独立事件。他是整个直播电商野蛮生长的缩影：当一个从零做到300亿的公司没有任何中间过程的时候，出事只是时间问题。他的核心矛盾在于：他卖9.9元的商品给月薪3000的人，同时买1.2亿元的楼给自己。当他的粉丝对着镜头笑的时候，他的财富也在笑。这种不对等不是他的错——是直播电商这个模式的底层逻辑。小杨哥只是第一个被推到台前的人。2025年他的直播间关停了。他最后一条视频是沉默的，评论区里有人打了三个字："都走了。"他是被时代捧上去的，也是被时代摔下来的——摔他的那只手，和捧他的那只手，是同一只。</p>
