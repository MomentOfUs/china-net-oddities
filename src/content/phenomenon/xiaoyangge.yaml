english_name: Zhang Qingyang (Crazy Little Yang Brother)
essay: |
  <p>2015年安徽六安霍邱县的泥泞农田里。张庆杨和哥哥张开杨赤脚站在泥地上傻笑，互相朝对方脸上抹着稀泥，没有剧本，没有打光，只有一部几百块钱的廉价手机和充满泥土气息的乡村下午。这幅毫无修饰、充满底层留守儿童自娱自乐气息的搞笑画面，为这对双胞胎兄弟按下了通往流量世界的第一个快进键。</p><p>张庆杨兄弟的狂飙是中国短视频去专业化红利与算法对草根娱乐极致推流的典型结合。在转型直播带货后，他们首创了“反向整蛊带货”的网综化模式，在直播间里打闹、摔商品、演狗血剧本。算法以数亿的场观和首个“个人粉丝破亿”的加冕，将他迅速确立为直播带货帝国的绝对君主，完成了惊人的财富积累。</p><p>然而，名利的极速膨胀也为他的商业帝国埋下了自毁的引线。他开始疯狂透支自身信用，与涉嫌虚假宣传的劣质供应链深度绑定，甚至在面临假货指责时，试图通过资本公关手段强行压制。<span class="hl">其背后的核心悖论在于：他以草根兄弟的朴实起家，最终却用最直白的资本剥削和虚假宣传完成了对广大消费者的收割，暴露出其对底层信任的冷酷耗竭。</span></p><p>2024年底，随着“假月饼事件”的曝光以及监管部门的介入，其商业帝国在一场排山倒海的调查舆论中迎来了致命的崩溃瞬间。相关部门对其开出重罚并责令停播，其主账号瞬间冰封，旗下庞大的“三只羊”MCN机构彻底沦为全网声讨的资本废墟，完成了从草根偶像到失信商人的坠落。</p><p>截至2026年，张庆杨已退出了直播的前台，三只羊帝国的那些总部大楼在风中显得有些萧条，昔日动辄过亿的带货GMV已彻底化为乌有。评论区里只剩下了一片唾骂和维权的留言。他用自身的自毁，为中国直播电商野蛮生长的狂飙时代，留下了一座庞大而荒凉的流量墓碑。</p>

