comment: |-
  <b>直播带货帝国的狂飙与瓦解</b> · 张庆杨 · 疯狂小杨哥 · 反向整蛊带货 · 假月饼风波 · 平台处罚<br><br>张庆杨（网络ID为“疯狂小杨哥”），1995年2月27日出生于安徽省六安市霍邱县的一个普通农村家庭，与双胞胎哥哥张开杨（大杨哥）曾是长期的留守儿童。张庆杨自幼性格活泼，在大学期间便对短视频创作产生了浓厚兴趣。成名前，他与哥哥在霍邱县农村老家摸索拍摄，没有任何专业团队和商业资本支持，生活水平长期处于底层状态。<br><br>2015年起，张庆杨与哥哥开始在快手、抖音平台上发布生活整蛊搞笑短视频。其早期的作品多以家庭日常为题材，包括在熟睡的父亲头上放炮仗、两兄弟互相整蛊打闹等。张庆杨凭借其极具爆发力的尖叫、夸张的肢体冲突和极其下沉的“反向整蛊”搞笑风格，迅速吸引了数以千万计的普通网民，粉丝量在短时间内呈现火箭般蹿升，成为了抖音平台历史上首个粉丝量破亿的个人账号。<br><br>在2020年至2023年的巅峰期，张庆杨将搞笑整蛊完美融入了直播带货，开创了“反向整蛊式带货”的行业先河。他在直播间与品牌方互相调侃、甚至公开“暴力测试”产品，让直播间场观和销售额屡屡破亿。2021年，张庆杨创办了“三只羊网络”MCN机构，快速收割商业版图。公司签约带货主播超过2000人，建立了庞大的带货和供应链帝国。他实现了惊人的阶层跨越，在2022年甚至自掏腰包1.03亿元在合肥买下一栋大楼作为总部基地。2023年三只羊年营收破百亿，张庆杨成为了中国直播电商发展史上的历史级顶流。<br><br>然而，三只羊帝国的狂野扩张与粗放的供应链管理，最终引爆了毁灭性的合规危机。2024年9月，其直播间因涉嫌销售虚假宣传的贴牌“香港美诚月饼”以及假冒牛肉卷等事件，引发了全社会关于消费者权益受损的强烈声讨。同年底，安徽合肥联合调查组对三只羊公司作出立案调查，依法没收其违法所得并处以6800万元行政罚款，国家市场监管总局和央视点名通报，三只羊主账号和张庆杨本人被平台强制暂停直播，其个人及公司信用彻底破产。<br><br>假货危机爆发后，张庆杨与哥哥在各大平台上停止了更新，陷入了长期的“隐身”状态。2026年1月，三只羊主账号尝试低调复播，在张庆杨本人未露脸的情况下，4小时销售额仅有25万元（仅相当于其巅峰单场破亿销售额的0.25%），市场反响极其惨淡。2026年2月，包括“七老板”在内的多位头部主播先后宣布解约，公司签约主播人数从2000人锐减至321人，人去楼空。截至2026年，张庆杨依然处于退网停播状态，其带货帝国已告解体，深刻印证了直播电商野蛮生长的泡沫在法治和合规监管面前的必然覆灭。
