comment: 杨笠，1992年生，河北人，脱口秀演员，笑果文化旗下艺人。<br><br>2020年，《脱口秀大会》第三季上，杨笠说了一段话，其中有五个字，让她从此再也不只是一个脱口秀演员——<b>"那么普通，却那么自信"</b>。<br><br>这五个字精准命中了中国互联网最敏感的神经。有人拍案叫绝，说她说出了无数女性想说不敢说的话；有人暴跳如雷，说她在搞性别对立、煽动男女对立。<br><br>从此，杨笠成了中国互联网性别战争的核心战场。她说的每一句话、参加的每一个节目、代言的每一个品牌——都会被放大、被解读、被攻击或被捍卫。<br><br>英特尔代言事件是经典案例：签了她做代言人，男性用户在评论区疯狂抵制，品牌最终被迫撤下广告。后来舍得酒业请她参加活动，同样被怒火围攻。<br><br>杨笠的本质不是一个"性别议题战士"——她只是一个说脱口秀的，碰巧说中了一个时代的穴位。但互联网不会放过她：她要么是女神，要么是公敌，没有中间地带。<br><br>2023年后，国内脱口秀行业经历了整顿和重启。笑果文化被重罚，house被封杀，整个行业进入寒冬。杨笠在国内的演出机会大幅减少。她转向香港和海外市场——2025年10月，她在香港举办个人脱口秀专场。<br><br>"普通且自信"这五个字，已经永久地刻在了中文互联网的语料库里。但杨笠本人，已经从那个被架起来的文化符号的位置上退了下来。她还在做脱口秀，还在讲段子——只是不再在中国互联网的风暴中心了。
