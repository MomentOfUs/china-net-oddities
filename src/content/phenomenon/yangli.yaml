english_name: Yang Li
essay: <p>杨笠不是中国第一个讲性别话题的脱口秀演员，但她是第一个因为讲性别话题而<strong>变成一个问题本身</strong>的人。</p><p>2020年之前，她是笑果文化签约艺人，在《脱口秀大会》上表现不错但不算最突出。2020年，她讲了那段话：男人"那么普通，却那么自信"。现场效果炸裂，台下女性观众尖叫鼓掌，男性观众或许在笑，或许有点不舒服——但没有人想到，这段五分钟的表演会引爆一场持续数年、波及整个互联网的文化战争。</p><p>支持者说：她说出了女性长期被压抑的感受，是勇敢的。反对者说：她在煽动性别对立，是恶意的。两种声音在网上对撞，中间地带被彻底碾碎。杨笠本人对此的回应是——"我没有想到会这样"。</p><p>最魔幻的现实是：杨笠本人可能从来没有打算当什么"女权领袖"。她只是一个喜剧演员，用段子来表达自己的观察和感受。但互联网不给她选择——当你成了一个文化符号，你就不再属于你自己了。</p><p>2021年，英特尔请她做代言，评论区被抵制留言淹没，品牌撤下了广告。2022年，舍得酒业请她出席活动，同样引发大规模抗议。这些事件让杨笠成了一个悖论：她是一个代言被撤的人，但她的名字本身就是一个品牌——一个代表"立场"的品牌。</p><p>杨笠的故事是互联网时代最典型的"被符号化"案例。她的脱口秀可能不是最好的，但她作为文化符号的重量，远超大多数刻意为之的意见领袖。</p>
