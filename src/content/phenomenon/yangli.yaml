english_name: Yang Li
essay: <p>杨笠不是中国第一个讲性别话题的脱口秀演员，但她是第一个因为讲性别话题而<strong>变成一个问题本身</strong>的人。</p><p>2020年之前，她是笑果文化签约艺人，在《脱口秀大会》上表现不错但不算最突出。2020年，她讲了那段话：男人"那么普通，却那么自信"。现场效果炸裂，台下女性观众尖叫鼓掌，男性观众或许在笑，或许有点不舒服——但没有人想到，这段五分钟的表演会引爆一场持续数年的舆论战争。</p><p>杨笠的困境在于：她说的不是段子，她说的是社会结构。当一个脱口秀演员的段子恰好戳中了真实的性别矛盾，她就不再是一个演员了——她成了一个立场。支持她的人和反对她的人，都不再把她的话当段子听：他们把她的每一个词都放在天平上称，看它偏向了哪一边。杨笠自己说："我只是在讲段子。"但互联网不答应——因为性别话题，从来都不是段子。</p><p>她的商业价值经历了过山车式的震荡：品牌代言被撤又恢复；线下演出被举报又加场；微博热搜上了又下。她成了一个矛盾的开关——品牌只要请她，就同时拥有了拥趸和抵制者。</p><p>杨笠不是女权主义者，也不是反女权者的敌人——她只是一个脱口秀演员，在台上讲了一些观众爱听的笑话，然后发现自己被两股更大的力量同时裹挟了。2023年后她减少了演出，不再像以前那样频繁触碰性别话题。有人说她妥协了，有人说她成熟了。但真相可能更简单：作为一个脱口秀演员，当你的每一个梗都要被抽出来做社会分析的时候，你就再也讲不出好笑的梗了。不是她不讲了，是她"不能"讲了。</p>
