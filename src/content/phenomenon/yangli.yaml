comment: |-
  <b>性别议题争议中心</b> · 脱口秀演员 · 普信男 · 媒介生命史<br><br>杨笠，1992年出生于河北省秦皇岛市的一个普通工薪家庭。她自幼喜爱画画，后考入北京服装学院动画专业。大学毕业后，杨笠并没有顺利进入动画行业，而是度过了一段长达数年的迷茫与漂泊期：她做过设计助理、当过前台客服，甚至做过短暂的自由职业者，生活极其窘迫。2017年起，杨笠在接触到单口喜剧（脱口秀）后产生浓厚兴趣，开始在北京的各大开放麦登台尝试，并于2018年正式签约笑果文化，成为一名职业脱口秀编剧与演员。<br><br>2020年，杨笠作为参赛选手加入了腾讯视频播出的《脱口秀大会》第三季。在节目的第五期中，她发表了一段关于男性心理与行为的幽默表演。在段子中，她针对生活中男性习惯性说教、盲目自信的现象进行了辛辣反讽，并说出了一句改变其职业生命的标志性金句：“他明明看起来那么普通，却可以那么自信。”这一被称为“普信男”的段子以惊人的速度火爆网络，迅速切中了中文互联网积压已久的性别话语交锋点。<br><br>在2020年至2022年的流量巅峰期，杨笠成为了中文互联网上最具争议和最出圈的脱口秀演员，全网热搜不断。她被大批女性网民奉为“女性独立与嘴替”的先锋代表，其名言“那么普通，却那么自信”、“男人，还有底线呢？”成为流行语。然而，她的爆红也将其推上了网络性别战争的风暴中心。在此期间，杨笠迎来了空前的流量红利与同样空前的网暴抵制：2021年3月，英特尔（Intel）宣布杨笠为其宣传大使，立即遭到大批男性网民的集体声讨与消费抵制，英特尔迫于压力不得不连夜撤下其广告；同年，其代言舍得酒业、奔驰汽车等商业活动，均引爆了双方群体的撕裂性博弈，每次商业活动都演变为性别对立的社会学演练。<br><br>随着中国网络环境的净化和行业整顿的推进，2023年笑果文化因旗下其他艺人的严重违规行为遭遇了毁灭性罚款与停演整顿，脱口秀行业的线上商业化平台几乎被悉数拆除。身处风暴漩涡的杨笠，由于其符号被严重极化、工具化，在国内主流电视和网络节目上的活动空间也面临了严重的合规受限。在经历了长期的争议和压力后，杨笠选择逐渐淡出舆论焦点，开始将重心转移。<br><br>为了寻求更自由的创作空间和延续职业生命，2025年起，杨笠开始转向香港及海外中文脱口秀演出市场，并于2025年10月成功在香港举办了个人脱口秀专场，获得了海外华人群体的热烈反响。截至2026年，虽然“普信男”一词已成为中文互联网不可磨灭的永久词汇，但杨笠本人已主动退出了舆论交锋的最前线，转型为一位更加审慎、低调的职业幽默表演者，其轨迹深刻映射了草根演员在算法和极端情绪撕裂下的复杂生存图谱。
