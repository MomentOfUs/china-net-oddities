english_name: Yang Li
essay: |
  <p>2020年夏天，《脱口秀大会》录制棚。杨笠站在麦克风前，说出了那句话：“他明明看起来那么普通，却可以那么自信。”现场女观众尖叫鼓掌。有人笑出了眼泪。没有人意识到，这个五分钟表演里的包袱，会在往后数年里持续燃烧。</p><p>五个字在微博上裂变。它不是作为段子在传播——它变成了一套诊断工具。千万女性用它命名自己长期无法言说的感受；千万男性感到被冒犯，但说不出冒犯自己的到底是什么。一个关于约会的笑话，撕开了一个事实：在性别这件事上，中国男性和女性活在完全不同的现实里。</p><p>杨笠是靠讲笑话谋生的人。但笑话不再是笑话了。她的每一句台词都被放在天平上称——偏哪边？她越是解释“我只是在讲段子”，越像在为一个立场站台。这一切的逻辑在一条线上收束：<span class="insight">她讲了一个关于社会现象的笑话，然后自己变成了那个社会现象。</span></p><p>2021年，英特尔发布她的代言海报。24小时内，男性网民发起集体抵制，品牌连夜撤下广告。舍得酒业的合作紧随其后，剧本完全一样。每一次商业活动都变成一场性别公投。请杨笠，等于同时拥有拥趸和敌人——品牌方第一次发现，流量可以是一种精确计算的负资产。</p><p>2023年笑果文化被重罚，脱口秀行业的线上平台几乎归零。杨笠——这个从未主动选择当战士的人——发现国内已经没有能放置她的舞台了。不是被封杀。是无法被放置。</p><p>2025年10月，她在香港办了一场个人专场。观众笑了。那笑声里没有诊断，没有立场，没有投票。只是一个人讲笑话，一群人听。和2020年之前一样。</p>

