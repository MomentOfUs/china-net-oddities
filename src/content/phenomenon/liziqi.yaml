comment: |-
  <b>非遗田园创作者</b> · 李佳佳 · 李子柒 · 东方美食生活家<br><br>李佳佳（网络ID为“李子柒”），1990年7月6日出生于四川省绵阳市的一个普通农村家庭。她的童年非常坎坷：父母在她很小的时候离异，随后父亲不幸去世，继母对她态度恶劣，甚至曾拽着她的头发把她往水沟里按。年幼的李佳佳只能与爷爷奶奶相依为命。爷爷是一位乡村木匠，操办乡邻的红白喜事并精通各种传统手艺与农活，这成为李佳佳日后传统技能与乡野知识的最初源泉。爷爷去世后，十四岁的李佳佳被迫辍学前往城市谋生。在成名之前，她经历了长达八年的艰苦漂泊：她做过服务员、发过传单，甚至为了生存去酒吧担任驻场DJ。2012年，为了照料年迈多病的奶奶，李佳佳毅然决定放弃城市工作，返回绵阳农村老家。<br><br>2015年，为了给自己的淘宝网店引流，李佳佳开始自学视频拍摄与剪辑。起初，她使用手机记录自己制作农家饭菜的过程，但效果并不理想。2016年下半年起，她开始专注于以古风、田园生活为特色的短视频创作。2016年11月，她发布了一期名为《兰州牛肉面》的视频。在这期视频中，她从选面、揉面、拉面到熬汤，全部独立手工完成，画面精致，节奏舒缓，充满古朴之美。该视频迅速在网络上引爆，全网播放量在短时间内突破5000万次，成为了李子柒IP崛起的关键契机。<br><br>2017年，李佳佳与MCN机构微念创始人刘同明达成深度合作，正式开启品牌商业化运营。在2017年至2021年的巅峰期，李子柒成为了中文互联网上无可争议的“东方美食生活家”和文化传播顶流。她的视频不仅在国内各大平台上订阅量破千万，更在海外视频平台YouTube上引发了狂潮。截至2021年，她的YouTube订阅用户突破1500万，连续打破“YouTube中文频道最多订阅”的吉尼斯世界纪录，被外交部、主流媒体广泛誉为“中国传统文化海外输出的代表人物”。其商业版图也迅速扩张，李子柒品牌螺蛳粉等农产品实现年销售额数十亿元。<br><br>然而，随着商业利益的急剧膨胀，李佳佳与所属MCN公司微念之间的利益矛盾也彻底白热化。由于微念掌控了“李子柒”商标的所有权以及相关电商实体的控制权，而李佳佳本人在合作中并未获得足够合理的股份和财务控制，这导致她沦为被资本工具化的创作者。2021年7月14日，李佳佳在发布了一期制作盐的视频后，宣布无限期停更。同年10月，李佳佳正式起诉杭州微念，双方展开了长达三年的商标及股权争夺战。在此期间，这个全球顶流账号彻底沉寂，舆论对于资本剥削原创作者的行为展开了激烈的社会大讨论。<br><br>经过三年的法律博弈，双方于2022年底达成和解，李佳佳重新获得了“李子柒”个人品牌的绝对控制权，微念则退居幕后。2024年11月，李佳佳以一期讲述国家级非物质文化遗产“雕漆”的视频正式复出，瞬间在全网掀起狂澜，证明了其强大的IP生命力。截至2026年，李佳佳继续保持着稳定且高质量的视频更新。在一个内容创作日益浮躁、碎片化和急于带货变现的算法环境中，李佳佳依然坚守着精致、缓慢的田园美学与非遗技艺传播，探索着个人IP与文化公共资产的长线生存模式。
