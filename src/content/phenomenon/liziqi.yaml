comment: '<b>~1990—</b> 四川绵阳 · 本名李佳佳<br><br>2016年，一个四川农村女孩开始在美拍发布古风美食视频。没有团队、没有剧本、没有专业设备——她自己种菜、自己做菜、自己剪辑。她不知道自己会成为中国文化输出最大的一张名片——她只是想让奶奶吃到自己做的饭。<br><br>2021年7月14日，她发布了最后一条视频，然后消失了。不是因为创作瓶颈，不是因为偷懒——是因为她和签约公司微念之间爆发了一场关于"李子柒"这个品牌归属权的官司。三年后她赢了，带着自己的名字回来了。'
