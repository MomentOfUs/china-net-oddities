english_name: Li Ziqi
essay: |
  <p>二零二一年七月十四日。李子柒发了一条做盐的视频——四川山里的土灶，铁锅，卤水在文火上慢慢结晶。没有告别文案，没有回归预告。视频播完，她消失了三年。</p><p>她不是冲着“文化输出”拍的。二零一六年，一个在城里当过服务员和酒吧DJ的农村女孩回到绵阳老家，用手机拍自己腌菜做饭——初衷是为淘宝店引流。她的视频节奏反一切算法：酿一缸酱油要等三个月，打一张纸要一整季，做一件斗篷要从春天剪羊毛拍到入冬。国内平台的数据模型嫌太慢。但在全球注意力市场里，慢恰恰是硬通货。一种不需要翻译的画面语言——种地、砍柴、炒菜、端给奶奶——跑赢了所有精心翻译过的外宣文案。YouTube订阅突破两千万，中文频道全球最高，吉尼斯世界纪录。</p><p>然后她停下了。不是因为创作枯竭。是因为“商标注册”“股权结构”“MCN合约”这些词，进入了一个田园视频创作者的生活。她发现自己用了五年的名字，注册在一家不属于她的公司名下。<span class="insight">一个全球顶流，打官司要回自己的名字——这件事本身比任何视频都更具概括力。</span></p><p>她视频里的世界不需要合同。她本人的名字需要法院判决才能拿回来。</p><p>打了三年。二零二二年底和解，李佳佳拿回“李子柒”品牌的完整控制权，微念退居幕后。她没有立刻复出。又等了近两年——二零二四年十一月，距上一条视频整整一千二百一十七天——她更新了一条雕漆视频。国家级非遗，大漆一层一层地涂，一刀一刀地刻。没有任何解释，不回应，不卖惨。只是继续做手工，拍田园。这个姿态本身就是判决书。</p><p>算法迭代了无数次，平台换了三批顶流。一个消失了一千二百一十七天的人，回归当日全网服务器被挤到限流。算法的第一条规则是缺席即死亡。她是唯一的例外。</p>

