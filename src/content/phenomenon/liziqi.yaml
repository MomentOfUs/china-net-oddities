comment: '李子柒，本名李佳佳，四川绵阳人，2016年开始在美拍发布古风美食视频，以"田园叙事"风格走红。她的视频内容以中国传统手工艺和农村生活为主，涵盖蜀绣、造纸、酱油酿造等非物质文化遗产技艺，以唯美的镜头语言呈现了中国式田园诗。


  2021年7月，李子柒在更新完"盐"系列后突然停更，随后爆出与MCN机构微念的股权纠纷。这场耗时三年的博弈以李子柒胜诉告终，她重新掌握了自己名字的控制权——但付出的代价是三年的沉默。


  李子柒的不可替代性在于：她在YouTube拥有超过1700万订阅者，是中文世界最成功的海外内容输出者。她的视频不需要翻译——因为一双手、一把锄头、一锅热气腾腾的食物就是全人类共通的语言。2025年复出后，她的风格未变，但互联网已经变了。等她的人还在，但流量逻辑已经转向了更短、更快的模式。'
