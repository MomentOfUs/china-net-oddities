essay: <p>洛杉矶，一个中国男人站在教堂门口排队领免费午餐。他穿着灰色T恤，头发乱糟糟的，肚子挺着，脸上挂着一个不合时宜的笑容。他举着手机拍自己。"金牌讲师！"他说。"看看，这就是美国，一人一份，不能多拿。"这是他的开场白，每一期都是。这个开场白让他一个月赚了20万。</p><p>他叫雷森，外号丁胖子金牌讲师。在成为讲师之前，他在中国因为盗窃被判了半年，出来以后听信移民中介的话把自己偷渡到了美国。到洛杉矶以后他发现自己被骗了——没有高薪工作，没有大房子，连合法身份都没有。他开始了流浪生活，在华人区领免费食物，睡公园长椅。</p><p>2023年某一天他举起手机拍自己领食物——然后火了。不是因为他惨，而是因为他"乐"。他笑嘻嘻地说"一人一份不能多拿"，认真地给观众介绍美国的免费午餐制度。他的流量密码很简单：在美国流浪，同时喊"今生无悔入华夏"。这组合对很多人来说太新鲜了——一个偷渡客，在美国混得最惨，却最爱他的祖国。</p><p>月入20万之后他做了两件事：给母校捐了一万，给甘肃地震灾区捐了一千。这些举动被大量放大，有人骂他"爱国生意"，有人高呼"讲师纯爷们"。然后他被国内平台封禁了。在美国的华人同乡——一个做移民中介的博士——向移民局举报他，说"这个人在摧毁华人形象"。</p><p>丁胖子金牌讲师的荒诞之处在于：一个盗窃犯偷渡到美国，在街头要饭的时候找到了自己最值钱的东西——"爱国"。这不是讽刺，这是一个时代的真实注脚：当一个人连饭都要不到的时候，他唯一能用来交易的资产——就是声称自己爱他的祖国。</p>
