comment: 丁胖子金牌讲师，本名雷森。一个因为在美国要饭而爆红的中国偷渡客——他的走红方式在互联网历史上没有先例。<br><br>雷森是四川人，年轻时因盗窃被判刑半年。出狱后听信移民中介忽悠，把自己偷渡到了美国。到美国后发现中介说的全是假的——没有高薪工作、没有大房子，他连合法身份都没有，只能在洛杉矶华人区流浪。他开始领救济餐、睡大街、翻垃圾桶。<br><br>然后他想到了一个主意：拍视频。他举着手机拍自己领免费食物的全过程，喊口号"金牌讲师"。视频里他胖乎乎的、头发乱糟糟的、笑容憨厚。视频在中国互联网上爆炸了——不是因为他惨，而是因为他"乐"。一个在美国要饭的人，每天笑嘻嘻地领救济餐，给观众展示美国的"黑暗面"。他说"今生无悔入华夏，来世还做中国人"。大量粉丝疯狂打赏，据说月入20万。他用打赏的钱给甘肃地震捐了1000块，给母校捐了1万块。<br><br>美国主流媒体甚至报道了他——"来自中国的大学讲师在美国无家可归"——"金牌讲师"这个外号就是这么来的。美国人以为他真是大学讲师。<br><br>但他的好日子没持续太久。国内平台以"违规"为由封杀他。在美国的华人同乡举报他非法打工、偷税漏税给移民局。他被迫转战国外平台。<br><br>丁胖子金牌讲师是中国互联网最奇特的现象之一：一个偷渡客，用在美国要饭的视频，反向输出爱国流量，一个月赚20万。他不是用才华、不是用颜值、不是用噱头——他只是举起手机拍了自己的一天。然后成了讲师。
