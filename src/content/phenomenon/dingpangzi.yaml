essay: |
  <p>洛杉矶正午的刺眼阳光下，雷森排在教堂救济站的长队中，破旧的灰色T恤下露出一截肚皮。轮到他时，他接过义工递来的泡沫餐盒，将手机镜头对准里面的面包与土豆泥，嘴边挤出一个标志性的戏谑微笑：“看看，这就是美国，一人一份，不能多拿。”这段洛杉矶流浪要饭的纪实，在2023年的中文互联网上一夜引爆，拉开了一个极具黑色幽默的“要饭爱国”故事。</p><p>雷森的爆红依赖于算法对阶层对立与地缘情绪的极致迎合。一个偷渡美国的边缘流浪汉，在视频里把领救济餐戏称为“打野”，并在吃完后高喊“今生无悔入华夏”和“要饭也不能忘记爱国”。这种将“落魄美国”与“崇高爱国”缝合在同一个画框里的内容，精准满足了部分国内受众对于海外社会衰落的心理投射，单月打赏收入迅速狂飙至数十万元，完成了荒诞的财富收割。</p><p>然而，雷森在变现的狂热中很快滑向了流量的深渊。为了维持高热度，他开始制作教唆他人如何“白嫖”福利的视频，甚至为了制造对立冲突而公开揭露当地华人餐馆非法使用黑工的现象。<span class="hl">这种越过道德与行业底线的行为，不仅在国内引发了对其利用爱国情怀做“流量生意”的广泛质疑，更引起了海外华人社群的强烈愤怒，将他推入了风暴的中心。</span></p><p>2023年底，多名华人联名向美国移民局及税务局举报雷森偷税漏税及非法打工，试图在物理层面将其彻底驱逐。同期，由于其宣扬的畸形价值观和极端对立情绪触碰红线，国内主流社交平台对他的账号实施了永久封禁。两扇门在一夜之间同时对他关闭，国内的流量管道被彻底斩断，雷森在一场由自己吹大的流量泡沫中迎来了致命的窒息。</p><p>截至2026年，雷森依然被困在海外视频平台YouTube上，更新着已然无人问津的“要饭”日常，昔日的巨额打赏一去不复返。在异国他乡的寒风里，这个失去母国主战场又被当地华人群体抵制的偷渡者，彻底成为了被流量时代弃置的边缘符号。他最终证明了一个公式：在美国的落魄虽然可以被打包成昂贵的产品销售，但被售罄后留下的，只有更加荒凉的废墟。</p>

