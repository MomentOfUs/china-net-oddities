essay: |
  <p>洛杉矶正午，一个中国男人排在教堂救济站的队列里。灰色T恤皱得看不出原样，头发黏在额头上，肚子从衣摆底下鼓出一截。轮到他的时候，义工递过来一个泡沫餐盒。他把镜头对准餐盒，嘴型摆出一个笑容——"看看，这就是美国，一人一份，不能多拿。"</p><p>他在每期视频里都用这句开场白，每期的流量都比上一期高。逻辑简单到粗暴：一个偷渡者在美国街头领免费午餐，同时对着镜头高喊"今生无悔入华夏"。穷人拍自己穷不是新鲜事——新鲜的是一个中国人领美国的救济、喊中国的爱国口号，两件事在同一个画框里同时发生。2023年，这个组合为他换来了单月20万人民币的打赏收入。一个在四川因盗窃被判刑半年的男人，在洛杉矶救济站的队列里，完成了从刑满释放人员到"金牌讲师"的身份跃迁。</p><p>这里出现了一个无法解开的死结：他越惨流量越大，流量越大收入越高，收入越高人越不惨——但流量密码偏偏是"惨"。讲师必须继续流浪，因为生活有任何改善，内容地基就会裂开。那句爱国口号不是立场，是入场券。没有"今生无悔入华夏"，他只是一个偷渡客在美国要饭——观众需要这句口号来给自己的围观买一张道德门票。</p><p>2023年底，国内平台对他全面封禁。同期，一名在美华人博士向美国移民局举报了他，理由是视频"摧毁华人形象"。两扇门同时关上：中国不让他播，美国要把他赶走。他曾给母校捐了一万，给甘肃地震灾区捐了一千——这两个数字被两边的支持者和反对者各自引用，没有人问过他为什么要捐。</p><p>2025年后，他的"领饭"系列停了。不是因为封禁。当同乡和仇家都知道他在哪儿排队的时候，免费午餐也成了一桩危险的生意。回头看，讲师的真正遗产不是口号，是一个精确的公式：在中国互联网上，一个偷渡客的美国落魄，比一百个留学生的美国成功，更值钱。</p>

