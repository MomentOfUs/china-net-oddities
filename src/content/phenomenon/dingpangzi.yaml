comment: |-
  <b>偷渡流浪汉</b> · 雷森 · 丁胖子金牌讲师 · 洛杉矶打野<br><br>雷森（网络ID为“丁胖子金牌讲师”），四川籍人士。在走红网络之前，雷森有着极其坎坷且不光彩的过去。他曾因犯盗窃罪被判刑半年。出狱后，面对国内生活的困境，他听信了非法移民中介的宣传，决定通过偷渡的方式前往美国谋求生路。抵达洛杉矶丁胖子广场后，他发现现实远比想象残酷：没有合法身份、没有高薪工作、不会英语，甚至连基本的温饱都无法保障，很快他便沦为了洛杉矶街头的一名无家可归者，靠拾荒和申领救济维生。<br><br>2023年，雷森开始尝试用手机记录自己在洛杉矶街头的流浪要饭生活。他以“丁胖子金牌讲师”为名，每天在抖音、快手等平台发布自己排队申领美国教堂、慈善机构免费救济餐的纪实视频。在视频中，他自封为“金牌讲师”，将流浪要饭戏称为“打野”。他以那句标志性的开场白——“看看，这就是美国，一人一份，不能多拿”，以及在吃完救济餐后高呼的“今生无悔入华夏”和“要饭也不能忘记爱国”，迅速在中文互联网上引发了排山倒海般的关注。<br><br>在2023年的巅峰期，雷森凭借这种极具戏剧冲突的“爱国流浪汉”人设，在短时间内收割了数百万粉丝，单月打赏收入自曝高达20万人民币。他以第一视角将洛杉矶底层社会的破败、混乱以及免费福利制度展现在国内受众面前，满足了部分受众对“美国落后”情绪的心理投射。他的大红大静甚至引发了美国当地中文媒体的报道，戏称他为“在美无家可归的大学讲师”。在获得巨额财富后，雷森向国内母校捐赠了1万元，并向甘肃地震灾区捐赠了1千元，这些善举被其粉丝奉为“流浪硬汉”的铁证，但也引发了关于其利用爱国情怀做“流量生意”的巨大争议。<br><br>雷森的爆红迅速触碰了多重红线。他在视频中公开教授如何在美国“白嫖”福利，甚至涉嫌揭露当地华人餐馆非法使用黑工的现象，这引起了美国当地华人社群的强烈愤怒。一名具有博士学历的华人移民中介公开向美国移民局及税务局举报雷森，指控其涉嫌偷税漏税以及非法打黑工，试图在物理层面将其驱逐。与此同时，他在视频中展现的畸形价值观和极端对立情绪，也引起了国内监管部门的警惕。2023年底，雷森在抖音、微博、快手等国内主流平台的账号全部遭遇官方封禁，其在国内的流量变现通道瞬间被彻底切断。<br><br>在国内主战场被彻底封禁后，雷森被迫将重心转移至YouTube等海外社交媒体平台。然而，由于脱离了国内庞大的粉丝基础和打赏生态，且面临当地华人群体的持续抵制与人身安全威胁，其视频的商业化价值和影响力大打折扣。截至2026年，雷森依然在海外平台上更新着他的“打野”日常，但他已经逐渐失去了早期的话题度，彻底沦为一个在异国他乡依靠贩卖自身底层挣扎经历维持生存的边缘符号。
