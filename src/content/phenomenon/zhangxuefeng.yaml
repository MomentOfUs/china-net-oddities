english_name: Zhang Xuefeng
essay: <p>张雪峰是最难定义的网红。他集老师、网红、商人、老板四种身份于一体，每种身份都做到了极致。</p><p>小时候睡火车站，穷得"响都不响"——他发明的这个说法后来成了互联网梗，但很少有人知道这是他的真实童年。齐齐哈尔富裕县，他家的贫困程度和地名形成反讽。他考上郑州大学——这个经历被他后来反复讲述：一个东北小城的孩子，翻过了高考这座大山，然后发现山外还是山。</p><p>2016年，"7分钟解读34所985高校"的视频让他从一个普通考研讲师变成了超级网红。视频里他嬉笑怒骂，把中国高校扒了个底朝天。到2026年去世时，抖音2656万粉丝，微博800万——他的每一个言论都能上热搜，每一条视频都有几十万人等着骂他或等他帮自己填志愿。</p><p>他最著名的争议是"新闻学打晕论"：2023年高考季，一位家长咨询590分能不能报川大新闻，他激动地说"孩子非要报新闻，我会把他打晕"。新闻学界炸了，教授们围剿他。他累到胸闷心悸被强制住院。但他不道歉，只是说："我离被人搞不远了。"</p><p>2026年3月24日，他走了。中午12点26分在公司跑步后出现不适，下午3点50分抢救无效。央视新闻发了讣告。当天晚上9点，他的账号全部变灰。那条"人生真好玩，下辈子还来"的微博，成了最后的签名。</p><p>生前有人问他：为什么这么拼？他说：<b>"我从小穷怕了。穷过的人，知道每分钱都是命换的。我帮一个孩子选对专业，可能就改变了他一家人的命运。"</b></p><p>他去世前最后一次直播中的开场白："大家早上好，初中的孩子刚出门，小学的孩子在吃饭，高中的孩子在背书，他们的家长在看我。"</p><p>这是张雪峰给自己写的悼词。</p>
