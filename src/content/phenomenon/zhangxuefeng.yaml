comment: 他是这个时代最复杂的教育符号——一个把知识变现玩到极致的人。<br><br>2007年从郑州大学给排水工程专业毕业后北漂，进入考研培训行业。2016年，一段<b class="hlg">"7分钟解读34所985高校"</b>的视频让他一夜走红。他的讲课风格犀利幽默、敢说真话，被学生称为"考研界郭德纲"。<br><br>然后争议来了。他说"所有文科都是服务业，服务业就是舔"，说"孩子非要报新闻我会把他打晕"，说"家里没企业别报管理"。中产阶级骂他功利主义、扼杀理想。普通人说他是<b class="hlg">"打破信息差"</b>——老百姓的家庭经不起试错。<br><br>2021年，他离开待了14年的北京，到苏州创立峰学蔚来。11999元的梦想卡和17999元的圆梦卡——3小时卖2万个，销售额2亿。2026届的服务在2024年就已经售罄。有人骂他饥饿营销割韭菜，他说："我是从最底层爬上来的，我知道穷人家的孩子需要什么。"<br><br>他给员工发2000万年终奖、春节放假23天、率先实行上四休三。员工买房他借100万。他曾晒出捐款回执：向黑龙江希望工程捐款50万，向苏州教育发展基金会捐款100万，每年向郑州大学捐款300万。<br><br>2026年3月24日下午3点50分，张雪峰因心源性猝死抢救无效于苏州逝世。距离他42岁生日还有不到2个月。去世前几小时，他还在直播和高考家长互动。公司跑步后出现不适，送医抢救无效。<br><br>有人问张雪峰想在墓碑上刻什么。他几乎没有思考地说：<b>"人生真好玩，下辈子还来。"</b>
