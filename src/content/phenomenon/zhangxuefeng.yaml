english_name: Zhang Xuefeng
essay: <p>张雪峰是最难定义的网红。他集老师、网红、商人、老板四种身份于一体，每种身份都做到了极致。</p><p>小时候睡火车站，穷得"响都不响"——他发明的这个说法后来成了互联网梗，但很少有人知道这是他的真实童年。齐齐哈尔富裕县，他家的贫困程度和地名形成反讽。他考上郑州大学——这个经历被他后来反复讲述：一个东北小城的孩子，翻过了高考这座大山，然后发现山外还是山。</p><p>2016年，"7分钟解读34所985高校"的视频让他从一个普通考研讲师变成了超级网红。但他最值钱的东西不是口才，是"真实"。中产精英骂他"功利主义"，普通家庭喊他"信息差终结者"。两边都没说错。问题在于：在一个人均年收入3万的国家，理想主义是有钱人的奢侈品。张雪峰替穷人做了一道他们自己不敢做的选择题——"别谈理想，先吃饱饭。"他说的每一个字都淌着穷人的血泪，但用的是最粗俗的包装纸。</p><p>2021年，他离开待了14年的北京，去苏州。走的时候他说："北京是一座梦想之城，但它也是消耗之城。"到苏州后他做了一件事——把公司开到大学对面，免费给大学生做职业规划答疑。11999元的梦想卡、17999元的圆梦卡，3小时卖2万个，销售额2亿。他把"割韭菜"和"做公益"这两件矛盾的事，缝合得滴水不漏。这不是他的高明——这是一个撕裂的时代创造出的完美商人：穷人需要他，中产痛恨他，两边都离不开他。</p><p>2026年3月24日，下午3点50分，张雪峰因心源性猝死逝世。42岁不到。去世前几小时，他还在直播间和高考家长聊天。没有遗言，没有告别，没有给他最擅长的"收尾"留下任何时间。他生前说过一句话："人生真好玩，下辈子还来。"下辈子来不来没人知道，但这一生——一个穷得睡火车站的东北男孩，靠一张嘴改变了无数穷人家孩子的命运，也承受了同样数量的骂名——争议没有随他的死亡消失，它们只是变成了一个没有正确答案的讨论：到底是张雪峰的问题，还是这个时代的问题？
