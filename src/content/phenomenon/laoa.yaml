english_name: Lao A (Alex)
essay: |
  <p>B站那条灰色的提示条再次弹出。直播间封面暗下去的那一刻，右下方跳出一条折叠的系统通知。没有人截图留念。老观众已经熟悉这套流程：黑屏、换号、重新上传身份证。只是每次申请新号的间隙越来越短——从喝一杯水，到打一个哈欠。</p><p>2022年他在西雅图开播时，讲的是超市物价和房租涨价，画面不过一间合租公寓的客厅。两年后，他坐在同一个麦克风前，身后是344万粉丝和6700万播放。镜头摇到街边帐篷、流浪汉手推车、便利店收银台后的防弹玻璃——每一样东西都比上一期更尖锐，每一条视频都比上一条获得更多点赞。算法不是他的敌人。</p><p>2025年，他在连麦中提到了女留学生。那些语言不通、社交封闭的女孩，成了"钓鱼佬团伙的狩猎目标"。一个从美国街头起步的内容创作者，最有冲击力的输出指向了一群自己人。支持者和反对者的人数都在增长，两边都在援引他的片段。但争论的中心不再是他所说的是否准确，而是他有没有资格说那些话。</p><p>封号斗士这个称谓的本质是一道算术：每封一次，说真话的人设就加固一层。被封的次数越多，粉丝的忠诚度越高。黑屏之后总有一批人跟着他找到新号——像一组不知道总部的游击队员，依靠社区通知的默契保持移动。他在这个过程中没有愤怒，没有解释。新号的第一场直播和第二场之间只隔了一个审核周期。</p><p>当一个说真话的人的每一句真话都能精准变现时，真话本身就不再是逻辑前提，而是产品参数。</p><p>2026年，一个深夜，新直播间亮起来。弹幕区等了三秒，出现了第一条发言。内容与上一次账号被封前相同——信息量不大，锋芒不退。屏幕对面的观众没有察觉，这段话他今天已经说过一次了。在另一个已被注销的账号的最后一条动态里，一模一样的句子，一字未改。</p>

