comment: |-
  <b>美国留学生播主</b> · Alex · 斯奎奇大王 · 牢A<br><br>Alex（网络ID为“牢A”，B站账号为“斯奎奇大王”），1995年出生于黑龙江省大庆市。他在大庆完成了早期的基础教育，随后在2022年左右远赴美国留学。在西雅图留学期间，由于高昂的生活成本，Alex开始在当地的餐厅及零售店打工，亲身经历了美国社会的底层运转与生存压力。在打工和学习的闲暇之余，他开始利用业余时间，在Bilibili（B站）等国内平台上开通直播，以视频连麦和日常漫谈的形式，分享自己在西雅图的见闻与生活点点滴滴。<br><br>2024年前后，Alex的直播内容开始从单纯的生活日常，转向对美国社会问题的深度剖析。他通过直接展示西雅图贫民区的流浪汉危机、泛滥的毒品问题、深刻的种族矛盾以及华人群体在海外的真实社会地位等负面现象，直接打破了传统舆论中对“灯塔国”的梦幻滤镜。他以直率、生动且不加修饰的第一视角纪实叙事，迅速迎合了中文互联网年轻群体对海外社会“祛魅”的强烈话语需求，其粉丝量和直播观看人数开始呈现爆发式增长。<br><br>在2024年至2025年的巅峰期，Alex的B站账号“斯奎奇大王”累积了超过340万粉丝，视频总播放量突破6700万。他以高频的直播连麦为核心特色，与国内外各路网民和留学生展开关于时政、社会规范和文化差异的激烈辩论，被粉丝冠以“凭一个人连麦干翻全美”的硬核名号。由于其直播言论尺度极大，频繁触碰平台的内容合规红线，他的账号多次遭遇短则数天、长则数月的封禁处罚。网民将他屡封屡战、反复换号复出的状态戏称为“封号斗士”，并赋予了他一个带有调侃与受难隐喻的黑色标签——“牢A”（意为像坐牢一样的Alex），使其成为了中文互联网言论生态中的一个独特奇观。<br><br>2025年至2026年，Alex在一次直播连麦中，针对在美女留学生以及陪读母亲的处境发表了一系列极具争议性的言论。他声称部分女留学生由于语言不通、社交孤立，极易在海外沦为特定边缘群体的“狩猎目标”，并描述了海外存在“钓鱼佬”团伙等现象。这一言论迅速在网络上引爆，激起了女性群体、留学生群体以及地缘政治爱好者的激烈冲突。反对者强烈指责他通过恶意捏造故事污名化海外女性、刻意煽动性别对立并贩卖安全恐慌以收割流量；而支持者则坚称他只是道出了“没人敢揭露的海外现实”。<br><br>由于言论争议的持续升级和性别对立情绪的蔓延，Alex在国内主流视频平台上的活动空间受到严格限制，多次面临严重的禁言和内容清空处罚。截至2026年，虽然他依然以“牢A”的名号活跃在部分海外视频及直播平台上，依靠继续输出极化话题和海外见闻维持曝光，但他最初在B站建立起的广泛共鸣基础已遭受重创。他的经历反映了时政与地缘博主在利用社会焦虑变现的同时，最终被激化的舆论冲突和监管红线所反噬的典型轨迹。
