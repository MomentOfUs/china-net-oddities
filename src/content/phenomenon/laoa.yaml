english_name: Lao A (Alex)
essay: <p>他的直播间又一次黑了。B站那条提示——"该直播间已被关闭"——弹出时，弹幕区滑过一串问号，然后沉入空白。没有人问为什么。老观众都知道流程：封了，换号，再来。从黑屏到新直播间亮起之间的沉默，恰好等于注册一个B站账号的时间。他没有愤怒，没有解释——只是安静地完成第七次、还是第八次转生。</p><p>2022年，他是西雅图一个普通留学生，开播聊聊物价和房租。2024年，他已经是中国互联网上最出名的"美国真相揭露者"——344万粉丝，6700万播放。算法奖励了每一次升级：从抱怨物价到拍摄流浪汉，从流浪汉到种族矛盾，从种族矛盾到断言"美国正在崩溃"。越尖锐，流量越高。越危险，粉丝越忠诚。封号不是惩罚——是认证。"封号斗士"这个标签背后的算术很简单：被封次数越多，"说真话"的人设越稳。</p><p>但在所有被封的理由中，最具破坏力的一次与美国毫无关系。2025年，他在连麦中声称部分女留学生因语言障碍和社交孤立，在海外沦为"钓鱼佬团伙的狩猎目标"。一个靠"揭露美国真相"立足的人，最致命的输出不在太平洋彼岸，而在自己人身上。当观众发现他说的每一句"真话"都恰好值一个打赏，"真相"和"剧本"的边界就消失了。</p><p>2025年之后，两群人各自成营。反对者说他污名化女性、贩卖恐慌。支持者说他是"凭一己之力扯下美国遮羞布"的人。两边的音量都很大。但没有人在争论他说的是不是真的——争论的焦点变成了他有没有资格说。平台封他，不是因为他说了假话，而是因为他说的内容太能分裂观众。</p><p>今天回头看，牢A留给互联网的不是一个真相，而是一道无人作答的证明题：当一个"说真话的人"的每一句真话都能精准变现，真话还叫真话吗。</p><p>他的新直播间亮起来的时候，头像换了，房间号换了。弹幕里飘出的第一句话和上一个账号被封前一模一样。</p>
