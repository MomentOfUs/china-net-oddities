comment: <b>户晨风</b> · B站UP主 · 购买力系列 · "户圣"<br><br>户晨风是B站2024-2025年最具争议性的UP主之一。他的核心内容不是数码评测，而是<strong>购买力系列</strong>——他走上街头，给路人一笔钱（50元、100元、200元不等），让他们去花，记录他们买了什么。这个看似简单的设定，产生了一种奇特的化学反应：不同收入层次、不同城市、不同年龄段的人在面对"白来的钱"时的选择，成了社会阶层的一面镜子。<br><br>购买力系列的爆火逻辑很直接——每个人看到视频都会想：换成我，我会买什么？有的人拿了钱去买菜，有的人买烟，有的人存起来，有的人随手花掉。街头采访的形式去掉了滤镜和脚本，让观众看到了一个个真实的、未经修饰的微观决策。户晨风后来把系列扩展到国外——到东南亚、日本等地测试人民币的全球购买力，引发了对"中国货币购买力"的广泛讨论。<br><br>除了购买力系列，他的"户晨风严选"系列也很有影响力——他对社会热点事件进行"严选评价"，语气不容反驳，立场极端明确。争议随之而来：他与900万粉的敬汉卿因手机和新能源汽车问题爆发公开骂战；与峰哥多次对线；"线下陪玩收费5000元一小时"争议更是让他的名声冲出B站。极客湾的观众曾专门提问"怎么看待户晨风"，馆长出一期视频评价他。<br><br>2025年9月，B站以"发布不实信息"为由封禁了他的账号。封禁之后，他被一部分人戏称为"户圣"——"敢说真话的圣人"——这个称号既包含真诚的拥护，也包含嘲讽的玩梗。户晨风的故事是中国互联网内容生态的一个经典案例：他靠记录普通人的真实消费选择走红，又因言论越界被封，最后在封禁的余波中被互联网反手封圣。
