english_name: HuChenfeng
essay: |
  <p>户晨风的购买力系列是他做过最聪明的内容——不是因为他做得多好，是因为这个设定本身就是一个完美的社会实验装置。给他一张钞票，看他怎么花——这个动作拆穿了所有关于"消费选择"的叙事泡沫。在互联网上，所有人都在告诉你应该买什么、为什么买、买什么才高级。户晨风做的事情很简单：把钱递给一个普通人，然后闭嘴，看。</p><p>这个"看"字是全部的秘密。他没有剧本、没有引导、没有"你为什么不买这个"的追问。他只是把钱递过去，记录对方的表情、犹豫、最终决定。有的人拿了钱去买菜——一天的饭钱省下来了。有的人拿了钱买烟——明知道不健康，但那一刻就想要。有的人拿了钱存起来——不花，因为"白给的钱花了心里不踏实"。这些选择没有对错，但它们拼出了一张比任何经济学报告都诚实的社会底片。购买力系列不是关于"钱能买什么"——是关于"钱在普通人心里意味着什么"。</p><p>但户晨风的问题也从这里开始。购买力系列的成功让他相信了一件事：他的判断是对人性和社会的准确洞察。这个信念本身没有错——错的是他把这种自信从街头采访带到了直播间。他后来的"严选"系列，本质上是在复制购买力系列的叙事逻辑：我看到→我判断→我下结论——但对象从"一个拿钱的路人"变成了"一个复杂的社会议题"。给路人100块钱看他怎么花，和给一个社会事件贴标签，需要的判断力完全不同。他以为用的是同一套方法，其实不是。前者是观察，后者是裁判。</p><p>对线的爆发是他从"观察者"滑向"裁判者"的标志。与敬汉卿的骂战、与峰哥的对线——一个50万粉的UP主和900万粉的UP主干上了，这场不对称战争的最大赢家不可能是敬汉卿（他赢了是应该的），只能是户晨风（他输了也是赢家）。他为这场战争付出的代价是：从"给钱让花的那个人"变成了"那个和敬汉卿吵架的人"。这两个标签之间，差了整个购买力系列的全部诚意。</p><p>被封禁之后，他去不了街头了。购买力系列停更了。"户圣"的称号是对他被封禁的纪念，也是对购买力系列的一种告别。互联网封了一个"说太多的人"，但它的代价是关掉了那台观察普通人钱袋子的摄像机。这件事的价值——比他和敬汉卿吵了什么都大。</p>
