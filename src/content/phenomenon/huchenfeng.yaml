comment: >
  <b>户晨风</b> · 1998年生·江苏镇江·高中毕业·前汽车维修工·<b>“安卓人”发明者</b><br><br>
  户晨风（1998年—），中国大陆网络红人、主播。他的走红路径分明显的两个阶段：<b>第一阶段是“购买力挑战”——随机给陌生人钱并采访他们，测试购买力；第二阶段是“安卓/苹果论”——用手机品牌标签构建“鄙视链”，引爆全网争议。</b><br><br>
  2023年2月，他辞去工作成为全职自媒体创作者。同年3月14日，他发布了一段<b>「养老金购买力挑战」</b>视频：遇到一位78岁老人，每月只有107元退休金。这段视频迅速在中国互联网引发巨大反响，中国底层百姓艰难的生活困境被赤裸裸地展示了出来。这也是“购买力挑战”系列的开端——从100元购买力到全球购买力挑战（韩国首尔一天最低工资、泰国曼谷100元人民币、香港洗碗工一天工资），他通过给陌生人钱+采访的方式，把“钱能买什么”做成了一个现象级内容品类。<br><br>
  2023年7月起，他开始在视频中公开自己的月收入和税单。他的直播内容转向连麦讨论时事，言论日趋大胆：主张学校铁路医院私有化、称麦当劳比大多数中国家庭的年夜饭好吃、“超市就去山姆，电车就是特斯拉，手机就是苹果”。这些言论让他收获了大量粉丝，也让他多次被短暂禁言。<br><br>
  2025年，他发明了<b>“安卓人”“苹果人”</b>这套话语体系——将一切事物粗暴分为安卓（低端、劣质）和苹果（高端、优质）两类：安卓人、安卓学历、安卓素质、安卓态度、安卓房、安卓车……这套话语在年轻人中疯狂传播，也让他赚到了此前无法想象的收入——祝福陌生人“越来越苹果”的短视频业务，一条2999元。他在直播中自曝月收入突破<b>60万元</b>。<br><br>
  但“危险流量”终于引爆了。2025年9月16日，“户晨风被封”登上热搜；9月20日，他在微博、B站、抖音、快手等所有平台的账号被清空封禁。封禁原因：“违反相关法律法规”，“恶意挑动群体极端对立、宣扬暴力戾气等负面情绪”。他被戏称为<b>“户圣”</b>——一个包涵复杂情感的封号。留几手的评价最精准：“把这么一群人聚在一起瞎折腾，解构行业，解构阶层，把很多严肃的东西戏谑化，本身就是一种敏感。”
