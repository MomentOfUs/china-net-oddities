  bio:
  - 1998年生于江苏镇江，高中毕业；2017-18年从事汽车维修；2019年考取基金经理资格证，入职5月后离职
  - 2023年2月起转为全职自媒体创作者
  - 2023年3月14日发布<span class="hl">「养老金购买力挑战」</span>——78岁老人月退休金107元——视频引爆互联网
  - "“购买力挑战”系列由此成型：随机给陌生人钱并采访，测试购买力"
  - 后扩展为<span class="hl">「全球购买力挑战」</span>：韩国首尔一天最低工资、泰国曼谷100元、香港洗碗工一天工资
  - 2023年7月起公开月收入和税单，直播连麦讨论时事，言论日趋大胆
  - 2025年提出<span class="hl">「安卓人」「苹果人」</span>话语体系——将一切分为低端/高端，引爆全网
  - 推出“祝福陌生人越来越苹果”短视频业务，2999元/条；自曝月入破60万
  - 争议言论包括：主张私有化学校铁路医院、麦当劳比年夜饭好吃、超市就去山姆等
  - 2025年9月20日<b class="hr">全网封禁</b>，所有账号被清空——原因：恶意挑动群体极端对立
  - 封禁后被戏称<span class="hl">「户圣」</span>；留几手：“把严肃的东西戏谑化，本身就是一种敏感”
