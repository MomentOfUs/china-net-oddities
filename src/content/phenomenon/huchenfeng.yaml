comment: |-
  <b>时政民生争议博主</b> · 户晨风 · “安卓人”发明者<br><br>户晨风，本名不详，1998年出生于江苏省镇江市的一个普通工薪家庭。他高中毕业后未能继续深造，便步入社会谋生。在2017年至2018年期间，他主要在当地从事汽车维修工作，每天与机油和零件打交道。为了改变命运，他在2019年自学并通过了基金经理资格证考试，展现出了对社会经济运行及资本分配逻辑的强烈兴趣，随后决定辞去体力工作，全职投身自媒体创作赛道。<br><br>2023年2月起，户晨风开始在B站、抖音等平台发布视频。2023年3月14日，他发布了一期名为“养老金购买力挑战”的视频：他在街头偶遇了一位78岁、每月仅靠107元退休金维生的贫困老人，并带她去超市购买生活用品。这段极其真实、未加修饰的底层民生纪实视频迅速在网络上引爆，直观地揭示了社会保障体系下部分边缘群体的生存困境。该视频在斩获巨大流量的同时，也让户晨风迅速走红，成为以“购买力挑战”为核心标签的时政与民生类大UP主。<br><br>在2023年至2025年的巅峰期，户晨风的全网粉丝量突破 200 万，自曝月收入一度高达 60 万元。他将挑战模式扩展为“全球购买力挑战”，远赴韩国首尔、泰国曼谷、中国香港等地，以一天最低工资或100元人民币的购买力为切入点，对比不同地区的消费水平和社会福利。2025年初，他创造了“安卓人/苹果人”的话语体系，将手机品牌粗暴地作为划分个人学历、财产、素质和思维逻辑的标签，宣称“你是典型的安卓人”并推出每条2999元的“祝你越来越苹果”有偿定制视频。这一极具阶层歧视与群体对立性质的模因在青年网民中引发了海量模仿与激烈争论，甚至吸引了《联合早报》等主流媒体的关注和分析。<br><br>户晨风内容中长期存在的激进政治与社会主张，使其始终处于舆论风暴眼。他曾在直播中发表“麦当劳比大多数中国家庭年夜饭好吃”、“学校铁路医院应该私有化”等极具煽动性的暴论，引起了网民的强烈声讨。知名网络评论家留几手曾锐评他“把严肃的东西戏谑化，本身就是一种敏感”。随着其在直播连麦中讨论时事时的尺度失控，以及涉嫌恶意挑动不同社会群体之间的极端对立，各大平台对其进行了多次短暂禁言警告，但他并未收敛。<br><br>2025年9月20日，在舆论的持续发酵和监管警示下，户晨风在微博、B站、抖音、快手等国内所有社交平台上的账号遭遇全面封禁，所有内容被悉数清空，账号搜索结果归零。由于他在封禁后被网民带有反讽性质地戏称为“户圣”，其账号的消亡标志着他彻底退出了国内的内容创作市场。他的起落轨迹表明，将社会分配、阶层差异等严肃的时政议题进行娱乐化标签和商业化变现，在中文互联网上具有极高的合规风险。
