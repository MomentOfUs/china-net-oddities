comment: <b>户晨风</b> · B站UP主 · 数码区 · "户圣"<br><br>户晨风是B站2024-2025年最具争议性的UP主之一。他的起点并不特别——一个普通的数码区UP主，评测手机、讨论科技产品，风格属于"敢说真话"类型。但这条路很快就走偏了：他的"真话"越来越尖锐，话题从科技延伸到社会、从社会延伸到政治，尺度越拉越大。<br><br>2025年是他爆发的一年。他与900万粉的敬汉卿因手机和新能源汽车问题爆发公开骂战，双方的争论从产品参数上升到人身攻击，最终演变成B站年度大戏。与此同时，他与峰哥（同为B站UP主，已收录入馆）多次对线，后者在直播中对他进行尖刻点评。"线下陪玩收费5000元一小时"的争议更是让他的名声冲出数码圈，进入社会新闻的范畴。<br><br>他的"户晨风严选"系列是他最标志性的内容——他选择特定的社会议题、产品、事件进行"严选评价"，语气不容反驳，立场极端明确。这种风格吸引了大量认同他观点的粉丝——也有人认为他只是通过极端言论收割流量。极客湾的观众曾专门提问"怎么看待户晨风"，说明他在科技圈的影响力已经大到头部频道不得不回应。<br><br>2025年9月，B站以"发布不实信息"为由封禁了他的账号。封禁之后，互联网上出现了一个奇特的讽刺现象：他被一部分人戏称为"户圣"——"敢说真话的圣人"——这个称号既包含真诚的拥护，也包含嘲讽的玩梗。馆长专门出了一期视频评价他，称他的封禁"一针见血"。<br><br>户晨风的故事是中国互联网内容生态的一个经典案例：当一个内容创作者发现"说真话"（或者"说观众想听的真话"）是流量密码，他会不断加码，直到越界。平台在流量的诱惑和风险的考量之间摇摆，最终在某个节点按下封禁键。然后他倒下了，但"敢说真话"的人设在这个倒下的动作中反而得到巩固——互联网最擅长把被封禁的人变成圣人。
