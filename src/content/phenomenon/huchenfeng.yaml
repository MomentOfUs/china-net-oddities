english_name: HuChenfeng
essay: |
  <p>户晨风不是一个人，是一条完整的流量生产线从上线到关停的全程录像。</p><p>他的起点是购买力挑战——这可能是2023年中国互联网最诚实的内容。一个人走上街头，给陌生人钱，问他们能买什么。78岁的老人，每月退休金107元，拿到这些钱去买东西——那不是内容创作，是社会学田野调查。这段视频之所以炸裂，不是因为户晨风做了什么，而是因为他什么都没做：他只是把钱递过去，让对方的花费当上了讲述者。107元一个人的一个月能做什么——这个事实本身，比他任何一段直播间的慷慨陈词都有力量一万倍。</p><p>购买力挑战系列的逻辑是「揭示」。全球版也一样：韩国首尔一天最低工资的购买力、泰国曼谷100元人民币的购买力、香港洗碗工一天工资的购买力。他展示的不是消费差异——在全球化的表层下，不同国家同样的一小时、同样的劳动、换到了完全不同的东西。这个系列让他成为一个「发现者」——他找到了一个让观众自己得出结论的绝佳装置。</p><p>然后他发明了「安卓人」。这套话语体系其实是他内容逻辑的必然延伸：一个善于「发现差异」的人，自然而然就会开始「定义好坏」。购买力挑战让人看到「不同阶层的人分别能买什么」，安卓/苹果论则直接说「你是哪个阶层的」。前者是一面镜子，后者是一把尺子。镜子里看到的是事实，尺子量出来的是审判。从发现者变成定义者，从田野调查变成贴标签——这个转变只需要一步，而这一步决定了他的命运。</p><p>留几手说得最透：「把这么一群人聚在一起瞎折腾，解构行业，解构阶层，把很多严肃的东西戏谑化，本身就是一种敏感。」户晨风的内容逻辑是「把一切变成段子」——这个逻辑在购买力挑战上完美成立，因为这确实是一个关于生活的黑色幽默。但当他把这套逻辑用在「苹果人」「安卓人」「山姆超市」「特斯拉」上的时候，他制造的不是幽默，是战场。他给每个事物贴上了敌我标签，然后把选择权交给了观众：你是哪边的？</p><p>他的结局也因此注定。2025年9月20日，全网封禁，账号清空。一个测了两年「100元能买什么」的人，最终证明了一件事——当流量足够危险的时候，平台的容忍度值多少钱。答案：不值60万。</p>
footer: "数据源：维基百科/联合早报/广州日报/浙江日报潮新闻/留几手/王玮晨"
