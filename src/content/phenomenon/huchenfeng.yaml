english_name: HuChenfeng
essay: |
  <p>2023年8月，成都市，菜市场门口。一个青年对着镜头展示当天的采购成果：一小把青菜、三个土豆、半斤猪肉、一袋两块钱的挂面。他报出了总价：二十七块三。然后他认真地对镜头说："二十七块三，够我吃两顿。"弹幕上有人回复他："可以了，我这一顿外卖四十。"他看了一眼弹幕，没有接话。他拍的不是探店的精致视频——他拍的是普通人每天的基准物价。一个土豆多少钱、一升油多少钱、一斤排骨多少钱——这些信息在互联网上是最常见也最稀缺的数据。说它常见，是因为每个人都在花钱。说它稀缺，是因为没人把它当内容拍。</p><p>户晨风的拍摄方法是一条直线：直立行走，固定在菜市场或超市，画质无需修饰，剪辑长度按需要。他不对物价发表评论，不评价通胀，不对比去年。他的视频里甚至没有旁白。字幕有时有有时没有。菜价就拍在菜价区，肉价就拍在肉价区。然后回家，做饭，拍自己吃。这条线走到尽头时，他看到了一堵墙。</p><p>争议始于一条拍他的买菜视频被截取传播。画面配了各种文案：\\"成都物价低到离谱\\""一个年轻人靠一百块过一周"。这些截取配文形成了与成都当时实际物价的尖锐对比。有人在评论区贴出了一线城市猪价的截图——户晨风的视频没有解释价格差异的形成原因，没有标注地域属性，没有说明是否在打折时段购买。他不是经济学家，他只会举着手机把钱收据拍下来，然后说："我花的就这么多。"这条视频被以他的名义推向了舆论的风口，但他本人在视频里从未表达过任何观点。他没有说任何话——这是最好也是最坏的辩护。</p><p>平台限制了他的推流，理由不明。他的视频至今仍然被反复搬运，每一次搬运转折都会加上新的文案。他什么都没说——但互联网不需要他说话就已经替他完成了所有表达。今天，他的账号还在更新，点赞量稳定在四位数。菜市场的阿姨不知道他在拍视频，一条鱼多少钱还是多少钱。拍的人还在拍，买的人还在买。没有比这更能说明这条视频为什么有用的了。</p>

