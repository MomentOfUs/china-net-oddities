comment: |-
  <b>英雄联盟职业选手与主播</b> · 卢本伟 · Wh1t3zZ · 五五开 · 全网封禁<br><br>卢本伟（游戏ID为Wh1t3zZ，俗称“五五开”），1993年8月11日出生于香港。在电子竞技尚未得到社会广泛认可的年代，卢本伟少年时期由于家庭原因，将大量精力寄托于网络游戏。他凭借超群的游戏天赋被电竞战队发掘，只身前往内地开展职业选手生涯，曾效力于IG、皇族等多支早期顶级《英雄联盟》（LOL）战队，担任中单位置。<br><br>2013年，卢本伟作为皇族战队（Royal）的中单主力，代表中国赛区杀入第三届《英雄联盟》全球总决赛（S3）。在总决赛前夕接受采访时，面对关于与韩国顶级中单选手Faker的对比，卢本伟自信地回应称“我和他五五开吧，我也经常杀他的”。尽管最终皇族战队以1比3不敌SKT夺得亚军，但他的这句“五五开”却成为了中文电竞圈经久不衰的名梗，也直接确立了他标志性的个人网络标签。同年底，卢本伟宣布退役，转型为全职游戏主播并签约斗鱼直播平台。<br><br>在2015年至2017年的巅峰期，卢本伟成为了名副其实的“斗鱼一哥”和游戏直播行业的绝对顶流，拥有千万级粉丝。他的直播风格极具爆发力和娱乐反差，创造了如“难受啊，马飞”、“给阿姨倒一杯卡布奇诺”、“十七张牌你能秒我”等风靡中文互联网的经典流行语，至今仍是鬼畜区和日常表情包的常客。在此期间，他与女友赵梦玥（UU妹）深度绑定，其个人年收入估算达数千万元。<br><br>卢本伟的覆灭源于2017年底的“开挂风波”。2017年10月，在射击游戏《绝地求生》（吃鸡）爆火的背景下，卢本伟在直播中展现出了多次极其反常的精准射击操作，被多名B站UP主和技术网民质疑使用外挂。面对质疑，性格急躁且拥有庞大粉丝群的卢本伟采取了极端的公开自证与网络对抗策略，坚称“我卢本伟没有开挂”。2017年12月，为了反击质疑，卢本伟在成都举办了一场线下粉丝见面会。在见面会上，他情绪失控，公开教唆并煽动现场大批未成年粉丝，使用极其污秽、恶毒的语言录制视频辱骂质疑者。这一教唆群体网暴的行为瞬间性质升级，引爆了全网舆论的强烈声讨。2018年1月，央视《焦点访谈》点名批评了卢本伟教唆粉丝谩骂的恶劣行为。<br><br>在国家级主流媒体和监管部门的介入下，2018年2月12日，卢本伟被国家行业主管单位实施全平台永久封禁，斗鱼、B站、微博、抖音同步对其账号实施了注销和影像清理。截至2026年，卢本伟在互联网上依然处于“不可复出”的绝对禁忌状态，任何关于他的视频或姓名提及均可能面临平台合规审查。然而，这种彻底的物理抹除，反而使他在大批老粉丝中被幽灵化和神圣化，成为了中国直播粗放野蛮发展期向合规法治期过渡的标志性时代祭品。
essay: |
  <p>2017年12月成都某酒店的粉丝见面会上，卢本伟站在镁光灯中央，面色通红地挥舞着手臂，教唆台下那群多数未满十八岁的年轻粉丝，对着镜头骂出极其难听的脏话。台下的少年们狂热地附和着，声音在宴会厅里回荡。这段视频被迅速上传至网络，彻底跨过了电竞圈的边界，将他直接送进了央视《焦点访谈》的画面中。</p><p>卢本伟的爆红是早期游戏直播行业野蛮生长与斗鱼平台流量垄断机制碰撞的核爆产物。从LOL世界亚军退役，他在算法的托举下迅速成长为拥有千万粉丝的“斗鱼一哥”，其标志性语录成为中文互联网的公共语言。算法以数千万的身价奖励他在镜头前的疯狂叫嚣，将他确立为游戏直播时代的绝对之王。</p><p>然而，在极度膨胀的名利中，卢本伟很快在流量的挟持下走向了自毁的深渊。面对开挂质疑，他没有选择理性的自证，而是试图利用粉丝对他的狂热偏爱来绑架舆论，甚至在粉丝聚会中教唆青少年公开辱骂异见者。<span class="hl">这一挑战社会公序良俗底线的行为，彻底暴露了他缺乏基本德育与社会责任感的职业底牌，使其信誉大厦在一夜之间土崩瓦解。</span></p><p>2018年初，央视《焦点访谈》对其进行点名定性，指责其利用影响力诱导青少年网络暴力。国家相关部门随即对其下达了全网永久封禁的顶格处罚，将其在国内主流直播平台上的肉身进行了彻底的物理清除。这场下坠宣告了他作为行业顶流的商业生命彻底消亡。</p><p>截至2026年，卢本伟在互联网上已被禁播整整八年。虽然电竞圈仍时常流传着关于他“五五开”的鬼畜梗和复出谣言，但他本人已无法在主流平台上公开获取一分钱的流量收益。那个曾经在屏幕前叫嚣的主播之王，如今只剩下一堆陈旧的鬼畜切片和一片荒凉的封禁废墟，无声地躺在档案馆最阴暗的角落里。</p>

relics:
  - name: S3总决赛亚军奖牌
    desc: 2013年洛杉矶斯台普斯中心，皇族战队1:3负于SKT后领取的亚军奖牌。卢本伟职业生涯的最后一块勋章——从此之后，他再也没有以"选手"的身份出现在比赛场上，而是以另一种姿态成为中国游戏直播历史的一部分。
  - name: 斗鱼直播间截图（140万在线）
    desc: 2016年卢本伟直播间的同时在线数据截图。140万在一个没有疫情红利的年代是一个令人震惊的数字——这个数字让他成为斗鱼一哥，也成为平台不敢也不能保他的原因——匹夫无罪，流量太肥。
  - name: 全平台封禁通知
    desc: 2018年2月12日，斗鱼、B站、微博、抖音同步发布的封禁声明。这是中国互联网史上第一次对一个主播执行"全平台五方会审"级别的封杀。从此以后，卢本伟这个名字开始了他从互联网生态系统中的物理删除。

glossary:
  - key: 五五开
    val: 卢本伟的游戏ID Wh1t3zZ的中文外号。传说S3总决赛前他与Faker训练赛胜率五五开，虽经多方考证为叙事虚构，但"能和Faker五五开的中单"已经成了LOL考古学的经典传说。
  - key: 你强任你强，我吃你三狼
    val: 卢本伟直播间最著名的骚话之一。这句台词完美概括了他的直播风格——用最猖狂的语气说着最不正经的内容，技术流与娱乐性在他身上达成了微妙的平衡。
  - key: 给阿姨倒一杯卡布奇诺
    val: 卢本伟直播《H1Z1》时对队友说的经典台词。这句话后来成为B站鬼畜的超级素材，也是他直播内容"游戏之外还有戏剧"的最佳证明——他能把任何一句毫无意义的台词变成互联网流行语。
  - key: 十七张牌你能秒我
    val: 卢本伟直播斗地主时的名场面——手持十七张牌时自信喊出的台词，随即被对手秒杀。这个反转式打脸场面成为他直播生涯最著名的表情包之一，也是"嘴硬"与"事实"之间永远存在张力的互联网隐喻。

