comment: '<b>1993</b> · 香港 · 卢本伟 · 曾是斗鱼一哥<br><br>他是中国游戏直播史上最传奇也最悲情的人物。<br><br>2013年，他以皇族中单的身份杀入S3全球总决赛，对阵Faker的SKT。那场比赛他输了——1:3，亚军。但那个亚军含金量极高：皇族从小组赛一路杀到决赛，卢本伟是队伍最稳定的Carry点。退役后他转型直播，凭着退役选手的身份、天生的综艺感和满嘴骚话，迅速在斗鱼崛起。2016-2017年是他的巅峰期，直播间同时在线一度达到140万——一个在当时看起来很离谱的数字。他的金句满天飞——"你强任你强，我吃你三狼""难受啊马飞""给阿姨倒一杯卡布奇诺"——几乎每句话都能上热搜。他是斗鱼当之无愧的一哥，也是中国游戏直播行业的奠基人之一。<br><br>2017年10月，绝地求生火遍全网，卢本伟在直播中展现了一系列被认为"非人类操作"的吃鸡镜头。质疑声起，愈演愈烈——从弹幕到论坛到整个B站。卢本伟和女友UU妹选择了正面硬刚：直播自证、发律师函、各种对线。舆论完全失控，每一次自证都催生更多质疑。最后他做了一个毁灭性的决定——在2017年12月的线下粉丝见面会上，教唆粉丝录制视频辱骂质疑者。那些视频在网络上疯传，舆论从"开挂"演变为"教唆"。<br><br>2018年1月，央视《焦点访谈》点名批评卢本伟粉丝见面会事件。一个月后的2018年2月12日，斗鱼、B站、微博、抖音——全平台同步永久封禁。没有上诉，没有解释，没有重来的机会。<br><br>他的消失比封杀本身更彻底。整个互联网关于他的所有视频、直播录像、二创——被系统性地清理了几轮。现在在B站搜"卢本伟"，结果是零。他的名字成了一种"不可名状的存在"——粉丝叫他"本伟"、"那个人"、"开哥"。他是中国互联网上被删得最干净的人之一，一个曾经站在行业巅峰的名字，如今只能以暗语存在。'

essay: |
  <p>卢本伟是中国游戏直播行业的第一条完整抛物线——从职业选手到直播天王，再到全网封杀，这条弧线几乎是行业史的缩影。</p><p>2013年的S3亚军是他职业生涯的巅峰，也是他身份转折的跳板。退役后他比任何现役选手都更理解"游戏"的含义——游戏不只是竞技，更是内容。他的直播风格在2015-2017年间定义了"斗鱼一哥"的标准：既要技术，又要综艺感，还要有持续的内容输出能力。他的成功看起来理所当然——退役选手身份是背书，骚话是天赋，直播时长是勤奋。但恰恰是他的成功过于完美，完美到让后来者看到了"复制"的可能性。</p><p>开挂风波是卢本伟命运的转折点。但他被摧毁的导火索不是开挂，而是他对质疑的反应。在面对大众质疑时，他选择了一种完全不符合"顶流主播"身份的策略——无视流程、情绪化对抗、求助于粉丝暴力。粉丝见面会上教唆骂人这个决策，既暴露了他对公众人物的认知缺失，也宣告了他无法驾驭自己创造的流量。他成了第一个被自己流量反噬的人。</p><p>央视《焦点访谈》的点名是事件升级的分水岭。当一个主播的名字出现在一档国家级新闻评论节目上时，他的命运就已经不由平台或个人决定了。2018年2月12日的全平台封禁是对这种"不确定的危险样品"的标准化清理——平台不会为任何一个主播承担政策风险，哪怕他是平台自己捧出来的顶流。</p><p>卢本伟消失之后，中国游戏直播行业进入了一个新的阶段——每个顶流都看清了那条红线。但更黑色幽默的是，卢本伟的"不可提及"反而造就了一个幽灵般的存在——他的名字被删除得越干净，他在粉丝心中的地位就越神圣。B站上那些以"某某某""知名不具"为标题的考古视频，每一帧都在诉说着一个事实：互联网可以删除一个人，但删除本身留下了一个更大的黑洞。</p><p>卢本伟的结局是整个行业的一面镜子——你可以在算法里活，就必须接受在规则里死。</p>

relics:
  - name: S3总决赛亚军奖牌
    desc: 2013年洛杉矶斯台普斯中心，皇族战队1:3负于SKT后领取的亚军奖牌。卢本伟职业生涯的最后一块勋章——从此之后，他再也没有以"选手"的身份出现在比赛场上，而是以另一种姿态成为中国游戏直播历史的一部分。
  - name: 斗鱼直播间截图（140万在线）
    desc: 2016年卢本伟直播间的同时在线数据截图。140万在一个没有疫情红利的年代是一个令人震惊的数字——这个数字让他成为斗鱼一哥，也成为平台不敢也不能保他的原因——匹夫无罪，流量太肥。
  - name: 全平台封禁通知
    desc: 2018年2月12日，斗鱼、B站、微博、抖音同步发布的封禁声明。这是中国互联网史上第一次对一个主播执行"全平台五方会审"级别的封杀。从此以后，卢本伟这个名字开始了他从互联网生态系统中的物理删除。

glossary:
  - key: 五五开
    val: 卢本伟的游戏ID Wh1t3zZ的中文外号。传说S3总决赛前他与Faker训练赛胜率五五开，虽经多方考证为叙事虚构，但"能和Faker五五开的中单"已经成了LOL考古学的经典传说。
  - key: 你强任你强，我吃你三狼
    val: 卢本伟直播间最著名的骚话之一。这句台词完美概括了他的直播风格——用最猖狂的语气说着最不正经的内容，技术流与娱乐性在他身上达成了微妙的平衡。
  - key: 给阿姨倒一杯卡布奇诺
    val: 卢本伟直播《H1Z1》时对队友说的经典台词。这句话后来成为B站鬼畜的超级素材，也是他直播内容"游戏之外还有戏剧"的最佳证明——他能把任何一句毫无意义的台词变成互联网流行语。
  - key: 十七张牌你能秒我
    val: 卢本伟直播斗地主时的名场面——手持十七张牌时自信喊出的台词，随即被对手秒杀。这个反转式打脸场面成为他直播生涯最著名的表情包之一，也是"嘴硬"与"事实"之间永远存在张力的互联网隐喻。

