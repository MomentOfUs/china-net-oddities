english_name: Fengge (Zhou Lifeng)
essay: <p>峰哥拍过一条出圈的视频：山东一个精神疾病患者，坐在镜头前用勺子舀空气吃饭。画面安静，尴尬，持续了十分钟。弹幕在笑。但笑完之后评论区沉默了很久——没人说清楚峰哥是在做社会调查，还是在消费一个病人。</p><p>这个问题追了他五年。他拍流浪汉、拍26岁癌症青年在出租屋里等死、拍台风吹垮的烂尾楼、拍缅甸诈骗园区里被人用枪顶着头的中国人。他的镜头永远对准社会最边缘的角落，而且从来不解释自己为什么要拍。你问他，他就回你一句"这是好事儿啊"——他的第二口头禅。</p><p>2023年9月，他去了一趟缅甸，拍了一集"生死36小时"。他说自己被持枪人员挟持过，差点被当场枪毙，起飞回国时哭了十多分钟。有人扒细节说缅甸签证时间对不上，断定他是编的。但更多人不在乎——因为在观众心里，他已经不是一个博主了，是一个"亡命天涯"的角色。角色的产出应当符合角色的逻辑。真不真不重要，"好玩"就值了。</p><p>2024年，全平台一起关了他的门。微博、B站、抖音、小红书全面禁止关注。没有明确原因，只有一句"违反相关法律法规"。一个总是在拍边缘的人，最终自己也被赶到了边缘。</p><p>被封之后他转了股市，2026年拿着手机截图说赚了一个亿。"这是好事儿啊"——这句话从他嘴里说出来，永远有效。你永远无法证明峰哥说的任何一件事是真的还是假的。而这一点，恰恰是他最像这个时代的地方。</p>
