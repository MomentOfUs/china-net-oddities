english_name: Fengge (Zhou Lifeng)
essay: <p>峰哥亡命天涯是中国互联网最难以归类的产物——他不是纯粹的猎奇博主，不是严肃的纪录片导演，不是段子手，不是调查记者。他什么都是，也什么都</p><p>不是。而这种"无法被定义"本身，就是他全部价值的来源。</p><p>拍精神病患者用勺子舀空气吃饭、蹲在路边和流浪汉分烟、记录26岁癌症晚期青年在出租屋里的最后时光——峰哥的镜头永远对准社会的裂缝。问题在于：他是在拉近距离，还是在消费距离？这是峰哥身上最大的道德悬疑。他从来不解释。你问多了，他就回你一句"这是好事儿啊"——他的第二口头禅。这个回答比任何辩解都更锋利：当一个人把所有质疑都消解在"好事儿"里，你无法知道他是真的豁达，还是用豁达当护身符。</p><p>2023年的缅北之行把这种撕裂推到了极致。他自述被持枪人员挟持、差点被当场枪毙、起飞回国时哭了十多分钟。有人信，有人不信，更多人不在乎——因为在戈夫曼的拟剧论框架下，峰哥的前台表演已经完美到观众不再区分真假：他建构了一个"亡命天涯"的人设，而这个人设的所有产出——包括缅北——都必须服从于这个角色的逻辑。真假不重要，"抽象"才是本体。</p><p>但真正意味深长的不是缅北——而是随后的事。2024年，峰哥的全平台账号被禁止关注。微博、B站、抖音、小红书，四座城池同时关门。一个猎奇者最终自己成了奇观——不是因为他说了什么，而是因为他的存在方式本身就违反了平台的"正常"标准。他被封禁的原因不是某一条具体的内容，而是一种无法被收编的创作姿态：把镜头对准不该对准的地方，然后用"哈哈哈"来回应一切。</p><p>被封之后他转了股市，2026年拿着账户截图说"赚了一个亿"。"这是好事儿啊"——这句话从他嘴里说出来，永远有效。他可能是真赚了，也可能是抽象输出还在继续。对于峰哥，你永远无法证明任何一件事是真的还是假的。而这一点，恰恰是他最像这个时代的地方。</p>
