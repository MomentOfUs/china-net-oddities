english_name: Fengge (Zhou Lifeng)
essay: <p>峰哥拍过一条视频：山东一个精神疾病患者坐在镜头前，用勺子舀空气吃饭。画面安静、尴尬，持续了十分钟。弹幕在笑，但评论区沉默了很久。</p><p>没人说清楚他是在做社会调查还是在消费一个病人。这个问题追了他五年。但峰哥的身份远比这个问题复杂——在拿起镜头之前，他做了五年程序员，在巨人网络参与研发《征途2》。他的老板是史玉柱，那个用"脑白金"洗脑了全中国的男人。峰哥从史玉柱身上学到了两件事：市场营销的本质是洞察人性，以及——不要把自己太当回事。</p><p>2023年的纪录片《隐居》是他创作生涯的顶点。他花了几个月时间深入云南大山，记录了一个在深山中独自生活了二十多年的隐士。这部片子获得了一致好评——因为拍它的人知道什么该拍、什么不该拍。他是一个被严重低估的纪录片导演，只不过他自己把导演身份藏在了猎奇博主的皮套下。这种身份错位本身就是他作品的一部分——一个能拍出《隐居》的人，同时也在拍"路边流浪汉尬聊"系列。两个标签放在同一个人身上，互联网的处理方式只能选择忽略其中一个。</p><p>被封之后他转战YouTube，账号"峰哥亡命天涯"继续更新。去缅甸、去尼泊尔、去那些正常创作者不会去的地方。2025年的一条视频里，他站在暴雨中拍尼泊尔贫民窟，浑身湿透，镜头纹丝不动。弹幕刷过一句话："他不是在拍人类，他就是人类本身。"——说得比任何影评都准。没有比这更峰哥的评价了：你在定义他的时候，他已经在定义下一件事了。</p><p>2026年，峰哥的YouTube粉丝突破了50万。他的镜头比以前更稳了，话比以前更少了。那个曾经满嘴网络黑话、怼天怼地的抽象博主，在经历了封禁、转平台、持续输出之后，沉默了下来——不是因为没话说了，是因为他意识到镜头本身比他说的任何话都更有力量。抽象不是一种表达方式，是一种成长的结果：当你经历了足够多，你就会发现，最好的表达就是不表达。</p>
