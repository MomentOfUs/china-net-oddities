english_name: Fengge (Zhou Lifeng)
essay: <p>峰哥拍过一条视频：山东一个精神疾病患者坐在镜头前，用勺子舀空气吃饭。画面安静、尴尬，持续了十分钟。弹幕在笑，但评论区沉默了很久。</p><p>没人说清楚他是在做社会调查还是在消费一个病人。这个问题追了他五年。但峰哥的身份远比这个问题复杂——在拿起镜头之前，他做了五年程序员，在巨人网络参与研发《征途2》。他的老板是史玉柱，那个用"脑白金"洗脑了全中国的男人。峰哥从史玉柱身上学到了两件事：市场营销和人性洞察。然后他带着这两样东西去了蜂群文化，从一个底层策划做到合伙人、股东。这段经历解释了他为什么能把镜头对准社会最边缘的角落，还让几百万人看得停不下来——他太清楚什么内容能抓人了，因为这是他的专业。</p><p>2023年下半年，他去了一趟缅甸妙瓦底。回来之后说自己在那边被持枪人员挟持，差点被枪毙，起飞回国时哭了十多分钟。有人查了签证时间线说对不上，于是这是一场自导自演的争论爆发。但更多的人不在乎——因为在他们心里，峰哥早已不是一个博主，是一个亡命天涯的角色。角色的产出应当符合角色的逻辑。好故事不必是真的，只要它像真的就行。</p><p>2024年1月，他发了一条微博：要去冲击珠穆朗玛峰，正式无限期退出互联网。粉丝们还在感动，第二天全平台账号被禁止关注——原来他早就知道自己要被封了。一个总是拍边缘的人，最终自己也被赶到了边缘。</p><p>被封之后他转了股市。但他炒股的方式和他拍纪录片一样神奇：2021年117元买入稳健医疗，一路补仓，2025年38元卖出。网友送他外号"A股反向指标"。2026年他拿着手机截图说赚了一个亿，没人知道是真是假。"这是好事儿啊"——这句话永远有效。你永远无法证明峰哥说的任何一件事是真的还是假的。而这一点，恰恰是他最像这个时代的地方。</p>
