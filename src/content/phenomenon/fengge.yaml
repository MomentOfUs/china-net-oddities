comment: 峰哥，原名周丽峰，1986年生。他是B站抽象文化的集大成者，也是中国互联网最奇特的内容创作者之一——你不能定义他是做啥的，但他的每一个视频都在定义"抽象"本身。<br><br>他的视频以访谈和猎奇内容闻名：拍流浪汉、拍精神病、拍底层、拍缅北诈骗园区、拍台风吹垮的烂尾楼。他不是在猎奇，他就是奇观本身——一个开着破车满中国跑、逮着谁就尬聊、把镜头怼到最尴尬的角落的男人。<br><br>他同时拥有几重身份的撕裂感：国家一级登山运动员 vs 蹲在路边和流浪汉分烟的博主；蜂群文化合伙人（正经MCN老板）vs B站抽象区一哥；纪录片导演（拍过口碑不错的《隐居》）vs 被全网当乐子的"峰哥亡命天涯"账号持有者。这种身份的浓度在中国互联网上找不到第二个人——他不是某种人，他是所有撕裂面的合集。<br><br>2023年，他发布了纪录片《隐居》获得好评。同年9月，他亲历缅甸生死36小时，起飞回国时哭了十多分钟，这条视频登上热搜。然而同年底，他的多平台账号因"违反法律法规"被禁止关注，微博、B站、小红书、抖音全面封禁。<br><br>"资本峰"、"婆罗门"——网友给他贴的标签。他不在乎。他说："哈哈！是这样的！"<br><br>被封之后他也没闲着。他转战YouTube继续拍——去尼泊尔、去新疆、去各种没人去的地方。他的视频质量越来越高，抽象度反而降低了——也许是因为真正的抽象不是刻意为之的，是被封过后还能"哈哈"一声继续往前走的姿态。2025年他在YouTube上发的视频已经有了稳定的几十万播放量。没有人知道他到底是活明白了，还是从来就没糊涂过。
