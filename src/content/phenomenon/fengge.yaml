english_name: Fengge (Zhou Lifeng)
essay: <p>峰哥的B站账号简介写着："拍摄世间百态，记录鬼火少年"。</p><p>但他的内容远不止于此。他拍过的最出圈的一条视频，是和山东一位精神疾病患者的对谈。画面里，峰哥举着手机，对方对着镜头自言自语，用勺子舀空气吃饭。弹幕在笑，但看过的人都知道这东西有多沉重——它介于纪实和冒犯之间，没人说清楚峰哥是在做社会调查还是在取乐。</p><p>2023年，他自导自演了一出"缅北生死36小时"。他说自己去缅甸调查电信诈骗，被持枪人员挟持，起飞回国时哭了十多分钟。这条视频让他登顶热搜。有人信，有人不信。但这就是峰哥的魔力——真假不重要，<b>"抽象"才是本体</b>。</p><p>从《抓马侦探》系列短剧的赌场老板，到《隐居》纪录片的导演，从B站抽象区到国家一级登山运动员，峰哥的履历像他的人设一样分裂。但有一点是确定的：<b>他开创了一种没人能复制的"抽象纪实"风格</b>——把镜头怼到中国社会最底层、最荒诞、最边缘的角落，然后什么都不说，让你自己看。</p><p>2024年年底，他的账号全面被封。全平台禁止关注。对于这个结局，峰哥的反应大概和他在任何困境中的反应一样：<br><br>"哈哈！是这样的！"</p>
