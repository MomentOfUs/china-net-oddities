relics:
- name: 国家一级登山运动员证书
  desc: 峰哥最具迷惑性的身份认证。一个互联网抽象猎奇博主同时拥有专业登山资质——你永远分不清他哪些是真的，哪些是演的。
- name: 精神疾病患者用餐记录
  desc: 峰哥经典视频中一位精神疾病患者用勺子舀空气吃饭的录制素材。这段素材引发了"消费苦难还是记录现实"的终极争论。
- name: 全平台封禁通知合集
  desc: 峰哥在B站、抖音、微博等平台被封禁的通知截图集合。他记录了别人的荒诞，自己的荒诞却由平台来书写。
glossary:
- key: 抽象
  val: 峰哥内容的核心标签。他的视频游走在真实记录和虚构之间，让观众永远无法确定自己看到的是纪录片还是剧情片。
- key: 资本峰
  val: 峰哥的早期外号。作为前巨人网络程序员，他对资本的运作逻辑比一般抽象博主更清楚。
- key: 婆罗门
  val: 峰哥在B站抽象圈的称呼。象征着他在"猎奇纪实"这个品类中的至高地位。
- key: 是真是假
  val: 峰哥带给观众的核心困惑。当一个视频博主让你永远无法判断内容的真实性时，他的作品就不再是记录，而成为一种新的艺术形式。
