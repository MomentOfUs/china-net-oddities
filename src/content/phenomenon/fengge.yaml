comment: |-
  <b>B站纪实博主</b> · 周丽峰 · 峰哥亡命天涯<br><br>周丽峰，网络ID为“峰哥亡命天涯”（简称“峰哥”），1986年出生于宁夏回族自治区银川市，成长于东北地区。他毕业于计算机相关专业，并在大学毕业后进入IT行业。在成为自媒体创作者之前，周丽峰曾在巨人网络担任了五年的程序员，亲身参与了国民级网游《征途2》的研发工作。随后在上海从事IT策划期间，他开始以文字创作者的身份活跃于豆瓣等社区，凭借撰写独特的旅游与美食体验积累了第一批核心粉丝。此后，他加入了知名MCN机构蜂群文化，并随着公司在资本市场的成功运作而成为公司股东及合伙人，为其后期的自媒体创作奠定了雄厚的资金基础。<br><br>2019年前后，周丽峰开始以“峰哥亡命天涯”为网名在Bilibili（B站）平台发布视频。他凭借敏锐的互联网嗅觉，开创了冷门、猎奇的社会纪实采访赛道。他以极其随性、反精英的姿态，拿着手持摄像机走访中国各地的废弃建筑、街头流浪人员、重度精神障碍患者以及游手好闲的“鬼火少年”，这种不加修饰、充满尴尬对话的独特纪实风格，迅速在充满娱乐化的中文互联网上脱颖而出，被网民视为一种后现代的“社会人类学观察”。<br><br>在2021年至2023年的巅峰期，周丽峰在B站、微博和抖音等平台的粉丝总量超过500万。他创造了诸如“哈哈！是这样的！”、“这是好事儿啊！”等全网模仿的魔性口癖。在此期间，他不仅在多部热门网络短剧中客串演出，还于2023年9月发布了长达67分钟的精品纪实纪录片《隐居》，深入记录了一位在云南大山中独自生活了二十多年的隐士，该片获得了主流舆论的极高赞誉。2023年9月中旬，周丽峰只身前往缅甸边境亲历并报道当地的安全局势与边境危机，其“生死36小时”的硬核纪实报道多次登上微博热搜，自称回国起飞时激动痛哭了十多分钟，这一事件让他的全网知名度达到了顶峰。<br><br>然而，周丽峰内容中长期存在的灰色解构和对敏感社会议题的戏谑化表达，最终引发了监管层面的警惕。他在直播中频繁讨论股市（被网友封为“A股反向指标”，如高位买入稳健医疗大亏）、解构社会阶层对立，以及对底层边缘人群生活状态的猎奇展示，屡次踩在合规边缘。2024年1月，因违反相关法律法规，周丽峰在微博、B站、抖音等主流国内社交平台上的账号遭遇全面封禁，所有账号均被设置为“禁止关注”和内容清空，其在国内的商业变现和流量变现路径宣告中断。<br><br>在国内平台彻底被封后，周丽峰迅速将创作重心转移至海外视频平台YouTube。他继续以“峰哥亡命天涯”为号，拍摄他在尼泊尔贫民窟、印度等地实地走访的猎奇纪实内容。截至2026年，其海外账号粉丝量已突破50万，他虽然告别了国内主流舆论场的喧嚣，但依然靠着独特的反差纪实视角和海外平台的广告分成维持着内容创作。他的经历展现了一个精通互联网规则、游走于监管红线与公众猎奇需求之间的智慧型内容生产者的生存路径。
