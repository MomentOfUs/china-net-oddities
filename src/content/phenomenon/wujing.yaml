glossary:
- key: 吴京
  val: 中国演员、导演。"战狼"系列创造的不仅是票房纪录，更是中文互联网上最具争议性的文化符号。
- key: 战狼
  val: 起初是电影角色名，后来成为中文互联网上的争议性标签。自豪和反讽——语境决定了一切。
- key: 京图
  val: 吴京表情截图的统称。他的表情包数量和质量在影星中遥遥领先。
- key: 含京量
  val: 网友发明的度量单位。一个词同时包含了自豪和戏谑——互联网对宏大叙事最聪明的消解方式。
