english_name: Wu Jing
essay: |
  <p>一九九五年，北京什刹海体校训练馆。二十一岁的吴彬把最后一个动作收住，枪杆啪地拍在地板上。全国武术比赛枪术、对练冠军。一年后他在《功夫小子闯情关》里演了一个会武术的年轻人——没人记得那部电影，但那是他第一条通向世界的光学纤维。起点太亮了，以至于没有人注意到他此后走了多长的夜路。</p><p>他去了香港。港片已式微，他只能在《杀破狼》《男儿本色》里演黄毛反派，出场几场打戏，然后退场。每个动作明星都走过这条路，但吴京走到一半发现路是断的。他手里握着“动作明星”的入场券——但他觉得那张券是假的。一个没有市场定价权的武术冠军，在香港电影工业的末班车上，是倒数第二排靠窗的乘客。</p><p>回到北京之后，他做了一件事。2015年，《战狼》——抵押房产，自编自导自演。没人看好他：一个电视咖拍电影，还拍军事题材，还自己当导演。5.45亿。然后2017年的《战狼2》——56.95亿。他把赌注翻了十倍，赢了十倍。更重要的是，他为后来的中国电影找到了一条没人走过的路：爱国主义商业大片。在《战狼2》之后，“爱国”不再只是主旋律教育的代名词——它成了一种票房保障。</p><p>然后来了“含京量”的计算。B站上每一个镜头都被做成了表情包。每一次创下票房纪录，豆瓣上反对的声音就更响一分。吴京成了一个测量工具——你有多喜欢或者多讨厌他，就代表了你在这个社会的文化坐标。</p><p>吴京不说话。他只拍电影。2024年的《镖人》票房依然过10亿。时间会给他一个答案：要么成为一个时代的符号，要么成为一个时代的注脚。不管哪一种，都不是他自己选的。</p>

