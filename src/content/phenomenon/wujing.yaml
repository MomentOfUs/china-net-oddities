english_name: Wu Jing
essay: <p>吴京的故事是中国电影工业最真实的缩影——从小众到大众，从边缘到主流，从被嘲笑到被仰望，再从被仰望到被解构。</p><p>1974年生于北京，满族正白旗。什刹海体校师从吴彬——和李连杰同一个师父。1994年全国武术比赛枪术、对练冠军。1995年出演《功夫小子闯情关》出道。这是他的第一条路：南下香港，做打星。但港片已式微，他只能在《杀破狼》《男儿本色》里演黄毛反派，几场打戏换来一块"动作明星"的入场券——但他觉得那张券是假的。</p><p>2015年的《战狼》是他赌上全部身家的一搏。没人看好他——一个电视咖拍电影，还拍军事题材，还自己当导演，怎么看都是扑街的命。但《战狼》拿了5.45亿。然后2017年的《战狼2》——56.95亿。他把赌注翻了十倍，赢了十倍。更重要的是，他为后来的中国电影找到了一条没人走过的路：爱国主义商业大片。在《战狼2》之后，"爱国"不再只是主旋律教育的代名词——它成了一种票房保障。</p><p>然后来了解构。B站上"含京量"成了梗。"战狼"从褒义词变成了贬义词再到中性词。吴京的每一个表情都被做成了表情包。他的电影每一次创下票房纪录，豆瓣上反对的声音就更响一分。吴京成了一个测量工具——你有多喜欢或者多讨厌他，就代表了你在这个社会的文化坐标。</p><p>吴京的荒诞不在于他被过度追捧或过度贬低——而在于没人能客观地看他。他是中国当下文化撕裂的完美标尺：喜欢他的人认为他撑起了中国电影工业，讨厌他的人认为他消费了爱国情绪。两边都没说错，两边也都没说全。吴京不说话。他只拍电影。2024年的《镖人》票房依然过10亿。时间会给他一个答案：要么成为一个时代的符号，要么成为一个时代的注脚。不管哪一种，都不是他自己选的。</p>
