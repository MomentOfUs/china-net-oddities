comment: 马保国，1952年生，山东人，"浑元形意太极拳"掌门人。2020年5月17日之前，他只是民间武术界一个不太出名的老人。那一天之后，他成了全中国最红的老人。<br><br>2020年5月17日，马保国在山东一场民间搏击比赛中对阵业余爱好者王庆民。这位自称"太极大师"的老人上场30秒，被击中面部三次倒地，最后一次直接失去意识。整个过程干净利落——一个69岁的太极高手，被一个练了几个月搏击的人KO。<br><br>但真正让他封神的不是比赛，是赛后他发的澄清视频。在视频中，他戴着标志性的黑眼圈，用一本正经的语气说：<b>大意了没有闪、"年轻人不讲武德"、"来骗！来偷袭！我这个六十九岁的老同志"、耗子尾汁</b>。——这些话在24小时内传遍全中国。<br><br>B站上，马保国的鬼畜视频铺天盖地。各类版本：Rap版、电音版、电影版——不讲武德和耗子尾汁成了2020年使用频率最高的网络流行语，连官方媒体都跟着玩梗。<br><br>马保国的荒诞在于：他明明是被KO的那个，但他用一种异常认真的态度，把自己的失败包装成了"对方不讲武德"的故事。这种自信——或者说这种与现实世界的脱节——产生了核弹级的喜剧效果。<br><br>2021年，他尝试趁着热度进入娱乐圈，开设了付费直播、参加综艺。但舆论风向随之转变，人民日报点名批评，各平台对他的内容进行限制。马保国逐渐从公众视野中淡出。<br><br>但不讲武德已经变成了中文互联网的永久遗产。马保国可能不是最能打的武术家，但他绝对是2020年中国互联网最绕不开的那个人。
