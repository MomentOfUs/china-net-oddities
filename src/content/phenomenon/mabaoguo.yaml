english_name: Ma Baoguo (Tai Chi Master)
essay: <p>2020年5月17日，山东淄博的一个民间擂台上，69岁的马保国站到了聚光灯下。他自称浑元形意太极拳掌门人，曾在英国击败过搏击冠军。对手叫王庆民，49岁，一名普通的业余搏击爱好者。30秒内，马保国被击倒三次，最后一次重重摔在地上，失去了意识。</p><p>如果故事在这里结束，它只是传统武术界又一出无人问津的闹剧。但马保国没有让故事结束。赛后，他顶着眼眶淤青，架好镜头，录了一段"澄清视频"。画面里，他用山东口音一字一顿：我大意了，没有闪。年轻人不讲武德。来骗，来偷袭，我这个六十九岁的老同志。耗子尾汁。</p><p>一本正经的认真和荒谬绝伦的事实之间，制造了中文互联网最有效的传播配方：反差。一个被一拳KO的老人，用师父训徒弟的口吻教训对手。不讲武德和耗子尾汁被列为2020年度十大网络用语，B站鬼畜视频数以万计，累计播放量无法统计。</p><p>他被击倒后做的第一件事，不是去医院检查脑震荡，而是架好镜头，对着自己的淤青脸录了一段教学视频。这不是武术家的失误——这是一个内容创作者的本能。</p><p>2020年11月，人民日报发文定调："马保国闹剧，该立刻收场了。"平台限流、直播间关闭、经纪约作废。从全民狂欢到全平台噤声，前后不过六个月。此后，他偶尔在快手小号露面，打打养生拳，做一两次带货。</p><p>今天回头看，那条视频还在。他顶着眼眶淤青，对着镜头说：我大意了，没有闪。</p>
