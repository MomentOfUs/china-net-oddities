essay: |
  <p>2020年5月17日，山东淄博一个民间擂台上，69岁的马保国站到聚光灯下。他自称浑元形意太极拳掌门人。对手叫王庆民，49岁，业余搏击爱好者。30秒之内，马保国被击倒三次。最后一次，他后脑着地，失去意识。</p><p>比赛视频在任何其他年份都不会超过体育频道的通报范围。但这不是它的终点。马保国顶着眼眶淤青，架好家用摄像机的三脚架，录了一段。他对着镜头说：大意了，没有闪。年轻人不讲武德。来骗，来偷袭我六十九岁的老同志。耗子尾汁。他的表情从头到尾没有松动——像一个老师在严谨地批改学生作业。</p><p>一本正经的严肃与事实的荒谬之间的反差，达到了中文互联网内容传播的最高效率。B站鬼畜视频数以万计。不讲武德和耗子尾汁入选2020年度十大网络用语。</p><p>他被击倒后做的第一件事不是去医院检查脑震荡，而是架好镜头录教学视频。这不是武术家的反应——这是一个本能的内容创作者的条件反射。他比任何一个嘲笑他的人都更早意识到：这段淤青脸比他的任何一套拳法都有价值。</p><p>2020年11月28日，人民日报发文：马保国闹剧该收场了。平台限流，直播间关闭，经纪约解除。从全民狂欢到全平台噤声，前后六个月。</p><p>他偶尔在快手小号露面，打养生拳，带几次货。那条澄清视频还在。淤青还在他眼眶上，画面还在，他还在说：大意了，没有闪。反复播放。在每一个设备上，画面始终停留在第一次按下录制键的那一刻。有一些动作保持了原有的惯性。他还在认真教拳，面对空无一人的直播间。每一条弹幕他都回复了。在一个他已经被彻底解构的平台上，他还在做一件互联网无法解构的事：确信。他确信自己是一个武术家。这个信念本身，不需要被理解。他还在打。没有闪，也不知闪给谁看。</p>

