comment: |-
  <b>浑元形意太极拳掌门</b> · 马保国 · 不讲武德 · 耗子尾汁<br><br>马保国，1951年出生于河南省的一个普通家庭。他自称出身武术世家，年轻时曾入伍参军，后进入大学深造。2001年，马保国为了筹集儿子在英国留学的昂贵学费，前往英国教拳谋生。在此期间，他创办了“英国混元太极拳协会”，并宣称曾轻松击败过英国搏击冠军。回国后，马保国以此段经历为噱头，创立了“浑元形意太极门”并出任掌门人，开始在民间开设武馆并传授所谓的传统太极功夫，建立起一种带有神话色彩的传统武术宗师人设。<br><br>2020年5月17日，马保国在山东淄博参加了一场名为“演武堂之决战淄博”的民间搏击比赛。他的对手是一位时年49岁的业余搏击爱好者王庆民。令人意想不到的是，这位号称拥有深厚传武内功的六旬掌门人，在比赛开始后的短短30秒内，被业余选手连续击倒三次并直接打晕休克。比赛视频被传上网络后引发了对于传统武术骗局的大范围调侃。赛后，马保国在眼眶青肿的情况下，亲自录制了一段为自己辩护的解释视频，在视频中他以独特的口音和强硬的态度，指责对手“不讲武德”，并大声辩解称“我大意了，没有闪”。这段极具反差喜感的视频迅速引爆全网，成为了现象级网络模因。<br><br>在2020年下半年的流量巅峰期，马保国成为了全网第一“梗王”。他口中吐出的“年轻人不讲武德”、“耗子尾汁（好自为之）”、“来骗！来偷袭！我这个六十九岁的老同志”等话语，被国家语言监测中心列为2020年十大网络热词。在B站鬼畜区，马保国的素材被网民疯狂二次创作，产出了成千上万个千万级播放量的恶搞作品。在资本和经纪公司的推波助澜下，马保国开始高调宣布进军娱乐圈，承接商业代言、开办付费连麦，甚至签约参演武侠网络电影，流量变现速度惊人。<br><br>马保国以“审丑”和“闹剧”为特征的野蛮变现迅速引发了主流社会的警惕和监管的反制。2020年11月底，官方媒体人民日报发表了题为《马保国闹剧，该立刻收场了》的评论员文章，严厉痛批马保国通过宣扬荒诞、低俗价值观来哗众取宠、收割流量的行为，称其“丢人现眼”并警告资本切勿为了利益为小丑推波助澜。<br><br>在官媒严厉定性后，各大平台立即对马保国相关内容实施了全方位的限流和下架处理，其原本高调的商业化变现通道被强行关闭。截至2026年，马保国在经历了几轮彻底封禁和限流后，主要依靠在其快手、抖音小号上分享日常养生打拳以及少量的电商带货维持生计，其热度早已在全网消费和监管规范中退潮。他的经历展示了互联网算法和审丑经济如何将传统武术界的一场拳台闹剧，重构并放大为全网荒诞解构的流量狂欢，并最终在社会基本公序良俗红线面前触壁覆灭。
