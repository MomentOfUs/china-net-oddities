relics:
- name: 发青的眼眶
  desc: 2020年5月17日采集自山东某民间擂台的人体物证。一位69岁老人30秒内被击倒三次后留下的面部淤痕，后来成为全民消费的快乐原料。
- name: 浑元形意太极拳谱（影印本）
  desc: 马保国自称的武学典籍，据载包含"接化发"三大核心技术。该文献的实战效果在2020年5月17日接受了历史性检验，结论为：理论完美，实战为零。
- name: 闪电鞭创意模型
  desc: 马保国标志性招式的物理化再现。松活弹抖，闪电五连鞭——这套动作在武术史上可能毫无地位，但在互联网模因史上占据了一席之地。
glossary:
- key: 大意了没有闪
  val: 马保国被KO后在视频中的辩解。这句话以极致的"我不承认我输了"的逻辑，成为互联网上形容翻车后强行挽尊的万能句式。
- key: 年轻人不讲武德
  val: 马保国劝诫"偷袭"他的年轻人的名句。该句的荒诞之处在于：一个自称太极大师的人被一拳KO后，怪对方没有提前打招呼。
- key: 耗子尾汁
  val: '"好自为之"的马保国口误版。这个发音误差在互联网上获得的传播量超过了原词，成为2020年度最火的谐音梗之一。'
- key: 接化发
  val: 马保国武学理论的核心三元组：接招、化解、发劲。理论上看无懈可击，实战中被30秒KO，完成了理论物理学与实验物理学之间鸿沟的肉身演示。
- key: 闪电五连鞭
  val: 马保国的标志性招式，以松活弹抖的动作打出五连击。该招式的实际杀伤力从未被验证，但其在互联网上的模因价值已超越了一切武术评价体系。
