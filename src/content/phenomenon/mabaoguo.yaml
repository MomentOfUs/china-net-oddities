essay: |
  <p>2020年5月17日山东淄博的一场民间搏击擂台上。69岁的马保国双手抱拳，以浑元形意太极拳掌门人的身份迎战业余搏击手。然而在短短30秒内，他被对方连续击倒三次，最后一次直挺挺地后脑着地陷入昏迷。这段狼狈不堪的被KO视频，被现场观众迅速上传至网络，拉开了一场中文互联网史上最大规模的审丑风暴。</p><p>马保国的爆红依赖于大众对“传统武术神话破灭”的恶搞快感与算法的指数级分发。被KO后，他顶着红肿的眼眶录制视频，一本正经地用“年轻人不讲武德”、“来骗来偷袭”和“耗子尾汁”进行错乱的辩解。这种严肃的说教与滑稽事实的强烈反差，完美缝合了网民的解构心理，B站上迅速涌现出海量的鬼畜二创，将他推上了黑红流量之巅。</p><p>然而，当这股黑红流量被推向商业变现的顶峰时，其背后的低俗审丑本质触碰了主流价值的红线。2020年底，人民日报发文痛批其“闹剧该收场了”，直指其靠装疯卖傻博取商业利益的吃相难看，平台随即对其进行了永久禁播。<span class="hl">这场戏剧性的坠落，是他试图将大众的嘲笑转化为商业打赏的自取其辱，彻底撕碎了他所谓的传统宗师外衣。</span></p><p>禁播并未能彻底终结他的生命，在名利诱惑下，他迅速放下“宗师”的架子，入驻抖音带货，甚至在镜头前配合商家做出各种怪诞的武术动作。他不再试图解释自己为什么被KO，而是彻底接受了自己作为一个带货小丑的定位。他的每一次出镜，都是一次对自我尊严的公开折现，依靠充当玩物在互联网的夹缝中生存。</p><p>截至2026年，马保国依然在直播间里打着“闪电五连鞭”推销着廉价商品，昔日的太极掌门人已沦为纯粹的滑稽模因。弹幕区里飘满了嘲讽的“耗子尾汁”，他则面无表情地继续念着带货话术。他最终以自身的彻底小丑化，成为了中文互联网注意力经济时代，一具被资本和网民榨干后凝固的审丑标本。</p>

