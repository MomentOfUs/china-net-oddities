english_name: Ma Baoguo (Tai Chi Master)
essay: <p>2020年5月17日，一个69岁的老人走上了一个简陋的擂台。对手是一个三十出头的业余搏击爱好者。比赛持续了不到30秒——老人被击倒三次，最后重重摔在地上，失去了意识。</p><p>如果故事在这里结束，它只是一个有关"传武神话破灭"的小新闻。但马保国没有让故事结束——他拍了一个视频。</p><p>视频里，马保国眼眶发青，表情严肃，用一口山东普通话娓娓道来：<strong>大意了没有闪、"年轻人不讲武德"、"来骗！来偷袭！我这个六十九岁的老同志"、耗子尾汁</strong>。</p><p>这些话说出口的那个瞬间，2020年的中文互联网被投下了一颗文化核弹。</p><p>为什么这些词能火？因为它们在"一本正经的认真"和"荒谬绝伦的事实"之间创造了极致的反差。一个被人打晕在地的老人，不但不承认自己不行，反而像一个武林宗师在传授经验一样，给对手上了一堂"武德"课。这种自信——或者说这种对现实的彻底无视——产生了让人笑到停不下来的化学反应。</p><p>后来的故事是互联网教科书级的：B站鬼畜大军倾巢而出，千万级播放量的MAD如雨后春笋；不讲武德和耗子尾汁被国家语言资源监测中心列为2020年十大网络用语；连人民网都在标题里用耗子尾汁。</p><p>马保国短暂地试图利用这波流量：直播带货、付费连麦、签约经纪公司。但舆论迅速反转。人民日报发文批评"马保国闹剧"，各平台下架相关内容。他的账号被限流，直播被中断——风头骤起骤落，不过半年光景。</p><p>但梗没有消失。"大意了没有闪"至今活跃在每一个中老年人的微信群里，在每一个游戏连败的弹幕里，在每一个笑话的结尾里。马保国的遗产不是他那套拳法，而是那一段全国人民一起复读的、关于"武德"的黑色幽默。</p>
