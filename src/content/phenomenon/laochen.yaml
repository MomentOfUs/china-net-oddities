english_name: Chen Guoqiang (Anti-Fraud Officer Chen)
essay: <p>反诈老陈的意义，不在于他做了什么，而在于他经历了什么。</p><p>2021年的中国互联网，是"国家反诈中心"APP推广的关键时期。全国上下都在动员，各种宣传手段轮番上阵。而陈国平，一个普通的基层民警，用最简单的方式——穿着警服在抖音开直播、跟各种主播连麦——成了这场运动中最大的亮点。</p><p>他的公式极其简单：<strong>警服 + 反差 = 流量</strong>。当一个穿着制服的正经警察，在直播间里跟"西厂公公"、网络乞丐、各路牛鬼蛇神连麦时，产生的化学反应是核弹级的。观众们看的是——"正道的光"。那个穿着警服的人，是无数人对正义的投射。</p><p>但问题在于：当穿上警服的老陈成为了全中国的网红，脱了警服的老陈变成了什么？他不顾领导和同事的劝阻，在2022年4月正式辞职。他以为自己带走的是"流量"——但他不知道，那身警服才是流量的来源。辞职后的老陈做了一切尝试：拍农村生活短视频、做反诈短剧、直播带货——数据越来越难看，评论区越来越刻薄。</p><p>2024年老陈在网上公开求职。他对着镜头说"最看不起现在的自己"。济宁消防向他伸出橄榄枝——邀请被网友投诉后撤回。他做的事每一件都被涌到道德高地上审判。白岩松在节目中提到他，他说"白岩松是著名评论员"——下面全是骂他的。他做每件事都会被审判，到后来他发现自己不是警察了，连呼吸都是错的。</p><p>到2025-2026年，他的直播间从几百人降到两位数。他还在播，还在讲反诈，但已经没有人在听了。比后悔更残酷的结局不是"他错了"，而是"流量耗尽之后，他连后悔的资格都没了"。他不能回到警局，不能体面地退休，不能重新做普通人——他只能继续对着两位数的观众讲反诈，直到平台的算法把他彻底遗忘。反诈老陈最荒诞的地方不是他辞掉了警察的工作——是他以为流量是自己的，但流量从来都不属于任何人。它只是那段时间刚好路过他。</p>
