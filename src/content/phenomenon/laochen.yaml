glossary:
- key: 我是反诈主播
  val: 老陈直播连麦时的开场白。当他穿着警服出现在别人的直播间时，对面主播的反应本身就是最好的内容。
- key: 西厂公公
  val: 老陈与"西厂"雨化田连麦时的经典画面。一个警官对着一个扮太监的人宣传反诈——这场跨次元的对话成了2021年最火的直播名场面。
- key: 辞去公职
  val: 老陈人生最大的转折点。他以为脱下警服可以做更自由的内容，结果脱下的不只是警服，还有四百万粉丝的关注。
