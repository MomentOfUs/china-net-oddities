english_name: Chen Guoqiang (Anti-Fraud Officer Chen)
essay: |
  <p>2021年9月的一个深夜，抖音直播间里出现了一个前所未有的画面。屏幕左边是警服，右边是太监戏服。穿着警服的中年男人皱着眉，对着镜头严肃发问："我是反诈主播，你是什么主播？"对面的"西厂公公"愣住了，手忙脚乱地敬了一个礼。这段24秒的连麦录屏在24小时内被播放了上亿次。</p><p>老陈走红的公式不需要任何传播学训练就能看懂：警服加反差，等于绝对流量。一个真警察坐在一群牛鬼蛇神中间连麦，每一个画面都是天然的内容。观众不需要知道他叫陈国平，不需要了解他从警二十年——他们只需要看见那身警服。那身衣服替所有人说出了"正道的光"四个字。</p><p>问题是，老陈自己也没分清这一点。他渐渐以为那一百多万粉丝是冲着他这个人来的。他以为那句"我是反诈主播"的力量来自他的语气、他的表情、他的个人魅力。</p><p>2022年4月，老陈不顾领导多次劝阻，正式辞去公职。他相信自己带走的是流量——一百万人看过他，一百万人认识他。这是整件事里最致命的一个误会。<span class="hl">他以为自己在直播间里是主角。但主角从来都是那件警服。他只是刚好穿着它的那具身体。</span></p><p>脱下警服之后，老陈变成了一块被抽掉磁芯的铁。他试过拍农村短视频，试过做反诈短剧，试过直播带货——数据一路下滑，评论区从"正道的光"退化成"你谁啊"。2024年他对着镜头说"最看不起现在的自己"，公开在网络求职。济宁消防曾伸出橄榄枝——网友投诉后撤回。他发现自己失去的不只是那身衣服，还有开口说"我是反诈主播"的资格。</p><p>到2026年，他的直播间在线人数降到了两位数。他还在播，还在讲反诈。弹幕偶尔飘过一句"这不是老陈吗"，然后直播间重新归于安静。</p>

