comment: 反诈警官老陈，本名陈国平，1978年生，河北秦皇岛人。曾是一名基层民警，2017年开始从事反电信诈骗工作。<br><br>2021年9月，全国反诈行动如火如荼。陈国平穿着警服在抖音直播宣讲反诈知识，偶然间与一位主播连麦，说出那句被载入互联网史册的话——<b>"我是反诈主播，你是什么主播？"</b><br><br>这句话在一夜之间引爆全网。对方主播惊慌失措、主动交代的模样，配上警服的压迫感，形成了极致的喜剧效果。陈国平一夜涨粉百万，成为2021年最现象级的互联网人物。<br><br>他与各路主播连麦的名场面接踵而至："西厂公公"看到他敬礼、网络乞丐被教育、各路妖魔鬼怪在警服前乖乖低头——这些连麦视频成了2021年最受欢迎的互联网内容。<br><br>巅峰时期，他一场直播的打赏收入高达上百万元。在体制内拿着几千块工资的警察，突然面对如此巨大的金钱冲击，没有人能不被撼动。<br><br>2022年4月，陈国平做了一个改变一生的决定：辞去公职，成为一名全职主播。他脱下了那身警服。<br><br>然后，一切就变了。失去警服加持的老陈，直播间在线人数从几万跌到几百。他拍农村生活视频、做反诈短剧、直播带货——什么方法都试了，流量再也没回来。月收入从十几万跌到一万出头。<br><br>2024年，他在求职视频中公开喊话求一份工作，说自己"最看不起现在的自己"。济宁消防曾向他伸出橄榄枝，但被铺天盖地的网友投诉推了回去。<br><br>反诈老陈的故事，是互联网时代最残酷的寓言之一：<b>你以为是自己的才华和努力，其实只是那身衣服</b>。
