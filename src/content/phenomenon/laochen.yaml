comment: |-
  <b>反诈警官老陈</b> · 陈国平 · 我是反诈主播<br><br>陈国平（网络ID为“反诈警官老陈”），1977年出生于河北省秦皇岛市的一个普通农村家庭。他于1996年应征入伍，在部队锤炼了坚韧的作风。2000年左右，陈国平退伍转业进入公安系统，成为秦皇岛市公安局海港分局的一名基层民警。在长达二十年的警务生涯中，他曾先后从事过缉毒、刑侦等一线警务工作。近年来，面对电信网络诈骗犯罪的激增，陈国平调入反诈中队，负责反诈宣传工作，并开始尝试利用新兴的短视频平台开展线上反诈宣讲。<br><br>2021年9月，陈国平在抖音平台以“反诈警官老陈”的名义开展日常反诈连麦直播。在一次个人直播PK中，他连麦到了打扮成太监模样的搞笑主播“西厂公公”。陈国平穿着威严的警服，以极具反差感的神态严肃发问：“我是反诈主播，请问你是什么主播？你下载国家反诈中心APP了吗？”这一突如其来的官方连麦让娱乐主播瞬间慌张致敬，戏剧性的反差感和正能量传播效果迅速在全网刷屏。“我是反诈主播”成为年度最红金句，老陈的直播间一夜之间暴涨百万粉丝，成为中文互联网上史无前例的现象级流量事件。<br><br>在2021年下半年的流量巅峰期，老陈成为了全国最具知名度的明星警察。他以一己之力推动了“国家反诈中心APP”在全国范围内的下载狂潮。他不仅与各路网络大主播高频PK，还受邀参与了多档主流媒体栏目的录制。然而，巨大的流量很快带来了极大的争议。2022年3月，老陈在一次公益性质的直播中，接受了一位神秘网友打赏的333个“嘉年华”（折合人民币约100万元）。尽管他随后宣布将打赏所得扣税后全部用于公益捐赠，并公示了捐款证书，但“公职人员直播接受巨额打赏”依然在社会上引发了关于警民伦理与警纪警规的狂热声讨。<br><br>面对潮水般的举报信、舆论压力以及体制内严苛的纪律约束，陈国平做出了一个令全网震惊的决定：2022年4月，他正式宣布辞去警察公职，脱离公安系统，专职转型为一名自媒体商业网红。然而，老陈严重低估了“制服”与“个人”在流量市场中的主次关系。辞去公职后，失去了体制背书和警服光环的老陈，其流量呈断崖式下跌。为了维持关注，他开始尝试与各类娱乐主播连麦，但在直播中却由于缺乏边界感而出现低俗言行。在一场与女主播的连麦中，他因做出带有性暗示的不雅动作，遭致全网痛批，社会口碑彻底崩塌。2024年初，老陈在网上公开求职，喊话“如果敢用我、想用我的单位可以联系我”，甚至表示“最看不起现在的自己”，其求职合作因遭到网民的联合投诉而屡屡夭折。<br><br>截至2026年，陈国平依然在各大平台上坚持着他的直播，但昔日动辄千万的场观已缩水至两位数的在线人数。他成为了各大自媒体盘点“流量泡沫破裂”和“后悔辞职第一人”的典型反面教材。陈国平的转型悲剧深刻地证明了，在注意力经济的浪潮中，体制内红利具有极强的脱域贬值属性——很多时候，网红所拥有的影响力并非源自其个人才华，而是源自他身上那件神圣的警服；一旦脱下警服，借来的流量迟早要如数奉还。
