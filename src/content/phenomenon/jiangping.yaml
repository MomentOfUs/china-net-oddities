# 六、正文内容
comment: |
  <b>2007</b> · 江苏涟水 · 姜萍<br><br>姜萍，2007年出生于江苏省淮安市涟水县的一个普通农村家庭。初中毕业后，她考入涟水中等专业学校（简称

essay: '<p>2024年6月13日，一个名字突然出现在了阿里全球数学竞赛的晋级名单上——姜萍，第12名，来自江苏涟水中等专业学校，服装设计专业。在这条信息出现之前，没有人知道她是谁。三个标签——"中专生"、"女生"、"第12名"——在互联网的算法机制里产生了剧烈的化学反应。一夜之间，全网认识了她。</p><p>达摩院的传播团队本能般地启动了流程。他们派人去涟水拍了一条短片：一个穿着白色衬衫的少女，面对镜头，低着头，偶尔抬起眼睛羞怯地笑一下，说自己在自学高等数学。她没有大厂PR视频惯用的坚定眼神和节奏感台词，那种生涩感和非职业性，反而成了最好的传播素材。央媒接过这套素材完成了最后一轮的放大。一个完美闭环：大厂有传播素材可以交差，官媒有"正能量"选题可以出街，公众有一个故事可以感动。</p><p>疑点和感动同步抵达。她的当月月考数学成绩是83分，不是满分附近。她在采访中把《数学分析》说成了"数学方面"——任何一个真正学过高数的人都知道，一个能在国际竞赛中拿第12名的人不会犯这样的口误。北大数学教授袁新意的公开发声带来了职业级别的拆解。公众分成两派，互相僵持了将近五个月。</p><p>2024年11月3日，阿里竞赛组委会和涟水中专联合发了一份通报。承认了，在预选赛中，教师王闰秋违规为姜萍提供了帮助。没有说替考，没有说代写，而是用了"提供帮助"四个字。通报很短。老师被诫勉谈话，取消了评优资格。没有追究姜萍的责任，理由是她未成年。</p><p>这是整件事最让人沉默的部分：从头到尾，姜萍都没有说过一句超过记者提问内容的完整的话。她没有被造神的野心，也没有辟谣的能力。她是一张A4纸——老师借这张纸写了一份给自己评优的申请，达摩院在这张纸上复印了一套公关PPT，央媒在这张纸上印了一版正能量版面。写完了，用完了，放回了抽屉里。</p><p>今天回头再看这条时间线，最值得记住的数字不是第12名，不是83分，而是十一月三号。那天以后，没有人再提姜萍。就像这个故事的结局本该如此：一个被摆布的棋子，被放回了盒子里。而盒子上写着——2024年度最热互联网叙事。材料：劣质纸。有效期：五天。</p>'

# 七、三大拟物字段
relics:
  - name: 月考试卷——83分
    desc: 涟水中专门诊数学试卷，计分栏残留着红笔批注的"83"。一份普通的中专月考答卷，却成为了推翻中国互联网2024年最大流量叙事的致命物证。
  - name: 达摩院导演的采访短片
    desc: 2024年6月由达摩院委托电视台拍摄的姜萍采访原片。镜头前少女念着准备好的台词："数学分析……不是，数学方面"。这份未经剪辑的影像素材，日后将成为一场公关灾难的完整物证。
  - name: 2024年11月3日的通报函
    desc: 阿里竞赛组委会与涟水中专联合发布的官方通告复印本。全文不足300字，仅用一个"提供帮助"四字，便合上了整个中国互联网2024年最具争议的叙事卷宗。

glossary:
  - key: 天才少女
    val: 2024年6月加在姜萍身上的标签。它满足了全社会对"寒门出贵子"叙事近乎偏执的需求，也成为后续五年中互联网造神与毁神循环的最佳注脚。
  - key: 数学方面
    val: 姜萍在接受媒体采访时的原话口误——"我记得学得最透彻的是《数学分析》……啊不是，《数学方面》"。这一口误被数学界人士视为其真实水平的窥视孔，成为全网质疑的起点之一。
  - key: 提供帮助
    val: 阿里竞赛组委会在2024年11月3日通报中使用的措辞。它精确地回避了"作弊"或"代考"等定性用语，成为官方公关话术中的典范级模糊表达。
  - key: 王闰秋
    val: 涟水中专数学老师，姜萍的指导老师。策划了让姜萍以自己的名义参赛以谋取个人评优利益的核心人物，最终因违规提供帮助被诫勉谈话。

