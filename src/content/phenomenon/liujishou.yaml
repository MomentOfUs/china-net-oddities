english_name: LiuJiShou
essay: |
  <p>留几手是中国互联网最完整的「L型人生」标本——不是因为他从巅峰跌落到谷底，而是因为他跌倒了之后发现，谷底躺着的那张沙发还挺舒服的。</p><p>2013年的留几手是一个现象的顶点。一个前程序员，在微博上给陌生人照片打分，三个月吸粉200万。这个模式在今天看起来简单到不可思议：没有剪辑、没有特效、没有团队，只有一个人对着照片写段子。但它成功的原因是它精准地踩中了那个时代最隐秘的心理需求——在人人都在表演完美的社交网络上，留几手提供了一个「被精准羞辱」但不会真正受伤的安全空间。你来求虐，我来满足你，两不相欠，各得其乐。这不是评论，这是互动。不是单向输出，是双向游戏。段子的真正消费者不是看客，是那些排队把照片发给他的人——他们在求一个被看见的机会，哪怕是以被骂的方式。</p><p>人民日报2013年那篇定性文章是对的——「审丑」确实是留几手模式的核心。但它的另一个名字是「解构」。葫芦屯小组那一整套犬儒主义、后现代解构文化，是留几手们的思想底色。他们不相信任何权威，不尊重任何秩序，把一切严肃的东西变成笑话。这套玩法的尽头必然是不断升级——因为当解构变成一种风格，你就必须一直找到下一个可以解构的对象。从普通人的照片到明星、到社会现象、到公共事件……他的靶子越来越大，冒险也越来越高。</p><p>《再见爱人4》的翻红是一次精确的复刻。他的毒舌在点评普通人照片的时代已经失效了——那套「负分滚粗」的话语放在今天会被举报到封号。但点评杨子就不一样了：杨子是一个公众认可的「靶子」——狂妄、油腻、控制欲强。留几手做的事和十年前一模一样——找一个人，分析他的漏洞，用最精准的言辞扎下去。只是靶子从「发照片的素人」换成了「综艺里坐对面的杨子」。观众反应也一样：太解气了。留几手没有变，只是时代找到了一个允许他继续毒舌的出口。</p><p>2026年3月的坠落是这个逻辑的必然终点。张雪峰猝死，他发「东北网红数量减一」。网友说死者为大，他说「凭什么？」这两个字是他的全部答案——他一生都在解构一切，包括「死者为大」这个传统的最后一道防线。当他说「凭什么」的时候，他不是在针对张雪峰，他是在执行自己的操作系统：没有什么是不能解构的，没有什么是不能吐槽的，没有什么是不能被「负分滚粗」的。但问题是，这套操作系统在2013年运行得很好，到了2026年，社会已经不接受这个「对所有事物负分滚粗」的许可了。</p><p>留几手的十年弧光是一个互联网的隐喻：一个时代的创造力来自于解构一切，一个时代的崩塌也来自于解构一切。他不知道自己什么时候该停下来。但也许他从一开始就没有「停下来」这个选项——当你靠「负分滚粗」成了千万大V，你还能干什么？只能继续「负分滚粗」，直到滚到自己身上。</p>
