comment: |-
  <b>初代网红与时评人</b> · 刘爽 · 留几手 · 负分滚粗<br><br>刘爽（网络ID为“留几手”，粉丝常称其为“手哥”），1980年代出生于吉林省长春市九台区的一个普通家庭。在成为初代网红之前，刘爽是个不折不扣的高材生，他毕业于正规大学的计算机专业，有着扎实的逻辑思维能力。大学毕业后，他曾进入IT企业担任程序员，从事系统开发工作。然而，程序员刻板的生活无法满足他对文字表达的渴望，他开始频繁在豆瓣社区上以“留一手”为ID撰写关于都市情感、个人见闻的技术分析类文章，以辛辣、幽默的文风在豆瓣早期积累了首批核心拥趸。<br><br>2013年初，刘爽正式将主战场转移至微博平台，并将网名改为“留几手”。他首创了“给照片打分”的互动模式：普通网友将个人肖像发给他，求取他的评价。刘爽凭借其极尽刻薄、尖酸、充满东北方言色彩与社会学解构的评语，对投稿的素人照片进行肆无忌惮的羞辱和解构，并最终给出一个极具标志性的低分和评语——“负分，滚粗！”这一近乎虐恋式的互动在微博上引爆，短短三个月内便吸引了超过200万粉丝。<br><br>在2013年至2015年的全盛期，“留几手”的微博粉丝量一路突破1300万，成为当时微博最具影响力的KOL之一。他的毒舌不仅让素人排队求骂，甚至吸引了林更新、陈赫、刘烨等主流娱乐明星主动发照片求打分以蹭取流量。他在自媒体广告变现上实现了日入10万元的商业神话。2013年，尽管官媒人民日报发文批评其评分为“审丑”文化，但这反而进一步推高了他的网络热度。在此期间，他与蜂群文化等MCN机构绑定，成为合伙人并间接持有公司股份，完成了从草根博主向资本运营者的跨越。<br><br>随着互联网审美品味的更迭和网络暴力监管的收紧，留几手赖以成名的“毒舌羞羞”模式在微博上逐渐被边缘化，其账号也因多次发表敏感政治和时事评论（如2023年嘲讽淄博烧烤为“小地方人的狂欢”）而多次遭遇禁言。2024年初，刘爽与妻子共同参加了芒果TV的婚姻纪实真人秀《再见爱人4》。在节目中，他凭借对另一位嘉宾杨子“装懂王”、“蹭圣依流量”等犀利且具有精准洞察力的点评，在全网实现了戏剧性的二次翻红，被观众奉为“互联网嘴替”。<br><br>然而，刘爽对一切事物习惯性的解构与戏谑，最终迎来了反噬。2026年3月25日，中文互联网上另一位争议性公众人物张雪峰因心源性猝死离世，举国哀悼。刘爽当晚在微博上发表了极其轻浮的调侃贴：“东北网红数量减一”。面对网友“死者为大”的善意劝诫，他强硬回怼：“凭什么？”这一极其违背公序良俗和基本人道主义底线的言论，引发了公众排山倒海的愤怒。次日（2026年3月26日），微博官方因其恶意消费逝者、挑动社会对立，对其账号实施了合规封禁，设置为“禁止关注”。这场坠落为刘爽长达十余年的“毒舌”生涯画上了一个讽刺的句号，完整展示了解构主义网红在过度戏谑现实后的必然覆灭。
