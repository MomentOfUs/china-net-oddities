comment: >
  <b>留几手</b> · 本名刘爽·初代网红·"负分滚粗"发明者<br><br>
  留几手（本名刘爽），中国大陆初代网络红人。2010年以ID"留一手"在豆瓣起家，2013年转战微博后爆红——他给网友发来的照片"打分"，语言犀利毒舌，动辄"负分""零分""滚粗"。这个看似简单的模式在微博上引发了病毒式传播：三个月吸粉近200万，巅峰期全平台粉丝超1300万。<br><br>
  <b>他的走红是这个时势的必然：</b>2010年代初，微博140字时代催生了段子手文化，"留几手"把"点评"做成了一个互动游戏。无论你被打了负分还是正分，被点评本身就是一种社交货币。明星也排队"求虐"——刘烨、陈赫、林更新都找他评过照。他的风格被称为"虐骂式点评"，人民日报2013年曾下场定性为"审丑"，但这反而让他更火了。<br><br>
  爆红后，他辞掉程序员工作成为全职网红。他是MCN蜂群文化的合伙人，间接持股16%，仅月分红就近30万。他曾自曝巅峰日入10万，微博广告报价1.5万起/条，一年禁言让他损失几百万。他参加过王思聪的生日会、在章鱼TV解说中超、被韩寒的ONE收录过文章。他自称"L型人生"——"登上过巅峰人生，而后时代红利变了，落回到了躺平的生活。"<br><br>
  <b>2024年，《再见爱人4》让他翻红。</b>他凭借对杨子的犀利点评——"有懂王！""你这些年蹭了圣依不少流量"——再次出圈。但翻红也意味着回到了公众的放大镜下。2026年3月25日，教育界网红张雪峰因心源性猝死离世，刘爽发了一条微博："东北网红数量减一。"网友劝他"死者为大"，他回复"凭什么？"次日，他的微博账号被禁止关注。<br><br>
  留几手的十年弧光，是中国互联网从文字时代到视频时代的完整映射：一个段子手在微博时代辉煌、在封禁中沉寂、在综艺中翻红、又因一张嘴再次坠落。粉丝说他人间清醒，批评者说他嘴淬了毒——这两件事可能本来就是同一件事。
