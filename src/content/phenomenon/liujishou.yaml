english_name: LiuJiShou
essay: |
  <p>2026年3月25日深夜，知名学者张雪峰猝逝的消息在微博上引发巨震。刘爽盯着屏幕，敲下一行极其轻佻的推文：“东北网红数量减一。”面对评论区劝他“死者为大”的善意警告，他以一贯傲慢的姿态强硬回怼“凭什么”。这一挑战人伦底线的行为在一夜之间引爆了全网的狂暴怒火，并于次日中午迎来了账号被官方实施合规封禁的裁决。</p><p>刘爽的走红公式建立在微博早期大V时代网民对于“毒舌人设”的审丑消费之上。从豆瓣情感评书起家，他在微博开创了通过极尽刻薄、满是东北方言的评语给素人照片打分的互动模式，以一句“负分，滚粗”迅速聚拢了上千万粉丝。算法和大众的好奇心奖励他这种肆无忌惮的解构，使他成为风光无限的初代顶级流量大V。</p><p>然而，在经历了图文自媒体黄金期的消退后，刘爽在时代的更迭中展现出无休止的流量焦虑。他试图通过参加综艺真人秀《再见爱人4》重塑“互联网嘴替”的清醒人设，其背后的核心悖论在于：他必须不断寻找新的靶子进行尖酸的嘲讽以维持其毒舌商业价值。<span class="hl">这种无差别的解构最终走向了反噬，暴露了他在狂妄变现中对人道精神的极度冷血。</span></p><p>张雪峰去世后的那句暴论，是他毒舌生涯中最惨烈的崩溃瞬间。他习惯了将一切悲剧和严肃议题降维成取悦粉丝的轻浮段子，却忘记了这一次死者并没有主动把照片发到他的私信里求他评分。大众无法容忍一个把死亡当成调侃噱头的寄生虫，平台以铁腕封禁将其长达十余年的毒舌生涯彻底拉下铁幕。</p><p>截至2026年3月26日，刘爽那拥有千万粉丝的微博账号已处于“禁止关注”和内容封存状态，昔日繁华的自媒体商业化帝国在一日之间化为一片死寂的废墟。他用自己的自毁，为中文互联网初代网红的落幕画上了一个充满反讽的休止符。他在自己发起的解构浪潮里，被大众彻底解构并抛弃。</p>

