english_name: Fan Xiaoqin (Little Jack Ma)
essay: <p>范小勤的故事是中国互联网最残酷的童话——一个智力残疾的孩子，因为长得像首富，被从山沟里捞出来，又被像垃圾一样扔回去，再被像文物一样捞出来。整个循环跟他本人没有任何关系。</p><p>2015年那张照片改变了一切。马云转发时说"像照镜子"——他不知道他照见的不是自己，而是一个智力残疾二级的孩子一生的悲剧开端。资本在24小时内锁定了这个商品。他被带到石家庄，穿上小西装，学会了说"谢谢老板"，学会了向镜头微笑，学会了做一个人形展示品。没有人教过他怎么写字、怎么算数、怎么理解这个世界。五年。智力二级残疾。身高104厘米。这就是全部收获。</p><p>2021年被送回村里那天，他好像只出了一趟远门。但认知停滞在了被带走的那一年——17岁的身体里，住着一个8岁的孩子。</p><p>2026年，流量回来了。不是因为他有什么变化，而是因为互联网需要一个新的话题。他在直播间写那个歪歪扭扭的"穷"字——他的人生缩写——网友说那是"唐宋八大家"，228元一幅，卖出近百万元。弹幕在狂欢。没有人停下来想过：一个智力残疾二级的年轻人写的字卖228元，买的人到底在买什么？是艺术吗？是同情吗？还是消费一个残障人士的猎奇感本身变成了商品？</p><p>然后官宣恋情。然后怀孕。双胞胎。19岁的女友对着镜头说"为流量怀孕"。范小勤站在旁边，什么也没说——他可能根本不明白这个词的含义。但资本知道。平台知道。算法知道。一场关于残障人士的伦理审判，被包装成甜蜜日常，按秒推送到了你的推荐页。</p><p>他的父亲范家发只有一条腿，站在镜头后面。他说了一句话："我就是个叫花子网红。"——这可能是整个事件里唯一一句没有被人写好的台词。命运给范小勤发了最烂的一手牌，而整个互联网，每一个人，都想从这手牌里抽一张。</p>
