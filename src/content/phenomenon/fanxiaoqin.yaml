comment: <b>2008.4.30</b> · 江西吉安永丰县·严辉村<br><br>他叫范小勤。但大部分人只知道他叫"小马云"——一个因为跟中国首富长了一张相似的脸，被从山沟里捞出来，塞进西装，送上舞台，又在五年后像用过的道具一样被扔回去的孩子。<br><br>2015年，一张照片让这个江西贫困村的7岁男孩一夜走红。马云本人转发说"像照镜子"。资本立刻行动——河北商人刘长江以"资助教育"为名，将范小勤带到石家庄，穿上名牌，参加商演，录综艺，直播带货。他学会了在镜头前微笑、鞠躬、说"谢谢老板"、"我是马云的儿子"。没有人教他读书写字。因为对于一个流量木偶来说，认字不是必要的技能。<br><br>2021年，他长高了，长胖了，不像马云了。资本单方面解约，将他送回村里。五年流量生涯的全部成果：智力二级残疾诊断书。身高104cm——五年间几乎没有生长。体重36斤。认知水平约等于8岁儿童。一去一回之间，他的身体和精神都留下了不可逆的损伤——生长激素分泌异常（呆小症），智力停留在被带走的年纪。<br><br>然而互联网不会放过任何一个可以再消费一次的人。<br><br>2026年5月，18岁的范小勤再次出现在直播间。他烫了红发，戴了耳钉，在线7万人。他在镜头前写毛笔字——歪歪扭扭，笔画错乱，连自己的名字都写不利索。但网友把那个"穷"字解读出"唐宋八大家的风骨"。228元一幅的签名书法卖出数千份，二手平台炒到上万。<br><br>一个月后，官宣恋情。再一个月后，19岁女友自曝怀了双胞胎。后来又说"为流量怀孕"。<br><br>范小勤今年18岁了。他还不知道马云是谁。他不知道什么是流量，什么是爱情，什么是婚姻。他只知道城里有很多人围着他，发给他糖，让他说话。然后有一天，那些人不见了。然后有一天，那些人又回来了。<br><br>而他的父亲范家发——一条腿，一个智障的妻子，两个残疾的儿子——站在镜头后面。全村人都靠他儿子的流量活着。他说自己是个"叫花子网红"。
