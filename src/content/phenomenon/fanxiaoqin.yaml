relics:
- name: 马云转发截图
  desc: 2015年马云在微博上转发范小勤照片时配文"像照镜子"的截图。一张改变一个孩子命运的转发——首富照见的不是自己，而是一个智力残疾二级的孩子一生的悲剧开端。
- name: 小西装
  desc: 2016年资本将范小勤从江西农村带到石家庄后强行套上的童装西装。一件包裹着8岁儿童的商品外衣，五年后被脱下时，孩子的身高停留在104厘米。
- name: 智力二级残疾诊断书
  desc: 2021年范小勤被送回农村后乡政府出具的正式诊断文件。消费了五年之后，人们才"发现"这个被当成商品展览的孩子，从一开始就是一个需要特殊照顾的残疾人。
glossary:
- key: 小马云
  val: 范小勤因长相酷似马云被赋予的符号化称呼。这个标签剥夺了她的本名，将她从一个活生生的人简化为一个"长得像首富的商品"。
- key: 智力二级残疾
  val: 范小勤被送回农村后乡政府出具的诊断结论。这个信息本应在资本带走她之前就完成核查——但它没有。因为核查清楚了，这个商品就不值钱了。
- key: 叫花子网红
  val: 2026年范小勤被再次推到镜头前时的新定位。从"小马云"到"叫花子网红"，同一个孩子，同一个被消费的命运，换了包装继续出售。
- key: 被送回
  val: 2021年范小勤像用过的道具一样被退回江西农村。身高104厘米、体重36斤、智力二级残疾——这是资本还给这个家庭的"成品"。
