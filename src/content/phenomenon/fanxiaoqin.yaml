comment: |-
  <b>2008.4.30</b> · 江西吉安永丰县·严辉村<br><br>范小勤，2008年4月30日出生于江西省吉安市永丰县石马镇严辉村。他的家庭背景极其困难且充满悲剧色彩：父亲范家发在年轻时因蛇咬被迫截肢，成为独腿残疾人；母亲患有先天性小儿麻痹和智力障碍，且不幸被独眼狼咬瞎了一只眼睛；祖母则患有严重的老年痴呆症。范小勤本人与哥哥范小勇均遗传了智力残疾，全家仅靠独腿的父亲干农活和微薄的低保维持生计，范小勤童年时期从未接受过任何正规教育，生活在极度贫困与营养不良的边缘。<br><br>2015年，一名同村村民回乡探亲时，偶然拍下了范小勤的照片并将其发布在网络上。由于照片中范小勤的容貌与阿里巴巴创始人、当时如日中天的中国首富马云惊人地相似，该照片迅速走红。2015年7月，马云本人在微博上转发了该照片，并幽默地调侃称“乍一看到这小子，还以为是家里人上传了我小时候的照片，这感觉跟照镜子一样”。首富的互动使得范小勤瞬间成为全网舆论的焦点，被冠以“小马云”的称号，命运自此彻底改变。<br><br>2017年前后，来自河北的商人刘长江介入，承诺每年支付范家一笔生活费并资助范小勤上学，随后将9岁的范小勤带离江西农村，前往河北石家庄。在随后的五年里，范小勤被包装成了商业展示品。他住在高档住宅中，由保姆贴身照顾，频繁出入各大饭局、商演活动以及网络直播间。他被教导穿着精致的西装，模仿马云的姿态，并在镜头前机械地重复鞠躬和喊出“谢谢老板”、“么么哒”等刻板台词。在流量巅峰期，他成为了资本吸金的符号，而其作为儿童所应享有的正常成长环境和基础受教育权则被严重剥夺。<br><br>随着时间的推移，范小勤生理特征发生变化，身体变胖，容貌也逐渐不再像马云，其身上的“首富替代品”商业价值迅速归零。2021年，商人刘长江单方面解除合约，将13岁的范小勤送回了江西严辉村。当他重回村庄时，舆论哗然：13岁的他身高仅有104厘米，体重36斤，连简单的算术和自己名字的拼写都不会，且腿上布满了密密麻麻的针眼（引发了资本注射生长抑制剂的谣言，后被证实为皮肤病所致）。经专业医院诊断，范小勤患有矮小症且智力二级残疾。重回农村的范小勤，很快又吸引了大量流量掮客和自媒体博主，甚至其父亲也开设了抖音账号，继续让他出现在视频中写毛笔字、展示失智行为以维持关注。<br><br>2026年，成年后的范小勤再次成为争议中心。5月8日，他以一头烫红发、戴耳钉的形象进行了“成年首播”，在线峰值高达7万人，单场打赏收入超过29万元。他在直播间售卖歪歪扭扭书写的“穷”字书法作品，每幅定价228元，销售额近百万元，并在二手平台上被炒至万元。5月20日，范小勤官宣了与一名19岁网民的恋情，不久后女友在直播中公开宣称怀上双胞胎并坦承“为流量怀孕”，引发全网道德伦理的激烈声讨。截至2026年，范小勤依然没有建立起健全的社会认知，其荒诞的互联网生活仍由其家庭和幕后推手操盘，彻底沦为了一个被流量时代过度消费且无法自主掌握命运的底层符号。
