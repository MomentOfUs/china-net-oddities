english_name: Fan Xiaoqin (Little Jack Ma)
essay: |
  <p>2015年，江西永丰县严辉村。一个八岁男孩蹲在村口的泥地上，嘴里嚼着一根不知道从哪儿捡来的树枝。一个路过的村民停下来看了他一眼，然后掏出手机拍了张照片。这个男孩长了一张和马云几乎一模一样的脸——最著名的中国企业家和最贫困的江西山村儿童之间，被同一组面部特征连接在了一起。那张照片在两天内传遍全国。范小勤那时候还不知道自己有一个"爸爸"存在。</p><p>马云本人在微博上回应了此事："小马云是一个孩子，我希望他有一个快乐的童年。"但"快乐"这个选项在照片传遍全网的那个夜晚就已经不存在了。流量像一堵墙一样倒过来。浙江的老板来了，河北的经纪公司来了。一个叫刘长江的人签下了范小勤，把他带到石家庄。范小勤坐上了人生中第一架飞机。他第一次吃到麦当劳。不会用筷子，不会用马桶。八岁之前，他的日常货币是山里捡的废纸和塑料瓶，突然有一天，他演出的出场费足够他爷爷种十年的地。</p><p>接下来的四年是一份内容清单：拍视频，直播，参加活动，录歌。他对着镜头喊"阿里巴巴"，喊"大家好我是小马总"。他学会了几个固定的动作和表情——在正确的时候向观众问好，在正确的时候对着镜头假笑。拍摄间隙，他蹲在角落里啃手指，和八岁之前没有任何区别。2020年，合同到期。范小勤回到了严辉村。不会算数，不会认字，不会写自己的名字。他的身高停留在了八岁时的水平——不是基因，是因为"小马云"的"小"是他的商业核心参数，没有人需要这个参数被更新。</p><p>回村后，有志愿者来教他。他的智力没有被破坏——它停留在被流量冻结的那个时刻。他重新学会了和人打招呼，重新学会了去村口小卖部买东西。只是每次有人举起手机，他会本能地面向镜头，摆出那个学了四年的表情——嘴微微张开，眼睛盯着摄像头，像一只被训练过的海豹等待会得到一块鱼。那个动作发生在他意识到自己在干什么之前，在大脑做出判断之前，肌肉记忆已经完成了这场表演的所有步骤。</p>

