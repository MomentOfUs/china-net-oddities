relics:
- name: 破旧智能手机
  desc: 山东滨州一位42岁农民使用的智能手机。2021年6月之前它只用来拍土味视频，粉丝不过几千；之后的一个月里，它见证了中文互联网最不可复制的流量神话。
- name: 安妮连麦截图
  desc: 2021年6月铁山靠与网红安妮的直播连麦截图。一次普通的连麦互动，让一个山东农民一夜之间从几千粉暴涨到几十万——算法选中他的时候，不需要任何理由。
- name: 全平台封禁通知
  desc: 铁山靠爆红后不久收到的平台封禁通知。算法给了他一切，算法又全部拿走——他不是被封杀的，他是被算法"用完即弃"的。
glossary:
- key: 铁山靠
  val: 山东方言，形容一个人像山一样可靠。这个词后来成了一个42岁山东农民的直播ID，再后来成了一个被全平台封禁的流量神话——再也没有人敢用这个词做ID。
- key: 安妮
  val: 与铁山靠连麦的网红主播。那一次连麦改变了两个人的命运——铁山靠从几千粉到顶流，安妮被推到了舆论风暴的中心。一次连麦，两种结局。
- key: 流量之神的私生子
  val: 铁山靠粉丝给他的封号。他没有内容、没有团队、没有运营，但数据碾压几乎所有头部主播——他是算法意志的肉身展现，也是算法无常的最佳证明。
- key: '421'
  val: 铁山靠与安妮直播互动的标志性场次编号。这个数字在粉丝圈内成为暗号，代表了那个"农民主播一夜封神"的魔幻之夏。
