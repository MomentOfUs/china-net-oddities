english_name: TieShanKao
essay: |
  <p>2021年6月，一个四十二岁的山东农民在抖音上误触了连麦键。屏幕对面是网红安妮，穿着猫耳头饰，正在用夹子音撒娇。他看了她几秒，皱起眉头，用浓重的胶东方言吐出四个字：“我是嫩爹。”</p><p>这四个字在接下来的三个月里被播放了三亿次。他从几千粉涨到一千万粉，单场直播在线十万人。他没有内容，没有运营，没有团队——他甚至没想过要红。他只是被算法选中了。平台选中一个人的时候不需要理由。推荐权重在他身上指数级放大，形成从众效应：你刷到他，停住，算法记住，推给下一个。铁山靠证明了平台可以在任何原材料上制造顶流——一个只会骂人的山东农民也行。</p><p>2021年9月16日，全平台同步封禁。理由：“内容低俗”。同一时期，平台上比这四个字出格得多的内容仍在正常流通。<span class="insight">铁山靠真正的罪名不在他说了什么——在他不在任何名单上。</span>没有MCN签约，没有团队可谈判，没有合约可约束。平台花了三个月发现自己造了一个控制不了的东西。造他和毁他的是同一只手。这只手做这两件事，都不需要理由。</p><p>封禁之后，互联网上开始流传铁山靠死了。心脏病、死在监狱里、被仇家杀害——数个版本并行，每一条都是编的，每一条都有人信。他妻子阿敏出来辟谣，辟谣迅速变成新版本死亡叙事里的一个情节。人们不是在消费这些谣言——是在用它们解释一个无法解释的事实。一个活人在互联网上存在了三个月，然后被抹除得如此彻底，以至于“他已死亡”反而成了最合理的解释。</p><p>截至归档日期，刘铁山在互联网上依然不存在。他没有退网声明，没有告别，没有留下任何一个字的交代。他只是不再出现了——一条在峰值被切断的流量曲线，在坐标系上持续下坠，直到归零。</p>

