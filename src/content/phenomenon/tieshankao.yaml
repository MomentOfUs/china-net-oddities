english_name: TieShanKao
essay: |
  <p>铁山靠的荒诞不在他本人，而在那个让他凭空出现又凭空消失的系统。</p><p>他的流量逻辑直接到令人不安——他没有内容，没有运营，没有团队。一个山东农民，42岁，对着手机镜头骂骂咧咧，就拥有了千千万人梦寐以求的顶流数据。这不是对"内容为王"的证伪，这是对"算法为王"的显影：平台想要你红的时候，你不需要任何理由。算法不需要你的才华，只需要你的数据符合某种不可言说的分布曲线。</p><p>他和安妮的连麦是互联网史上最经典的时间窗口案例之一。在那一分钟之前，他是几千粉的农村中年人。一分钟之后，他是全国顶流。平台在他身上投入了推荐权重，然后这个权重指数级放大，形成了一种"不得不看"的从众效应——你刷到他，停住，算法记住你，推荐给更多人，更多人刷到他，停住。这个过程不需要任何人为介入，它是一个完全自动化的、没有主体的权力在运作。</p><p>而封禁的逻辑同样直接。铁山靠的问题不是他做错了什么——问题是他存在本身。一个没有运营、没有包装、没有团队的农民被算法推上顶流，这本身就是对平台内容体系的挑衅。他不在任何MCN的白名单里，没有合约约束，没有团队可以谈判。他的不可控性才是原罪。封禁不需要理由，或者理由是什么根本不重要——重要的是可预测的流量必须由可预测的内容产生，而铁山靠是系统预测之外的黑洞。</p><p>最黑色幽默的部分是封禁之后。一个在系统内存在了三个月的人消失了，但他死后留下的信息比他在世时更多——关于他去世的传闻有多个版本：死在监狱里、心脏病突发、被仇家杀害。每一条都是编的，每一条都有人信。因为在算法的世界里，一个人可以消失得如此彻底，这种彻底本身就是一种暴力的证据——人们需要给他一个死亡叙事来解释这个黑洞。"如果他没有死，为什么全网都找不到他？" 这个问题的潜台词是：在互联网时代，能让一个人消失得如此干净的，只有死亡。或者，比死亡更彻底的东西。</p>
