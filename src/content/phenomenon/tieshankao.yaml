comment: <b>铁山靠</b> · 山东滨州 · 农民 · 被封禁的流量神话<br><br>他被称为"流量之神的私生子"。2021年6月之前，他是山东农村一个42岁的中年农民，在快手上土味直播，粉丝不过几千。2021年6月，他与网红"安妮"的一次连麦互动，让他一夜之间从几千粉暴涨到几十万。此后一个月，他的直播间同时在线人数突破十万，数据碾压当时几乎所有头部主播。<br><br>但他的爆红毫无"网感"——他不会运营，没有团队，没有剧本。他的直播内容就是和妻子阿敏在田间地头聊天、骂人、唱土味山歌。他的口头禅"我是嫩爹"被全网模仿，"求怕累"成了互联网暗语。B站二创视频铺天盖地。抖音、快手、微博，处处是铁山靠。<br><br>然后他被封了。2021年9月16日，全平台同步封禁。官方给出的理由是"内容低俗"，但没有人真正知道封禁的具体原因。更离奇的是，封禁之后，互联网上开始流传他去世的消息——"铁山靠已经死了""心脏病突发""在狱中"。他到底是死是活，至今没有人能说清楚。他的妻子阿敏多次辟谣，但每一次辟谣都让传说更加扑朔迷离。<br><br>铁山靠的荒诞之处在于：他的整个互联网生命周期只有三个月。三个月，从农村中年人到全国顶流，再到彻底消失。他被算法推上去，被平台一键清除。他的爆红不因为才华，封禁不因为违法。他是算法时代最赤裸的案例——没有他，流量也照转。但他存在过的那三个月，让所有人看见了流量这座机器的内部构造。
